{ brand: "小天鹅", code: "P4", descShort: "室内盘管高温保护", fullGuide: "1.清洗过滤网。2.检查风机转速。3.检测盘管传感器。4.检查电加热是否异常。" },
{ brand: "小天鹅", code: "P5", descShort: "室外冷凝器高温保护", fullGuide: "1.清洗冷凝器翅片。2.检查外机散热风扇。3.清理散热器。4.检查制冷剂是否过多。" },
{ brand: "小天鹅", code: "P6", descShort: "压缩机相电流检测故障", fullGuide: "1.检查压缩机线序是否正确。2.测量压缩机三相绕组阻值。3.更换变频模块。4.更换压缩机。" },
{ brand: "小天鹅", code: "P7", descShort: "排气温度过高保护", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。" },
{ brand: "小天鹅", code: "P8", descShort: "压缩机顶部温度保护（新款变频）", fullGuide: "1.检测压缩机顶部温度传感器。2.检查制冷剂是否不足。3.改善外机散热。4.更换压缩机。" },
{ brand: "小天鹅", code: "P9", descShort: "化霜保护/防冷风保护（新款）", fullGuide: "1.空调正常进入化霜模式。2.制热预热阶段防冷风保护，等待几分钟自动恢复。3.如长时间不出风，检查内机管温传感器。" },
{ brand: "小天鹅", code: "H5", descShort: "变频模块温度过高保护（新款）", fullGuide: "1.断电后检查模块散热片。2.检查外机散热风扇。3.更换导热硅脂。4.更换IPM模块。" },
{ brand: "三菱重工", code: "E1", descShort: "线控器与内机通讯故障/操作开关线断/室内机板不良", fullGuide: "1.检查线控器连接线是否断线或接触不良。2.检查室内机电路板是否损坏。3.测量开关信号线通断。4.更换室内机P板。" },
{ brand: "三菱重工", code: "E2", descShort: "室内机地址重复/室内机板故障", fullGuide: "1.检查同一系统内室内机地址是否有重复。2.重新设置室内机地址码。3.更换室内机电路板。" },
{ brand: "三菱重工", code: "E3", descShort: "未检测到室外机/内外信号线断/室外机电源OFF", fullGuide: "1.检查室内外机信号连接线是否断路。2.检查室外机电源是否ON。3.检查室外机号码设定是否正确(未设48或49)。4.检查内机板信号线CNK端子保险丝是否熔断。5.更换室外机板。" },
{ brand: "三菱重工", code: "E4", descShort: "室内机地址设定错误(设为48或49)", fullGuide: "1.检查室内机地址码设定。2.重新设置有效地址码(非48/49)。3.更换室内机电路板。" },
{ brand: "三菱重工", code: "E5", descShort: "室内外机通讯异常/室外机电源分开/外机板故障", fullGuide: "1.检查室内外机连接线是否松动。2.测量通讯电压。3.检查室外机电源是否分开供电。4.更换室外机电路板。" },
{ brand: "三菱重工", code: "E6", descShort: "室内热交换器热敏电阻故障/内机板故障", fullGuide: "1.检查热交换器热敏电阻连接是否松动。2.测量热敏电阻阻值(25℃约5-10K)。3.更换热敏电阻。4.更换室内机板。" },
{ brand: "三菱重工", code: "E7", descShort: "室内环境温度传感器故障/吸气热敏电阻不良", fullGuide: "1.检查吸气热敏电阻连接。2.测量热敏电阻阻值。3.更换热敏电阻。4.更换室内机板。" },
{ brand: "三菱重工", code: "E8", descShort: "制热过载保护(内机热交温度超68℃)/热敏电阻短路", fullGuide: "1.检查过滤网是否脏堵，清洗滤网。2.检查内机风机转速。3.检测热交换器热敏电阻是否短路。4.更换热敏电阻或室内机板。" },
{ brand: "三菱重工", code: "E9", descShort: "排水系统异常/浮子开关动作/电源电压过低", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。5.测量电源电压是否过低(额定70%以下)。" },
{ brand: "三菱重工", code: "E10", descShort: "操作开关多台控制时台数超过(17台以上)", fullGuide: "1.检查多台控制器设置。2.减少同时操作的控制台数(不超过17台)。3.检查控制器通讯线路。4.更换控制器。" },
{ brand: "三菱重工", code: "E11", descShort: "线控器设定内机地址时连接多台内机", fullGuide: "1.检查1个线控器控制的内机数量。2.线控器设定地址时只能连接1台内机。3.正确设置内机地址。" },
{ brand: "三菱重工", code: "E12", descShort: "室内机地址开关设置不良", fullGuide: "1.检查室内机地址开关设置。2.重新设置地址码。3.更换室内机电路板。" },
{ brand: "三菱重工", code: "E14", descShort: "定频一拖多室内主机与子机通讯不良/地址设定不良", fullGuide: "1.检查室内主机与子机之间的通讯线路。2.重新设置地址码。3.更换内机主板。" },
{ brand: "三菱重工", code: "E15", descShort: "室内机吹出温度传感器断线(出风传感器)", fullGuide: "1.检查出风温度传感器连接。2.测量传感器阻值。3.更换传感器。4.更换室内机板。" },
{ brand: "三菱重工", code: "E16", descShort: "室内风扇马达故障/室内基板不良(KX4机器)", fullGuide: "1.检查风扇马达线束是否断线、短路。2.检查风扇周围是否有异物缠绕。3.更换风扇马达。4.更换P板。" },
{ brand: "三菱重工", code: "E18", descShort: "通讯异常(集中控制器适用)", fullGuide: "1.检查集中控制器连接线。2.检查通讯线路。3.更换集中控制器。" },
{ brand: "三菱重工", code: "E28", descShort: "线控器温度传感器断线(线控器温度传感有效时)", fullGuide: "1.检查线控器温度传感器。2.更换线控器。3.更换线控器电路板。" },
{ brand: "三菱重工", code: "E30", descShort: "内外机连接不匹配/内机对应外机机号是子机", fullGuide: "1.检查内外机型号是否匹配。2.更换匹配的机组。3.检查内外机连接配置。" },
{ brand: "三菱重工", code: "E31", descShort: "室外机地址重复/室外机板故障", fullGuide: "1.检查室外机地址设置是否有重复。2.重新设置唯一地址。3.更换室外机电路板。" },
{ brand: "三菱重工", code: "E32", descShort: "电源缺相/反相/电源相序错误", fullGuide: "1.检查电源相序是否正确。2.将三相电源中任两相对换接法。3.检查电源是否缺相。4.更换室外机电路板。" },
{ brand: "三菱重工", code: "E33", descShort: "压缩机过流/缺S相或R相/缺相/外机板故障", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查压缩机是否缺S相或R相(初级52C次级配线)。4.更换压缩机或室外机板。" },
{ brand: "三菱重工", code: "E34", descShort: "52C接触器初级或次级缺T相", fullGuide: "1.检查52C接触器初级是否缺T相。2.检查电源线路连接。3.检查接触器是否损坏。4.更换52C接触器。" },
{ brand: "三菱重工", code: "E35", descShort: "制冷过负荷保护/室外热交温度超70℃/外机热敏电阻短路", fullGuide: "1.检查外机散热环境。2.清理冷凝器翅片。3.检查外机热敏电阻是否短路。4.更换热敏电阻或室外机板。" },
{ brand: "三菱重工", code: "E36", descShort: "压缩机排气温度过高(超130℃)", fullGuide: "1.检测压缩机排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。5.更换室外机板。" },
{ brand: "三菱重工", code: "E37", descShort: "室外热交换器温度传感器断线", fullGuide: "1.检测室外热交换器传感器阻值。2.更换传感器。3.检查线路连接。4.更换室外机板。" },
{ brand: "三菱重工", code: "E38", descShort: "室外环境温度传感器断线", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查线路连接。4.更换室外机板。" },
{ brand: "三菱重工", code: "E39", descShort: "压缩机排气温度传感器断线", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。4.更换室外机板。" },
{ brand: "三菱重工", code: "E40", descShort: "高压开关63H1动作/压缩机内部热保护49C动作/排气温度过高/电源电压过低", fullGuide: "1.检查高压开关是否动作。2.检测压缩机内部热保护器。3.检查排气温度传感器。4.测量电源电压是否过低。5.更换高压开关或压缩机。" },
{ brand: "三菱重工", code: "E41", descShort: "功率模块温度过高(KX/KX4机器)", fullGuide: "1.断电后检查模块散热片。2.检查外机散热风扇。3.更换导热硅脂。4.更换IPM模块或变频板。" },
{ brand: "三菱重工", code: "E42", descShort: "压缩机过电流(启动过程中电流过大)", fullGuide: "1.检测压缩机启动电流是否过大。2.检查压缩机是否卡缸。3.检查压缩机电容。4.更换压缩机。" },
{ brand: "三菱重工", code: "E43", descShort: "室内机连接台数或容量超过规定值", fullGuide: "1.检查室内机总容量是否超出室外机容量范围(50%-135%)。2.调整室内机配置。3.更换更大容量的室外机。" },
{ brand: "三菱重工", code: "E45", descShort: "变频控制基板通信异常", fullGuide: "1.检查控制P板与变频P板之间的通讯连接。2.测量通信电压。3.更换控制P板或变频P板。" },
{ brand: "三菱重工", code: "E46", descShort: "同一信号线系统中混用自动地址、手动地址和线控器地址设定", fullGuide: "1.检查地址设定方式是否统一。2.全部改用同一种地址设定方式。3.重新设置地址。" },
{ brand: "三菱重工", code: "E48", descShort: "室外直流风扇异常(KX4机器)", fullGuide: "1.检查直流风机插头是否松动。2.测量风机绕组及霍尔反馈。3.更换室外直流电机。" },
{ brand: "三菱重工", code: "E49", descShort: "低压异常(PSL)/冷媒不足/压缩机未运转(KX4机器)", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查压缩机是否运转。" },
{ brand: "三菱重工", code: "E53", descShort: "压缩机吸气管传感器断线(Tho-S)(KX4机器)", fullGuide: "1.检测吸气管传感器阻值。2.更换传感器。3.检查线路连接。4.更换室外机板。" },
{ brand: "三菱重工", code: "E54", descShort: "高压压力传感器断线(PSH)(KX4机器)", fullGuide: "1.检查高压压力传感器接头连接。2.更换传感器。3.更换室外机板。" },
{ brand: "三菱重工", code: "E56", descShort: "功率晶体管温度传感器断线(Tho-P1)(KX4机器)", fullGuide: "1.检查模块温度传感器插头是否松动。2.测量传感器阻值。3.更换传感器。4.更换室外机板。" },
{ brand: "三菱重工", code: "E57", descShort: "63L低压开关动作/冷媒不足/压缩机未运转(单元机)", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查压缩机是否运转。" },
{ brand: "三菱重工", code: "E58", descShort: "电流保护", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压。3.检查系统压力。4.更换压缩机。" },
{ brand: "三菱重工", code: "E59", descShort: "压缩机启动不良(CM)/压缩机故障(KX4机器)", fullGuide: "1.检查压缩机线序是否正确。2.测量压缩机绕组阻值。3.检查压缩机电容。4.更换压缩机。" },
{ brand: "三菱重工", code: "E60", descShort: "压缩机转子位置检出异常(CM1)/压缩机锁定", fullGuide: "1.检查压缩机线序是否正确。2.测量压缩机三相绕组阻值。3.检查压缩机是否卡缸或堵转。4.更换变频模块。5.更换压缩机。" },
{ brand: "三菱重工", code: "E61", descShort: "室外主、子机之间通信异常", fullGuide: "1.检查室外主机与子机之间的通讯线。2.检查外机主板供电。3.更换故障主板。" },
{ brand: "三菱重工", code: "E62", descShort: "室外子机地址设置不当", fullGuide: "1.检查室外子机地址设置。2.重新设置唯一地址。3.更换室外子机板。" },
{ brand: "三菱重工", code: "E63", descShort: "紧急停止(KX4机器)", fullGuide: "1.检查是否按下了紧急停止按钮。2.断电重启。3.检查控制板。4.更换室外机板。" },
{ brand: "三菱重工", code: "E75", descShort: "信号线连接不良/信号线短路(集中/中央控制器)", fullGuide: "1.检查信号线连接是否良好。2.测量信号线是否有短路。3.更换信号线。4.更换集中控制器。" },
{ brand: "三菱重工", code: "E101", descShort: "室内温度探头故障", fullGuide: "1.检查室内温度探头是否损坏或接触不良。2.测量传感器阻值(25℃约5-10K)。3.更换传感器。4.更换室内机板。" },
{ brand: "三菱重工", code: "E102", descShort: "室内盘管温度过高", fullGuide: "1.清洗过滤网。2.检查内机风机转速。3.检测盘管传感器。4.检查制冷剂是否不足。" },
{ brand: "三菱重工", code: "E103", descShort: "室外盘管温度过高", fullGuide: "1.清洗冷凝器翅片。2.检查外机散热风扇。3.检查外机盘管传感器。4.清理散热器。" },
{ brand: "三菱重工", code: "E104", descShort: "低氟压力保护", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查阀门是否损坏。" },
{ brand: "三菱重工", code: "E105", descShort: "高氟压力保护", fullGuide: "1.检查压缩机是否过载。2.检查管道是否有堵塞。3.清洗系统管道。4.检查制冷剂是否过多。" },
{ brand: "三菱重工", code: "E106", descShort: "排水泵故障", fullGuide: "1.检查排水泵是否工作正常。2.清洗排水泵和管道。3.检查浮子开关。4.更换排水泵。" },
{ brand: "三菱重工", code: "E107", descShort: "室内外通信错误", fullGuide: "1.检查室内外通信线路是否连接正确。2.检查通信模块是否损坏。3.更换内机主板或外机主板。" },
{ brand: "三菱重工", code: "P8", descShort: "过滤网复位故障/滤网脏堵", fullGuide: "1.清洗过滤网。2.清洗水槽和排水管。3.按遥控器复位键消除提醒。" },
{ brand: "三菱重工", code: "wait", descShort: "压缩机预热/制热防冷风", fullGuide: "1.空调正在预热或化霜，属正常现象。2.首次上电或断电后上电，机组正在进行来电自启动等待。3.制热运行时室内机盘管温度低于设定值，内机不运转，等待3-5分钟预热。4.如长时间不出风，检查内机管温传感器。" },
{ brand: "三菱重工", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "三菱重工", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "万宝", code: "E1", descShort: "室内环境温度传感器故障", fullGuide: "1.检查室内环境温度传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查主板接口电路。4.更换室内机主板。" },
{ brand: "万宝", code: "E2", descShort: "室内盘管温度传感器故障", fullGuide: "1.检查室内盘管传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查线路连接。4.更换室内机主板。" },
{ brand: "万宝", code: "E3", descShort: "室外盘管温度传感器故障", fullGuide: "1.检查室外盘管传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查外机主板。" },
{ brand: "万宝", code: "E4", descShort: "室外环境温度传感器故障", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "万宝", code: "E5", descShort: "系统高压保护/压缩机过载", fullGuide: "1.清洗冷凝器翅片，保证通风良好。2.检查制冷剂是否过多。3.检查外机散热风扇是否运转。4.检查高压开关是否损坏。" },
{ brand: "万宝", code: "E6", descShort: "系统低压保护/缺氟", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查低压开关。" },
{ brand: "万宝", code: "E7", descShort: "通讯故障", fullGuide: "1.检查内外机连接线是否松动或断路。2.检查信号线连接是否正常。3.更换内机主板或外机主板。" },
{ brand: "万宝", code: "E8", descShort: "过电流保护", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查压缩机电容。4.更换压缩机。" },
{ brand: "万宝", code: "E9", descShort: "排气温度过高保护", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。" },
{ brand: "万宝", code: "dF", descShort: "自动化霜，正常状态", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "万宝", code: "CL", descShort: "过滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "万宝", code: "H1", descShort: "制热预热防冷风，正常运行", fullGuide: "空调正常进入制热防冷风模式，属正常现象，等待几分钟自动恢复。" },
{ brand: "万宝", code: "E0", descShort: "室内机EEPROM存储故障", fullGuide: "1.断电重启尝试恢复。2.更换室内主板。3.重新烧录EEPROM数据。" },{ brand: "万宝", code: "EA", descShort: "系统高压保护/管路堵塞/散热不良", fullGuide: "1.清洗冷凝器翅片，保证通风良好。2.检查制冷剂是否过多。3.检查管路是否堵塞。4.检查外机散热风扇是否运转。5.更换高压开关。" },
{ brand: "万宝", code: "Eb", descShort: "压缩机电流过载保护/卡缸", fullGuide: "1.检测压缩机电流是否过大。2.检查压缩机是否卡缸或堵转。3.测量压缩机绕组阻值。4.检查电源电压是否稳定。5.更换压缩机。" },
{ brand: "万宝", code: "Ec", descShort: "过欠压保护/电源电压异常", fullGuide: "1.测量电源电压是否正常(220V±10%)。2.检查电源线路是否接触不良。3.加装稳压器。4.避开用电高峰期使用。" },
{ brand: "万宝", code: "Ed", descShort: "四通阀换向异常故障", fullGuide: "1.测试四通阀线圈阻值(约2KΩ)。2.检查四通阀是否卡死。3.检查制冷剂压力。4.更换四通阀。" },
{ brand: "万宝", code: "F1", descShort: "变频IPM模块保护/过热/过流/短路", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。4.涂抹导热硅脂。5.检查外机散热风扇。" },
{ brand: "万宝", code: "F2", descShort: "PFC功率因数校正保护", fullGuide: "1.检查PFC电路IGBT及二极管。2.测量PFC输出电压。3.更换外机主板或PFC模块。4.检查电抗器。" },
{ brand: "万宝", code: "F3", descShort: "压缩机启动失败/失步保护", fullGuide: "1.检查压缩机线序是否正确。2.测量压缩机绕组阻值。3.检查电源相序。4.更换变频模块或压缩机。" },
{ brand: "万宝", code: "F4", descShort: "直流母线过欠压保护", fullGuide: "1.检测电源电压。2.检查PFC电路。3.检查电解电容。4.更换外机主板。" },
{ brand: "万宝", code: "F5", descShort: "压缩机顶部温度保护", fullGuide: "1.检测压缩机顶部温度传感器。2.检查制冷剂是否不足。3.改善外机散热。4.更换压缩机。" },
{ brand: "万宝", code: "P0", descShort: "系统压力异常保护", fullGuide: "1.检测系统压力。2.检查制冷剂是否过多或不足。3.检查管路是否堵塞。4.检查四通阀是否换向正常。" },
{ brand: "万宝", code: "P1", descShort: "冷凝器高温保护/外机散热不良", fullGuide: "1.清洗冷凝器翅片。2.检查外机散热风扇。3.清理散热器。4.检查制冷剂是否过多。" },
{ brand: "万宝", code: "P2", descShort: "蒸发器防冻结保护/内机风量不足", fullGuide: "1.清洗过滤网增加风量。2.检查内机风机转速。3.检测盘管传感器。4.检查制冷剂是否不足。" },
{ brand: "万宝", code: "P3", descShort: "排气温度过高保护/缺氟/散热差", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。" },
{ brand: "万宝", code: "FL", descShort: "水满保护/排水故障（天花机/风管机）", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。" },
{ brand: "万宝", code: "LP", descShort: "三相电源相序/缺相保护（商用机型）", fullGuide: "1.检查电源相序是否正确。2.调整相序，将三相电源中任两相对换。3.检查电源是否缺相。4.检查电源线路。" },
{ brand: "万宝", code: "EE", descShort: "室外机EEPROM存储故障", fullGuide: "1.断电重启尝试恢复。2.更换室外主板。3.重新烧录EEPROM数据。" },
{ brand: "韩电", code: "E3", descShort: "室外盘管温度传感器T3故障", fullGuide: "1.检查室外盘管传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查外机主板接口电路。4.更换外机主板。" },
{ brand: "韩电", code: "E4", descShort: "系统异常/制冷制热温度无变化", fullGuide: "1.检查制冷剂是否不足或泄漏，检漏补氟。2.检查四通阀是否换向正常。3.检查压缩机是否运行。4.检查系统是否堵塞。5.更换四通阀或压缩机。" },
{ brand: "韩电", code: "E7", descShort: "过欠压保护/电源电压异常", fullGuide: "1.测量电源电压是否正常(220V±10%)。2.检查电源线路是否接触不良。3.加装稳压器。4.避开用电高峰期使用。" },
{ brand: "韩电", code: "E8", descShort: "面板与内机主板通讯故障", fullGuide: "1.检查显示板连接线是否松动。2.更换显示板。3.更换内机主板。4.检查通讯线路。" },
{ brand: "韩电", code: "E9", descShort: "排水故障/水满保护（商用天花机）", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。5.更换排水泵。" },
{ brand: "韩电", code: "EA", descShort: "电流传感器故障/检测回路异常", fullGuide: "1.检查电流互感器(CT)连接是否松脱。2.测量CT输出电压。3.更换CT传感器。4.更换外机主板。" },
{ brand: "韩电", code: "Eb", descShort: "主控板与显示屏通讯故障", fullGuide: "1.检查主控板与显示屏之间连接线。2.更换显示屏。3.更换主控板。4.检查通讯线路。" },
{ brand: "韩电", code: "Ec", descShort: "冷媒泄漏/系统低压保护", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查管路接头是否松动。" },
{ brand: "韩电", code: "Ed", descShort: "四通阀换向异常", fullGuide: "1.测试四通阀线圈阻值(约2KΩ)。2.检查四通阀是否卡死。3.检查制冷剂压力。4.更换四通阀。" },
{ brand: "韩电", code: "EE", descShort: "室外机EEPROM故障/参数丢失", fullGuide: "1.断电重启尝试恢复。2.更换室外主板。3.重新烧录EEPROM数据。" },
{ brand: "韩电", code: "F0", descShort: "压缩机电流过载保护", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查压缩机电容。4.检查系统压力。5.更换压缩机。" },
{ brand: "韩电", code: "F1", descShort: "室外环境温度传感器T4故障", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查主板接口。4.更换外机主板。" },
{ brand: "韩电", code: "F2", descShort: "冷凝器高温保护/外机散热不良", fullGuide: "1.清洗冷凝器翅片。2.检查外机散热风扇。3.清理散热器。4.检查制冷剂是否过多。" },
{ brand: "韩电", code: "F3", descShort: "压缩机排气温度过高保护", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。" },
{ brand: "韩电", code: "F4", descShort: "室外风机电机故障/失速保护", fullGuide: "1.检查直流风机插头是否松动。2.测量风机绕组及霍尔反馈。3.更换室外直流电机。" },
{ brand: "韩电", code: "F5", descShort: "变频驱动保护/IPM模块过热过流", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。4.涂抹导热硅脂。" },
{ brand: "韩电", code: "P1", descShort: "系统高压保护/管路堵塞", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.检查管路是否堵塞。4.检查高压开关。5.检查外机散热风扇。" },
{ brand: "韩电", code: "P2", descShort: "系统低压保护/冷媒不足", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查低压开关。" },
{ brand: "韩电", code: "P4", descShort: "压缩机排气温度过高保护", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。" },
{ brand: "韩电", code: "P5", descShort: "制冷防过冷保护/蒸发器结霜", fullGuide: "1.清洗过滤网增加风量。2.检查内机风机转速。3.检测盘管传感器。4.检查制冷剂是否不足。" },
{ brand: "韩电", code: "P6", descShort: "制冷防过热保护/外机散热差", fullGuide: "1.清洗冷凝器翅片。2.检查外机散热风扇。3.检查制冷剂是否过多。4.清理散热器。" },
{ brand: "韩电", code: "P7", descShort: "制热防过热保护/内机风量不足", fullGuide: "1.清洗过滤网。2.检查内机风机转速。3.检测盘管传感器。4.检查电加热是否异常。" },
{ brand: "韩电", code: "P8", descShort: "室外温度过高/过低保护", fullGuide: "1.检查室外环境温度是否超出工作范围。2.检查室外环境温度传感器。3.更换传感器。" },
{ brand: "韩电", code: "FL", descShort: "水满保护/排水泵故障（商用机）", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。5.更换排水泵。" },
{ brand: "韩电", code: "LP", descShort: "三相电源缺相/相序错误（商用机）", fullGuide: "1.检查电源相序是否正确。2.调整相序，将三相电源中任两相对换。3.检查电源是否缺相。4.检查电源线路。" },
{ brand: "富士通", code: "E0", descShort: "EEPROM参数错误/主板数据异常", fullGuide: "1.断电重启尝试恢复。2.更换室内主板。3.重新烧录EEPROM数据。" },
{ brand: "富士通", code: "E1", descShort: "室内机和室外机通信故障", fullGuide: "1.检查室内外机连接线是否松动、断路或接错。2.测量信号线电压(正常应有波动)。3.检查室内控制基板是否故障。4.检查室外控制基板是否异常。5.更换内机主板或外机主板。" },
{ brand: "富士通", code: "E2", descShort: "过零检测出错故障", fullGuide: "1.检查电源电压波形是否畸变。2.更换内机主板。3.检测过零电路光耦。" },
{ brand: "富士通", code: "E3", descShort: "风机速度失控/室内风机故障", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈信号。3.检查风叶是否卡滞。4.更换室内电机。" },
{ brand: "富士通", code: "E4", descShort: "温度保险丝断开保护", fullGuide: "1.检查温度保险丝是否熔断。2.检查电加热是否异常过热。3.更换温度保险丝。4.检查风机转速是否正常。" },
{ brand: "富士通", code: "E5", descShort: "室外温度传感器故障", fullGuide: "1.检测室外环境温度传感器阻值(25℃约5-10K)。2.更换传感器。3.检查主板接口。4.更换室外机基板。" },
{ brand: "富士通", code: "E6", descShort: "室内温度传感器故障", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查主板接口电路。" },
{ brand: "富士通", code: "E7", descShort: "加湿器故障", fullGuide: "1.检查加湿器是否工作正常。2.检查加湿器供水是否正常。3.更换加湿器组件。" },
{ brand: "富士通", code: "E1", descShort: "T1传感器故障/室内环境温度传感器", fullGuide: "1.检查室内环境温度传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.更换室内机主板。" },
{ brand: "富士通", code: "E2", descShort: "T2传感器故障/室内盘管温度传感器", fullGuide: "1.测量盘管传感器阻值。2.更换同规格传感器。3.检查线路连接。" },
{ brand: "富士通", code: "E3", descShort: "T3传感器故障/室外盘管温度传感器", fullGuide: "1.检查室外盘管传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "富士通", code: "E4", descShort: "T4传感器故障/室外环境温度传感器", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "富士通", code: "E5", descShort: "网络通信故障", fullGuide: "1.检查通信线路连接。2.检查网络设置。3.更换通信模块。" },
{ brand: "富士通", code: "E6", descShort: "室外保护", fullGuide: "1.检查室外机电源是否正常。2.检查外机主板。3.检查压缩机运行状态。4.更换外机主板。" },
{ brand: "富士通", code: "P0", descShort: "模块保护/IPM模块故障", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。4.涂抹导热硅脂。" },
{ brand: "富士通", code: "P1", descShort: "电压过高或过低保护", fullGuide: "1.测量电源电压是否正常(220V±10%)。2.加装稳压器。3.检查电源线路。" },
{ brand: "富士通", code: "P2", descShort: "压缩机顶部温度保护", fullGuide: "1.检测压缩机顶部温度传感器。2.检查制冷剂是否不足。3.改善外机散热。4.更换压缩机。" },
{ brand: "富士通", code: "P3", descShort: "高低电压保护（变频机用）", fullGuide: "1.测量电源电压是否超出范围。2.检查电源线路。3.加装稳压器。4.更换外机主板。" },
{ brand: "富士通", code: "P4", descShort: "室内蒸发器保护关压缩机(高温或低温)", fullGuide: "1.清洗过滤网。2.检查风机转速。3.检测盘管传感器。4.检查制冷剂是否不足或过多。" },
{ brand: "富士通", code: "P5", descShort: "室外冷凝器高温保护关压缩机", fullGuide: "1.清洗冷凝器翅片。2.检查外机散热风扇。3.检查制冷剂是否过多。4.清理散热器。" },
{ brand: "富士通", code: "P7", descShort: "室外排气温度过高关压缩机（变频机用）", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。" },
{ brand: "富士通", code: "P8", descShort: "压缩机顶部温度保护（变频机用）", fullGuide: "1.检测压缩机顶部温度传感器。2.检查制冷剂是否不足。3.改善外机散热。4.更换压缩机。" },
{ brand: "富士通", code: "P9", descShort: "化霜保护或防冷风关风机", fullGuide: "1.空调正常进入化霜模式，属正常现象。2.制热预热阶段防冷风保护，等待几分钟自动恢复。3.如长时间不出风，检查内机管温传感器。" },
{ brand: "富士通", code: "02", descShort: "逆向串行信号异常", fullGuide: "1.检查室内外信号接线是否正确。2.检查室内控制基板是否故障。3.检查室外控制基板是否异常。" },
{ brand: "富士通", code: "03", descShort: "逆向串行信号异常", fullGuide: "1.检查室内外信号接线。2.更换室内控制基板。3.更换室外控制基板。" },
{ brand: "富士通", code: "04", descShort: "顺向串行信号异常", fullGuide: "1.检查室内外信号接线。2.检查室内控制基板。3.更换室外控制基板。" },
{ brand: "富士通", code: "05", descShort: "顺向串行信号异常", fullGuide: "1.检查室内外信号接线。2.更换室内控制基板。3.更换室外控制基板。" },
{ brand: "富士通", code: "22", descShort: "室温热敏电阻异常", fullGuide: "1.检查室温热敏电阻连接是否松动。2.测量阻值(25℃约5-10K)，异常则更换。3.检查室内控制基板。" },
{ brand: "富士通", code: "23", descShort: "管道热敏电阻异常", fullGuide: "1.检查管道热敏电阻连接。2.测量阻值，异常则更换。3.检查室内控制基板。" },
{ brand: "富士通", code: "131", descShort: "通讯故障", fullGuide: "1.检查内外机通讯线路。2.检查通讯地址设置。3.更换通讯模块。" },
{ brand: "富士通", code: "141", descShort: "通讯故障", fullGuide: "1.检查通讯线路连接。2.测量通讯电压。3.更换内机主板或外机主板。" },
{ brand: "富士通", code: "142", descShort: "通讯故障", fullGuide: "1.检查信号线是否短路或断路。2.检查终端电阻设置。3.更换通讯模块。" },
{ brand: "富士通", code: "143", descShort: "通讯故障", fullGuide: "1.检查室内外机连接线。2.检查地址设置是否正确。3.更换通讯模块。" },
{ brand: "富士通", code: "145", descShort: "室内机故障", fullGuide: "1.检查室内机电源。2.检查室内机主板。3.更换室内机主板。" },
{ brand: "富士通", code: "281", descShort: "地址错误", fullGuide: "1.检查室内机地址设置。2.重新设置唯一地址。3.检查地址码是否重复。" },
{ brand: "富士通", code: "284", descShort: "信号放大器错误", fullGuide: "1.检查信号放大器连接。2.更换信号放大器。3.检查通讯线路。" },
{ brand: "富士通", code: "5U1", descShort: "内机故障", fullGuide: "1.检查室内机主板。2.检查室内机传感器。3.更换故障部件。" },
{ brand: "富士通", code: "615", descShort: "供电电源故障", fullGuide: "1.测量电源电压是否正常。2.检查电源线路。3.检查电源板。4.更换电源板。" },
{ brand: "富士通", code: "626", descShort: "变频器故障", fullGuide: "1.断电后检查变频模块。2.测量压缩机三相绕组。3.更换变频板。" },
{ brand: "富士通", code: "628", descShort: "外机EEPROM错误", fullGuide: "1.断电重启。2.更换室外主板。3.重新烧录EEPROM数据。" },
{ brand: "富士通", code: "681", descShort: "继电器故障", fullGuide: "1.检查继电器线圈。2.测量继电器触点通断。3.更换继电器。" },
{ brand: "富士通", code: "682", descShort: "电流保护", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压。3.检查系统压力。4.更换压缩机。" },
{ brand: "富士通", code: "691", descShort: "通讯故障", fullGuide: "1.检查内外机通讯线路。2.更换通讯模块。3.更换内机主板或外机主板。" },
{ brand: "富士通", code: "711", descShort: "温度及压力异常", fullGuide: "1.检测各温度传感器阻值。2.检查系统压力。3.检查制冷剂是否不足或过多。" },
{ brand: "富士通", code: "865", descShort: "温度及压力异常", fullGuide: "1.检测排气温度传感器。2.检查高压开关。3.检查低压开关。4.更换故障传感器。" },
{ brand: "富士通", code: "921", descShort: "压缩机异常", fullGuide: "1.检查压缩机线序是否正确。2.测量压缩机绕组阻值。3.更换压缩机。" },
{ brand: "富士通", code: "955", descShort: "压缩机异常", fullGuide: "1.检查压缩机是否卡缸或堵转。2.检查压缩机电容。3.更换压缩机。" },
{ brand: "富士通", code: "9U2", descShort: "辅机故障", fullGuide: "1.检查辅助机电源。2.检查辅助机主板。3.更换辅助机主板。" },
{ brand: "富士通", code: "5N", descShort: "降雪保护", fullGuide: "1.检查室外机周围是否有积雪堵塞。2.清理室外机周围积雪。3.检查降雪传感器。" },
{ brand: "富士通", code: "AC4", descShort: "散热器温度异常", fullGuide: "1.检查外机散热风扇。2.清理散热片灰尘。3.检查散热器温度传感器。4.更换导热硅脂。" },
{ brand: "富士通", code: "CC.1", descShort: "传感器故障", fullGuide: "1.检查线控器温度传感器。2.更换线控器。3.更换线控器电路板。" },
{ brand: "富士通", code: "C2.1", descShort: "传输PCB故障", fullGuide: "1.检查传输PCB连接。2.更换传输PCB。3.检查通讯线路。" },
{ brand: "富士通", code: "12.1", descShort: "有线遥控器通讯故障", fullGuide: "1.检查遥控器与室内机之间的传送线路。2.更换遥控器。3.更换室内机接收板。" },
{ brand: "富士通", code: "12.3", descShort: "有线遥控器系统的设备数量过多", fullGuide: "1.检查一个线控器控制的内机数量。2.减少控制台数。3.正确设置内机地址。" },
{ brand: "富士通", code: "12.4", descShort: "有线遥控器系统启动故障", fullGuide: "1.检查遥控器连接线。2.断电重启。3.更换遥控器。4.更换室内机主板。" },
{ brand: "富士通", code: "15.4", descShort: "数据采集错误", fullGuide: "1.检查数据采集线路。2.检查传感器连接。3.更换采集模块。" },
{ brand: "富士通", code: "26.4", descShort: "有线遥控器系统的地址重复", fullGuide: "1.检查遥控器地址设置是否有重复。2.重新设置唯一地址。3.更换遥控器。" },
{ brand: "富士通", code: "26.5", descShort: "有线遥控器系统的地址设定错误", fullGuide: "1.检查地址码设定是否正确。2.重新设置地址码。3.更换遥控器。" },
{ brand: "富士通", code: "27.1", descShort: "主/从机设定故障", fullGuide: "1.检查主从机设置是否正确。2.确保只有一个主机。3.重新设置主从机。" },
{ brand: "富士通", code: "29.2", descShort: "连接遥控器数量故障", fullGuide: "1.检查一个系统内连接的遥控器数量。2.减少遥控器数量。3.正确设置遥控器地址。" },
{ brand: "富士通", code: "14.2", descShort: "室内机短缺错误", fullGuide: "1.检查室内机连接数量是否不足。2.通过外机PCB清除错误(按MODE→SELECT到F3→ENTER→SELECT到41→长按ENTER显示DONE)。3.确认错误清除后重启系统。" },
{ brand: "富士通", code: "14.5", descShort: "室内机短缺错误", fullGuide: "1.检查室内机通讯线路是否正常。2.通过外机PCB清除错误(按MODE→SELECT到F3→ENTER→SELECT到41→长按ENTER显示DONE)。3.检查所有内机是否正常上电。" },
{ brand: "富士通", code: "65", descShort: "通信线路松脱或外机电源异常", fullGuide: "1.检查通信线接头是否松脱，重新插紧。2.检查外机电源电压是否正常。3.检查外机主板供电。4.更换通信线或外机主板。" },
{ brand: "富士通", code: "002", descShort: "通信故障/压缩机保护", fullGuide: "1.检查室内外机通信线路。2.检查低压力继电器是否动作(制冷剂不足)。3.检查压缩机是否过热保护。4.检漏补氟。5.检查交流接触器是否损坏。" },
{ brand: "富士通", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "富士通", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "新飞", code: "E1", descShort: "室内温度传感器故障/室温感温包故障", fullGuide: "1.检查室内环境温度传感器连接是否松动或脱落。2.拔掉传感器插头测量阻值(25℃约5-10K)，异常则更换。3.检查传感器线路是否断路或短路。4.更换室内机主板。" },
{ brand: "新飞", code: "E2", descShort: "室内盘管温度传感器故障/室内防冻结保护", fullGuide: "1.检查室内盘管传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.清洗过滤网，检查内机风量是否正常。4.检查蒸发器是否结霜，若结霜可能是系统缺氟，需用压力表测系统压力，低压偏低则加氟。5.气温低于25℃时制冷运行蒸发器可能结霜属正常现象。6.更换室内机主板。" },
{ brand: "新飞", code: "E3", descShort: "室外盘管温度传感器故障/室外温度传感器故障", fullGuide: "1.检查室外盘管温度传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查传感器线路是否断路或短路。4.更换室外机主板。" },
{ brand: "新飞", code: "E4", descShort: "室外机故障/室外机保护", fullGuide: "1.检查室外机电源是否正常。2.检查外机主板是否损坏。3.检查压缩机运行状态。4.检查外机散热是否良好，清理冷凝器翅片。5.更换室外机主板或压缩机。" },
{ brand: "新飞", code: "E5", descShort: "室内外机通讯故障", fullGuide: "1.检查室内外机连接线是否松动、断裂或接错。2.更换内外机信号连接线。3.测量外机板信号端口的供电电压，如果有3-5V的电压说明通讯没问题，问题来自变频主板或模块。4.如果测外机板信号端口的供电电压为0-1V，说明室内机控制电路板有异常，更换电路板。5.电压异常或室外机很烫，说明变频模块需更换。6.检查外风机是否正常工作。" },
{ brand: "新飞", code: "E6", descShort: "内外机通讯故障/室内风机故障", fullGuide: "1.检查内外机信号连接线是否松脱。2.测量外机板信号端口供电电压。3.开关电源正常检查5V电压，查通信光耦。4.检查内机是否太脏，关掉主电源，打开下盖，抽出过滤网清洗。5.死机时关电几分钟后开机。6.更换室内外连接信号线。7.更换室内机电路主板。" },
{ brand: "新飞", code: "H6", descShort: "电机堵转/电机不转动故障", fullGuide: "1.检查电机是否卡滞或堵转。2.检查风机电容及电机绕组。3.检测风机霍尔反馈信号。4.检查风叶是否有异物卡住。5.更换室内电机。" },
{ brand: "新飞", code: "dF", descShort: "自动化霜/制热化霜状态（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。控制面板上“化霜”显示闪烁时，表示空调处于制热化霜状态。" },
{ brand: "新飞", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "新飞", code: "制热化霜", descShort: "制热化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "新飞", code: "制冷防冻结", descShort: "制冷防冻结保护状态（正常保护）", fullGuide: "控制面板上“运行”灯和“制冷”显示闪烁时，表示空调处于制冷防冻结保护状态，属正常保护现象。" },
{ brand: "新飞", code: "制热防高温", descShort: "制热防高温保护状态（正常保护）", fullGuide: "控制面板上“运行”灯和“制热”显示闪烁时，表示空调处于制热防高温保护状态，属正常保护现象。" },
{ brand: "新飞", code: "制热防冷风", descShort: "制热长时间防冷风保护", fullGuide: "控制面板上“运行”灯闪烁时，表示空调处于制热长时间防冻风保护状态，属正常保护现象，等待预热完成。" },
{ brand: "新飞", code: "E8", descShort: "过热保护/蒸发器结霜", fullGuide: "1.清洗过滤网增加风量。2.检查内机风机转速是否正常。3.检测盘管传感器是否异常。4.检查制冷剂是否不足，检漏补氟。5.检查蒸发器是否结霜，若结霜可能是系统缺氟。" },
{ brand: "新飞", code: "E9", descShort: "系统异常保护/外机通讯故障", fullGuide: "1.检查内外机连接线是否松动、断裂或接错。2.更换内外机信号连接线。3.检查室外机电源是否正常。4.测量外机板信号端口供电电压。5.更换室外机主板或内机主板。" },
{ brand: "新飞", code: "F1", descShort: "变频模块保护/压缩机过载", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组阻值。3.检查压缩机连接线是否绝缘受损。4.更换IPM模块或变频板。5.涂抹导热硅脂。" },
{ brand: "新飞", code: "F2", descShort: "压缩机启动失败/失步保护", fullGuide: "1.检查压缩机线序是否正确。2.测量压缩机绕组阻值。3.检查压缩机是否卡缸或堵转。4.检查压缩机电容。5.更换变频模块或压缩机。" },
{ brand: "新飞", code: "F3", descShort: "外机通讯故障/信号线断路", fullGuide: "1.检查内外机信号连接线是否松脱或断路。2.测量外机板信号端口供电电压。3.开关电源正常检查5V电压，查通信光耦。4.更换室内外连接信号线。5.更换室外机主板。" },
{ brand: "新飞", code: "F4", descShort: "排气温度过高保护/缺氟", fullGuide: "1.检测排气温度传感器阻值，异常则更换。2.检查制冷剂是否不足，检漏补氟。3.清理外机散热。4.检查系统是否堵塞。5.检查外机散热风扇是否运转。" },
{ brand: "新飞", code: "F5", descShort: "电流过载保护/电压不稳", fullGuide: "1.检测压缩机电流是否过大。2.测量电源电压是否正常(220V±10%)。3.检查压缩机电容。4.加装稳压器。5.更换压缩机。" },
{ brand: "新飞", code: "H1", descShort: "制热防冷风（正常）", fullGuide: "空调正常进入制热防冷风模式，属正常现象，等待几分钟自动恢复。" },
{ brand: "新飞", code: "H2", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "新飞", code: "H3", descShort: "制热过载保护/内机风量不足", fullGuide: "1.清洗过滤网。2.检查内机风机转速是否正常。3.检测盘管传感器。4.检查电加热是否异常。5.检查风道是否堵塞。" },
{ brand: "新飞", code: "LP", descShort: "三相缺相/相序错误（商用机）", fullGuide: "1.检查电源相序是否正确。2.调整相序，将三相电源中任两相对换。3.检查电源是否缺相。4.检查电源线路。" },
{ brand: "新飞", code: "FL", descShort: "水满保护/排水泵故障（天花机）", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。5.更换排水泵。" },
{ brand: "酷风", code: "E0", descShort: "EEPROM参数错误/主板数据异常", fullGuide: "1.断电重启尝试恢复。2.更换室内主板。3.重新烧录EEPROM数据。4.检查主板供电是否稳定。" },
{ brand: "酷风", code: "E1", descShort: "T1室内环境温度传感器故障", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查传感器线路是否断路或短路。4.更换室内机主板。" },
{ brand: "酷风", code: "E2", descShort: "T2室内盘管温度传感器故障", fullGuide: "1.测量盘管传感器阻值(25℃约5-10K)。2.更换同规格传感器。3.检查线路连接。4.检查蒸发器是否结霜，若结霜可能是系统缺氟。" },
{ brand: "酷风", code: "E3", descShort: "T3室外盘管温度传感器故障", fullGuide: "1.检查室外盘管传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查外机主板接口电路。4.若室内为单冷机型，T3/T4故障可能均显示E3，需根据室外故障指示判断[citation:2]。" },
{ brand: "酷风", code: "E4", descShort: "T4室外环境温度传感器故障", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查主板接口。4.注意：单冷机型室外T4开路/短路可能显示E3[citation:2]。" },
{ brand: "酷风", code: "E6", descShort: "水满保护/排水故障", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。5.检查水位开关是否正常[citation:2][citation:4]。" },
{ brand: "酷风", code: "E8", descShort: "室内外机通讯故障", fullGuide: "1.检查内外机连接线是否松动、断裂或接错。2.更换内外机信号连接线。3.测量外机板信号端口供电电压(正常应有波动)。4.检查外机主板供电。5.更换内机主板或外机主板[citation:2]。" },
{ brand: "酷风", code: "EA", descShort: "相序反接故障/压缩机低压故障", fullGuide: "1.检查电源相序是否正确，将三相电源中任两相对换。2.检查电源是否缺相。3.检查压缩机是否故障。4.更换室外机主板[citation:2]。" },
{ brand: "酷风", code: "Eb", descShort: "室内风机速度失控", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈信号。3.检查风叶是否卡滞。4.检查电机插头是否松动。5.更换室内电机[citation:2]。" },
{ brand: "酷风", code: "EC", descShort: "压缩机缺相故障", fullGuide: "1.检查压缩机连接线是否松脱。2.测量压缩机三相绕组阻值。3.检查电源是否缺相。4.更换压缩机或变频板[citation:2]。" },
{ brand: "酷风", code: "EE", descShort: "相序反接/电源相序错误", fullGuide: "1.检查电源相序是否正确。2.调整相序，将三相电源中任两相对换。3.检查电源线路。4.更换室外机主板[citation:2]。" },
{ brand: "酷风", code: "P1", descShort: "水满保护（移动空调系列）", fullGuide: "1.清理排水管路。2.检查接水盘水位。3.手动排除积水。4.检查浮子开关是否卡住[citation:2]。" },
{ brand: "酷风", code: "P7", descShort: "排气温度过高保护", fullGuide: "1.检测排气温度传感器阻值。2.检查制冷剂是否不足，检漏补氟。3.清理外机散热。4.检查系统是否堵塞。5.检查外机散热风扇[citation:2]。" },
{ brand: "酷风", code: "Pb", descShort: "压缩机低压保护", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查低压开关是否正常。5.检查制冷剂管路是否堵塞[citation:2]。" },
{ brand: "酷风", code: "PC", descShort: "压缩机高压保护", fullGuide: "1.清洗冷凝器翅片，保证通风良好。2.检查制冷剂是否过多。3.检查外机散热风扇是否运转。4.检查高压开关是否损坏。5.检查管路是否堵塞[citation:2][citation:7]。" },
{ brand: "酷风", code: "Pd", descShort: "压缩机过流保护", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查压缩机电容。4.检查系统压力是否过高。5.更换压缩机[citation:2]。" },
{ brand: "酷风", code: "T1故障", descShort: "T1室内环境温度传感器故障（指示灯指示）", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查传感器线路是否断路或短路。4.更换室内机主板。[指示灯：运行灯灭、定时灯灭、电辅热灯灭、化霜灯闪]" },
{ brand: "酷风", code: "T2故障", descShort: "T2室内盘管温度传感器故障（指示灯指示）", fullGuide: "1.测量盘管传感器阻值。2.更换同规格传感器。3.检查线路连接。4.更换室内机主板。[指示灯：运行灯闪、定时灯灭、电辅热灯灭、化霜灯闪]" },
{ brand: "酷风", code: "T3故障", descShort: "T3室外盘管温度传感器故障（指示灯指示）", fullGuide: "1.检查室外盘管传感器连接。2.测量传感器阻值，异常则更换。3.检查外机主板。[指示灯：运行灯亮、定时灯亮、电辅热灯灭、化霜灯灭]" },
{ brand: "酷风", code: "T4故障", descShort: "T4室外环境温度传感器故障（指示灯指示）", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查主板接口。[指示灯：运行灯灭、定时灯灭、电辅热灯亮、化霜灯灭]" },
{ brand: "酷风", code: "水满故障", descShort: "水满保护（指示灯指示）", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。[指示灯：运行灯灭、定时灯灭、电辅热灯灭、化霜灯亮]" },
{ brand: "酷风", code: "EEPROM故障", descShort: "主板EEPROM数据错误（指示灯指示）", fullGuide: "1.断电重启尝试恢复。2.更换室内主板。3.重新烧录EEPROM数据。[指示灯：运行灯亮、定时灯灭、电辅热灯亮、化霜灯灭]" },
{ brand: "酷风", code: "相序反接", descShort: "供电相序错误（指示灯指示）", fullGuide: "1.检查电源相序是否正确。2.调整相序，将三相电源中任两相对换。3.检查电源线路。[指示灯：运行灯灭、定时灯亮、电辅热灯灭、化霜灯亮]" },
{ brand: "酷风", code: "缺相故障", descShort: "电源缺相保护（指示灯指示）", fullGuide: "1.检查电源是否缺相。2.检查电源线路连接。3.检查空气开关。4.更换室外机主板。[指示灯：运行灯灭、定时灯亮、电辅热灯亮、化霜灯灭]" },
{ brand: "酷风", code: "高压保护", descShort: "系统高压保护（指示灯指示）", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.检查外机散热风扇。4.检查高压开关是否损坏。[指示灯：运行灯灭、定时灯灭、电辅热灯亮、化霜灯闪]" },
{ brand: "酷风", code: "低压保护", descShort: "系统低压保护（指示灯指示）", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查低压开关。[指示灯：运行灯亮、定时灯亮、电辅热灯灭、化霜灯亮]" },
{ brand: "酷风", code: "通信故障", descShort: "室内外通讯故障（指示灯指示）", fullGuide: "1.检查内外机连接线是否松动。2.测量通讯电压。3.更换内机主板或外机主板。[指示灯：运行灯亮、定时灯亮、电辅热灯亮、化霜灯灭]" },
{ brand: "酷风", code: "电流过载", descShort: "电流过载保护（指示灯指示）", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查压缩机电容。4.更换压缩机。[指示灯：运行灯灭、定时灯亮、电辅热灯亮、化霜灯亮]" },
{ brand: "酷风", code: "排气高温", descShort: "排气温度过高保护（指示灯指示）", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。[指示灯：运行灯亮、定时灯灭、电辅热灯亮、化霜灯亮]" },
{ brand: "酷风", code: "T3开路/短路", descShort: "室外T3传感器开路/短路（室外机指示灯）", fullGuide: "1.检查室外盘管传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)。3.更换传感器。4.检查外机主板。[室外指示灯：LED2灭、LED3灭、LED4亮]" },
{ brand: "酷风", code: "T4开路/短路", descShort: "室外T4传感器开路/短路（室外机指示灯）", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查主板接口。[室外指示灯：LED2亮、LED3灭、LED4灭]" },
{ brand: "酷风", code: "外机排气过高", descShort: "室外机排气温度过高保护", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。[室外指示灯：LED2亮、LED3灭、LED4亮]" },
{ brand: "酷风", code: "外机高压保护", descShort: "室外机高压保护", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.检查外机散热风扇。4.检查高压开关。[室外指示灯：LED2闪、LED3闪、LED4灭]" },
{ brand: "酷风", code: "外机低压保护", descShort: "室外机低压保护", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。[室外指示灯：LED2闪、LED3灭、LED4闪]" },
{ brand: "酷风", code: "外机电流过载", descShort: "室外机电流过载保护", fullGuide: "1.检测压缩机电流。2.检查电源电压。3.检查系统压力。4.更换压缩机。[室外指示灯：LED2灭、LED3闪、LED4亮]" },
{ brand: "酷风", code: "冷凝器高温", descShort: "冷凝器高温保护", fullGuide: "1.清洗冷凝器翅片。2.检查外机散热风扇。3.检查制冷剂是否过多。4.检查外机散热环境。[室外指示灯：LED2闪、LED3闪、LED4闪]" },
{ brand: "酷风", code: "外机通讯故障", descShort: "室外机通讯故障", fullGuide: "1.检查外机主板供电。2.检查通讯线路。3.更换外机主板。[室外指示灯：LED2灭、LED3闪、LED4灭]" },
{ brand: "酷风", code: "缺相/相序", descShort: "室外机缺相/相序错误", fullGuide: "1.检查电源相序是否正确。2.调整相序。3.检查电源是否缺相。[室外指示灯：缺相-LED2灭、LED3灭、LED4闪；相序反-LED2灭、LED3闪、LED4灭]" },
{ brand: "酷风", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "酷风", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "酷风", code: "P3", descShort: "IPM模块保护/变频器故障", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组阻值。3.检查压缩机连接线是否绝缘受损。4.更换IPM模块或变频板。5.涂抹导热硅脂[citation:1]。" },
{ brand: "酷风", code: "E5", descShort: "室内外机通讯故障（信号线/485总线异常）", fullGuide: "1.检查内外机连接线是否松动、断裂或接错。2.更换内外机信号连接线。3.测量485总线通讯电压(正常应有波动)。4.检查外机主板供电。5.更换内机主板或外机主板。" },
{ brand: "酷风", code: "E6", descShort: "水满保护/排水泵故障（天花机/风管机）", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。5.更换排水泵。" },
{ brand: "酷风", code: "E7", descShort: "压缩机排气温度过高保护/缺氟", fullGuide: "1.检测排气温度传感器阻值，异常则更换。2.检查制冷剂是否不足，检漏补氟。3.清理外机散热。4.检查系统是否堵塞。5.检查外机散热风扇是否运转。" },
{ brand: "酷风", code: "EE", descShort: "室外机EEPROM故障", fullGuide: "1.断电重启尝试恢复。2.更换室外主板。3.重新烧录EEPROM数据。4.检查主板供电是否稳定。" },
{ brand: "酷风", code: "Ed", descShort: "压缩机启动失败/失步保护（变频机）", fullGuide: "1.检查压缩机线序是否正确。2.测量压缩机绕组阻值。3.检查压缩机是否卡缸或堵转。4.检查压缩机电容。5.更换变频模块或压缩机。" },
{ brand: "酷风", code: "P2", descShort: "压缩机排气高温保护", fullGuide: "1.检测排气温度传感器阻值。2.检查制冷剂是否不足，检漏补氟。3.清理外机散热。4.检查系统是否堵塞。5.检查外机散热风扇。" },
{ brand: "酷风", code: "P3", descShort: "系统高压保护（散热不良/冷媒过多）", fullGuide: "1.清洗冷凝器翅片，保证通风良好。2.检查制冷剂是否过多。3.检查外机散热风扇是否运转。4.检查高压开关是否损坏。5.检查管路是否堵塞。" },
{ brand: "酷风", code: "Pd", descShort: "变频模块保护（过热/过流/短路）", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组阻值。3.检查压缩机连接线是否绝缘受损。4.更换IPM模块或变频板。5.涂抹导热硅脂。" },
{ brand: "酷风", code: "dF", descShort: "自动化霜（正常状态）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "酷风", code: "H1", descShort: "制热防冷风（正常）", fullGuide: "空调正常进入制热防冷风模式，属正常现象，等待几分钟自动恢复。" },
{ brand: "酷风", code: "LP", descShort: "三相电源缺相/相序错误（商用机）", fullGuide: "1.检查电源相序是否正确。2.调整相序，将三相电源中任两相对换。3.检查电源是否缺相。4.检查电源线路。5.检查空气开关。" },
{ brand: "云米", code: "E0", descShort: "室内外通讯故障", fullGuide: "1.检查内外机连接线是否松动、断裂或接错。2.新装机报E0，重点检查安装接线、端子内侧接线、桥堆接线。3.更换一条质量好点的连接线，防止线芯绝缘阻值不良干扰通讯信号。4.检查外机电抗器是否开路，绕组与插片焊接处容易脱焊。5.重新通电开机观察室外电控板红色指示灯：灯亮则检测室外N端子间直流电压：电压无变化或在0-24V变化更换室内电控板；电压在0-13V变化更换室外电控板。灯不亮则检测室外L、N端子间交流电压：无220V更换室内电控板；有220V更换室外电控板。6.检查室内/室外直流风扇电机是否短路，避免因直流电机短路损坏开关电源电路导致主芯片掉电，这种情况需同时更换电机和主板。" },
{ brand: "云米", code: "E1", descShort: "室温传感器故障", fullGuide: "1.首先确认室内传感器是否插好，在确认插接可靠后更换室内传感器。2.拔掉传感器插头测量阻值(25℃约5-10K)，异常则更换。3.更换传感器故障仍保持，更换室内控制板。" },
{ brand: "云米", code: "E2", descShort: "内盘管温度传感器故障", fullGuide: "1.首先确认室内传感器是否插好，在确认插接可靠后更换室内传感器。2.测量盘管传感器阻值(25℃约5-10K)，异常则更换。3.更换传感器故障仍保持，更换室内控制板。" },
{ brand: "云米", code: "E3", descShort: "外盘管温度传感器故障", fullGuide: "1.首先确认室外传感器是否插好，在确认插接可靠后更换传感器。2.检查室外盘管传感器阻值(25℃约5-10K)，异常则更换。3.更换传感器后故障仍保持，更换室外电源板。" },
{ brand: "云米", code: "E4", descShort: "系统异常故障", fullGuide: "1.此功能默认不开放给用户。若出现，先检查室外电源板主芯片附近的JP4跳线是否存在，若有该跳线则系统开放了此功能，剪断该跳线。2.检查外机高低压阀是否打开，系统是否严重堵死。3.室外电源板无JP4跳线出现E4代码，更换室外电源板。" },
{ brand: "云米", code: "E5", descShort: "室外通讯故障", fullGuide: "1.检查三相电源及连线是否正常。2.上电测试室外变压器输出是否正常。3.检查压力开关是否导通。4.将室外电路板上的五芯排线与室内外连接线的插头拔下，测试室外板排线插头处棕色线与灰色线之间是否导通，如导通则室外电路板正常；如不导通，则将三相电源的任意两相线对调后再作同样测量，如还不导通则室外电路板故障。" },
{ brand: "云米", code: "E6", descShort: "室内风机故障", fullGuide: "1.检查电机接插部位是否松动、启动运转电容容值是否正确。2.检查室内风扇叶是否卡死，致使电机不能运转。3.电控板电机驱动或反馈回路损坏，换室内电控板。4.检查电机是否损坏，更换同型号的电机。内风机故障后须重新上电方可恢复。" },
{ brand: "云米", code: "E7", descShort: "室外进风温传感器故障", fullGuide: "1.先检查室外进风温度传感器是否松脱、损坏、采集温度是否准确。2.检测室外环境温度传感器阻值(25℃约5-10K)，异常则更换。3.更换后还不能恢复正常，则是室外电源板传感器检测电路损坏，需更换。" },
{ brand: "云米", code: "E8", descShort: "排气温传感器故障", fullGuide: "1.先检查室外排气温度传感器是否松脱、损坏、采集温度是否准确。2.检测排气传感器阻值，异常则更换。3.更换后还不能恢复正常，则是室外电源板传感器检测电路损坏，需更换室外电源板。" },
{ brand: "云米", code: "EF", descShort: "室外风机故障", fullGuide: "1.检查风机是否正常运转，是否有异常声音或振动。2.检查风机线路是否正常，是否有断路或短路现象。3.检查风机电机是否故障、风机电容是否故障、风机叶轮是否故障。4.检查控制板是否正常，是否有故障代码显示。5.如果以上步骤都无法解决问题，联系专业技术人员维修。" },
{ brand: "云米", code: "P0", descShort: "IPM模块保护", fullGuide: "1.若上电后压缩机不启动直接报P0，更换模块板。2.压缩机能启动，运行后报P0，重点排查模块板是否安装牢固和平稳，有无松动，无松动则更换模块板。3.IPM智能变频模块内部自带过电流、过热等保护功能，过热/过流解除后可自动恢复运行。" },
{ brand: "云米", code: "P1", descShort: "过、欠压保护", fullGuide: "1.电压不稳定的正常保护功能。2.出现时先检查室外机白色接线端子上N、L线两端输入电压是否在正常许可范围内(160-260V)，超出此范围为正常保护。3.若电压正常，则为电压采样回路存在问题，特别是R423阻值不是150K时容易出现，需更换电源板。更换电源块板仍不能解决，再更换模块板。" },
{ brand: "云米", code: "P2", descShort: "过电流保护", fullGuide: "1.正常保护功能，运行电流超过最大允许电流时报该故障。2.排除实际电流过大保护后，仍为P2保护，则可能因电流检测电路故障导致检测到的电流大于实际电流值，先更换电源板，更换电源板不能修复再更换模块板。" },
{ brand: "云米", code: "P4", descShort: "排气温度保护", fullGuide: "1.查排气温度传感器是否漏插。2.查排气温度传感器是否出现损坏、龟裂、脱胶、夹断等现象。3.排气温度传感器OHB阻值漂移，需更换传感器。4.查是否室外风机停转运行，导致外盘管和排气温度急剧上升。" },
{ brand: "云米", code: "P5", descShort: "制冷防冻结保护", fullGuide: "1.属正常保护，低温制冷时可能会容易出现。2.室内风机转速过慢或不运转造成，检查电机、风机电容是否损坏、贯流风扇是否被卡住，室内机进出风口是否顺畅。3.内盘温度传感器IPT阻值漂移产生误差，需更换传感器。4.若以上都正常，则需更换室内控制板。" },
{ brand: "云米", code: "P6", descShort: "制冷防过热保护", fullGuide: "1.一般环境温度下运行报P6，请检查风扇运行是否正常，排除风扇原因，先更换室外管温温度传感器。2.排除温度传感器原因，更换室外电源板。" },
{ brand: "云米", code: "P7", descShort: "制热防过热保护", fullGuide: "1.高温环境下制热运行时保护属正常。2.非高温制热的正常保护，重点检查室内风扇电机是否运行正常。风扇运行正常且出风口温度不是很高，先更换室内盘管温度传感器，不能解除故障就更换室内电控板。3.若室外机商检出现该保护，排除工装原因后直接更换电源板。" },
{ brand: "云米", code: "P8", descShort: "室外温度保护", fullGuide: "1.属正常保护，制冷制热超出保护温度范围时发生(低温制冷/高温制热易发生)。2.若整机不在保护温度范围内出现该代码，一般可断定室外进风温度传感器不良导致室外环境温度采样不准确，先更换室外进风温度传感器。若更换传感器不能解除故障，再更换室外电源板。" },
{ brand: "云米", code: "P9", descShort: "驱动保护", fullGuide: "1.压缩机不能启动报P9，先检查压缩机线U、V、W三相是否有接错、接反。2.压缩机运行后报P9，更换模块板。3.压缩机停机后短时间再启动时压力不平衡导致P9，属正常保护，停机时间稍长再启动。" },
{ brand: "云米", code: "E9", descShort: "室外IPM模块/压缩机驱动故障（官方）", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组阻值。3.检查压缩机连接线是否绝缘受损。4.更换IPM模块或变频板。5.涂抹导热硅脂。" },
{ brand: "云米", code: "Eb", descShort: "主控板与显示板通信故障（官方，商用机常见）", fullGuide: "1.检查主控板与显示板之间的连接线是否松动。2.更换显示板。3.更换主控板。4.检查通讯线路。" },
{ brand: "云米", code: "EE", descShort: "室外EEPROM存储故障（官方）", fullGuide: "1.断电重启尝试恢复。2.更换室外主板。3.重新烧录EEPROM数据。4.检查主板供电是否稳定。" },
{ brand: "云米", code: "EF", descShort: "室外直流风机故障（官方）", fullGuide: "1.检查风机是否正常运转，是否有异常声音或振动。2.检查直流风机插头是否松动。3.测量风机绕组及霍尔反馈。4.检查风机电机是否故障。5.更换室外直流电机。" },
{ brand: "云米", code: "EP", descShort: "压缩机壳顶温度过高保护（官方）", fullGuide: "1.检测压缩机壳顶温度传感器。2.检查制冷剂是否不足，检漏补氟。3.改善外机散热。4.检查系统是否堵塞。5.更换压缩机。" },
{ brand: "云米", code: "F7", descShort: "变频模块温度保护（官方）", fullGuide: "1.检查外机散热风扇是否运转。2.清理散热片灰尘。3.更换导热硅脂。4.检查模块散热片。5.更换IPM模块或变频板。" },
{ brand: "云米", code: "F9", descShort: "模块感温包电路故障（官方）", fullGuide: "1.检查模块温度传感器插头是否松动。2.测量传感器阻值。3.更换传感器。4.更换外机主板。" },
{ brand: "云米", code: "FA", descShort: "压缩机相电流检测故障（官方）", fullGuide: "1.检查压缩机连接线序是否正确。2.测量压缩机三相绕组阻值。3.检查电流检测CT线圈。4.更换变频模块。5.更换压缩机。" },
{ brand: "云米", code: "H6", descShort: "压缩机失步保护（变频机，官方）", fullGuide: "1.检查压缩机线序是否正确。2.测量压缩机绕组阻值。3.检查压缩机是否卡缸或堵转。4.检查电源电压是否稳定。5.更换变频模块或压缩机。" },
{ brand: "云米", code: "Hd", descShort: "PFC输入过电流故障（官方）", fullGuide: "1.检查PFC电路IGBT及二极管。2.测量PFC输入电流。3.检查电抗器。4.更换外机主板或PFC模块。" },
{ brand: "云米", code: "AC", descShort: "自清洁运行提示（非故障，官方）", fullGuide: "空调正在进行自清洁功能，属正常状态，等待20-30分钟自动完成。" },
{ brand: "云米", code: "60", descShort: "除菌功能运行提示（非故障，官方）", fullGuide: "空调正在进行除菌功能，属正常状态，等待功能运行完成即可。" },
{ brand: "米家", code: "F1.1", descShort: "室内环境温度传感器故障", fullGuide: "1.根据显示的故障代码找到对应传感器，重新插拔传感器确认是否因接触不良导致。2.用万用表测试传感器电阻，检测是否有短路、开路或电阻值异常。用手握住温度传感器，检测其电阻值是否逐渐减小，正常则良好。3.可使用调试模式查看对应显示温度是否正常辅助判断。若显示50或0或--并闪烁，表示传感器异常。4.更换对应的传感器。" },
{ brand: "米家", code: "F1.2", descShort: "室外环境温度传感器故障", fullGuide: "1.根据显示的故障代码找到对应传感器，重新插拔传感器确认是否因接触不良导致。2.用万用表测试传感器电阻，检测是否有短路、开路或电阻值异常。用手握住温度传感器，检测其电阻值是否逐渐减小，正常则良好。3.可使用调试模式查看对应显示温度是否正常辅助判断。4.更换室外环境温度传感器。" },
{ brand: "米家", code: "F2.1", descShort: "室内盘管温度传感器故障", fullGuide: "1.根据显示的故障代码找到对应传感器，重新插拔传感器确认是否因接触不良导致。2.用万用表测试传感器电阻，检测是否有短路、开路或电阻值异常。用手握住温度传感器，检测其电阻值是否逐渐减小，正常则良好。3.更换室内盘管温度传感器。" },
{ brand: "米家", code: "F2.2", descShort: "室外盘管温度传感器故障", fullGuide: "1.根据显示的故障代码找到对应传感器，重新插拔传感器确认是否因接触不良导致。2.用万用表测试传感器电阻，检测是否有短路、开路或电阻值异常。3.更换室外盘管温度传感器。" },
{ brand: "米家", code: "F2.3", descShort: "室内盘管温度传感器失效故障", fullGuide: "1.检查室内盘管温度传感器插头是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.更换室内机主板。" },
{ brand: "米家", code: "F2.4", descShort: "室外盘管温度传感器失效故障", fullGuide: "1.检查室外盘管温度传感器插头是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.更换室外机主板。" },
{ brand: "米家", code: "F3.1", descShort: "室外排气温度传感器故障", fullGuide: "1.根据显示的故障代码找到排气温度传感器，重新插拔确认接触是否良好。2.用万用表测试传感器电阻，检测是否有短路、开路或电阻值异常。3.更换排气温度传感器。" },
{ brand: "米家", code: "F3.2", descShort: "排气温度传感器失效故障", fullGuide: "1.检测排气传感器阻值，异常则更换。2.检查传感器线路连接。3.更换室外机主板。" },
{ brand: "米家", code: "E0", descShort: "室内PG/直流风机故障", fullGuide: "1.手动转动风扇，确认是否卡死，若风叶卡滞需拆卸重装。2.检查电路板与电机线之间的电路，检查端子是否错位、氧化、断线，重新连接并确保可靠。3.检测电机各端子间电阻，若异常则更换电机。注意：更换电机时，先将新电机连接到主板进行测试，若正常则更换，若异常则继续检查主板。4.若以上检查无问题，检查主板输出电压，确认是否为主板问题，如有问题则更换。" },
{ brand: "米家", code: "E1", descShort: "室外EEPROM故障", fullGuide: "1.如果使用的是售后板，检查EEPROM参数是否匹配。2.更换室外机电控板。" },
{ brand: "米家", code: "E2", descShort: "室外直流风机故障", fullGuide: "1.手动转动风扇，确认是否卡死，如卡死需重新组装或更换变形部件。2.检查电路板与电机线之间的电路，检查端子是否错位、接触不良、断线，重新可靠连接。3.检测电机各端子间电阻，若异常则更换电机。注意：更换电机前，先将新电机连接到主板进行测试，若新电机运行正常则更换，若运行异常则检查是否为主板问题。" },
{ brand: "米家", code: "E3", descShort: "室内机主板与显示板通讯故障", fullGuide: "1.检查主控板与显示板之间的连接线，确保线序和连接可靠，重新插拔连接。2.若连线正常，更换室内机主板或显示板。" },
{ brand: "米家", code: "E6.1", descShort: "内外机通讯：室内机无法接收数据", fullGuide: "1.排除因供电和接线引起的通讯故障。2.检查机组连接。3.测试并确定室内机电压。4.检查室外机。" },
{ brand: "米家", code: "E6.2", descShort: "内外机通讯：室外机无法接收数据", fullGuide: "1.排除因供电和接线引起的通讯故障。2.检查机组连接。3.测试并确定室内机电压。4.更换内机主板或外机主板。" },
{ brand: "米家", code: "E8.1", descShort: "室外机压缩机芯片与风机芯片通讯故障", fullGuide: "1.检查室外机电控通讯线路。2.更换室外机电控板。" },
{ brand: "米家", code: "E8.2", descShort: "室内机主板与风机芯片通讯故障", fullGuide: "1.检查室内机电控通讯线路。2.更换室内机电控板。" },
{ brand: "米家", code: "E9.0", descShort: "IPM模块保护", fullGuide: "1.检查压缩机接线，若接线不良则重新接线。2.拔下压缩机端UVW线，重新上电，若故障无法清除，更换室外机电控。3.若压缩机相线与外壳之间阻抗过低，更换压缩机。4.若电控板为通用备件，可能是电控与压缩机参数不匹配，需刷新E方程序。5.更换室外机电控板。6.检查系统冷凝压力是否过高：风机异常、冷媒过多、毛细管堵塞、两器脏堵。7.更换压缩机。" },
{ brand: "米家", code: "FF", descShort: "室内机无法接收互联网模块(SOC/Wi-Fi)通讯故障", fullGuide: "1.检查Wi-Fi模块连接是否正常。2.重新插拔Wi-Fi模块。3.更换显示板。" },
{ brand: "米家", code: "U0.0", descShort: "逆变器直流过压故障", fullGuide: "1.首先检查室外机白色接线端子上N、L线两端输入电压是否在正常许可范围内(160-260V)，在通电状态下测试。若超出此范围为正常保护。2.检查电网电压是否波动大且突变，等待一段时间后重新开机。3.若电压正常，则为电压采样回路问题，更换室外电控板。注意：更换室外主板前，测试压缩机是否对铜管短路、三相电阻是否一致。" },
{ brand: "米家", code: "U0.1", descShort: "逆变器直流低压故障", fullGuide: "1.检查室外机输入电压是否低于160V。2.加装稳压器。3.若电压正常，更换室外电控板。" },
{ brand: "米家", code: "U0.2", descShort: "逆变器直流电压突变故障", fullGuide: "1.检查电网电压是否波动剧烈。2.检查PFC电路。3.更换室外电控板。" },
{ brand: "米家", code: "U0.3", descShort: "AC输入低电压检测故障", fullGuide: "1.检查室外机输入端交流电压是否低于160V。2.检查电源线路。3.加装稳压器。" },
{ brand: "米家", code: "U1.1", descShort: "逆变器模块故障/逆变器模块硬件过流故障", fullGuide: "1.检查压缩机接线，若接线不良则重新接线。2.拔下压缩机端UVW线，重新上电，若故障无法清除，更换室外机电控。3.若压缩机相线与外壳之间阻抗过低，更换压缩机。4.若电控板为通用备件，可能是电控与压缩机参数不匹配，需刷新E方程序。5.更换室外机电控板。6.检查系统冷凝压力是否过高：风机异常、冷媒过多、毛细管堵塞、两器脏堵。7.更换压缩机。" },
{ brand: "米家", code: "U1.2", descShort: "室外电流传感器故障", fullGuide: "1.检查电流传感器连接。2.更换室外机电控板。3.检查压缩机。" },
{ brand: "米家", code: "U1.3", descShort: "压缩机相电流电路检测故障", fullGuide: "1.检查压缩机连接线序。2.测量压缩机三相绕组阻值。3.更换变频模块。4.更换压缩机。" },
{ brand: "米家", code: "U2", descShort: "过电流保护", fullGuide: "1.检查电压是否过低。2.检查室外机换热器是否脏堵、格栅内散热不良。3.检查室内/外机出风口是否不顺畅。4.检查室内机过滤网是否脏堵。5.检查室内/外电机转速是否下降。6.检查室内/外风叶是否损坏。7.检查冷媒是否异常。排除实际电流过流保护后，若实际电流低于额定电流仍保护，则可能是电流检测电路故障，更换室外机电控板。高温等条件下出现该保护代码属正常，降温后保护消除。" },
{ brand: "米家", code: "U3", descShort: "驱动初始化故障", fullGuide: "1.检查室外机主电源电压(DC310V、DC15V、DC12V、DC5V)是否正常。2.更换室外机控制板(若异常电压由电子膨胀阀线圈或直流风机引起，则更换电子膨胀阀线圈或直流风机)。" },
{ brand: "米家", code: "U4", descShort: "失步检测/压缩机失步保护", fullGuide: "1.系统压力不平衡、停机时间不足——等待3-5分钟后再启动。2.输入电压异常——使用稳压器。3.检查压缩机接线是否连接良好且顺序正确——必要时重新连接。4.室外风机电机故障——更换电机。5.散热不良——清洁换热器，改善散热环境。6.控制板相采样电阻值偏差或采样电路故障——更换控制板。7.冷媒过量——按规定规格充注。8.压缩机故障(如卡死、绕组短路或开路)——更换压缩机。" },
{ brand: "米家", code: "U5", descShort: "压缩机缺相/反相保护", fullGuide: "1.检查压缩机接线顺序是否正确。2.检查电源是否缺相。3.调整接线顺序。4.更换压缩机。" },
{ brand: "米家", code: "U6.1", descShort: "模块温度保护", fullGuide: "1.检查电压是否在170V-270V之间——使用稳压器。2.检查室外机换热器是否脏堵——清除障碍物或清洁冷凝器。3.确保室外机气流顺畅——清除任何障碍物。4.检查室外机电机转速是否下降或风叶是否损坏——必要时更换电机或风叶。5.若模块温度检测电路故障——更换室外机控制板。" },
{ brand: "米家", code: "U6.2", descShort: "模块温度传感器电路故障", fullGuide: "1.检查模块板与散热片是否良好接触。确保模块与散热片之间紧密、无杂物、无缝接触。拧紧模块板螺丝。如有必要，更换室外机控制板。2.室外系统异常或压缩机电流过大——参照U6.1。3.模块温度检测电路故障——更换室外机控制板。" },
{ brand: "米家", code: "U8.1", descShort: "PFC硬件过流", fullGuide: "1.系统压力不平衡、停机时间不足——等待3-5分钟后再启动。2.输入电压异常——使用稳压器。3.检查压缩机接线是否连接良好且顺序正确——必要时重新连接。4.室外风机电机故障——更换电机。5.散热不良——清洁换热器，改善散热环境。" },
{ brand: "米家", code: "60", descShort: "自清洁/除菌功能运行中（非故障）", fullGuide: "空调正在进行自清洁或除菌功能，属正常状态，等待20-30分钟自动完成。" },
{ brand: "米家", code: "AC", descShort: "自清洁运行中（非故障）", fullGuide: "空调正在进行自清洁功能，属正常状态，等待功能运行完成即可。" },
{ brand: "米家", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "米家", code: "E0", descShort: "内机PG/直流风机故障（电机卡死、线松、驱动板坏，官方）", fullGuide: "1.手动转动风扇，确认是否卡死，若风叶卡滞需拆卸重装。2.检查电路板与电机线之间的电路，检查端子是否错位、氧化、断线，重新连接并确保可靠。3.检测电机各端子间电阻，若异常则更换电机。注意：更换电机时，先将新电机连接到主板进行测试，若正常则更换，若异常则继续检查主板。4.若以上检查无问题，检查主板输出电压，确认是否为主板问题，如有问题则更换。" },
{ brand: "米家", code: "E1", descShort: "室内环境温度传感器故障（探头松/断/坏，官方）", fullGuide: "1.根据显示的故障代码找到对应传感器，重新插拔传感器确认是否因接触不良导致。2.用万用表测试传感器电阻，检测是否有短路、开路或电阻值异常。用手握住温度传感器，检测其电阻值是否逐渐减小，正常则良好。3.可使用调试模式查看对应显示温度是否正常辅助判断。若显示50或0或--并闪烁，表示传感器异常。4.更换对应的传感器。" },
{ brand: "米家", code: "E2", descShort: "室内盘管温度传感器故障（结冰、防冻结保护，官方）", fullGuide: "1.根据显示的故障代码找到对应传感器，重新插拔传感器确认是否因接触不良导致。2.用万用表测试传感器电阻，检测是否有短路、开路或电阻值异常。3.更换室内盘管温度传感器。4.检查蒸发器是否结霜，若结霜可能是系统缺氟。" },
{ brand: "米家", code: "E3", descShort: "室外环境温度传感器故障（外机不启动、不化霜，官方）", fullGuide: "1.根据显示的故障代码找到对应传感器，重新插拔传感器确认是否因接触不良导致。2.用万用表测试传感器电阻，检测是否有短路、开路或电阻值异常。3.更换室外环境温度传感器。" },
{ brand: "米家", code: "E4", descShort: "室外盘管温度传感器故障（官方）", fullGuide: "1.根据显示的故障代码找到对应传感器，重新插拔传感器确认是否因接触不良导致。2.用万用表测试传感器电阻，检测是否有短路、开路或电阻值异常。3.更换室外盘管温度传感器。" },
{ brand: "米家", code: "E5", descShort: "压缩机过流/外机保护（电压低、散热差、电容坏，官方）", fullGuide: "1.检查电压是否过低。2.检查室外机换热器是否脏堵、格栅内散热不良。3.检查室内/外机出风口是否不顺畅。4.检查室内机过滤网是否脏堵。5.检查室内/外电机转速是否下降。6.检查冷媒是否异常。排除实际电流过流保护后，若实际电流低于额定电流仍保护，则可能是电流检测电路故障，更换室外机电控板。" },
{ brand: "米家", code: "E6", descShort: "内外机通讯故障（信号线断/松、主板坏，官方）", fullGuide: "1.排除因供电和接线引起的通讯故障。2.检查机组连接。3.测试并确定室内机电压。4.更换内机主板或外机主板。" },
{ brand: "米家", code: "E7", descShort: "外机排气高温保护（外机脏、缺氟，官方）", fullGuide: "1.检测排气温度传感器，检查是否松脱、损坏。2.检查制冷剂是否不足，检漏补氟。3.清理外机散热。4.检查系统是否堵塞。5.检查外机散热风扇是否运转。" },
{ brand: "米家", code: "E8", descShort: "系统异常/总故障标志（官方）", fullGuide: "1.检查制冷剂是否泄漏。2.检查系统是否堵塞。3.检查各传感器是否正常。4.检查压缩机运行状态。5.检漏补氟。6.申请售后检修。" },
{ brand: "米家", code: "EE", descShort: "外机EEPROM故障（主板存储异常，官方）", fullGuide: "1.如果使用的是售后板，检查EEPROM参数是否匹配。2.更换室外机电控板。" },
{ brand: "米家", code: "F2.3", descShort: "室内管温传感包故障（官方）", fullGuide: "1.检查室内盘管温度传感器插头是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.更换室内机主板。" },
{ brand: "米家", code: "F2.4", descShort: "室外管温传感包故障（官方）", fullGuide: "1.检查室外盘管温度传感器插头是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.更换室外机主板。" },
{ brand: "米家", code: "F3.2", descShort: "排气温度保护（官方）", fullGuide: "1.检测排气温度传感器，检查是否松脱、损坏。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。5.更换排气温度传感器。" },
{ brand: "米家", code: "F4", descShort: "光敏传感器故障（官方）", fullGuide: "1.检查光敏传感器连接是否正常。2.清洁传感器表面。3.更换光敏传感器。4.更换显示板。" },
{ brand: "米家", code: "F5", descShort: "总电流过流保护（官方）", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查压缩机电容。4.检查系统压力。5.更换压缩机。" },
{ brand: "米家", code: "P0", descShort: "IPM模块保护（过热、过流、短路，官方）", fullGuide: "1.检查压缩机接线，若接线不良则重新接线。2.拔下压缩机端UVW线，重新上电，若故障无法清除，更换室外机电控。3.若压缩机相线与外壳之间阻抗过低，更换压缩机。4.若电控板为通用备件，可能是电控与压缩机参数不匹配，需刷新E方程序。5.更换室外机电控板。6.检查系统冷凝压力是否过高：风机异常、冷媒过多、毛细管堵塞、两器脏堵。7.更换压缩机。" },
{ brand: "米家", code: "P1", descShort: "排气温度过高（外机脏、缺氟、冷媒过多，官方）", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否不足或过多。3.清理外机散热。4.检查系统是否堵塞。5.检查外机散热风扇是否运转。" },
{ brand: "米家", code: "P2", descShort: "电流过大保护（电压低、压缩机过载，官方）", fullGuide: "1.检查电压是否过低。2.检查室外机换热器是否脏堵。3.检查室内机过滤网是否脏堵。4.检查冷媒是否异常。5.更换室外机电控板。" },

{ brand: "米家", code: "P5", descShort: "制冷防冻结保护（滤网堵、风量小，官方）", fullGuide: "1.清洗过滤网增加风量。2.检查内机风机转速。3.检测盘管传感器。4.检查制冷剂是否不足。" },

{ brand: "米家", code: "P7", descShort: "模块温度保护（外机散热差，官方）", fullGuide: "1.检查电压是否在170V-270V之间——使用稳压器。2.检查室外机换热器是否脏堵——清除障碍物或清洁冷凝器。3.确保室外机气流顺畅——清除任何障碍物。4.检查室外机电机转速是否下降或风叶是否损坏——必要时更换电机或风叶。5.若模块温度检测电路故障——更换室外机控制板。" },

{ brand: "米家", code: "U0.2", descShort: "逆变器电压突变（官方）", fullGuide: "1.检查电网电压是否波动剧烈。2.检查PFC电路。3.更换室外电控板。" },

{ brand: "米家", code: "U1.1", descShort: "外机电流传感器故障（官方）", fullGuide: "1.检查电流传感器连接。2.更换室外机电控板。3.检查压缩机。" },
{ brand: "米家", code: "U1.2", descShort: "外机电流检测故障（官方）", fullGuide: "1.检查电流检测电路。2.更换室外机电控板。3.检查压缩机是否故障。" },

{ brand: "米家", code: "U2.1/U2.2/U2.3", descShort: "过电流保护（官方）", fullGuide: "1.检查电压是否过低。2.检查室外机换热器是否脏堵。3.检查室内机过滤网是否脏堵。4.检查冷媒是否异常。5.更换室外机电控板。" },
