{ brand: "三洋", category: "washer", code: "E2", descShort: "上盖未盖好/门开关故障", fullGuide: "1.检查洗衣机上盖是否完全盖好。2.检查门开关是否接触良好。3.重新盖好盖子后运行程序。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "E3", descShort: "脱水不平衡/衣物分布不均", fullGuide: "1.将桶内衣物抖散均匀。2.检查洗衣机是否放置平稳。3.单件大件衣物需添加2-3件类似衣物。4.重新分布负载后运行。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "E4", descShort: "进水超时/进水阀堵塞或水压过低", fullGuide: "1.检查水龙头是否打开，水压是否正常。2.清洁进水阀滤网，清除堵塞物。3.检查进水管是否弯折或冻结。4.检查水压是否过低。5.更换进水阀。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "E5", descShort: "水温超过50度/水温过高", fullGuide: "1.检查进水温度是否过高。2.检查加热管是否故障导致持续加热。3.待水温降低后重新运行。4.检查温度传感器。5.更换加热管。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "E6", descShort: "使用了高泡洗衣粉/泡沫过多", fullGuide: "1.使用了非低泡洗衣机专用洗涤剂。2.减少洗涤剂用量。3.建议使用少量低泡洗涤剂。4.添加额外的漂洗程序消除过多泡沫。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "E11", descShort: "进水异常/进水20分钟未达到设定水位", fullGuide: "1.检查水龙头是否打开，水压是否正常。2.清洁进水阀滤网。3.检查排水管是否挂起导致进水流失。4.检查水位传感器软管是否漏气。5.更换进水阀。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "E12", descShort: "排水异常/排水8分钟未达到复位水位", fullGuide: "1.检查排水管是否放下或弯折。2.清理排水泵过滤器内的异物。3.检查排水泵是否工作。4.检查水位传感器是否正常。5.更换排水泵。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "E13", descShort: "水温传感器异常/NTC开路或短路", fullGuide: "1.检查水温传感器连接线是否松动或脱落。2.测量传感器阻值(25℃约5-10K)。3.更换水温传感器。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "E14", descShort: "加热管故障/加热异常", fullGuide: "1.测量加热管阻值是否正常(通常20-50Ω)。2.检查加热管接线是否松动。3.更换加热管。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "E20", descShort: "排水泵未接好/电脑板无排水泵信号", fullGuide: "1.检查排水泵接线是否松脱。2.检查排水泵连接器是否接触不良。3.重新插紧排水泵接线。4.更换排水泵或电脑板。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "E21", descShort: "排水超时/排水3分钟水位无变化", fullGuide: "1.检查排水管是否弯折或堵塞。2.清理排水泵过滤器内的异物。3.检查排水泵是否损坏。4.检查排水管安装高度是否超标。5.更换排水泵。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "E30", descShort: "门锁不上/电脑板多次尝试锁门失败", fullGuide: "1.重新关门，检查门钩是否关到位。2.检查门封圈内是否有碎屑卡滞。3.轻压门体听是否有咔嗒锁扣声。4.更换门锁组件。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "E31", descShort: "门锁解不开/电脑板多次尝试解锁失败", fullGuide: "1.检查门锁组件是否卡死。2.检查门锁的机械连接。3.检查电源火线和零线是否接反。4.更换门锁组件。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "E40", descShort: "E2PROM检查码错误/存储芯片故障", fullGuide: "1.断电重启尝试恢复。2.更换电脑板。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "E41", descShort: "E2PROM连接错误", fullGuide: "1.检查E2PROM连接是否正常。2.更换电脑板。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "E50", descShort: "高压保护/线路电压超过280V", fullGuide: "1.立即切断电源，检查电源电压。2.待电压恢复正常后重新使用。3.加装稳压器。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "E60", descShort: "电机启动失败/3次尝试启动失败", fullGuide: "1.检查电机连接线是否松动。2.检查电机是否损坏。3.检查传动系统是否堵转。4.更换电机或电脑板。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "E61", descShort: "无测速信号/电脑板检测不到速度反馈", fullGuide: "1.检查电机的速度反馈信号线路是否脱落。2.检查电机霍尔传感器。3.检查电机连接线是否松动。4.更换电机或电脑板。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "E62", descShort: "测速信号不正常/电脑板上可控硅击穿", fullGuide: "1.检查测速信号线路。2.检查电脑板可控硅是否损坏。3.更换电脑板。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "E70", descShort: "按键卡死/按键按下20秒以上", fullGuide: "1.检查按键是否有液体渗入或物理卡滞。2.清洁控制板。3.更换显示板或电脑板。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "E80", descShort: "水位传感器异常/频率超出范围", fullGuide: "1.检查水位传感器连接线是否松动。2.检查水位传感器气管是否漏气或堵塞。3.更换水位传感器。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "Err8", descShort: "超水位保护(进排水故障)", fullGuide: "1.检查进水阀是否卡死导致进水不止。2.检查排水系统是否堵塞。3.联系检修。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "Err9", descShort: "超水位保护(洗涤水位未检测到)", fullGuide: "1.排水2分钟后显示Err9。2.检查压力开关连接和触点。3.检查压力开关及其连接系统是否泄漏。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "F1", descShort: "水位传感器接触不良", fullGuide: "1.检查水位传感器连接线是否松动。2.检查水位传感器是否损坏。3.更换水位传感器。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "F2", descShort: "EPROM自检出错", fullGuide: "1.断电重启尝试恢复。2.更换电脑板。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "F4", descShort: "过零检测线路故障", fullGuide: "1.检查过零检测电路。2.检查电源波形是否畸变。3.更换电脑板。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "F8", descShort: "水位传感器损坏或接触不良", fullGuide: "1.检查水位传感器连接线是否松动。2.检查水位传感器气管是否漏气。3.更换水位传感器。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "L5/LU", descShort: "低压保护/电源电压过低", fullGuide: "1.待电网电压升高后自动恢复运行。2.检查电源电压是否正常(187-242V)。3.加装稳压器。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "HU", descShort: "高压保护/电源电压过高", fullGuide: "1.立即切断电源，检查电源电压。2.待电压恢复正常后重新使用。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "UB", descShort: "脱水不平衡/衣物分布不均", fullGuide: "1.打开机门，抖散内桶衣物。2.如内桶是单个大件衣物，需增加1件类似衣物。3.如内桶泡沫过多，等待消泡程序运行结束。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "END", descShort: "程序结束", fullGuide: "洗衣机程序运行结束，属正常提示。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "CL", descShort: "童锁模式已开启", fullGuide: "1.长按童锁键解除童锁。2.参考用户手册了解如何解除儿童锁。[来源：三洋售后资料]" },
{ brand: "三洋", category: "washer", code: "d", descShort: "干燥功能运行中", fullGuide: "干燥功能运行中，属正常提示。[来源：三洋售后资料]" },
{ brand: "松下", category: "washer", code: "U11", descShort: "排水异常/排水管堵塞或排水泵故障", fullGuide: "1.检查排水管是否弯折、堵塞或被压住。2.清理排水过滤器及排水口内的硬币、纽扣、毛絮等异物。3.确认排水管末端是否泡在水中或高度超过2米。4.如有堆叠或延长排水管超过2m需调整。5.修正后将门盖打开再关上，按启动/暂停键重新启动。[来源：松下官网+citation:1]" },
{ brand: "松下", category: "washer", code: "U12", descShort: "机门未关好/门盖未关闭", fullGuide: "1.检查机门是否完全关闭。2.检查是否有衣物被门夹住。3.关闭门盖并按下启动/暂停键，直到听到‘咔擦’声响。[来源：松下官网+citation:1]" },
{ brand: "松下", category: "washer", code: "U13", descShort: "无法脱水/衣物分布不均或过多过少", fullGuide: "1.大件洗涤物（毛巾、床单等）过多，请减少大件物品。2.衣物太多有纠结状况时，解开缠绕的衣物。3.衣物太少时，多放入1-2条浴巾等衣物。4.检查机体是否倾斜或放置不稳。5.修正后将门盖打开再关上，按启动/暂停键重新启动。[来源：松下官网+citation:2]" },
{ brand: "松下", category: "washer", code: "U14", descShort: "无法注水/进水异常或水压过低", fullGuide: "1.确认水龙头是否已打开。2.检查是否停水或水压过低。3.清洁给水过滤网（进水阀滤网）内的杂质。4.检查进水管是否弯折或堵塞。5.排除异常后，将门盖打开再关上，按开始/暂停键重新开始运转。[来源：松下官网+citation:5]" },
{ brand: "松下", category: "washer", code: "U16", descShort: "无法干衣/未安装干衣过滤网", fullGuide: "1.检查干衣过滤网是否已安装。2.清洁保养后，请确实安装滤网。3.安装后按下启动/暂停键，重新启动。[来源：松下官网+citation:1]" },
{ brand: "松下", category: "washer", code: "U18", descShort: "排水过滤器未设置好", fullGuide: "1.检查排水过滤器是否正确安装到位。2.重新安装排水过滤器。3.确认安装牢固后重新启动。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "U23", descShort: "无法自动投入洗涤剂/自动投入槽异常", fullGuide: "1.清洁保养自动投入槽路径。2.正确安装自动投入槽。3.重新开启电源，确认上述事项。[来源：松下官网+citation:1]" },
{ brand: "松下", category: "washer", code: "U32", descShort: "洗涤剂1自动投入异常/洗剂无法自动投入", fullGuide: "1.按‘洗剂1’和‘电源键’后重新操作。2.待屏幕显示45分，按启动暂停键测试。3.如仍异常请联系售后。[来源：松下官网+citation:10]" },
{ brand: "松下", category: "washer", code: "U33", descShort: "柔顺剂自动投入异常/柔软剂无法自动投入", fullGuide: "1.按‘柔软剂’和‘电源键’后重新操作。2.待屏幕显示45分，按启动暂停键测试。3.如仍异常请联系售后。[来源：松下官网+citation:10]" },
{ brand: "松下", category: "washer", code: "U34", descShort: "洗涤剂2自动投入异常/洗剂无法自动投入", fullGuide: "1.按‘洗剂2’和‘电源键’后重新操作。2.待屏幕显示45分，按启动暂停键测试。3.如仍异常请联系售后。[来源：松下官网+citation:10]" },
{ brand: "松下", category: "washer", code: "E10", descShort: "洗涤时进水问题/水压过低或排水管过低", fullGuide: "1.检查水压是否过低。2.将进水管拉直，避免弯折。3.检查排水管高度是否低于55cm，需抬高至55cm以上。4.检查水腔过滤器是否堵塞。5.联系松下服务站检修。[来源：松下官网+citation:3]" },
{ brand: "松下", category: "washer", code: "E11", descShort: "水位传感器异常", fullGuide: "1.检查水位传感器连接线是否松动。2.检查水位传感器气管是否漏气或堵塞。3.断电重启后重新试机。4.更换水位传感器。[来源：松下售后资料+citation:6]" },
{ brand: "松下", category: "washer", code: "E12", descShort: "洗衣机水溢出/进水过多", fullGuide: "1.检查进水阀是否卡死导致进水不止。2.检查水位传感器是否故障。3.拔掉电源插头，将门盖打开再关上，重新通电启动。[来源：松下官网+citation:3]" },
{ brand: "松下", category: "washer", code: "E21", descShort: "排水超时/排水管堵塞", fullGuide: "1.检查排水管是否堵塞或弯折。2.清理排水过滤器。3.检查排水泵是否工作正常。[来源：松下官网+citation:3]" },
{ brand: "松下", category: "washer", code: "E30", descShort: "门未正确关闭/门锁故障", fullGuide: "1.检查是否有衣物被门卡住。2.重新关闭门并听到卡塔锁定声。3.关闭门之后重新启动。4.如仍报故障，检查门锁组件。[来源：松下官网+citation:3]" },
{ brand: "松下", category: "washer", code: "E31", descShort: "漏水检测异常/漏水传感器故障", fullGuide: "1.检查洗衣机底部是否有漏水迹象。2.检查漏水传感器是否被水浸湿。3.清洁传感器表面。4.联系松下服务站检修。[来源：松下售后资料+citation:6]" },
{ brand: "松下", category: "washer", code: "H01", descShort: "水位（压力）感应器异常", fullGuide: "1.检查水位传感器连接线是否松动。2.检查传感器气管是否漏气或堵塞。3.更换水位传感器。4.联系松下服务站。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H04", descShort: "电源开关继电器短路异常", fullGuide: "1.断电重启，拔掉电源插头等待10分钟。2.检查电源开关是否损坏。3.联系松下服务站检修。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H05", descShort: "芯片存储器通路异常/EEPROM故障", fullGuide: "1.断电重启尝试恢复。2.更换电脑板。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H07", descShort: "旋转感应器异常/转速传感器故障", fullGuide: "1.检查电机转速传感器连接线是否松动。2.检查电机霍尔传感器。3.更换电机或电脑板。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H09", descShort: "通信线断线/主板通讯异常", fullGuide: "1.检查主控板与显示板之间的连接线是否松动。2.检查排线插头是否氧化。3.更换显示板或电脑板。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H17", descShort: "温水热敏电阻异常/水温传感器故障", fullGuide: "1.检查水温传感器连接线是否松动。2.测量传感器阻值(25℃约5-10K)。3.更换水温传感器。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H18", descShort: "马达热保护器TH5开路或短路/电机过热", fullGuide: "1.检查电机是否过热。2.减少衣物负荷量，待电机冷却后重新试机。3.更换电机或热保护器。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H21", descShort: "溢水异常/水位过高", fullGuide: "1.检查进水阀是否卡死导致进水不止。2.检查水位传感器是否故障。3.检查排水系统是否堵塞。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H23", descShort: "加热器3驱动回路异常", fullGuide: "1.检查加热管连接线是否松动。2.测量加热管阻值是否正常(通常20-50Ω)。3.更换加热管或电脑板。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H25", descShort: "排水用马达牵引器异常/进水阀故障", fullGuide: "1.检查进水阀线圈阻值是否正常。2.检查进水时是否有明显‘嗡嗡’吸合声。3.无声响则大概率是进水阀故障，需更换。4.检查水位传感器气管是否松脱或堵塞。[来源：松下售后资料+citation:4]" },
{ brand: "松下", category: "washer", code: "H27", descShort: "机盖锁定开关异常/水压异常", fullGuide: "1.优先检查水龙头是否全开、进水管有无压扁或弯折。2.拆下进水阀滤网清除水垢杂质。3.断电重启复位后观察进水时是否有‘嗡嗡’吸合声。4.检查门锁开关是否损坏。[来源：太平洋科技+citation:4]" },
{ brand: "松下", category: "washer", code: "H29", descShort: "冷却风扇异常", fullGuide: "1.检查冷却风扇是否运转。2.检查风扇是否被异物卡住。3.测量风扇电机供电。4.更换冷却风扇。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H38", descShort: "泡传感器1或2回路异常", fullGuide: "1.检查泡沫传感器连接线是否松动。2.清洁传感器表面。3.更换泡沫传感器。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H41", descShort: "3D传感数据传输异常/振动传感器故障", fullGuide: "1.检查3D传感器连接线是否松动。2.断电重启后重新试机。3.更换3D传感器。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H43", descShort: "洗衣机内部漏水", fullGuide: "1.检查洗衣机底部是否有积水。2.检查各软管连接处是否松动。3.检查漏水传感器是否被浸湿。4.联系松下服务站检修。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H46", descShort: "漏水传感器开路或短路", fullGuide: "1.检查漏水传感器连接线是否松动。2.清洁传感器表面。3.更换漏水传感器。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H52", descShort: "高电压异常/输入电压超过20%以上", fullGuide: "1.检查电源电压是否过高。2.立即切断电源，待电压恢复正常后重新使用。3.加装稳压器。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H53", descShort: "低电压异常/输入电压低于35%以上", fullGuide: "1.检查电源电压是否过低。2.待电网电压升高后自动恢复运行。3.加装稳压器。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H55", descShort: "变频过电流异常/变频板电流过大", fullGuide: "1.检查电机是否短路。2.检查传动系统是否堵转。3.更换变频板或电机。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H56", descShort: "变频2回路过电流异常", fullGuide: "1.检查变频板驱动电路。2.检查电机是否损坏。3.更换变频板或电机。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H57", descShort: "减磁电流检知异常", fullGuide: "1.检查电机磁极信号是否正常。2.检查变频板电流检测电路。3.更换变频板或电机。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H59", descShort: "循环风扇马达回转异常", fullGuide: "1.检查循环风扇是否运转。2.检查风扇是否被异物卡住。3.更换循环风扇电机。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H65", descShort: "加热用主继电器驱动回路异常", fullGuide: "1.检查加热继电器是否损坏。2.检查电脑板加热控制电路。3.更换电脑板。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H66", descShort: "加热器1驱动回路异常", fullGuide: "1.检查加热管连接线是否松动。2.测量加热管阻值是否正常。3.更换加热管。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H67", descShort: "加热器2驱动回路异常", fullGuide: "1.检查加热管连接线是否松动。2.测量加热管阻值是否正常。3.更换加热管。[来源：松下售后资料+citation:7]" },
{ brand: "松下", category: "washer", code: "H**", descShort: "需要维修/硬件故障", fullGuide: "1.确认H后面显示的两位数字。2.将电源插头拔除。3.联系Panasonic服务站安排检修，请勿自行拆机。[来源：松下官网+citation:1]" },
{ brand: "松下", category: "washer", code: "H25(进水异常)", descShort: "进水压力异常/进水阀或水位传感器故障", fullGuide: "1.检查水龙头是否全开、进水管有无压扁弯折。2.拆下进水阀滤网清除水垢杂质。3.断电10分钟复位后重新试机。4.观察进水时是否有‘嗡嗡’吸合声，无声则更换进水阀。5.检查水位传感器气管是否松脱。[来源：太平洋科技+citation:4]" },
{ brand: "松下", category: "washer", code: "H27(门锁)", descShort: "机盖锁定开关异常/门锁故障", fullGuide: "1.检查门是否完全关闭。2.检查门锁开关是否损坏。3.检查门锁连接线是否松动。4.更换门锁组件。[来源：松下售后资料+citation:7]" },
{ brand: "小米", category: "washer", code: "E1", descShort: "排水超时/排水管堵塞或排水泵故障", fullGuide: "1.检查排水管是否正确安装，最高点需离地60-90cm。2.检查排水管是否插入下水道过深。3.清理排水泵过滤器内的异物。4.检查排水管是否堵塞或弯折。5.关机重启后观察，若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "E2", descShort: "门未关好/门锁异常", fullGuide: "1.检查洗衣机门是否完全关闭。2.检查门封圈内是否有衣物被卡住。3.轻推或轻敲门锁确保关好。4.重新关门后按启动键。5.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "E3", descShort: "衣物分布不均/脱水不平衡", fullGuide: "1.将桶内衣物抖散均匀。2.不同大小衣物混合放置，避免单件大件衣物单独脱水。3.可将衣物取出抖散后重新放入。4.检查洗衣机是否放置平稳。5.暂停洗衣机，整理衣物后继续运行。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "E4", descShort: "进水超时/水龙头未开或水压低", fullGuide: "1.检查水龙头是否打开。2.确认家中是否停水。3.检查水压是否正常(0.05-0.8MPa)。4.清洗进水阀滤网。5.检查排水管是否挂起(需离地60-90cm)。6.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "E6", descShort: "水位过高/溢水保护", fullGuide: "1.关闭洗衣机电源5-10分钟。2.重新通电启动。3.检查进水阀是否卡死。4.检查水位传感器是否故障。5.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "E8", descShort: "温度传感器异常/水温异常", fullGuide: "1.关闭洗衣机电源5-10分钟。2.重新通电启动。3.检查温度传感器连接线是否松动。4.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "F1", descShort: "水位异常/水位传感器故障", fullGuide: "1.关闭洗衣机电源5-10分钟。2.拔掉电源插头等待几分钟后重新插上。3.检查水位传感器连接线是否松动。4.检查传感器气管是否漏气。5.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "F2", descShort: "烘干加热管异常(洗烘一体机)", fullGuide: "1.关闭洗衣机电源5-10分钟。2.重新通电启动。3.检查加热管阻值是否正常。4.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "F3", descShort: "烘干风机异常(洗烘一体机)", fullGuide: "1.关闭洗衣机电源5-10分钟。2.重新通电启动。3.检查风机是否被异物卡住。4.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "F4", descShort: "进风口温度传感器异常(洗烘一体机)", fullGuide: "1.关闭洗衣机电源5-10分钟。2.重新通电启动。3.检查传感器连接线是否松动。4.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "F5", descShort: "出风口温度传感器异常(洗烘一体机)", fullGuide: "1.关闭洗衣机电源5-10分钟。2.重新通电启动。3.检查传感器连接线是否松动。4.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "FC1", descShort: "变频器通讯异常", fullGuide: "1.关闭洗衣机电源5-10分钟。2.重新通电启动。3.检查通讯线路连接。4.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "FC2", descShort: "电脑板通讯异常", fullGuide: "1.关闭洗衣机电源5-10分钟。2.拔掉电源插头等待几分钟后重新插上。3.检查主控板与显示板之间的连接线是否松动。4.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "C2/C3/C4/C5/C6/C7/C8/C9/C10/C11/C12", descShort: "电机及驱动通讯异常", fullGuide: "1.关闭洗衣机电源5-10分钟。2.重新通电启动。3.检查电机连接线是否松动。4.检查电机霍尔传感器。5.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "CX", descShort: "电机及驱动通讯异常", fullGuide: "1.关闭洗衣机电源5-10分钟。2.重新通电启动。3.检查电机连接线是否松动。4.检查传动系统是否堵转。5.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "E11", descShort: "进水异常/进水20分钟未达到设定水位", fullGuide: "1.检查水龙头是否打开。2.清洁进水阀滤网。3.检查水压是否过低。4.检查排水管是否挂起导致进水流失。5.关机重启后观察，若故障依旧，请联系售后。[来源：小米售后资料]" },
{ brand: "小米", category: "washer", code: "E12", descShort: "排水异常/排水不到8分钟恢复水位", fullGuide: "1.检查排水管是否已经放下。2.检查排水口是否畅通，清理异物。3.检查水位传感器是否工作正常。4.检查排水马达是否损坏。5.关机重启后观察，若故障依旧，请联系售后。[来源：小米售后资料]" },
{ brand: "小米", category: "washer", code: "U3", descShort: "脱水偏心异常/衣物分布不均", fullGuide: "1.将桶内衣物抖散均匀。2.避免单件大件衣物单独脱水。3.暂停洗衣机，整理衣物后重新运行。[来源：小米售后资料]" },
{ brand: "小米", category: "washer", code: "U4", descShort: "门锁异常/连续多次上锁或解锁失败", fullGuide: "1.检查门是否完全关闭。2.检查衣物是否被门夹住。3.重新关门确保门锁到位。4.若故障依旧，请联系售后。[来源：小米售后资料]" },
{ brand: "小米", category: "washer", code: "U81", descShort: "脱水异常/连续六次无法正常脱水", fullGuide: "1.将桶内衣物抖散均匀。2.检查洗衣机是否放置平稳。3.减少衣物负荷量。4.关机重启后重新运行脱水程序。[来源：小米售后资料]" },
{ brand: "小米", category: "washer", code: "EH1", descShort: "电机不启动/速度信号异常", fullGuide: "1.检查电机连接线是否松动。2.检查电机霍尔传感器。3.关机重启后观察。4.若故障依旧，请联系售后。[来源：小米售后资料]" },
{ brand: "小米", category: "washer", code: "EH2", descShort: "电机工作异常/停机一分钟不降", fullGuide: "1.检查电机是否过热。2.检查传动系统是否堵转。3.关机重启后观察。4.若故障依旧，请联系售后。[来源：小米售后资料]" },
{ brand: "小米", category: "washer", code: "EC2", descShort: "温度传感器异常/短路或断路", fullGuide: "1.检查温度传感器连接线是否松动。2.测量传感器阻值(25℃约5-10K)。3.更换温度传感器。[来源：小米售后资料]" },
{ brand: "小米", category: "washer", code: "EA1", descShort: "水位传感器异常", fullGuide: "1.检查水位传感器连接线是否松动。2.检查传感器气管是否漏气或堵塞。3.更换水位传感器。[来源：小米售后资料]" },
{ brand: "小米", category: "washer", code: "EA2", descShort: "水位异常过高", fullGuide: "1.检查进水阀是否卡死导致进水不止。2.检查水位传感器是否故障。3.关机重启后观察。4.若故障依旧，请联系售后。[来源：小米售后资料]" },
{ brand: "小米", category: "washer", code: "777", descShort: "显示通信异常/显示芯片通信错误", fullGuide: "1.关闭洗衣机电源5-10分钟。2.重新通电启动。3.检查显示板与主控板之间的连接线。4.若故障依旧，请联系售后。[来源：小米售后资料]" },
{ brand: "小米", category: "washer", code: "E7C", descShort: "水加热器不工作/加热管故障", fullGuide: "1.检查加热管连接线是否松动。2.测量加热管阻值是否正常(通常20-50Ω)。3.更换加热管。[来源：小米售后资料]" },
// 滚筒故障旧代码（字母型）
{ brand: "小米", category: "washer", code: "SF", descShort: "进水异常/水龙头未开或进水阀滤网堵塞", fullGuide: "1.检查水龙头是否异常。2.清洗进水阀滤网。3.检查进水管是否被冻住。4.关机重启后观察，若故障依旧请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "_F", descShort: "排水异常/排水管堵塞或排水泵故障", fullGuide: "1.清理排水管衣物异物。2.清理排水泵过滤器。3.恢复排水管到合适高度。4.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "dF", descShort: "门锁异常/门未关好", fullGuide: "1.重新关门。2.重新放置衣物，避免门被夹住。3.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "UF", descShort: "不平衡报警/衣物分布不均", fullGuide: "1.拆除运输螺栓。2.调平底脚，确保洗衣机放置平整。3.适当增加一两件衣物。4.将衣物手工抖散放置后重新启动。5.增加漂洗次数。若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "▔F", descShort: "溢水异常/水位过高", fullGuide: "1.关机重启后观察。2.检查进水阀是否卡死。3.检查水位传感器是否故障。4.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "PF", descShort: "水位异常/水位传感器故障", fullGuide: "1.关机重启后观察。2.检查水位传感器连接线。3.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "tF", descShort: "温度异常/温度传感器故障", fullGuide: "1.关机重启后观察。2.检查温度传感器连接线。3.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "HF", descShort: "加热异常/水加热管故障", fullGuide: "1.关机重启后观察。2.检查加热管连接线。3.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "HE", descShort: "烘干异常/烘干加热管故障", fullGuide: "1.关机重启后观察。2.检查烘干加热管阻值。3.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "FE", descShort: "烘干异常/烘干风机故障", fullGuide: "1.关机重启后观察。2.检查风机是否被异物卡住。3.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "IE", descShort: "烘干异常/进风口温度传感器故障", fullGuide: "1.关机重启后观察。2.检查传感器连接线。3.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "OE", descShort: "烘干异常/出风口温度传感器故障", fullGuide: "1.关机重启后观察。2.检查传感器连接线。3.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "CE", descShort: "通讯异常/变频器通讯异常", fullGuide: "1.关机重启后观察。2.检查通讯线路连接。3.若故障依旧，请联系售后。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "3C", descShort: "电机异常/电机停转", fullGuide: "1.关机重启后观察。2.检查电机连接线。3.若故障依旧，请联系售后。[来源：小米官网]" },
// 波轮洗衣机故障代码
{ brand: "小米", category: "washer", code: "E1(波轮)", descShort: "排水异常/排水超时5分钟", fullGuide: "1.检查排水管/下水口是否被堵住。2.检查排水管是否高于机器出水口。3.重新开关门盖自动解除。4.若仍未解决，请报单售后上门检测。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "E2(波轮)", descShort: "开关门异常/正常运转时开盖", fullGuide: "1.开盖报警后，需合盖并按启停键解除报警。2.检查门开关是否损坏。3.若仍未解决，请报单售后上门检测。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "E3(波轮)", descShort: "脱水撞桶三次/不平衡报警", fullGuide: "1.调平底脚，确保洗衣机放置平整。2.将衣物手工抖散放置后重新启动。3.重新开关下机盖。4.若仍未解决，请报单售后上门检测。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "E4(波轮)", descShort: "进水超时/水龙头未开或进水阀堵塞", fullGuide: "1.检查水龙头是否异常。2.清洗进水阀滤网。3.重新开关下机盖。4.若仍未解决，请报单售后上门检测。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "E5(波轮)", descShort: "童锁保护/运行时开门盖", fullGuide: "1.按下电源按键关机可解除。2.重启后观察是否恢复正常。3.若故障依旧，请报单维修。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "E6(波轮)", descShort: "溢水保护/进水阀始终进水或水位传感器故障", fullGuide: "1.按下电源按键关机可解除。2.重启后观察。3.若故障依旧，请报单维修。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "E7(波轮)", descShort: "洗涤加热管异常", fullGuide: "1.按下电源按键关机可解除。2.重启后观察。3.检查加热管连接线。4.若故障依旧，请报单维修。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "E8(波轮)", descShort: "温度传感器异常", fullGuide: "1.按下电源按键关机可解除。2.重启后观察。3.检查温度传感器连接线。4.若故障依旧，请报单维修。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "E9(波轮)", descShort: "电机热保护/电机过热", fullGuide: "1.按下电源按键关机可解除。2.减少衣物负荷量，待电机冷却后重新试机。3.若故障依旧，请报单维修。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "F1(波轮)", descShort: "水位异常/水位传感器故障", fullGuide: "1.按下电源按键关机可解除。2.重启后观察。3.检查水位传感器连接线。4.若故障依旧，请报单维修。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "OE(波轮)", descShort: "烘干异常/烘干加热管故障", fullGuide: "1.按下电源按键关机可解除。2.重启后观察。3.检查加热管阻值。4.若故障依旧，请报单维修。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "IE(波轮)", descShort: "烘干异常/进风口温度传感器故障", fullGuide: "1.按下电源按键关机可解除。2.重启后观察。3.检查传感器连接线。4.若故障依旧，请报单维修。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "FE(波轮)", descShort: "烘干异常/烘干风机故障", fullGuide: "1.按下电源按键关机可解除。2.重启后观察。3.检查风机是否被卡住。4.若故障依旧，请报单维修。[来源：小米官网]" },
{ brand: "小米", category: "washer", code: "HE(波轮)", descShort: "烘干异常/烘干加热管故障", fullGuide: "1.按下电源按键关机可解除。2.重启后观察。3.检查加热管连接线。4.若故障依旧，请报单维修。[来源：小米官网]" },
// 其它提示/非故障代码
{ brand: "小米", category: "washer", code: "dE", descShort: "门未关好报警", fullGuide: "1.检查门是否完全关闭。2.检查衣物是否被门夹住。3.重新关门确保门锁到位。[来源：小米售后资料]" },
{ brand: "小米", category: "washer", code: "END", descShort: "程序结束", fullGuide: "洗衣机程序运行结束，属正常提示。[来源：小米售后资料]" },
{ brand: "小米", category: "washer", code: "CL", descShort: "童锁已开启", fullGuide: "1.长按童锁键解除童锁。2.参考用户手册了解如何解除儿童锁。[来源：小米售后资料]" },
{ brand: "西门子", category: "washer", code: "E16/F16", descShort: "门未正确锁闭/门锁故障", fullGuide: "1.检查门是否完全关闭，确保听到清晰的咔嗒锁止声。2.检查衣物是否被门夹住。3.检查门封条是否平整无变形。4.打开门重新关闭后按启动/暂停键。5.断电5秒后重新通电。6.如代码仍存在，请联系西门子售后。[来源：西门子官网]" },
{ brand: "西门子", category: "washer", code: "E34/F34", descShort: "门未正确锁闭/门锁组件异常", fullGuide: "1.关门时请确认听到咔嗒声。2.满负载时可能导致门无法正常关闭，需调整衣物量。3.检查衣物是否被门夹住。4.重新关门后重启程序。[来源：西门子官网]" },
{ brand: "西门子", category: "washer", code: "E12/F12/E21", descShort: "门锁/安全联锁故障", fullGuide: "1.检查门封圈内侧有无异物卡入门锁舌槽，用干软布清理。2.用手按压门锁舌，确认能顺畅弹回无卡滞。3.检查电源插座电压是否稳定(220V±10%)。4.断电静置3分钟，长按启动/暂停键15秒复位。5.如仍报故障需更换门锁组件。[来源：西门子售后资料]" },
{ brand: "西门子", category: "washer", code: "E67", descShort: "运行模块故障/门锁过热保护", fullGuide: "1.关闭洗衣机电源，等待1-2分钟后重新通电测试。2.门锁模块过热保护时需等待冷却。3.如仍无法开门或故障依旧，需联系售后更换门锁组件。[来源：西门子售后资料]" },
{ brand: "西门子", category: "washer", code: "A02", descShort: "门锁异常/门锁微动开关故障", fullGuide: "1.检查机门是否完全闭合。2.检查门锁舌有无异物卡滞。3.用万用表检测门锁常闭触点阻值(正常应接近0Ω)。4.更换门锁总成。[来源：西门子售后资料]" },
{ brand: "西门子", category: "washer", code: "E17/F17", descShort: "进水超时/水压过低或进水阀堵塞", fullGuide: "1.检查水龙头是否完全打开。2.用桶接水检查水压，全开水龙头应至少流出约10升/分钟。3.若水压低请联系水管工。4.清洁进水阀滤网。5.检查进水管是否弯折。6.检查AquaStop安全软管是否堵塞。[来源：西门子官网]" },
{ brand: "西门子", category: "washer", code: "E29/F29", descShort: "进水异常/水压过低或进水阀堵塞", fullGuide: "1.检查水龙头是否完全打开。2.用桶接水检查水压，全开水龙头应至少流出约10升/分钟。3.若水压低请联系水管工。4.清洁进水阀滤网。5.检查进水管是否弯折或冻住。[来源：西门子官网]" },
{ brand: "西门子", category: "washer", code: "E11/E12", descShort: "进水系统异常/供水问题", fullGuide: "1.打开水龙头，检查能否1分钟内装满一桶水。2.清洁进水软管中的滤网。3.降低水压：关闭水龙头，选择任意程序启动约40秒。4.拔掉插头，拆下进水管清洗滤网。5.重新连接水管。[来源：西门子售后资料]" },
{ brand: "西门子", category: "washer", code: "E18", descShort: "进水阀/水压检测协同异常", fullGuide: "1.检查水龙头是否全开。2.清洁进水阀滤网，疏通水垢。3.重启后选择桶清洁程序，观察60秒内是否有间歇性进水声。4.用万用表测量进水阀线圈阻值(正常3.2-3.8kΩ)。5.进入工厂模式调取实时水压值。[来源：西门子售后资料]" },
{ brand: "西门子", category: "washer", code: "E03", descShort: "漏水/门封圈渗水", fullGuide: "1.检查门封圈是否有发泡胶脱落或龟裂。2.检查进水管快接卡扣是否完全咬合。3.在断电状态下手动旋转排水泵叶轮，判断有无异物卡死。4.检查门锁模块安装位置是否正确。[来源：西门子售后资料]" },
{ brand: "西门子", category: "washer", code: "E18/F18", descShort: "排水管堵塞/排水泵过滤器堵塞", fullGuide: "1.清理排水泵过滤器内的硬币、纽扣、毛絮等异物。2.检查排水管是否弯折或堵塞。3.确保排水管安装高度不超过1米。4.如代码仍存在，请联系西门子售后。[来源：西门子官网]" },
{ brand: "西门子", category: "washer", code: "E6/E25/E26/E30/E36/E80", descShort: "排水故障/排水泵堵塞或排水管弯折", fullGuide: "1.清理排水泵过滤器内的异物。2.检查排水管是否弯折或堵塞。3.确保排水管泵送高度不超过1米。4.检查排水泵线圈阻值。5.更换排水泵。[来源：西门子售后资料]" },
{ brand: "西门子", category: "washer", code: "E36/E80", descShort: "排水系统异常/排水泵故障", fullGuide: "1.清理排水泵过滤器。2.检查排水管是否弯折或堵塞。3.排水泵故障需专业检修。4.请联系西门子售后。[来源：西门子售后资料]" },
{ brand: "西门子", category: "washer", code: "E19/F19", descShort: "加热超时/加热管故障", fullGuide: "1.断电5秒后重新通电。2.检查加热管连接线是否松动。3.测量加热管阻值是否正常(通常20-50Ω)。4.如代码仍存在，请联系西门子售后。[来源：西门子官网]" },
{ brand: "西门子", category: "washer", code: "E20/F20", descShort: "意外加热/加热管异常", fullGuide: "1.断电重启进行复位。2.检查加热管是否短路。3.如错误无法纠正，请联系西门子售后。[来源：西门子官网]" },
{ brand: "西门子", category: "washer", code: "H9E", descShort: "热水龙头未打开/热水水压过低", fullGuide: "1.确认热水软管已正确连接。2.打开热水龙头。3.检查热水进水管是否弯折。4.检查热水水压是否正常。[来源：西门子售后资料]" },
{ brand: "西门子", category: "washer", code: "E6/E5/6E", descShort: "加热管故障/水温加热异常", fullGuide: "1.检查加热管阻值是否正常(通常20-50Ω)。2.检查加热管接线是否松动。3.更换加热管。4.请联系西门子售后。[来源：西门子售后资料]" },
{ brand: "西门子", category: "washer", code: "E21/F21", descShort: "电机故障/电机运转异常", fullGuide: "1.断电3分钟后重新通电重置洗衣机。2.检查电机连接线是否松动。3.检查电机霍尔传感器。4.如代码仍存在，请联系西门子售后。[来源：西门子官网]" },
{ brand: "西门子", category: "washer", code: "E04", descShort: "驱动系统故障/电机通讯异常", fullGuide: "1.进入服务模式调取电机实时转速数据。2.若转速持续为0rpm且无电流反馈，锁定齿轮箱或主控板通信异常。3.更换电机或主控板。[来源：西门子售后资料]" },
{ brand: "西门子", category: "washer", code: "E25/F25", descShort: "浊度传感器故障", fullGuide: "1.该故障无法自行修复。2.断电重启后观察。3.请联系西门子售后安排检修。[来源：西门子官网]" },
{ brand: "西门子", category: "washer", code: "E26/F26", descShort: "模拟压力传感器故障/水位传感器故障", fullGuide: "1.该故障无法自行修复。2.断电重启后观察。3.请联系西门子售后安排检修。[来源：西门子官网]" },
{ brand: "西门子", category: "washer", code: "E27/F27", descShort: "压力传感器故障", fullGuide: "1.该故障无法自行修复。2.断电重启后观察。3.请联系西门子售后安排检修。[来源：西门子官网]" },
{ brand: "西门子", category: "washer", code: "E10/F10", descShort: "i-DOS智能投放系统故障", fullGuide: "1.该代码为i-DOS系统错误。2.洗衣机已自动禁用智能投放功能。3.仍可手动在洗涤剂盒中添加洗涤剂。4.请联系西门子售后检修i-DOS模块。[来源：西门子官网]" },
{ brand: "西门子", category: "washer", code: "E23/F23/E35", descShort: "漏水检测/底座进水报警", fullGuide: "1.立即关闭水龙头。2.拔掉电源插头。3.检查洗衣机底部是否有积水或漏水迹象。4.检查各软管连接处是否松动。5.请联系西门子售后安排检修。[来源：西门子官网]" },
{ brand: "西门子", category: "washer", code: "E33", descShort: "泡沫过多/洗涤剂用量过多", fullGuide: "1.减少洗涤剂用量。2.特别是在软水地区或洗涤轻度脏污衣物时，应相应减少洗涤剂用量。3.运行额外的漂洗程序消除泡沫。[来源：西门子官网]" },
{ brand: "西门子", category: "washer", code: "E32", descShort: "衣物分布不均/甩干中断", fullGuide: "1.这不是故障，不平衡检测系统已中断甩干。2.将大件小件衣物在滚筒中混合分布。3.如需要可重新运行甩干程序。[来源：西门子官网]" },
{ brand: "西门子", category: "washer", code: "E60", descShort: "脱水不平衡/衣物分布不均", fullGuide: "1.洗衣机因滚筒不平衡已中断洗涤程序。2.将衣物在滚筒中抖散均匀。3.交替放置大件小件衣物，避免大件重物都在同一侧。4.如需可重新运行甩干程序。[来源：西门子售后资料]" },
{ brand: "西门子", category: "washer", code: "钥匙符号", descShort: "童锁已激活", fullGuide: "1.童锁功能已开启。2.参考用户手册了解如何解除儿童锁。3.长按预约键约5秒直至指示灯熄灭解除。[来源：西门子官网]" },
{ brand: "西门子", category: "washer", code: "水龙头符号", descShort: "水压低/进水管堵塞或弯折", fullGuide: "1.水压低或进水管堵塞/弯折。2.用桶接水直接检查水压，全开水龙头应至少流出约10升/分钟。3.若水压低请联系水管工。4.确保进水管畅通无弯折。[来源：西门子官网]" },
{ brand: "西门子", category: "washer", code: "E:00/E:10", descShort: "系统故障/需断电重启", fullGuide: "1.关闭洗衣机电源，等待5秒后重新通电。2.如代码再次出现，请联系西门子售后。[来源：西门子官网]" },
{ brand: "西门子", category: "washer", code: "ASAFEON", descShort: "键盘锁已启用", fullGuide: "1.键盘锁功能已开启。2.参考用户手册解除键盘锁。[来源：西门子售后资料]" },
{ brand: "西门子", category: "washer", code: "SFEOFF", descShort: "键盘锁已解除", fullGuide: "键盘锁已解除，可正常操作。[来源：西门子售后资料]" },
{ brand: "西门子", category: "washer", code: "NAL-E", descShort: "烘干负载超限", fullGuide: "1.选择混洗烘干程序时筒内负载超过7.5kg触发。2.手动减少衣物量后重启程序。3.无需拆机检修。[来源：西门子售后资料]" },
{ brand: "西门子", category: "washer", code: "E2EE", descShort: "存储芯片故障/EEPROM校验异常", fullGuide: "1.断电重启尝试恢复。2.进入服务模式执行EEPROM校验。3.如故障依旧需更换电脑板。[来源：西门子售后资料]" },
{ brand: "西门子", category: "washer", code: "√符号(恒定)", descShort: "电脑板烧毁", fullGuide: "若开机即恒定显示√符号，则判定为电脑板烧毁，需更换电脑板。[来源：西门子售后资料]" },
{ brand: "西门子", category: "washer", code: "√符号(程序结束)", descShort: "程序正常结束", fullGuide: "若程序结束时短暂出现√符号，属正常完成标识。[来源：西门子售后资料]" },
{ brand: "西门子", category: "washer", code: "END", descShort: "程序结束", fullGuide: "洗衣机程序运行结束，属正常提示。[来源：西门子售后资料]" },

    const tableBody = document.getElementById('tableBody');
    const resultCountSpan = document.getElementById('resultCount');
    const modalOverlay = document.getElementById('guideModal');
    const modalBody = document.getElementById('modalBodyContent');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const historyContainer = document.getElementById('historyList');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const statSummary = document.getElementById('statSummary');
    const refrigeratorTip = document.getElementById('refrigeratorTip');

    let searchHistory = [];

    function convertBrandToChinese(input) {
        if (!input) return input;
        const lower = input.trim().toLowerCase();
        if (brandMap.has(lower)) return brandMap.get(lower);
        for (let [key, value] of brandMap.entries()) {
            if (key.toLowerCase() === lower || lower.includes(key.toLowerCase()) || key.toLowerCase().includes(lower)) return value;
        }
        return input.trim();
    }

    function updateRefrigeratorTip() {
        if (refrigeratorTip) {
            if (currentCategory === 'refrigerator') {
                refrigeratorTip.classList.remove('hide');
            } else {
                refrigeratorTip.classList.add('hide');
            }
        }
    }

    // 清空表格（不显示任何故障数据）
    function clearTableToEmpty() {
        tableBody.innerHTML = `<tr><td colspan="5" class="empty-modern">🔍 请输入查询条件后点击「立即查询」进行检索</td></tr>`;
        resultCountSpan.innerText = '0 条';
    }

    function loadHistory() {
        const stored = localStorage.getItem('fault_independent_db');
        if(stored) { try { searchHistory = JSON.parse(stored); if(!Array.isArray(searchHistory)) searchHistory = []; } catch(e) { searchHistory = []; } }
        else searchHistory = [];
        renderHistory();
    }

    function saveHistory() { localStorage.setItem('fault_independent_db', JSON.stringify(searchHistory.slice(0, 12))); }

    function addHistory(brandVal, codeVal, fuzzyVal, categoryVal) {
        const record = { brand: brandVal, code: codeVal, fuzzy: fuzzyVal, category: categoryVal, ts: Date.now() };
        if(searchHistory.length && searchHistory[0].brand === brandVal && searchHistory[0].code === codeVal && searchHistory[0].fuzzy === fuzzyVal && searchHistory[0].category === categoryVal) return;
        searchHistory.unshift(record);
        if(searchHistory.length > 12) searchHistory.pop();
        saveHistory();
        renderHistory();
    }

    function clearHistory() { searchHistory = []; saveHistory(); renderHistory(); }

    function applyHistory(rec) {
        brandField.value = rec.brand || '';
        codeField.value = rec.code || '';
        fuzzyField.value = rec.fuzzy || '';
        if(rec.category && (rec.category === 'ac' || rec.category === 'refrigerator' || rec.category === 'washer')) setCategory(rec.category, false);
        else setCategory(currentCategory, false);
        performSearch(true);
    }

    function renderHistory() {
        if(!historyContainer) return;
        if(!searchHistory.length) { historyContainer.innerHTML = '<div class="empty-history">暂无查询记录</div>'; return; }
        let html = '';
        searchHistory.slice(0,10).forEach((rec,idx)=>{
            const catName = rec.category==='ac'?'空调':(rec.category==='refrigerator'?'冰箱':'洗衣机');
            let detail = (rec.brand?rec.brand+' ':'') + (rec.code?rec.code+' ':'') + (rec.fuzzy?`🔍${rec.fuzzy}`:'');
            if(!detail.trim()) detail = `全部${catName}`;
            html += `<div class="history-item" data-idx="${idx}"><span>📌 ${detail}</span><span class="history-badge">${catName}</span></div>`;
        });
        historyContainer.innerHTML = html;
        document.querySelectorAll('.history-item').forEach(el=>{ const idx=parseInt(el.dataset.idx); el.addEventListener('click',()=>{ if(searchHistory[idx]) applyHistory(searchHistory[idx]); }); });
    }

    function getCategoryText(cat) { return cat==='ac'?'❄️ 空调':(cat==='refrigerator'?'🧊 冰箱':'🧺 洗衣机'); }

    function getFiltered(brandQuery, codeQuery, fuzzyQuery) {
        let results = currentDatabase.getAll();
        if(brandQuery) results = results.filter(f => f.brand === brandQuery || f.brand.toLowerCase().includes(brandQuery.toLowerCase()));
        if(codeQuery) results = results.filter(f => f.code.toLowerCase().includes(codeQuery.toLowerCase()));
        if(fuzzyQuery) results = results.filter(f => f.brand.toLowerCase().includes(fuzzyQuery) || f.code.toLowerCase().includes(fuzzyQuery) || f.descShort.toLowerCase().includes(fuzzyQuery) || f.fullGuide.toLowerCase().includes(fuzzyQuery));
        return results;
    }

    function showFullGuide(fault) {
        modalBody.innerHTML = `<div class="guide-title">${fault.brand} · ${fault.code} (${getCategoryText(currentCategory)})</div>
            <div><strong>📌 故障摘要：</strong> ${fault.descShort}</div><br/>
            <div><strong>🛠️ 维修指南：</strong><br/><pre style="white-space:pre-wrap;">${fault.fullGuide}</pre></div>
            <div style="margin-top:12px; background:#f0f4fa; padding:10px; border-radius:16px;">⚠️ 安全提醒：断电操作，建议专业维修。</div>`;
        modalOverlay.classList.add('active');
    }

    function closeModal() { modalOverlay.classList.remove('active'); }

    function renderTable(data) {
        if(!data.length) {
            tableBody.innerHTML = `<tr><td colspan="5" class="empty-modern">😥 未找到匹配的故障代码，请尝试其他关键词</td></tr>`;
            resultCountSpan.innerText = '0 条';
            return;
        }
        let html = '';
        data.forEach((item,idx)=>{
            let preview = item.fullGuide.length>70 ? item.fullGuide.substring(0,70)+'…' : item.fullGuide;
            html += `<tr>
                        <td><span class="brand-chip">${escapeHtml(item.brand)}</span></td>
                        <td>${getCategoryText(currentCategory)}</td>
                        <td><span class="code-badge">${escapeHtml(item.code)}</span></td>
                        <td><div class="guide-preview">📘 ${escapeHtml(preview)}</div></td>
                        <td><button class="expand-guide-btn" data-idx="${idx}">完整指南</button></td>
                      </tr>`;
        });
        tableBody.innerHTML = html;
        resultCountSpan.innerText = `${data.length} 条`;
        document.querySelectorAll('.expand-guide-btn').forEach(btn=>{ const idx=parseInt(btn.dataset.idx); btn.addEventListener('click',()=>{ if(data[idx]) showFullGuide(data[idx]); }); });
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    // 核心搜索函数 - 只有调用此函数才会显示结果
    function performSearch(skipHistory=false, customBrand=null) {
        let rawBrand = (customBrand !== null) ? customBrand : brandField.value.trim();
        const chineseBrand = rawBrand ? convertBrandToChinese(rawBrand) : '';
        const codeVal = codeField.value.trim();
        const fuzzyVal = fuzzyField.value.trim();
        const filtered = getFiltered(chineseBrand, codeVal, fuzzyVal);
        renderTable(filtered);
        if(!skipHistory) addHistory(chineseBrand || rawBrand, codeVal, fuzzyVal, currentCategory);
        if(rawBrand && chineseBrand && rawBrand !== chineseBrand) brandField.value = chineseBrand;
    }

    function translateAndSearch() {
        let input = engBrandInput.value.trim();
        if(!input) { alert("请输入品牌英文或中文"); return; }
        const chinese = convertBrandToChinese(input);
        if(!chinese || chinese === input) { alert(`未找到匹配品牌`); return; }
        brandField.value = chinese;
        performSearch(false, chinese);
        engBrandInput.value = '';
    }

    function updateBrandDatalist() {
        const brands = currentDatabase.getBrands();
        let targetDatalist = document.getElementById('brandDatalist');
        if (!targetDatalist) {
            const newDatalist = document.createElement('datalist');
            newDatalist.id = 'brandDatalist';
            document.body.appendChild(newDatalist);
            targetDatalist = document.getElementById('brandDatalist');
        }
        targetDatalist.innerHTML = '';
        brands.forEach(brand => {
            const option = document.createElement('option');
            option.value = brand;
            targetDatalist.appendChild(option);
        });
        brandField.setAttribute('list', 'brandDatalist');
        brandField.placeholder = brands.length > 0 ? `请选择${getCategoryText(currentCategory)}品牌` : '暂无品牌数据';
    }

    function setCategory(cat, doSearch=false) {
        currentCategory = cat;
        if (cat === 'ac') currentDatabase = acDatabase;
        else if (cat === 'refrigerator') currentDatabase = refrigeratorDatabase;
        else if (cat === 'washer') currentDatabase = washerDatabase;

        deviceBtns.forEach(btn => {
            if(btn.getAttribute('data-cat')===cat) btn.classList.add('active');
            else btn.classList.remove('active');
        });

        updateBrandDatalist();
        updateStatsHighlight();
        updateRefrigeratorTip();

        // 切换设备时清空表格，不自动搜索
        clearTableToEmpty();
        // 清空搜索条件（可选，保持界面干净）
        brandField.value = '';
        codeField.value = '';
        fuzzyField.value = '';
    }

    function resetFilters() {
        brandField.value = '';
        codeField.value = '';
        fuzzyField.value = '';
        engBrandInput.value = '';
        // 重置后清空表格，不显示任何数据
        clearTableToEmpty();
    }

    function commonFault() {
        fuzzyField.value = '传感器';
        brandField.value = '';
        codeField.value = '';
        performSearch(false);
    }

    function updateStats() {
        const acCount = acDatabase.getAll().length;
        const refCount = refrigeratorDatabase.getAll().length;
        const washCount = washerDatabase.getAll().length;
        statSummary.innerHTML = `
            <div class="stat-item" data-cat="ac">❄️ 空调 ${acCount} 条故障码</div>
            <div class="stat-item" data-cat="refrigerator">🧊 冰箱 ${refCount} 条故障码</div>
            <div class="stat-item" data-cat="washer">🧺 洗衣机 ${washCount} 条故障码</div>
        `;
        document.querySelectorAll('.stat-item').forEach(el => {
            el.addEventListener('click', () => {
                const cat = el.getAttribute('data-cat');
                if (cat) setCategory(cat, false);
            });
        });
        updateStatsHighlight();
    }

    function updateStatsHighlight() {
        document.querySelectorAll('.stat-item').forEach(el => {
            if (el.getAttribute('data-cat') === currentCategory) {
                el.classList.add('active');
            } else {
                el.classList.remove('active');
            }
        });
    }

    function bindEvents() {
        deviceBtns.forEach(btn => btn.addEventListener('click', () => setCategory(btn.getAttribute('data-cat'), false)));
        searchBtn.addEventListener('click', () => performSearch(false));
        resetBtn.addEventListener('click', resetFilters);
        commonFaultBtn.addEventListener('click', commonFault);
        translateSearchBtn.addEventListener('click', translateAndSearch);
        closeModalBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => { if(e.target === modalOverlay) closeModal(); });
        clearHistoryBtn.addEventListener('click', clearHistory);
        [brandField, codeField, fuzzyField].forEach(inp => inp.addEventListener('keypress', (e) => { if(e.key === 'Enter') performSearch(false); }));
        engBrandInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') translateAndSearch(); });
    }

    function init() {
        updateStats();
        loadHistory();
        bindEvents();
        updateBrandDatalist();
        clearTableToEmpty();  // 初始状态清空表格
        updateRefrigeratorTip();
    }

    init();
</script>
</body>
</html>
