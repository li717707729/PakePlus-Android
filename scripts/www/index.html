{ brand: "三星", category: "refrigerator", code: "FF", descShort: "通讯故障/误入检测模式", fullGuide: "1.拔掉冰箱电源插头，等待10-15分钟让主板完全放电。2.重新通电后观察，若代码消失则正常使用。3.若代码重现，可能是主控板故障，需联系三星售后报修。[维修经验]" },
{ brand: "三星", category: "refrigerator", code: "F1", descShort: "冷藏蒸发器传感器故障/短路或断路", fullGuide: "1.拔掉电源静置12-15分钟让主控重置。2.检查冷藏室左侧蒸发器区域传感器是否松动就位。3.若重启后代码复现，需联系三星官方售后，由工程师检测传感器阻值(25℃时约5.0kΩ±5%)并更换。[官方来源：Samsung.com]" },
{ brand: "三星", category: "refrigerator", code: "F2", descShort: "环境温度传感器故障", fullGuide: "当环境传感器故障(短路或断路)时，温度显示区显示F2。冰箱不能进入人工智慧状态和速冻状态运行。建议断电重启，若故障依旧需联系售后维修。[维修资料]" },
{ brand: "三星", category: "refrigerator", code: "F3", descShort: "冷藏空间温度传感器故障", fullGuide: "当冷藏空间传感器故障(短路或断路)，温度显示区显示F3。冰箱不能进入人工智慧、速冻状态。建议联系三星售后检修。[维修资料]" },
{ brand: "三星", category: "refrigerator", code: "F4", descShort: "冷冻室温度传感器故障", fullGuide: "当冷冻传感器故障(短路或断路)，温度显示区显示F4。冰箱不能进入人工智慧状态，超温报警及冷冻温度显示功能不能执行。建议联系售后检修。[维修资料]" },
{ brand: "三星", category: "refrigerator", code: "F5", descShort: "变温室温度传感器故障", fullGuide: "当变温室传感器故障(短路或断路)，温度显示区显示F5。变温室温度设置显示功能不能进行。建议联系三星售后检修。[维修资料]" },
{ brand: "三星", category: "refrigerator", code: "F6", descShort: "化霜传感器故障", fullGuide: "当化霜传感器故障(短路或断路)，温度显示区显示F6。如未处于化霜状态则不进入化霜，如处于化霜状态则立即退出化霜。建议联系售后检修。[维修资料]" },
{ brand: "三星", category: "refrigerator", code: "F7", descShort: "冰温室传感器故障", fullGuide: "当冰温室传感器故障(短路或断路)，温度显示区显示F7，不影响冰箱制冷。建议联系三星售后检修。[维修资料]" },
{ brand: "三星", category: "refrigerator", code: "E5 / 5E", descShort: "外部传感器故障/冷藏室化霜传感器", fullGuide: "冰箱检测到外部传感器或冷藏室化霜传感器异常。建议拔掉电源10分钟后重新通电，若代码重现需联系三星售后报修。[维修资料]" },
{ brand: "三星", category: "refrigerator", code: "r5", descShort: "冷藏室温度传感器故障", fullGuide: "冰箱检测到冷藏室温度传感器异常，可能导致温控不准。建议断电重启，若故障依旧需联系三星售后检修。[维修资料]" },
{ brand: "三星", category: "refrigerator", code: "U5", descShort: "冷藏变温室传感器故障", fullGuide: "冰箱检测到冷藏变温室温度传感器异常。建议断电重启，若代码重现需联系三星官方售后报修。[维修资料]" },
{ brand: "三星", category: "refrigerator", code: "UE", descShort: "副蒸发器传感器故障", fullGuide: "冰箱检测到副蒸发器传感器异常。建议联系三星官方售后，由工程师检测后更换传感器。[维修资料]" },
{ brand: "三星", category: "refrigerator", code: "rE", descShort: "R副蒸发器传感器故障", fullGuide: "冰箱检测到R副蒸发器传感器异常。建议断电重启，若故障依旧需联系三星售后检修。[维修资料]" },
{ brand: "三星", category: "refrigerator", code: "H5", descShort: "冷冻/变温室传感器故障", fullGuide: "冰箱检测到冷冻变温室传感器异常。建议断电重启，若代码重现需联系三星官方售后报修。[维修资料]" },
{ brand: "三星", category: "refrigerator", code: "1E", descShort: "冷藏室温度传感器故障", fullGuide: "冰箱检测到冷藏室温度传感器异常，可能导致温控不准或冷藏室温度异常。建议拔掉电源10-15分钟后重新通电，若代码重现需联系三星官方售后检修。" },
{ brand: "三星", category: "refrigerator", code: "2E", descShort: "冷冻室温度传感器故障", fullGuide: "冰箱检测到冷冻室温度传感器异常，可能导致冷冻室温度控制异常。建议断电重启，若故障依旧需联系三星售后检修。" },
{ brand: "三星", category: "refrigerator", code: "3E", descShort: "蒸发器化霜传感器故障", fullGuide: "冰箱检测到蒸发器化霜传感器异常，可能导致化霜功能失效。建议断电重启，若代码重现需联系三星售后报修。" },
{ brand: "三星", category: "refrigerator", code: "4E", descShort: "冷冻室化霜传感器故障", fullGuide: "冰箱检测到冷冻室化霜传感器异常，可能导致冷冻室结冰严重。建议断电化霜后重新通电，若故障依旧需联系售后检修。" },
{ brand: "三星", category: "refrigerator", code: "8E", descShort: "制冰机温度传感器故障", fullGuide: "冰箱检测到制冰机温度传感器异常。建议检查制冰机状态，断电重启后若代码重现需联系三星售后报修。" },
{ brand: "三星", category: "refrigerator", code: "14E", descShort: "制冰机传感器故障", fullGuide: "冰箱检测到制冰机传感器异常。建议断电重启，若故障依旧需联系三星售后检修。" },
{ brand: "三星", category: "refrigerator", code: "23E", descShort: "冷凝器散热风扇故障", fullGuide: "冰箱检测到冷凝器散热风扇异常。1.检查风扇是否被异物卡住。2.检查风扇电机是否损坏。3.若风扇不转或转速异常，需联系三星售后更换风扇电机。" },
{ brand: "三星", category: "refrigerator", code: "24E", descShort: "整机化霜系统故障", fullGuide: "冰箱检测到化霜系统整体异常。1.检查化霜加热器是否损坏。2.检查化霜传感器是否正常。3.若化霜功能失效，需联系三星售后检修。" },
{ brand: "三星", category: "refrigerator", code: "26E", descShort: "制冰机功能异常", fullGuide: "冰箱检测到制冰机功能异常。1.检查制冰机开关是否打开。2.检查水路是否畅通。3.检查水压是否正常。4.若问题持续需联系售后检修。" },
{ brand: "三星", category: "refrigerator", code: "33E", descShort: "水管加热器/进水阀故障", fullGuide: "冰箱检测到水管加热器或进水阀异常。可能导致制冰或冷水供应问题。建议联系三星官方售后检修。" },
{ brand: "三星", category: "refrigerator", code: "39E", descShort: "制冰机模块故障", fullGuide: "冰箱检测到制冰机模块故障。1.检查制冰机是否卡死。2.检查制冰机电机是否损坏。3.若问题持续需联系三星售后更换制冰机模块。" },
{ brand: "三星", category: "refrigerator", code: "40E", descShort: "冰室风扇故障", fullGuide: "冰箱检测到冰室风扇异常。1.检查冰室是否结冰堵塞风扇。2.断电化霜后重新通电。3.若故障依旧需联系售后更换风扇电机。" },
{ brand: "三星", category: "refrigerator", code: "44E", descShort: "制冰机风扇故障", fullGuide: "冰箱检测到制冰机风扇异常。1.检查制冰室是否结冰堵塞。2.断电化霜后重新通电。3.若代码重现需联系三星售后检修。" },
{ brand: "三星", category: "refrigerator", code: "46E", descShort: "冰室温度传感器故障", fullGuide: "冰箱检测到冰室温度传感器异常。建议断电重启，若故障依旧需联系三星售后报修。" },
{ brand: "三星", category: "refrigerator", code: "41E", descShort: "显示板/触控屏通讯故障", fullGuide: "冰箱检测到显示板或触控屏通讯异常。1.拔掉电源插头60秒后重新通电。2.检查门上方的线束接头是否松动，重新插紧。3.若代码重现需联系售后检修。" },
{ brand: "三星", category: "refrigerator", code: "83E", descShort: "电源电压异常故障", fullGuide: "冰箱检测到电源电压异常。1.测量电源电压是否在正常范围(187-242V)。2.检查电源插座是否接触不良。3.若电压正常但代码仍出现，需联系售后检修主控板。" },
{ brand: "三星", category: "refrigerator", code: "84E", descShort: "压缩机锁死/变频驱动故障", fullGuide: "冰箱检测到压缩机锁死或变频驱动异常。1.断电60秒后重新通电。2.若故障重现，可能是压缩机卡缸或变频板损坏，需联系三星售后报修。" },
{ brand: "三星", category: "refrigerator", code: "85E", descShort: "低压供电故障", fullGuide: "冰箱检测到低压供电异常。1.检查电源电压是否稳定。2.检查主控板供电电路。3.若问题持续需联系三星售后检修。" },
{ brand: "三星", category: "refrigerator", code: "86E", descShort: "高压供电故障", fullGuide: "冰箱检测到高压供电异常。1.检查电源电压是否过高。2.检查压缩机供电电路。3.若代码重现需联系三星售后报修。" },
{ brand: "三星", category: "refrigerator", code: "UC", descShort: "电网电压不稳故障", fullGuide: "冰箱检测到电网电压不稳定。1.测量电源电压是否波动过大。2.电压不稳时可加装稳压器。3.若电压正常但代码仍出现，需联系售后检修。" },
{ brand: "三星", category: "refrigerator", code: "D5", descShort: "副蒸发器温度报警", fullGuide: "副蒸发器温度感应电阻损坏（最常见原因）。1.拔掉电源10-15分钟后重新通电。2.若代码仍存在，需检修副蒸发器温度传感器或电脑板。3.建议联系三星官方售后报修：400-810-5858。" },
{ brand: "三星", category: "refrigerator", code: "OF OF", descShort: "制冷关闭模式/演示模式（非故障）", fullGuide: "冰箱处于制冷关闭模式或演示模式。1.找到控制面板左侧顶部两个按钮，同时按住5-8秒直到听到提示音。2.听到提示音后松开按钮，等待几秒确认代码消失。3.若再次出现则重复上述步骤。" },
{ brand: "三星", category: "refrigerator", code: "5A", descShort: "冷藏室化霜传感器故障", fullGuide: "冰箱检测到冷藏室化霜传感器异常。建议拔掉电源10分钟后重新通电，若故障重现需联系三星售后报修。" },
{ brand: "三星", category: "refrigerator", code: "H5", descShort: "变温室传感器故障", fullGuide: "冰箱检测到变温室温度传感器异常。建议断电重启，若代码重现需联系三星官方售后报修。" },
{ brand: "三星", category: "refrigerator", code: "US", descShort: "变温室温度传感器故障", fullGuide: "冰箱检测到变温室温度传感器异常。建议断电重启，若故障依旧需联系三星售后检修。" },
{ brand: "晶弘", category: "refrigerator", code: "E0", descShort: "主控板与显示板通讯故障", fullGuide: "1.检查主控板与显示板之间的连接线是否松动或断裂。2.检查显示板排线插头是否氧化。3.更换显示板。4.更换主控板。" },
{ brand: "晶弘", category: "refrigerator", code: "E1", descShort: "冷藏室温度传感器故障", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查传感器线路是否断路或短路。4.更换主控板。" },
{ brand: "晶弘", category: "refrigerator", code: "E2", descShort: "冷冻室温度传感器故障", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查传感器线路是否断路或短路。4.更换主控板。" },
{ brand: "晶弘", category: "refrigerator", code: "E3", descShort: "化霜传感器故障", fullGuide: "1.检测化霜传感器阻值。2.更换传感器。3.检查线路连接。4.更换主控板。" },
{ brand: "晶弘", category: "refrigerator", code: "E4", descShort: "环境温度传感器故障", fullGuide: "1.检测环境温度传感器阻值。2.更换传感器。3.检查主板接口。4.更换主控板。" },
{ brand: "晶弘", category: "refrigerator", code: "E5", descShort: "制冷系统故障/制冷效果差", fullGuide: "1.检查制冷剂是否泄漏，检漏补氟。2.检查压缩机是否正常工作。3.检查毛细管是否堵塞。4.检查过滤器是否脏堵。5.更换压缩机或维修制冷系统。" },
{ brand: "晶弘", category: "refrigerator", code: "E6", descShort: "化霜加热器故障", fullGuide: "1.测量化霜加热器阻值(通常200-400Ω)。2.检查加热器保险丝是否熔断。3.检查化霜温控器。4.更换化霜加热器。" },
{ brand: "晶弘", category: "refrigerator", code: "E7", descShort: "风扇电机故障", fullGuide: "1.检查风扇电机是否卡滞。2.测量风扇电机供电电压。3.检查风扇电机绕组。4.更换风扇电机。" },
{ brand: "晶弘", category: "refrigerator", code: "E8", descShort: "门开关故障", fullGuide: "1.检查门开关是否接触良好。2.检查门封条是否密封严实。3.检查门开关线路。4.更换门开关。" },
{ brand: "晶弘", category: "refrigerator", code: "E9", descShort: "电源电压异常", fullGuide: "1.测量电源电压是否正常(187-242V)。2.检查电源线路。3.加装稳压器。4.更换电源板。" },
{ brand: "晶弘", category: "refrigerator", code: "F1", descShort: "冷藏室风扇故障", fullGuide: "1.检查冷藏室风扇是否运转。2.检查风扇是否被冰堵住。3.测量风扇电机供电。4.更换风扇电机。" },
{ brand: "晶弘", category: "refrigerator", code: "F2", descShort: "冷冻室风扇故障", fullGuide: "1.检查冷冻室风扇是否运转。2.检查风扇是否被冰堵住。3.测量风扇电机供电。4.更换风扇电机。" },
{ brand: "晶弘", category: "refrigerator", code: "F3", descShort: "化霜定时器故障", fullGuide: "1.检查化霜定时器是否正常转动。2.检查化霜定时器电机。3.更换化霜定时器。" },
{ brand: "晶弘", category: "refrigerator", code: "F4", descShort: "排水系统堵塞", fullGuide: "1.清理排水孔。2.检查排水管是否堵塞。3.检查排水加热丝。4.疏通排水管路。" },
{ brand: "晶弘", category: "refrigerator", code: "F5", descShort: "制冰机故障", fullGuide: "1.检查制冰机进水阀。2.检查制冰机电机。3.检查水位开关。4.更换制冰机组件。" },
{ brand: "晶弘", category: "refrigerator", code: "F6", descShort: "变频板通讯故障", fullGuide: "1.检查主控板与变频板之间的通讯线。2.检查变频板供电。3.更换变频板。4.更换主控板。" },
{ brand: "晶弘", category: "refrigerator", code: "F7", descShort: "压缩机驱动故障", fullGuide: "1.检查压缩机连接线U、V、W三相是否断路。2.测量压缩机三相绕组阻值。3.检查变频板驱动电路。4.更换变频板或压缩机。" },
{ brand: "晶弘", category: "refrigerator", code: "F8", descShort: "EEPROM数据错误", fullGuide: "1.断电重启尝试恢复。2.更换主控板。3.重新烧录EEPROM数据。" },
{ brand: "晶弘", category: "refrigerator", code: "H1", descShort: "自动化霜（正常）", fullGuide: "冰箱正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "晶弘", category: "refrigerator", code: "H2", descShort: "速冻模式运行中", fullGuide: "冰箱处于速冻模式，属正常功能，待速冻完成后自动退出。" },
{ brand: "晶弘", category: "refrigerator", code: "缺相保护(闪1次)", descShort: "缺相保护 (UVW三相中存在断路)", fullGuide: "1.检查压缩机连接线U、V、W三相是否断路或接触不良。2.检查变频板与压缩机之间的连接线是否松动。3.断电10分钟后重启，若故障重现需更换变频板或压缩机。[资料:晶弘变频一体板指示灯闪1次]" },
{ brand: "晶弘", category: "refrigerator", code: "过电压保护(闪2次)", descShort: "过电压保护 (直流母线电压>402V)", fullGuide: "1.测量电源电压是否过高。2.检查变频板电压检测电路。3.断电重启，故障清除后且停机5分钟后会自动重启。4.若频繁出现需更换变频板。[资料:晶弘变频一体板指示灯闪2次]" },
{ brand: "晶弘", category: "refrigerator", code: "欠电压保护(闪3次)", descShort: "欠电压保护 (直流母线电压<170V)", fullGuide: "1.测量电源电压是否过低(低于170V)。2.检查供电线路是否接触不良。3.加装稳压器。4.若电压正常仍报故障，需更换变频板。[资料:晶弘变频一体板指示灯闪3次]" },
{ brand: "晶弘", category: "refrigerator", code: "软过流保护(闪4次)", descShort: "软过流保护 (压缩机相电流>3A)", fullGuide: "1.检查压缩机是否卡缸或堵转。2.测量压缩机三相绕组阻值是否平衡。3.检查制冷系统压力是否过高。4.5分钟后会自动重启，若频繁出现需更换压缩机。[资料:晶弘变频一体板指示灯闪4次]" },
{ brand: "晶弘", category: "refrigerator", code: "过功率保护(闪5次)", descShort: "过功率保护 (压缩机功率超阀值)", fullGuide: "1.检查压缩机是否过载运行。2.测量压缩机电流是否过大。3.检查制冷系统是否堵塞。4.5分钟后会自动重启。[资料:晶弘变频一体板指示灯闪5次]" },
{ brand: "晶弘", category: "refrigerator", code: "堵转保护(闪6次)", descShort: "堵转保护 (三相电流不平衡)", fullGuide: "1.检查压缩机是否卡缸或堵转。2.测量压缩机三相绕组阻值是否平衡。3.检查制冷系统压力。4.5分钟后重启，若故障重现需更换压缩机。[资料:晶弘变频一体板指示灯闪6次]" },
{ brand: "晶弘", category: "refrigerator", code: "硬件过流保护(闪7次)", descShort: "硬件过流保护 (偏置电流采样异常)", fullGuide: "1.检查压缩机连接线是否短路。2.检查变频板电流检测电路。3.更换变频板。4.若更换后故障依旧，需更换压缩机。[资料:晶弘变频一体板指示灯闪7次]" },
{ brand: "晶弘", category: "refrigerator", code: "AD偏置故障(闪8次)", descShort: "AD偏置故障 (偏置电流采样值误差超出范围)", fullGuide: "1.检查变频板偏置电流采样电路。2.更换变频板。3.检查压缩机连接线是否正常。[资料:晶弘变频一体板指示灯闪8次]" },
{ brand: "晶弘", category: "refrigerator", code: "输入频率超限(闪9次)", descShort: "输入频率信号超出范围", fullGuide: "1.检查主控板与变频板之间的通讯线。2.检查主控板频率信号输出是否正常。3.更换主控板或变频板。[资料:晶弘变频一体板指示灯闪9次]" },
{ brand: "晶弘", category: "refrigerator", code: "#01", descShort: "冷藏室温度过低", fullGuide: "1.检查冷藏室温度调节器是否失灵，更换调节器。2.检查制冷剂是否泄漏，需联系专业人员进行维修。[资料:晶弘冰箱显示板代码#01]" },
{ brand: "晶弘", category: "refrigerator", code: "#02", descShort: "冷冻室温度过高", fullGuide: "1.检查冷冻室温度调节器是否失灵，更换调节器。2.检查制冷剂是否泄漏，需联系专业人员进行维修。[资料:晶弘冰箱显示板代码#02]" },
{ brand: "晶弘", category: "refrigerator", code: "#03", descShort: "照明灯不亮", fullGuide: "1.检查照明灯是否损坏，更换灯泡。2.检查电源线是否松动，重新插紧。[资料:晶弘冰箱显示板代码#03]" },
{ brand: "晶弘", category: "refrigerator", code: "#04", descShort: "风扇不转", fullGuide: "1.检查风扇是否损坏，更换风扇。2.检查电路板是否损坏，需联系专业人员进行维修。[资料:晶弘冰箱显示板代码#04]" },
{ brand: "晶弘", category: "refrigerator", code: "#05", descShort: "温度传感器故障", fullGuide: "1.检查温度传感器是否损坏，更换传感器。2.检查电路板是否损坏，需联系专业人员进行维修。[资料:晶弘冰箱显示板代码#05]" },
{ brand: "晶弘", category: "refrigerator", code: "#10", descShort: "温度调节器故障", fullGuide: "1.检查温度调节器是否损坏，更换调节器。2.检查电路板是否损坏，需联系专业人员进行维修。[资料:晶弘冰箱显示板代码#10]" },
{ brand: "晶弘", category: "refrigerator", code: "#11", descShort: "冷冻室温度过低", fullGuide: "1.检查冷冻室温度调节器是否失灵，更换调节器。2.检查制冷剂是否泄漏，需联系专业人员进行维修。[资料:晶弘冰箱显示板代码#11]" },
{ brand: "晶弘", category: "refrigerator", code: "EC", descShort: "通信故障（显示板与主控板）", fullGuide: "1.检查显示板与主控板之间的连接线是否松动或断裂。2.检查排线插头是否氧化。3.更换显示板。4.更换主控板。" },
{ brand: "晶弘", category: "refrigerator", code: "dR", descShort: "化霜电路/化霜加热器故障", fullGuide: "1.测量化霜加热器阻值(通常200-400Ω)，异常则更换。2.检查化霜传感器是否正常。3.检查化霜温控器。4.检查主控板化霜控制电路。5.更换化霜加热器或主控板。" },
{ brand: "晶弘", category: "refrigerator", code: "Ed", descShort: "门开关异常/开门超时报警", fullGuide: "1.检查门是否关严。2.检查门开关是否接触良好。3.检查门封条是否密封严实。4.更换门开关。" },
{ brand: "晶弘", category: "refrigerator", code: "H6", descShort: "室内风机无反馈故障", fullGuide: "1.检查风扇电机是否卡滞。2.测量风扇电机供电电压。3.检查风机霍尔反馈信号。4.更换风扇电机。" },
{ brand: "晶弘", category: "refrigerator", code: "ER", descShort: "制冷异常/温度过高报警", fullGuide: "1.检查制冷剂是否泄漏，检漏补氟。2.检查压缩机是否正常工作。3.检查冷凝器散热是否良好。4.检查门封条是否密封严实。5.检查蒸发器是否结冰。" },
{ brand: "晶弘", category: "refrigerator", code: "FF", descShort: "冷冻室风机故障/散热异常", fullGuide: "1.检查冷冻室风扇是否运转。2.检查风扇是否被冰堵住。3.测量风扇电机供电。4.检查冷凝器是否脏堵。5.更换风扇电机。" },
{ brand: "晶弘", category: "refrigerator", code: "UC", descShort: "电压异常/变频模块保护故障", fullGuide: "1.测量电源电压是否正常(187-242V)。2.检查供电线路是否接触不良。3.加装稳压器。4.检查变频板电压检测电路。5.更换变频板。" },
{ brand: "晶弘", category: "refrigerator", code: "H", descShort: "对应温区温度过高报警", fullGuide: "1.检查对应温区门是否关严。2.检查门封条是否密封严实。3.检查制冷系统是否正常。4.检查温度传感器是否异常。5.等待冰箱自行降温。" },
{ brand: "晶弘", category: "refrigerator", code: "L", descShort: "对应温区温度过低报警", fullGuide: "1.检查对应温区温度传感器是否异常。2.检查温控器设置是否过低。3.检查主控板控制电路。4.更换温度传感器或主控板。" },
{ brand: "晶弘", category: "refrigerator", code: "OF", descShort: "制冷关闭模式（非故障）", fullGuide: "冰箱处于制冷关闭模式，属正常状态，按电源键或模式键退出即可。" },
{ brand: "小天鹅", category: "refrigerator", code: "E0", descShort: "室内温度传感器故障", fullGuide: "1.检查传感器连接线是否松动，重新插紧。2.拔掉传感器插头测量阻值(25℃约5-10K)，异常则更换传感器。3.检查主板接口电路。4.更换主控板。[来源：小天鹅售后资料]" },
{ brand: "小天鹅", category: "refrigerator", code: "E1", descShort: "温度传感器故障", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查传感器线路是否断路或短路。4.更换主控板。[来源：114便民网]" },
{ brand: "小天鹅", category: "refrigerator", code: "E2", descShort: "冷凝器故障/冷凝器堵塞或散热不良", fullGuide: "1.检查冷凝器是否脏堵，清洗冷凝器翅片。2.检查冷凝器散热风扇是否运转。3.检查冷凝器管路是否堵塞。4.清理冰箱背部及底部灰尘，确保通风良好。[来源：114便民网]" },
{ brand: "小天鹅", category: "refrigerator", code: "E3", descShort: "压缩机故障/排水系统故障/蒸发器传感器故障", fullGuide: "1.检查压缩机是否正常运转。2.检查排水管是否堵塞，清理排水管路。3.检查排水泵是否工作，必要时更换。4.检查蒸发器传感器是否损坏，更换传感器。5.若压缩机卡缸或损坏，需更换压缩机。[来源：小天鹅售后资料+维修经验]" },
{ brand: "小天鹅", category: "refrigerator", code: "E4", descShort: "除霜传感器故障", fullGuide: "1.检查除霜传感器连接是否松动，重新插紧。2.测量除霜传感器阻值，异常则更换传感器。3.检查主板除霜控制电路。4.更换主控板。[来源：114便民网]" },
{ brand: "小天鹅", category: "refrigerator", code: "E5", descShort: "室内外机通信故障", fullGuide: "1.检查内外机连接线是否松动、断裂或接错。2.检查信号线是否接触不良。3.测量通信电压。4.更换内机主板或外机主板。[来源：小天鹅售后资料]" },
{ brand: "小天鹅", category: "refrigerator", code: "E6", descShort: "温度传感器故障/温度控制系统异常", fullGuide: "1.断开电源重启冰箱，尝试清除故障代码。2.检查温度传感器是否损坏或脱落，重新固定或更换。3.检查温度控制系统，确保所有连接线路正常。4.若以上方法无效，联系售后服务检修。[来源：太平洋科技]" },
{ brand: "小天鹅", category: "refrigerator", code: "E8", descShort: "压缩机过流保护", fullGuide: "1.检查电源电压是否在220V±10%正常范围内。2.测量压缩机电容容量，若损坏及时更换。3.检查压缩机是否卡缸或堵转。4.若无法解决，联系维修人员检修压缩机。[来源：小天鹅售后资料]" },
{ brand: "小天鹅", category: "refrigerator", code: "EF", descShort: "风机电机故障/冷冻室风机不转", fullGuide: "1.检查风机电机是否卡滞或损坏。2.测量风机电机供电电压(通常DC12V)。3.检查风机霍尔反馈信号。4.检查风道是否结冰堵塞，需化霜处理。5.更换风机电机。[来源：维修经验+抖音视频]" },
{ brand: "小天鹅", category: "refrigerator", code: "H", descShort: "温度传感器故障", fullGuide: "1.拔掉电源插头，检查温度传感器连接是否松动或损坏。2.检查控制板是否故障，需更换控制板。3.检查风扇、冷凝器和管道是否出现故障，及时清洁或更换。4.若以上方法无法解决问题，联系售后服务检修。[来源：啄木鸟家庭维修]" },
{ brand: "小天鹅", category: "refrigerator", code: "F8", descShort: "水位传感器故障", fullGuide: "1.检查水位传感器线路是否接触不良。2.检查水位传感器三脚插头是否松动。3.更换水位传感器。4.若更换后故障依旧，需更换电脑板。[来源：家电维修论坛]" },
{ brand: "小天鹅", category: "refrigerator", code: "E9", descShort: "冷冻室高温报警（制冷异常/门封不严）", fullGuide: "1.检查冷冻室门是否关严。2.检查门封条是否老化或变形，更换门封条。3.检查制冷系统是否正常，压缩机是否运转。4.检查冷凝器散热是否良好。5.如仍报警，联系售后检修。" },
{ brand: "小天鹅", category: "refrigerator", code: "FF", descShort: "制冷异常/温度过高报警", fullGuide: "1.检查制冷剂是否泄漏，检漏补氟。2.检查压缩机是否正常工作。3.检查冷凝器散热是否良好。4.检查门封条是否密封严实。5.检查蒸发器是否结冰。" },
{ brand: "小天鹅", category: "refrigerator", code: "8888/C1/DB", descShort: "进入测试模式（非故障，断电重启即可）", fullGuide: "冰箱进入测试模式，属非故障状态。1.拔掉电源插头，等待3分钟重新通电。2.若代码消失则正常使用。3.若代码重现，可能是主控板故障，需更换主板。" },
{ brand: "小天鹅", category: "refrigerator", code: "dR", descShort: "整机化霜电路故障", fullGuide: "1.检查化霜加热器是否损坏，测量阻值(正常200-400Ω)。2.检查化霜传感器是否正常。3.检查化霜温控器。4.检查主控板化霜控制电路。5.更换化霜加热器或主控板。" },
{ brand: "小天鹅", category: "refrigerator", code: "dA", descShort: "化霜加热器/风门加热故障", fullGuide: "1.测量化霜加热器阻值，异常则更换。2.检查风门加热器是否工作正常。3.检查风门是否卡死。4.检查加热器供电线路。5.更换故障加热器。" },
{ brand: "小天鹅", category: "refrigerator", code: "Ed", descShort: "门开关异常/开门超时报警", fullGuide: "1.检查门是否关严。2.检查门开关是否接触良好。3.检查门封条是否密封严实。4.更换门开关。" },
{ brand: "小天鹅", category: "refrigerator", code: "ErFF", descShort: "冷冻室风机故障", fullGuide: "1.检查冷冻室风扇是否运转。2.检查风扇是否被冰堵住，断电化霜。3.测量风扇电机供电电压。4.检查风机霍尔反馈信号。5.更换风扇电机。" },
{ brand: "小天鹅", category: "refrigerator", code: "ErRH", descShort: "环境传感器异常", fullGuide: "1.检测环境温度传感器阻值(25℃约5-10K)。2.检查传感器插头是否松动。3.更换传感器。4.更换主控板。" },
{ brand: "小天鹅", category: "refrigerator", code: "UC", descShort: "电压异常/变频模块保护", fullGuide: "1.测量电源电压是否正常(187-242V)。2.检查供电线路是否接触不良。3.加装稳压器。4.检查变频板电压检测电路。5.更换变频板。" },
{ brand: "小天鹅", category: "refrigerator", code: "EH", descShort: "湿度传感器故障", fullGuide: "1.检查湿度传感器连接是否松动。2.清洁传感器表面。3.更换湿度传感器。4.更换主控板。" },
{ brand: "小天鹅", category: "refrigerator", code: "H", descShort: "温区温度过高报警", fullGuide: "1.检查对应温区门是否关严。2.检查门封条是否密封严实。3.检查制冷系统是否正常。4.检查温度传感器是否异常。5.等待冰箱自行降温。" },
{ brand: "小天鹅", category: "refrigerator", code: "L", descShort: "温区温度过低报警", fullGuide: "1.检查对应温区温度传感器是否异常。2.检查温控器设置是否过低。3.检查主控板控制电路。4.更换温度传感器或主控板。" },
{ brand: "小天鹅", category: "refrigerator", code: "OF", descShort: "制冷关闭模式（非故障）", fullGuide: "冰箱处于制冷关闭模式，属正常状态，按电源键或模式键退出即可。" },
{ brand: "美的", category: "refrigerator", code: "E1", descShort: "冷藏室温度传感器短路/断路", fullGuide: "1.检查传感器连接线是否松动，重新插紧。2.拔掉传感器插头测量阻值(25℃约5-10K)，阻值偏离正常范围则更换传感器。3.检查传感器线路是否受潮氧化。4.拔掉电源静置12分钟以上，重新通电观察。5.如仍报故障，更换主控板。" },
{ brand: "美的", category: "refrigerator", code: "E2", descShort: "冷冻室温度传感器短路/断路", fullGuide: "1.检查冷冻室传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查传感器线路是否断路或短路。4.更换主控板。" },
{ brand: "美的", category: "refrigerator", code: "E3", descShort: "变温室温度传感器故障", fullGuide: "1.检查变温室传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查线路连接。4.更换主控板。" },
{ brand: "美的", category: "refrigerator", code: "E4", descShort: "环温传感器短路/断路", fullGuide: "1.检查环境温度传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查主板接口。4.更换主控板。" },
{ brand: "美的", category: "refrigerator", code: "E5", descShort: "E2PROM存储器读写故障", fullGuide: "1.断电重启，拔掉电源静置10分钟以上重新通电。2.如故障重现，可能是主控板存储器芯片损坏。3.更换主控板。" },
{ brand: "美的", category: "refrigerator", code: "E6", descShort: "通讯故障/超温报警", fullGuide: "1.检查显示板与主控板之间的连接线是否松动或断裂。2.检查通讯线路是否接触不良。3.更换显示板。4.更换主控板。5.如为超温报警，检查冷冻温度是否持续过高。" },
{ brand: "美的", category: "refrigerator", code: "E7", descShort: "通讯不合格/冷藏室化霜传感器故障", fullGuide: "1.检查显示板与主控板通讯线路。2.检查冷藏室化霜传感器连接是否松动。3.测量化霜传感器阻值，异常则更换。4.更换主控板或显示板。" },
{ brand: "美的", category: "refrigerator", code: "E8", descShort: "过零检测不合格/变温室化霜传感器故障", fullGuide: "1.检查过零检测电路。2.检查变温室化霜传感器连接是否松动。3.测量化霜传感器阻值，异常则更换。4.更换主控板。" },
{ brand: "美的", category: "refrigerator", code: "E9", descShort: "控制板故障/制冷剂泄漏", fullGuide: "1.检查制冷剂是否泄漏，检漏补氟。2.检查压缩机是否正常工作。3.检查门是否关好。4.如压缩机正常运转但温度不达标，可能是控制板故障，更换主控板。" },
{ brand: "美的", category: "refrigerator", code: "dR", descShort: "整机化霜电路故障", fullGuide: "1.检查化霜加热器是否损坏，测量阻值(正常200-400Ω)。2.检查化霜熔断器是否断路。3.检查化霜传感器是否正常。4.检查主控板化霜控制电路。5.更换化霜加热器或主控板。" },
{ brand: "美的", category: "refrigerator", code: "dA", descShort: "化霜加热器故障/开始除霜80分钟后传感器不到5℃", fullGuide: "1.检查化霜加热器是否断路。2.检查化霜熔断器是否断路。3.检查化霜温度传感器是否断路。4.检查主控板输出端电压是否正常。5.更换故障部件。" },
{ brand: "美的", category: "refrigerator", code: "EC", descShort: "E2PROM存储器故障（自检显示）", fullGuide: "1.断电重启尝试恢复。2.如故障重现，主控板存储器芯片损坏。3.更换主控板。" },
{ brand: "美的", category: "refrigerator", code: "EH", descShort: "湿度传感器故障（新品系列）", fullGuide: "1.检查湿度传感器连接是否松动。2.清洁传感器表面。3.更换湿度传感器。4.更换主控板。" },
{ brand: "美的", category: "refrigerator", code: "Er FS", descShort: "冷冻传感器断线或短路", fullGuide: "1.检查主控板输出端到冷冻传感器之间是否存在断路或短路现象。2.测量传感器阻值。3.更换传感器。4.更换主控板。" },
{ brand: "美的", category: "refrigerator", code: "Er rH", descShort: "环境温度传感器断线或短路", fullGuide: "1.检查主控板输出端到环境温度传感器之间是否存在断路或短路现象。2.测量传感器阻值。3.更换传感器。4.更换主控板。" },
{ brand: "美的", category: "refrigerator", code: "Er rS", descShort: "冷藏传感器1断线或短路", fullGuide: "1.检查主控板输出端到冷藏传感器1之间是否存在断路或短路现象。2.测量传感器阻值。3.更换传感器。4.更换主控板。" },
{ brand: "美的", category: "refrigerator", code: "Er r2", descShort: "冷藏传感器2断线或短路", fullGuide: "1.检查主控板输出端到冷藏传感器2之间是否存在断路或短路现象。2.测量传感器阻值。3.更换传感器。4.更换主控板。" },
{ brand: "美的", category: "refrigerator", code: "Er dS", descShort: "除霜传感器断线或短路", fullGuide: "1.检查主控板输出端到除霜传感器之间是否存在断路或短路现象。2.测量传感器阻值。3.更换传感器。4.更换主控板。" },
{ brand: "美的", category: "refrigerator", code: "Er dH", descShort: "除霜不良（开始除霜80分钟传感器不到5℃）", fullGuide: "1.检查化霜加热器是否断路。2.检查化霜熔断器是否断路。3.检查化霜温度传感器是否断路。4.检查主控板输出端电压是否正常。5.更换故障部件。" },
{ brand: "美的", category: "refrigerator", code: "Er CO", descShort: "通信异常（主控制板处理器）", fullGuide: "1.检查显控板与主控板及显示板和主控板连接线。2.检查通讯线路是否接触不良。3.更换显示板。4.更换主控板。" },
{ brand: "美的", category: "refrigerator", code: "Er FF", descShort: "冷冻电机异常（电机连接线断线或电机本身故障）", fullGuide: "1.检查电机连接线是否存在断路或短路现象。2.检查电机是否正常转动。3.检查风扇是否被冰堵住，断电化霜。4.更换冷冻室风扇电机。" },
{ brand: "美的", category: "refrigerator", code: "Er CF", descShort: "冷凝电机异常", fullGuide: "1.检查冷凝电机连接线是否断路或短路。2.检查冷凝电机是否正常工作。3.更换冷凝电机。" },
{ brand: "美的", category: "refrigerator", code: "Ed", descShort: "门开关异常/开门超时报警", fullGuide: "1.检查门是否关严。2.检查门开关是否接触良好。3.检查门封条是否密封严实。4.更换门开关。" },
{ brand: "美的", category: "refrigerator", code: "ErIC", descShort: "主控与显示板通讯异常", fullGuide: "1.检查主控板与显示板之间的连接线是否松动或断裂。2.检查排线插头是否氧化。3.更换显示板。4.更换主控板。" },
{ brand: "美的", category: "refrigerator", code: "FH", descShort: "冷冻室化霜系统故障", fullGuide: "1.检查化霜加热器是否损坏，测量阻值(正常200-400Ω)。2.检查化霜熔断器是否断路。3.检查化霜传感器是否正常。4.检查主控板化霜控制电路。5.更换化霜加热器或主控板。" },
{ brand: "美的", category: "refrigerator", code: "FD", descShort: "冷冻化霜温度传感器故障", fullGuide: "1.检查冷冻化霜传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查线路连接。4.更换主控板。" },
{ brand: "美的", category: "refrigerator", code: "EE", descShort: "制冰机传感器故障", fullGuide: "1.检查制冰机传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查制冰机工作状态。4.更换传感器或制冰机组件。" },
{ brand: "美的", category: "refrigerator", code: "US", descShort: "变温室温度传感器故障", fullGuide: "1.检查变温室传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查线路连接。4.更换主控板。" },
{ brand: "美的", category: "refrigerator", code: "UC", descShort: "电压异常/变频模块故障", fullGuide: "1.测量电源电压是否正常(187-242V)。2.检查供电线路是否接触不良。3.加装稳压器。4.检查变频板电压检测电路。5.更换变频板。" },
{ brand: "美的", category: "refrigerator", code: "EF", descShort: "水箱/水路系统故障", fullGuide: "1.检查水箱水位是否正常。2.检查水路是否堵塞。3.检查进水阀是否工作正常。4.检查水管是否折弯。5.清理水路或更换故障部件。" },
{ brand: "美的", category: "refrigerator", code: "E0", descShort: "制冰机故障（部分高端机型）", fullGuide: "1.检查制冰机是否卡死。2.检查制冰机电机是否正常。3.检查进水阀是否工作。4.检查水位开关。5.更换制冰机组件。" },
{ brand: "美的", category: "refrigerator", code: "L3", descShort: "冷冻室风机故障（转速异常/不转）", fullGuide: "1.检查冷冻室风扇是否运转。2.检查风扇是否被冰堵住，断电化霜。3.测量风扇电机供电电压。4.检查风机霍尔反馈信号。5.更换风扇电机。" },
{ brand: "美的", category: "refrigerator", code: "L4", descShort: "冷凝器风机故障（转速异常/不转）", fullGuide: "1.检查冷凝器风扇是否运转。2.检查风扇是否被异物卡住。3.测量风扇电机供电电压。4.检查风机霍尔反馈信号。5.更换冷凝风扇电机。" },
{ brand: "美的", category: "refrigerator", code: "H", descShort: "对应温区温度过高提示", fullGuide: "1.检查对应温区门是否关严。2.检查门封条是否密封严实。3.检查制冷系统是否正常。4.检查温度传感器是否异常。5.等待冰箱自行降温。" },
{ brand: "美的", category: "refrigerator", code: "L", descShort: "对应温区温度过低提示", fullGuide: "1.检查对应温区温度传感器是否异常。2.检查温控器设置是否过低。3.检查主控板控制电路。4.更换温度传感器或主控板。" },
{ brand: "西门子", category: "refrigerator", code: "E1", descShort: "冷藏室传感器故障", fullGuide: "1.检查冷藏室传感器连接是否松动。2.用万用表测量传感器阻值（25℃标准阻值约5kΩ±5%），偏差超10%需更换。3.注意：西门子K系列采用NTC 10kΩ/β值3950K定制规格，勿使用通用传感器替代。4.检查门体是否密闭、是否频繁开启导致温差突变。5.断电30秒重启，若故障重现更换传感器或主控板。[来源：西门子技术手册]" },
{ brand: "西门子", category: "refrigerator", code: "E2", descShort: "冷冻室传感器故障", fullGuide: "1.检查冷冻室传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查传感器线路是否断路或短路。4.更换主控板。[来源：西门子售后资料]" },
{ brand: "西门子", category: "refrigerator", code: "E3", descShort: "冷藏室温度传感器故障/变温区传感器", fullGuide: "1.检查冷藏室温度传感器连接。2.用手轻触冷藏室上部感知实际温度是否与显示一致。3.测量传感器阻值，偏差超10%需更换。4.检查风道是否被食物遮挡影响温度检测。[来源：西门子技术手册]" },
{ brand: "西门子", category: "refrigerator", code: "E4", descShort: "冷冻室温度传感器故障", fullGuide: "1.检查冷冻室传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查传感器线路。4.更换主控板。[来源：西门子售后资料]" },
{ brand: "西门子", category: "refrigerator", code: "E5", descShort: "变温室温度传感器故障", fullGuide: "1.检查变温室传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查线路连接。4.更换主控板。[来源：西门子售后资料]" },
{ brand: "西门子", category: "refrigerator", code: "E6", descShort: "操作面板损坏/显示板故障", fullGuide: "1.检查显示面板是否有裂痕或进水痕迹。2.检查主控板与显示板之间排线插接是否松动。3.排线接口处如有氧化痕迹，用橡皮擦轻拭金手指后重新压紧。4.更换显示面板或主控板。[来源：西门子售后资料]" },
{ brand: "西门子", category: "refrigerator", code: "E7", descShort: "通信故障", fullGuide: "1.检查主控板与显示板间排线插接是否松动。2.排线接口处有无氧化痕迹，用橡皮擦轻拭金手指后重新压紧。3.更换显示板。4.更换主控板。5.确认冰箱周边无大功率变频设备（如电磁炉、微波炉）持续运行，避免电磁干扰。[来源：西门子技术手册]" },
{ brand: "西门子", category: "refrigerator", code: "E8", descShort: "电源故障/压缩机过流保护/制冰机冰块卡住", fullGuide: "1.检查冰箱电源线路是否正常，测量电源电压是否在220V±10%范围内。2.检查压缩机是否卡缸，测量压缩机电容容量。3.如冰箱带制冰机，检查冰格或冰块容器出口是否被冰块卡住，清空冰格抽屉并自然化冰后清理。4.加装稳压器。[来源：西门子售后资料]" },
{ brand: "西门子", category: "refrigerator", code: "E9", descShort: "电磁阀故障", fullGuide: "1.检查电磁阀线圈阻值是否正常。2.检查电磁阀供电线路。3.检查电磁阀是否卡死。4.更换电磁阀。5.如冷冻/冷藏切换异常，重点检查电磁阀。[来源：西门子售后资料]" },
{ brand: "西门子", category: "refrigerator", code: "E07", descShort: "通讯异常/主控板与显示板通信中断", fullGuide: "1.重点检查主控板与显示板间排线插接是否松动。2.排线接口处有无氧化痕迹，用橡皮擦轻拭后重新压紧。3.确认冰箱周边无大功率变频设备干扰。4.更换显示板。5.更换主控板。[来源：西门子技术手册]" },
{ brand: "西门子", category: "refrigerator", code: "E25", descShort: "通信故障/CAN总线通信异常", fullGuide: "1.检查主控板与显示板间排线插接是否松动。2.确认冰箱周边无大功率变频设备（如电磁炉、微波炉）持续运行，避免2.4GHz频段电磁干扰影响CAN总线通信稳定性。3.更换显示板。4.更换主控板。[来源：西门子技术手册]" },
{ brand: "西门子", category: "refrigerator", code: "F21", descShort: "室外除霜温度传感器故障", fullGuide: "1.检查化霜传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查化霜加热器是否损坏。4.更换主控板。[来源：西门子售后资料]" },
{ brand: "西门子", category: "refrigerator", code: "F25", descShort: "室外排气温度传感器故障", fullGuide: "1.检测排气传感器阻值。2.检查传感器插头是否松动。3.更换排气传感器。4.更换主控板。[来源：西门子售后资料]" },
{ brand: "西门子", category: "refrigerator", code: "F6", descShort: "室外环境温度传感器故障", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查主板接口。4.更换主控板。[来源：西门子售后资料]" },
{ brand: "西门子", category: "refrigerator", code: "EE", descShort: "按键操作错误/控制面板误操作", fullGuide: "1.检查是否有按键卡滞未回弹。2.检查用户是否正确操作按键。3.断电30秒重启。4.如频繁出现，更换显示面板。[来源：西门子售后资料]" },
{ brand: "西门子", category: "refrigerator", code: "ER", descShort: "通用故障/系统错误", fullGuide: "1.检查冰箱是否正确连接电源，电源线有无损坏或松动。2.检查温度传感器是否故障。3.检查控制面板是否故障。4.检查制冷系统、风扇、排水系统是否正常。5.联系西门子官方售后服务中心检修。[来源：西门子售后资料]" },
{ brand: "西门子", category: "refrigerator", code: "L", descShort: "对应温区温度过低提示", fullGuide: "1.检查对应温区是否误设为速冻模式。2.检查该温区食物是否紧贴内壁、风道是否被遮挡。3.检查温度传感器是否异常。4.调整温控器设置。5.如温度持续过低，更换传感器或主控板。[来源：西门子技术手册]" },
{ brand: "西门子", category: "refrigerator", code: "H", descShort: "对应温区温度过高提示/超温报警", fullGuide: "1.检查冰箱门是否完全关闭，门封条密封是否良好。2.检查一次性放入冷冻室的食物是否过多。3.检查制冷系统是否正常。4.等待冰箱自行降温，如长时间不降温需联系售后检修。[来源：西门子售后资料]" },
{ brand: "西门子", category: "refrigerator", code: "E33", descShort: "制冰机冰块卡住", fullGuide: "1.清空冰格抽屉和冷冻室抽屉。2.将抽屉从冷冻室取出，让冰块自然化冰。3.化冰后擦拭干净，将抽屉放回原位。4.检查制冰机工作状态。[来源：Nettoparts.ie]" },
{ brand: "西门子", category: "refrigerator", code: "E48", descShort: "制冰机冰块卡住", fullGuide: "1.清空冰格抽屉和冷冻室抽屉。2.将抽屉从冷冻室取出，让冰块自然化冰。3.化冰后擦拭干净，将抽屉放回原位。4.检查制冰机工作状态。[来源：Nettoparts.ie]" },
{ brand: "西门子", category: "refrigerator", code: "E10", descShort: "冷凝器风机故障（不转/转速异常）", fullGuide: "1.检查冷凝器风扇是否运转。2.检查风扇是否被异物卡住。3.测量风扇电机供电电压。4.检查风机霍尔反馈信号。5.更换冷凝风扇电机。" },
{ brand: "西门子", category: "refrigerator", code: "E11", descShort: "蒸发器风机故障（不转/转速异常）", fullGuide: "1.检查蒸发器风扇是否运转。2.检查风扇是否被冰堵住，断电化霜。3.测量风扇电机供电电压。4.检查风机霍尔反馈信号。5.更换蒸发器风扇电机。" },
{ brand: "西门子", category: "refrigerator", code: "E12", descShort: "冷冻室温度传感器故障（部分机型）", fullGuide: "1.检查冷冻室传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查传感器线路是否断路或短路。4.更换主控板。" },
{ brand: "西门子", category: "refrigerator", code: "E13", descShort: "门体线束/门控开关故障", fullGuide: "1.检查门体线束连接是否松动或断裂。2.检查门控开关是否接触良好。3.检查门体线束插头是否氧化。4.更换门体线束或门控开关。" },
{ brand: "西门子", category: "refrigerator", code: "E14", descShort: "进水阀/水路传感器故障", fullGuide: "1.检查进水阀是否工作正常，测量线圈阻值。2.检查水路是否堵塞。3.检查水压是否正常。4.更换进水阀或水路传感器。" },
{ brand: "西门子", category: "refrigerator", code: "E15", descShort: "制冰机电机/位置传感器故障", fullGuide: "1.检查制冰机电机是否正常运转。2.检查位置传感器是否正常。3.检查制冰机是否卡死。4.更换制冰机电机或位置传感器。" },
{ brand: "西门子", category: "refrigerator", code: "E17", descShort: "制冰机/风扇电机故障", fullGuide: "1.检查制冰机风扇是否运转。2.检查制冰机组件是否正常工作。3.检查风扇电机供电。4.更换制冰机风扇电机。" },
{ brand: "西门子", category: "refrigerator", code: "E19", descShort: "门封/门控开关异常", fullGuide: "1.检查门封条是否老化或变形，更换门封条。2.检查门控开关是否接触良好。3.检查门是否关严。4.更换门控开关。" },
{ brand: "西门子", category: "refrigerator", code: "E21", descShort: "制冷系统异常（冷媒泄漏/压缩机效率低）", fullGuide: "1.检查制冷剂是否泄漏，检漏补氟。2.检查压缩机是否正常工作，测量压缩机电流。3.检查系统是否堵塞。4.更换压缩机或维修制冷系统。" },
{ brand: "西门子", category: "refrigerator", code: "E62", descShort: "变频压缩机故障/驱动模块异常", fullGuide: "1.检查变频板驱动电路。2.测量压缩机三相绕组阻值。3.检查变频板与压缩机之间连接线。4.更换变频板或压缩机。" },
{ brand: "西门子", category: "refrigerator", code: "E6", descShort: "通讯故障/除霜系统异常", fullGuide: "1.检查主控板与显示板之间排线插接是否松动。2.检查化霜加热器是否损坏。3.检查化霜传感器是否正常。4.更换主控板或显示板。" },
{ brand: "西门子", category: "refrigerator", code: "E7", descShort: "通讯故障/除霜系统异常", fullGuide: "1.检查主控板与显示板之间排线插接是否松动。2.检查化霜加热器是否损坏。3.检查化霜传感器是否正常。4.更换主控板或显示板。" },
{ brand: "西门子", category: "refrigerator", code: "E8", descShort: "通讯故障/除霜系统异常", fullGuide: "1.检查主控板与显示板之间排线插接是否松动。2.检查化霜加热器是否损坏。3.检查化霜传感器是否正常。4.更换主控板或显示板。" },
{ brand: "西门子", category: "refrigerator", code: "Holiday", descShort: "假日模式（非故障）", fullGuide: "冰箱处于假日模式，属正常功能，按模式键退出即可。" },
{ brand: "西门子", category: "refrigerator", code: "dE", descShort: "门开关异常/门未关严报警", fullGuide: "1.检查门是否关严。2.检查门开关是否接触良好。3.检查门封条是否密封严实。4.更换门开关。" },
{ brand: "惠而浦", category: "refrigerator", code: "E1", descShort: "冷藏室传感器短路或断路", fullGuide: "1.检查冷藏室传感器连接线是否松动，重新插紧。2.拔掉传感器插头测量阻值(25℃约5-10K)，异常则更换传感器。3.确保传感器线路未受潮氧化。4.断电10分钟后重新通电，若故障重现更换主控板。[来源：啄木鸟维修]" },
{ brand: "惠而浦", category: "refrigerator", code: "E2", descShort: "微冻室传感器短路或断路/冷藏室蒸发器传感器故障", fullGuide: "1.断电后卸下顶盖板，取出电路板。2.用万用表电阻档测电器盒内10芯插座(左侧)第3、5脚之间的直流电阻值。3.环境温度0℃-39℃时，若阻值小于1.0kΩ或大于6.7kΩ，则为传感器故障。4.取下后板，在传感器与内藏线连接处挖出发泡剂，剪断后更换同型号传感器。5.连接处涂热熔胶防潮，补发泡剂后通电测试。[来源：啄木鸟维修]" },
{ brand: "惠而浦", category: "refrigerator", code: "E3", descShort: "冷冻室传感器短路或断路", fullGuide: "1.检查冷冻室传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查传感器线路是否断路或短路。4.更换主控板。[来源：啄木鸟维修]" },
{ brand: "惠而浦", category: "refrigerator", code: "E4", descShort: "环温传感器短路或断路", fullGuide: "1.检查环境温度传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查主板接口。4.更换主控板。[来源：啄木鸟维修]" },
{ brand: "惠而浦", category: "refrigerator", code: "E5", descShort: "E2PROM读写故障", fullGuide: "1.断电重启，拔掉电源静置10分钟以上重新通电。2.如故障重现，可能是主控板存储器芯片损坏。3.更换主控板。[来源：啄木鸟维修]" },
{ brand: "惠而浦", category: "refrigerator", code: "E6", descShort: "超温报警/冷冻温度大幅降低", fullGuide: "1.检查冷冻室门是否关严。2.检查一次性放入冷冻室的温热食物是否过多。3.检查温度传感器是否故障。4.断电重启，等待冰箱自行降温。5.如长时间不降温需联系售后检修。[来源：啄木鸟维修]" },
{ brand: "惠而浦", category: "refrigerator", code: "E7", descShort: "通讯故障/主控与显示板通讯不合格", fullGuide: "1.检查主控板与显示板之间的连接线是否松动或断裂。2.检查排线插头是否氧化。3.更换显示板。4.更换主控板。[来源：啄木鸟维修]" },
{ brand: "惠而浦", category: "refrigerator", code: "E8", descShort: "过零检测不合格", fullGuide: "1.检查过零检测电路。2.检查电源波形是否畸变。3.更换主控板。[来源：啄木鸟维修]" },
{ brand: "惠而浦", category: "refrigerator", code: "EH", descShort: "环境温度传感器故障", fullGuide: "1.检查环境温度传感器连接是否松动。2.拔掉电源等待几分钟后重新插上测试。3.测量传感器阻值，异常则更换。4.如问题仍然存在，联系售后服务中心由专业技术人员维修。[来源：啄木鸟维修]" },
{ brand: "惠而浦", category: "refrigerator", code: "PO", descShort: "电源中断/停电故障", fullGuide: "1.确认冰箱温度是否正常，等待24小时让温度稳定。2.尝试关闭断路器几分钟后再打开，重置冰箱。3.如果冷却无法恢复或故障反复出现，需检查主控板。[来源：RepairClinic]" },
{ brand: "惠而浦", category: "refrigerator", code: "PF", descShort: "电源故障/停电后恢复", fullGuide: "1.此代码通常在短暂停电后出现，属信息提示。2.断电几分钟后重新上电，查看代码是否清除。3.检查冷冻室温度是否正常。4.如正常则无需维修。[来源：RepairClinic]" },
{ brand: "惠而浦", category: "refrigerator", code: "CF", descShort: "主控板与显示板通讯故障", fullGuide: "1.检查显示板连接线是否松动。2.断电重启观察。3.如果代码重现，需检查线束连接和主控板。4.更换UI板或主控板。[来源：Appliance GrandMasters]" },
{ brand: "惠而浦", category: "refrigerator", code: "dH", descShort: "化霜加热器故障/化霜系统不加热", fullGuide: "1.检查冷冻室后壁是否有大量结霜。2.不要用尖锐工具铲冰。3.检查化霜加热器是否损坏，测量阻值(正常200-400Ω)。4.检查双金属片/化霜传感器。5.更换化霜加热器或主控板。[来源：Appliance GrandMasters]" },
{ brand: "惠而浦", category: "refrigerator", code: "dF", descShort: "化霜故障/化霜周期未正常完成", fullGuide: "1.检查门封条是否密封良好。2.减少开门次数。3.断电重启。4.如果结霜持续出现，需要专业检修化霜系统。[来源：Appliance GrandMasters]" },
{ brand: "惠而浦", category: "refrigerator", code: "F1", descShort: "冷冻室温度传感器故障", fullGuide: "1.检查通风口是否被食物遮挡。2.断电重启。3.如果代码重现，需检修传感器或线路。4.更换冷冻室传感器。[来源：Appliance GrandMasters]" },
{ brand: "惠而浦", category: "refrigerator", code: "F2", descShort: "冷藏室温度传感器故障", fullGuide: "1.检查风道和风门区域是否正常。2.断电重启。3.如果代码重现，需检修传感器或线路。4.更换冷藏室传感器。[来源：Appliance GrandMasters]" },
{ brand: "惠而浦", category: "refrigerator", code: "F3", descShort: "蒸发器温度传感器故障", fullGuide: "1.检查蒸发器是否结霜不均匀。2.断电重启。3.如果代码重现，需检修传感器线路。4.更换蒸发器传感器。[来源：Appliance GrandMasters]" },
{ brand: "惠而浦", category: "refrigerator", code: "F5", descShort: "蒸发器风机问题", fullGuide: "1.倾听冷冻室风扇是否运转。2.确保没有物体阻挡风扇叶片。3.断电重启。4.如果风机不转，需更换风扇电机。[来源：Appliance GrandMasters]" },
{ brand: "惠而浦", category: "refrigerator", code: "F6", descShort: "压缩机驱动问题", fullGuide: "1.清洁冷凝器线圈。2.断电重启。3.如果代码重现，需检修压缩机启动装置或变频板。[来源：Appliance GrandMasters]" },
{ brand: "惠而浦", category: "refrigerator", code: "DR/dO", descShort: "门未关严/门开关故障", fullGuide: "1.用力关上门并确认门已关严。2.检查门封条是否有变形或脏污。3.检查门开关是否接触良好。4.如果门已关严但警报仍在，更换门开关。[来源：Appliance GrandMasters]" },
{ brand: "惠而浦", category: "refrigerator", code: "SF", descShort: "展厅模式开启/制冷效果不正常", fullGuide: "1.此模式用于展厅展示，不制冷。2.查阅说明书按特定按键组合退出。3.如果按键无反应，需检修控制面板。[来源：Appliance GrandMasters]" },
{ brand: "惠而浦", category: "refrigerator", code: "E0", descShort: "制冰机故障", fullGuide: "1.检查制冰机的水线是否被冰或杂物堵塞。2.检查水阀是否打开。3.检查注水管是否结冰。4.更换水滤芯。5.检查制冰机电机是否正常。6.如果制冰机结霜严重，需化霜处理。[来源：Appliance GrandMasters]" },
{ brand: "惠而浦", category: "refrigerator", code: "ICE/iC", descShort: "制冰机故障", fullGuide: "1.检查供水阀门是否打开。2.检查注水管是否结冰堵塞。3.检查水压是否正常。4.检查制冰机模块。5.更换制冰机组件或进水阀。[来源：Appliance GrandMasters]" },
{ brand: "惠而浦", category: "refrigerator", code: "E9", descShort: "冷冻室高温报警", fullGuide: "1.检查冷冻室门是否完全关闭。2.检查冷冻室通风口是否被食物堵塞。3.检查后壁是否有严重结霜。4.断电重启。5.断电重启后如代码仍出现，需专业检修。[来源：Appliance GrandMasters]" },
{ brand: "惠而浦", category: "refrigerator", code: "EE", descShort: "制冰机电路故障", fullGuide: "1.检查制冰机保险丝是否熔断。2.检查线路连接是否松动。3.检查制冰机电机是否故障。4.需技术人员测试电压和通断。[来源：Appliance GrandMasters]" },
{ brand: "惠而浦", category: "refrigerator", code: "H", descShort: "对应温区温度过高提示", fullGuide: "1.检查冰箱门是否完全关闭，门封条密封是否良好。2.检查一次性放入冷冻室的食物是否过多。3.等待冰箱自行降温，如长时间不降温需联系售后检修。[来源：啄木鸟维修]" },
{ brand: "惠而浦", category: "refrigerator", code: "L", descShort: "对应温区温度过低提示", fullGuide: "1.检查温控器设置是否过低。2.检查温度传感器是否异常。3.检查主控板控制电路。4.更换温度传感器或主控板。[来源：啄木鸟维修]" },
{ brand: "惠而浦", category: "refrigerator", code: "E0-01", descShort: "制冰进水超时故障", fullGuide: "1.检查进水阀是否工作正常，测量线圈阻值(正常约700-1100Ω)。2.检查水压是否正常(需大于1.5bar)。3.检查水管是否结冰堵塞。4.检查进水滤芯是否堵塞，更换滤芯。5.更换进水阀。" },
{ brand: "惠而浦", category: "refrigerator", code: "E0-02", descShort: "制冰溢水/水位异常故障", fullGuide: "1.检查水位传感器是否正常。2.检查制冰盒水位是否过高。3.检查进水阀是否卡滞导致进水不止。4.检查排水是否堵塞。5.更换水位传感器或进水阀。" },
{ brand: "惠而浦", category: "refrigerator", code: "E0-03", descShort: "制冰脱冰机构故障", fullGuide: "1.检查制冰机脱冰电机是否正常运转。2.检查脱冰加热器是否工作。3.检查制冰盒是否卡死。4.检查冰盒温度传感器。5.更换脱冰电机或制冰机组件。" },
{ brand: "惠而浦", category: "refrigerator", code: "E0-04", descShort: "冰盒检测传感器故障", fullGuide: "1.检查冰盒检测传感器连接是否松动。2.清洁传感器表面。3.更换冰盒检测传感器。4.检查冰盒是否安装到位。" },
{ brand: "惠而浦", category: "refrigerator", code: "E10", descShort: "显示板与主控板界面通讯故障", fullGuide: "1.检查显示板与主控板之间的连接线是否松动或断裂。2.检查排线插头是否氧化。3.更换显示板。4.更换主控板。" },
{ brand: "惠而浦", category: "refrigerator", code: "EE", descShort: "制冰机电路/主板存储故障", fullGuide: "1.断电重启尝试恢复。2.检查制冰机连接线。3.更换制冰机模块。4.更换主控板。" },
{ brand: "惠而浦", category: "refrigerator", code: "F4", descShort: "冷藏化霜系统故障", fullGuide: "1.检查冷藏化霜加热器是否损坏，测量阻值(正常200-400Ω)。2.检查化霜熔断器是否断路。3.检查化霜传感器是否正常。4.更换化霜加热器或主控板。" },
{ brand: "惠而浦", category: "refrigerator", code: "F7", descShort: "环境温度检测故障", fullGuide: "1.检查环境温度传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查主板接口。4.更换主控板。" },
{ brand: "惠而浦", category: "refrigerator", code: "dr", descShort: "门开关故障/门未关严报警", fullGuide: "1.检查门是否关严。2.检查门开关是否接触良好。3.检查门封条是否密封严实。4.更换门开关。" },
{ brand: "惠而浦", category: "refrigerator", code: "dE", descShort: "门控异常/门体通讯故障", fullGuide: "1.检查门体线束连接是否松动或断裂。2.检查门控开关是否正常。3.检查门体线束插头是否氧化。4.更换门体线束或门控开关。" },
{ brand: "惠而浦", category: "refrigerator", code: "rd", descShort: "冷藏化霜加热器故障", fullGuide: "1.测量冷藏化霜加热器阻值(正常200-400Ω)。2.检查化霜加热器是否断路。3.检查加热器供电线路。4.更换冷藏化霜加热器。" },
{ brand: "惠而浦", category: "refrigerator", code: "DF", descShort: "整机化霜系统失效", fullGuide: "1.检查化霜加热器是否损坏。2.检查化霜熔断器是否断路。3.检查化霜传感器是否正常。4.检查主控板化霜控制电路。5.更换化霜加热器或主控板。" },
{ brand: "惠而浦", category: "refrigerator", code: "SY", descShort: "主控板与面板通讯异常", fullGuide: "1.检查主控板与显示面板之间的连接线是否松动。2.检查排线插头是否氧化。3.更换显示面板。4.更换主控板。" },
{ brand: "惠而浦", category: "refrigerator", code: "CE", descShort: "主控板与面板通讯异常", fullGuide: "1.检查主控板与显示面板之间的连接线是否松动。2.检查排线插头是否氧化。3.更换显示面板。4.更换主控板。" },
{ brand: "惠而浦", category: "refrigerator", code: "LC", descShort: "漏水传感器报警", fullGuide: "1.检查冰箱底部是否有积水。2.检查排水管是否堵塞。3.检查接水盘是否满溢。4.清理积水并检查漏水传感器。5.如无漏水但报警持续，更换漏水传感器。" },
{ brand: "惠而浦", category: "refrigerator", code: "HRS", descShort: "冷藏室高温报警", fullGuide: "1.检查冷藏室门是否关严。2.检查门封条是否密封良好。3.检查冷凝器散热是否良好。4.检查制冷系统是否正常。5.等待冰箱自行降温。" },
{ brand: "惠而浦", category: "refrigerator", code: "LRS", descShort: "冷藏室低温报警", fullGuide: "1.检查冷藏室温度传感器是否异常。2.检查温控器设置是否过低。3.检查风门是否卡死在开启位置。4.更换温度传感器或主控板。" },
{ brand: "惠而浦", category: "refrigerator", code: "PE", descShort: "电源供电故障", fullGuide: "1.测量电源电压是否正常(187-242V)。2.检查电源线是否损坏。3.检查电源板保险丝是否熔断。4.检查开关电源输出是否正常。5.更换电源板或主控板。" },
{ brand: "惠而浦", category: "refrigerator", code: "PC", descShort: "变温抽屉温度传感器故障", fullGuide: "1.检查变温室传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查线路连接。4.更换主控板。" },
{ brand: "海信", category: "refrigerator", code: "F1", descShort: "冷藏室温度传感器故障", fullGuide: "1.拔掉传感器插头测量阻值(25℃正常应在2.3-2.8kΩ)。2.若显示OL（超量程）或阻值低于1.8kΩ、高于3.2kΩ，则更换传感器。3.检查传感器插头是否氧化，用橡皮擦轻拭金手指。4.检查线路是否断路或短路。5.更换主控板。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "F2", descShort: "变温室温度传感器故障", fullGuide: "1.检查变温室传感器连接是否松动。2.测量传感器阻值(25℃约2.3-2.8kΩ)，异常则更换。3.检查线路连接。4.更换主控板。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "F3", descShort: "冷冻室温度传感器故障", fullGuide: "1.检查冷冻室传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查传感器线路。4.更换主控板。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "F4", descShort: "环境温度传感器故障", fullGuide: "1.检查环境温度传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查主板接口。4.更换主控板。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "F5", descShort: "冷藏室温度传感器与环境传感器同时故障", fullGuide: "1.同时检查冷藏室传感器和环境传感器。2.分别测量两个传感器阻值，异常则更换。3.检查线路是否共用部分。4.更换主控板。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "F6", descShort: "冰温室传感器故障/接收通讯故障", fullGuide: "1.检查冰温室传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查通讯线路。4.更换主控板。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "F7", descShort: "发送通讯故障/冰温室与变温室传感器同时故障", fullGuide: "1.检查主控板与显示板之间的通讯线路。2.检查排线插头是否氧化。3.同时检查冰温室和变温室传感器。4.更换显示板或主控板。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "F8", descShort: "变温室蒸发器传感器故障", fullGuide: "1.检查变温室蒸发器传感器连接。2.测量传感器阻值，异常则更换。3.检查蒸发器是否结霜严重。4.更换主控板。[来源：海信售后资料]" },
// E系列故障代码
{ brand: "海信", category: "refrigerator", code: "E0", descShort: "温度传感器短路或断路", fullGuide: "1.检查冷藏室或冷藏室温度传感器连接是否松动。2.测量传感器阻值(25℃约2.3-2.8kΩ)，异常则更换。3.检查线路是否断路或短路。4.更换主控板。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "E1", descShort: "冷藏室传感器短路或断路", fullGuide: "1.检查冷藏室感温头连接是否松动。2.测量传感器阻值，异常则更换。3.断电静置5分钟后重新通电。4.若故障重现，更换主控板。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "E2", descShort: "微冻室/变温室传感器短路或断路", fullGuide: "1.检查变温室感温头连接是否松动。2.测量传感器阻值，异常则更换。3.检查线路连接。4.更换主控板。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "E3", descShort: "冷冻室传感器短路或断路/蒸发器温度传感器异常", fullGuide: "1.检查冷冻室感温头连接是否松动。2.测量传感器阻值(25℃正常应在2.3-2.8kΩ)。3.检查冷藏室后壁上方偏右位置的传感器探头是否被霜层覆盖。4.检查线缆根部有无弯折压痕或绝缘层破裂。5.断电静置5分钟后重启。6.更换传感器或主控板。[来源：海信售后资料+太平洋科技]" },
{ brand: "海信", category: "refrigerator", code: "E4", descShort: "环温传感器短路或断路", fullGuide: "1.检查环境温度传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查主板接口。4.更换主控板。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "E5", descShort: "E2PROM读写故障", fullGuide: "1.断电重启，拔掉电源静置10分钟以上重新通电。2.如故障重现，可能是主控板存储器芯片损坏。3.更换主控板。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "E6", descShort: "超温报警/冷冻温度持续过高", fullGuide: "1.检查冷冻室门是否关严。2.检查一次性放入的温热食物是否过多。3.检查冷凝器散热是否良好。4.等待冰箱自行降温，如长时间不降温需联系售后检修。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "E7", descShort: "通讯不合格", fullGuide: "1.检查主控板与显示板之间的连接线是否松动或断裂。2.检查排线插头是否氧化。3.更换显示板。4.更换主控板。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "E8", descShort: "过零不合格", fullGuide: "1.检查过零检测电路。2.检查电源波形是否畸变。3.更换主控板。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "E9", descShort: "控制板坏或制冷剂泄漏", fullGuide: "1.检查制冷剂是否泄漏，检漏补氟。2.检查压缩机是否正常工作。3.如压缩机正常但温度不达标，可能是控制板故障，更换主控板。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "EE", descShort: "接收通讯故障/显示板线缆故障", fullGuide: "1.检查显示板与主控板之间的连接线。2.检查排线插头是否氧化。3.更换显示板。4.更换主控板。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "Er", descShort: "接收通讯故障/主控接收通讯故障", fullGuide: "1.检查主控板与显示板之间的通讯线路。2.检查排线插头是否松动。3.更换显示板。4.更换主控板。[来源：海信售后资料]" },
// H系列故障代码(高端机型)
{ brand: "海信", category: "refrigerator", code: "H5", descShort: "变温室蒸发传感器故障", fullGuide: "1.检查变温室蒸发传感器连接。2.测量传感器阻值，异常则更换。3.检查蒸发器是否结霜严重。4.更换主控板。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "H6", descShort: "变温室蒸发器传感器故障", fullGuide: "1.检查变温室蒸发器传感器连接。2.测量传感器阻值，异常则更换。3.更换主控板。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "H14", descShort: "过电流保护动作（软件）", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查变频板电流检测电路。4.更换变频板或压缩机。[来源：海信维修资料]" },
{ brand: "海信", category: "refrigerator", code: "H16", descShort: "电流检测回路异常", fullGuide: "1.检查电流检测CT线圈是否松脱。2.测量CT输出电压。3.更换CT传感器。4.更换变频板。[来源：海信维修资料]" },
{ brand: "海信", category: "refrigerator", code: "H17", descShort: "过电流保护动作（硬件）", fullGuide: "1.检查压缩机是否卡缸或堵转。2.测量压缩机三相绕组阻值。3.检查系统压力是否过高。4.更换压缩机。[来源：海信维修资料]" },
{ brand: "海信", category: "refrigerator", code: "H1C", descShort: "压缩机锁定/压缩机故障", fullGuide: "1.检查压缩机是否卡缸或堵转。2.测量压缩机绕组阻值。3.检查变频板驱动电路。4.更换压缩机。[来源：海信维修资料]" },
{ brand: "海信", category: "refrigerator", code: "H21", descShort: "DC电压异常", fullGuide: "1.测量直流母线电压是否正常。2.检查PFC电路。3.检查电解电容是否鼓包。4.更换变频板。[来源：海信维修资料]" },
{ brand: "海信", category: "refrigerator", code: "H22", descShort: "由于急减速导致的失步", fullGuide: "1.检查压缩机线序。2.检查电源电压是否稳定。3.更换变频板。[来源：海信维修资料]" },
{ brand: "海信", category: "refrigerator", code: "H23", descShort: "由于急加速导致的失步", fullGuide: "1.检查压缩机线序。2.检查系统压力是否异常。3.更换变频板。[来源：海信维修资料]" },
{ brand: "海信", category: "refrigerator", code: "H24", descShort: "通信异常", fullGuide: "1.检查主控板与变频板之间的通讯线。2.测量通讯电压。3.更换主控板或变频板。[来源：海信维修资料]" },
{ brand: "海信", category: "refrigerator", code: "H30", descShort: "冷冻室传感器断路", fullGuide: "1.检查冷冻室传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查线路是否断路。4.更换主控板。[来源：海信维修资料]" },
{ brand: "海信", category: "refrigerator", code: "H31", descShort: "除霜传感器（冷冻）断路", fullGuide: "1.检查冷冻化霜传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查线路连接。4.更换主控板。[来源：海信维修资料]" },
{ brand: "海信", category: "refrigerator", code: "H32", descShort: "冷藏室传感器断路", fullGuide: "1.检查冷藏室传感器连接。2.测量传感器阻值，异常则更换。3.更换主控板。[来源：海信维修资料]" },
{ brand: "海信", category: "refrigerator", code: "H33", descShort: "切换室传感器断路", fullGuide: "1.检查切换室传感器连接。2.测量传感器阻值，异常则更换。3.更换主控板。[来源：海信维修资料]" },
{ brand: "海信", category: "refrigerator", code: "H38", descShort: "冷冻室传感器短路", fullGuide: "1.检查冷冻室传感器线路是否短路。2.测量传感器阻值，异常则更换。3.更换主控板。[来源：海信维修资料]" },
{ brand: "海信", category: "refrigerator", code: "H39", descShort: "除霜传感器（冷冻）短路", fullGuide: "1.检查冷冻化霜传感器线路是否短路。2.测量传感器阻值。3.更换传感器或主控板。[来源：海信维修资料]" },
{ brand: "海信", category: "refrigerator", code: "H60", descShort: "机械室电风扇马达锁定", fullGuide: "1.检查机械室风扇是否被异物卡住。2.测量风扇电机供电电压。3.检查风机霍尔反馈信号。4.更换风扇电机。[来源：海信维修资料]" },
{ brand: "海信", category: "refrigerator", code: "H61", descShort: "冷藏室电风扇马达锁定", fullGuide: "1.检查冷藏室风扇是否被冰堵住。2.断电化霜处理。3.测量风扇电机供电。4.更换风扇电机。[来源：海信维修资料]" },
{ brand: "海信", category: "refrigerator", code: "H62", descShort: "冷冻室电风扇马达锁定", fullGuide: "1.检查冷冻室风扇是否被冰堵住。2.断电化霜处理。3.测量风扇电机供电。4.更换风扇电机。[来源：海信维修资料]" },
{ brand: "海信", category: "refrigerator", code: "H71", descShort: "冷冻室除霜故障", fullGuide: "1.检查化霜加热器是否损坏，测量阻值(正常200-400Ω)。2.检查化霜熔断器是否断路。3.检查化霜传感器是否正常。4.更换化霜加热器或主控板。[来源：海信维修资料]" },
{ brand: "海信", category: "refrigerator", code: "H80", descShort: "制冰盘马达动作不良", fullGuide: "1.检查制冰机脱冰电机是否正常运转。2.检查制冰盒是否卡死。3.检查冰盒检测传感器。4.更换制冰机组件。[来源：海信维修资料]" },
{ brand: "海信", category: "refrigerator", code: "H82", descShort: "操作面板通信异常", fullGuide: "1.检查显示板与主控板之间的通讯线路。2.检查排线插头是否氧化。3.更换显示板。4.更换主控板。[来源：海信维修资料]" },
{ brand: "海信", category: "refrigerator", code: "HLL", descShort: "低压侧制冷剂泄漏", fullGuide: "1.检漏并补充制冷剂。2.检查管路接头是否松动。3.检查密封圈是否老化。4.补漏后抽真空加氟。[来源：海信维修资料]" },
{ brand: "海信", category: "refrigerator", code: "HLH", descShort: "高压侧制冷剂泄漏", fullGuide: "1.检漏并补充制冷剂。2.检查高压管路是否有破损。3.补漏后抽真空加氟。[来源：海信维修资料]" },
// CF/DR系列故障代码
{ brand: "海信", category: "refrigerator", code: "CF", descShort: "冷藏蒸发电机故障/冷凝电机故障", fullGuide: "1.检查冷凝器风扇是否运转。2.检查风扇电机供电。3.更换冷凝风扇电机。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "dr", descShort: "门未关闭/门开关故障", fullGuide: "1.检查门是否关严。2.检查门开关是否接触良好。3.检查门封条是否密封严实。4.更换门开关。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "EF", descShort: "冷冻蒸发电机故障/发送通讯故障", fullGuide: "1.检查冷冻室风扇是否运转。2.检查通讯线路。3.更换冷冻风扇电机或主控板。[来源：海信售后资料]" },
// LO/温度提示系列
{ brand: "海信", category: "refrigerator", code: "LO", descShort: "电压低/温度过低", fullGuide: "1.测量电源电压是否过低。2.加装稳压器。3.如温度显示过低，检查温度传感器是否异常。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "HHHH/EE", descShort: "显示板线缆故障/全显88", fullGuide: "1.检查显示板连接线是否松动。2.检查排线插头是否氧化。3.更换显示板。4.更换主控板。[来源：海信售后资料]" },
{ brand: "海信", category: "refrigerator", code: "dR", descShort: "化霜电路/化霜加热器故障", fullGuide: "1.检查化霜加热器是否损坏，测量阻值(正常200-400Ω)。2.检查化霜熔断器是否断路。3.检查化霜传感器是否正常。4.检查主控板化霜控制电路。5.更换化霜加热器或主控板。" },
{ brand: "海信", category: "refrigerator", code: "Ed", descShort: "门开关异常/开门超时报警", fullGuide: "1.检查门是否关严。2.检查门开关是否接触良好。3.检查门封条是否密封严实。4.更换门开关。" },
{ brand: "海信", category: "refrigerator", code: "UC", descShort: "电压异常/变频模块保护故障", fullGuide: "1.测量电源电压是否正常(187-242V)。2.检查供电线路是否接触不良。3.加装稳压器。4.检查变频板电压检测电路。5.更换变频板。" },
{ brand: "海信", category: "refrigerator", code: "EA", descShort: "制冰模块通讯故障", fullGuide: "1.检查制冰模块与主控板之间的通讯线路。2.检查连接插头是否松动或氧化。3.更换制冰模块。4.更换主控板。" },
{ brand: "海信", category: "refrigerator", code: "H", descShort: "对应温区温度过高报警", fullGuide: "1.检查对应温区门是否关严。2.检查门封条是否密封严实。3.检查制冷系统是否正常。4.检查温度传感器是否异常。5.等待冰箱自行降温。" },
{ brand: "海信", category: "refrigerator", code: "L", descShort: "对应温区温度过低报警", fullGuide: "1.检查对应温区温度传感器是否异常。2.检查温控器设置是否过低。3.检查主控板控制电路。4.更换温度传感器或主控板。" },
{ brand: "海信", category: "refrigerator", code: "OF", descShort: "制冷关闭模式（非故障）", fullGuide: "冰箱处于制冷关闭模式，属正常状态，按电源键或模式键退出即可。" },
{ brand: "美菱", category: "refrigerator", code: "E0", descShort: "冷藏室/冷冻室温度传感器故障", fullGuide: "1.检查传感器连接线是否松动，重新插紧。2.拔掉传感器插头测量阻值(25℃约5-10K)，异常则更换。3.两个屏幕同时闪烁E0说明冷藏室和冷冻室传感器同时故障。4.变温室显示E0说明变温室传感器故障。5.更换主控板。[来源：美菱售后资料]" },
{ brand: "美菱", category: "refrigerator", code: "E1", descShort: "蒸发器传感器故障/冷藏室蒸发器传感器故障", fullGuide: "1.检查蒸发器传感器与主控板之间的连接是否良好，重新插紧。2.测量传感器阻值，异常则更换。3.断电重启，拔掉电源插头等待10分钟后再通电。4.如问题仍未解决，联系美菱客服(4008-117-117)进行专业维修。[来源：美菱售后资料+啄木鸟维修]" },
{ brand: "美菱", category: "refrigerator", code: "E2", descShort: "微冻室/变温室传感器短路或断路", fullGuide: "1.检查变温室传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查线路连接。4.更换主控板。[来源：美菱售后资料]" },
{ brand: "美菱", category: "refrigerator", code: "E3", descShort: "冷冻室传感器短路或断路/化霜报警/蒸发器传感器故障(BCD-216ZE3B)", fullGuide: "1.检查冷冻室传感器连接是否松动。2.测量传感器阻值，异常则更换。3.冷冻室连续三次化霜达不到退出条件会显示E3报警，需检查化霜加热器是否损坏，测量阻值(正常200-400Ω)。4.检查化霜熔断器是否断路。5.更换化霜加热器或主控板。[来源：美菱售后资料]" },
{ brand: "美菱", category: "refrigerator", code: "E4", descShort: "环温传感器短路或断路", fullGuide: "1.检查环境温度传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查主板接口。4.更换主控板。[来源：美菱售后资料]" },
{ brand: "美菱", category: "refrigerator", code: "E5", descShort: "E2PROM读写故障", fullGuide: "1.断电重启，拔掉电源静置10分钟以上重新通电。2.如故障重现，可能是主控板存储器芯片损坏。3.更换主控板。[来源：美菱售后资料]" },
{ brand: "美菱", category: "refrigerator", code: "E6", descShort: "超温报警/冷冻温度持续过高", fullGuide: "1.检查冷冻室门是否关严。2.检查一次性放入的温热食物是否过多。3.检查冷凝器散热是否良好。4.等待冰箱自行降温，如长时间不降温需联系售后检修。[来源：美菱售后资料]" },
{ brand: "美菱", category: "refrigerator", code: "E7", descShort: "通讯不合格/显示板与主控板通讯故障", fullGuide: "1.检查主控板与显示板之间的连接线是否松动或断裂。2.检查排线插头是否氧化。3.更换显示板。4.更换主控板。[来源：美菱售后资料]" },
{ brand: "美菱", category: "refrigerator", code: "E8", descShort: "过零不合格/过零检测电路故障", fullGuide: "1.检查过零检测电路。2.检查电源波形是否畸变。3.更换主控板。[来源：美菱售后资料]" },
{ brand: "美菱", category: "refrigerator", code: "EC", descShort: "通信线故障/主控与显示板通讯异常", fullGuide: "1.检查主控板与显示板之间的连接线是否松动。2.检查排线插头是否氧化。3.更换显示板。4.更换主控板。[来源：美菱售后资料]" },
{ brand: "美菱", category: "refrigerator", code: "F1", descShort: "冷藏蒸发器传感器故障", fullGuide: "1.检查冷藏蒸发器传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查线路连接。4.更换主控板。[来源：美菱售后资料]" },
{ brand: "美菱", category: "refrigerator", code: "F2", descShort: "环境传感器故障", fullGuide: "1.检查环境传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查主板接口。4.更换主控板。[来源：美菱售后资料]" },
{ brand: "美菱", category: "refrigerator", code: "F3", descShort: "冷冻蒸发器传感器故障", fullGuide: "1.检查冷冻蒸发器传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查线路连接。4.更换主控板。[来源：美菱售后资料]" },
{ brand: "美菱", category: "refrigerator", code: "E9", descShort: "冷凝器风扇故障/散热不良", fullGuide: "1.检查冷凝器风扇是否运转。2.检查风扇是否被异物卡住。3.测量风扇电机供电电压。4.清洁冷凝器翅片，确保散热良好。5.更换冷凝风扇电机。" },
{ brand: "美菱", category: "refrigerator", code: "dR", descShort: "化霜电路/化霜加热器故障", fullGuide: "1.检查化霜加热器是否损坏，测量阻值(正常200-400Ω)。2.检查化霜熔断器是否断路。3.检查化霜传感器是否正常。4.检查主控板化霜控制电路。5.更换化霜加热器或主控板。" },
{ brand: "美菱", category: "refrigerator", code: "Ed", descShort: "门开关异常/开门超时报警", fullGuide: "1.检查门是否关严。2.检查门开关是否接触良好。3.检查门封条是否密封严实。4.更换门开关。" },
{ brand: "美菱", category: "refrigerator", code: "ErFF", descShort: "冷冻室风机故障", fullGuide: "1.检查冷冻室风扇是否运转。2.检查风扇是否被冰堵住，断电化霜。3.测量风扇电机供电电压。4.检查风机霍尔反馈信号。5.更换风扇电机。" },
{ brand: "美菱", category: "refrigerator", code: "UC", descShort: "电压异常/变频模块保护故障", fullGuide: "1.测量电源电压是否正常(187-242V)。2.检查供电线路是否接触不良。3.加装稳压器。4.检查变频板电压检测电路。5.更换变频板。" },
{ brand: "美菱", category: "refrigerator", code: "H", descShort: "对应温区温度过高报警", fullGuide: "1.检查对应温区门是否关严。2.检查门封条是否密封严实。3.检查制冷系统是否正常。4.检查温度传感器是否异常。5.等待冰箱自行降温。" },
{ brand: "美菱", category: "refrigerator", code: "L", descShort: "对应温区温度过低报警", fullGuide: "1.检查对应温区温度传感器是否异常。2.检查温控器设置是否过低。3.检查主控板控制电路。4.更换温度传感器或主控板。" },
{ brand: "美菱", category: "refrigerator", code: "OF", descShort: "制冷关闭模式（非故障）", fullGuide: "冰箱处于制冷关闭模式，属正常状态，按电源键或模式键退出即可。" },
{ brand: "容声", category: "refrigerator", code: "E1", descShort: "冷藏室传感器短路或断路", fullGuide: "1.检查冷藏室传感器连接线是否松动，重新插紧。2.拔掉传感器插头测量阻值(25℃约5-10K)，异常则更换。3.检查传感器线路是否断路或短路。4.更换主控板。[来源：容声售后资料]" },
{ brand: "容声", category: "refrigerator", code: "E2", descShort: "微冻室传感器短路或断路", fullGuide: "1.断电后拆下顶盖板，取出电路板。2.用万用表测量电器盒中10芯插座(左侧)第3、5脚之间的直流电阻值。3.环境温度0℃-39℃时，若阻值小于1.0kΩ或大于6.7kΩ，则为传感器故障。4.更换传感器或主控板。[来源：容声售后资料+citation:8]" },
{ brand: "容声", category: "refrigerator", code: "E3", descShort: "冷冻室传感器短路或断路/冷藏室蒸发器感温头故障", fullGuide: "1.检查冷冻室传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.如为冷藏室蒸发器感温头故障，需挖开发泡剂更换感温头。4.更换主控板。[来源：容声售后资料+citation:2]" },
{ brand: "容声", category: "refrigerator", code: "E4", descShort: "环温传感器短路或断路", fullGuide: "1.检查环境温度传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查主板接口。4.更换主控板。[来源：容声售后资料+citation:1]" },
{ brand: "容声", category: "refrigerator", code: "E5", descShort: "E2PROM读写故障", fullGuide: "1.断电重启，拔掉电源静置10分钟以上重新通电。2.如故障重现，可能是主控板存储器芯片损坏。3.更换主控板。[来源：容声售后资料+citation:1]" },
{ brand: "容声", category: "refrigerator", code: "E6", descShort: "超温报警，冷冻温度持续过高", fullGuide: "1.检查冷冻室门是否关严。2.检查一次性放入的温热食物是否过多。3.检查冷凝器散热是否良好。4.等待冰箱自行降温，如长时间不降温需联系售后检修。[来源：容声售后资料+citation:1]" },
{ brand: "容声", category: "refrigerator", code: "E7", descShort: "通讯不合格/主控与显示板通讯故障", fullGuide: "1.检查主控板与显示板之间的连接线是否松动或断裂。2.检查排线插头是否氧化。3.更换显示板。4.更换主控板。[来源：容声售后资料+citation:1]" },
{ brand: "容声", category: "refrigerator", code: "E8", descShort: "过零不合格/过零检测电路故障", fullGuide: "1.检查过零检测电路。2.检查电源波形是否畸变。3.更换主控板。[来源：容声售后资料+citation:1]" },
{ brand: "容声", category: "refrigerator", code: "E9", descShort: "压缩机过流保护/电压不稳", fullGuide: "1.检查电源电压是否在220V±10%正常范围内。2.测量压缩机电容容量，若损坏及时更换。3.检查压缩机是否卡缸。4.联系售后检修压缩机。[来源：容声售后资料+citation:5]" },
{ brand: "容声", category: "refrigerator", code: "ER", descShort: "ER通讯故障/主控板与显示板通信中断", fullGuide: "1.检查主控板与显示板之间的连接线是否松动。2.检查风机是否正常运转、化霜保险是否熔断。3.冰箱能正常制冷说明问题不大，重点检查传感器插头。4.更换主控板或显示板。[来源：家电维修论坛+citation:4]" },
{ brand: "容声", category: "refrigerator", code: "F1", descShort: "冷藏室传感器故障", fullGuide: "1.检查冷藏室传感器线是否短路或开路。2.传感器探头损坏需更换。3.检查传感器线束插头是否接触不良。4.如风机线单独通到主板测试正常但仍报F1，需检查冷藏室蒸发器温度传感器位置是否正确。5.更换主控板。[来源：容声维修资料+citation:9][citation:10]" },
{ brand: "容声", category: "refrigerator", code: "F2", descShort: "变温室传感器故障/环境传感器故障", fullGuide: "1.检查变温室传感器线是否短路或开路。2.传感器探头损坏需更换。3.检查传感器线束插头是否接触不良。4.更换主控板。[来源：容声维修资料+citation:9]" },
{ brand: "容声", category: "refrigerator", code: "F3", descShort: "冷冻室传感器故障", fullGuide: "1.检查冷冻室传感器线是否短路或开路。2.传感器探头损坏需更换。3.检查传感器线束插头是否接触不良。4.更换主控板。[来源：容声维修资料+citation:3][citation:9]" },
{ brand: "容声", category: "refrigerator", code: "F4", descShort: "冷冻室传感器故障/环境传感器失效", fullGuide: "1.检查冷冻传感器是否发生短路或断路。2.冰箱无法进入人工智能状态，超温报警和冷冻温度显示功能无法执行。3.更换传感器。4.检查冷却系统效能是否下降（冰堵、制冷剂泄漏、风扇不转）。[来源：容声维修资料+citation:3][citation:6]" },
{ brand: "容声", category: "refrigerator", code: "H", descShort: "对应温区温度过高提示", fullGuide: "1.检查对应温区门是否关严。2.检查门封条是否密封严实。3.检查制冷系统是否正常。4.检查温度传感器是否异常。5.等待冰箱自行降温。[来源：容声售后资料+citation:1]" },
{ brand: "容声", category: "refrigerator", code: "L", descShort: "对应温区温度过低提示", fullGuide: "1.检查对应温区温度传感器是否异常。2.检查温控器设置是否过低。3.检查主控板控制电路。4.更换温度传感器或主控板。[来源：容声售后资料+citation:1]" },
{ brand: "容声", category: "refrigerator", code: "OF", descShort: "制冷关闭模式（非故障）", fullGuide: "冰箱处于制冷关闭模式，属正常状态，按电源键或模式键退出即可。" },
{ brand: "容声", category: "refrigerator", code: "dF", descShort: "化霜运行/自动化霜（正常）", fullGuide: "冰箱正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "容声", category: "refrigerator", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "容声", category: "refrigerator", code: "开门报警图标闪烁", descShort: "门未关严报警（非故障）", fullGuide: "提示用户关门，属正常提示功能。检查门是否关严、门封条是否密封良好。关好门后报警自动消除。[来源：容声售后资料+citation:2]" },
 { brand: "容声", category: "refrigerator", code: "H14", descShort: "过电流保护动作（软件）", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查变频板电流检测电路。4.更换变频板或压缩机。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H16", descShort: "电流检测回路异常", fullGuide: "1.检查电流检测CT线圈是否松脱。2.测量CT输出电压。3.更换CT传感器。4.更换变频板。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H17", descShort: "过电流保护动作（硬件）", fullGuide: "1.检查压缩机是否卡缸或堵转。2.测量压缩机三相绕组阻值。3.检查系统压力是否过高。4.更换压缩机。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H1C", descShort: "压缩机锁定/压缩机故障", fullGuide: "1.检查压缩机是否卡缸或堵转。2.测量压缩机绕组阻值。3.检查变频板驱动电路。4.更换压缩机。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H21", descShort: "DC电压异常", fullGuide: "1.测量直流母线电压是否正常。2.检查PFC电路。3.检查电解电容是否鼓包。4.更换变频板。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H22", descShort: "由于急减速导致的失步", fullGuide: "1.检查压缩机线序。2.检查电源电压是否稳定。3.更换变频板。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H23", descShort: "由于急加速导致的失步", fullGuide: "1.检查压缩机线序。2.检查系统压力是否异常。3.更换变频板。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H24", descShort: "通信异常", fullGuide: "1.检查主控板与变频板之间的通讯线。2.测量通讯电压。3.更换主控板或变频板。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H30", descShort: "冷冻室传感器断路", fullGuide: "1.检查冷冻室传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查线路是否断路。4.更换主控板。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H31", descShort: "除霜传感器（冷冻）断路", fullGuide: "1.检查冷冻化霜传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查线路连接。4.更换主控板。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H32", descShort: "冷藏室传感器断路", fullGuide: "1.检查冷藏室传感器连接。2.测量传感器阻值，异常则更换。3.更换主控板。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H33", descShort: "切换室传感器断路", fullGuide: "1.检查切换室传感器连接。2.测量传感器阻值，异常则更换。3.更换主控板。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H34", descShort: "制冰盘传感器断路", fullGuide: "1.检查制冰盘传感器连接。2.测量传感器阻值，异常则更换。3.更换制冰盘传感器。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H35", descShort: "RT传感器断路", fullGuide: "1.检查RT传感器连接。2.测量传感器阻值，异常则更换。3.更换主控板。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H36", descShort: "除霜传感器（冷藏）断路", fullGuide: "1.检查冷藏化霜传感器连接。2.测量传感器阻值，异常则更换。3.更换主控板。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H37", descShort: "蔬菜保鲜室传感器断路", fullGuide: "1.检查蔬菜保鲜室传感器连接。2.测量传感器阻值，异常则更换。3.更换主控板。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H38", descShort: "冷冻室传感器短路", fullGuide: "1.检查冷冻室传感器线路是否短路。2.测量传感器阻值，异常则更换。3.更换主控板。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H39", descShort: "除霜传感器（冷冻）短路", fullGuide: "1.检查冷冻化霜传感器线路是否短路。2.测量传感器阻值。3.更换传感器或主控板。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H3L", descShort: "冷藏室传感器短路", fullGuide: "1.检查冷藏室传感器线路是否短路。2.测量传感器阻值。3.更换传感器或主控板。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H3H", descShort: "切换室传感器短路", fullGuide: "1.检查切换室传感器线路是否短路。2.测量传感器阻值。3.更换传感器或主控板。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H3C", descShort: "制冰盘传感器短路", fullGuide: "1.检查制冰盘传感器线路是否短路。2.测量传感器阻值。3.更换传感器。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H3d", descShort: "RT传感器短路", fullGuide: "1.检查RT传感器线路是否短路。2.测量传感器阻值。3.更换传感器。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H3E", descShort: "除霜传感器（冷藏）短路", fullGuide: "1.检查冷藏化霜传感器线路是否短路。2.测量传感器阻值。3.更换传感器。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H3F", descShort: "蔬菜保鲜室传感器短路", fullGuide: "1.检查蔬菜保鲜室传感器线路是否短路。2.测量传感器阻值。3.更换传感器。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H60", descShort: "机械室电风扇马达锁定", fullGuide: "1.检查机械室风扇是否被异物卡住。2.测量风扇电机供电电压。3.检查风机霍尔反馈信号。4.更换风扇电机。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H61", descShort: "冷藏室电风扇马达锁定", fullGuide: "1.检查冷藏室风扇是否被冰堵住。2.断电化霜处理。3.测量风扇电机供电。4.更换风扇电机。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H62", descShort: "冷冻室电风扇马达锁定", fullGuide: "1.检查冷冻室风扇是否被冰堵住。2.断电化霜处理。3.测量风扇电机供电。4.更换风扇电机。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H63", descShort: "机械室电风扇马达反转", fullGuide: "1.检查风扇电机接线是否错误。2.检查风扇电机驱动电路。3.更换风扇电机。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H64", descShort: "冷藏室电风扇马达反转", fullGuide: "1.检查冷藏室风扇电机接线。2.检查电机驱动电路。3.更换风扇电机。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H65", descShort: "冷冻室电风扇马达反转", fullGuide: "1.检查冷冻室风扇电机接线。2.检查电机驱动电路。3.更换风扇电机。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H71", descShort: "冷冻室除霜故障", fullGuide: "1.检查化霜加热器是否损坏，测量阻值(正常200-400Ω)。2.检查化霜熔断器是否断路。3.检查化霜传感器是否正常。4.更换化霜加热器或主控板。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H80", descShort: "制冰盘马达动作不良", fullGuide: "1.检查制冰机脱冰电机是否正常运转。2.检查制冰盒是否卡死。3.检查冰盒检测传感器。4.更换制冰机组件。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "H82", descShort: "操作面板通信异常", fullGuide: "1.检查显示板与主控板之间的通讯线路。2.检查排线插头是否氧化。3.连续通讯1分钟以上失败时报此故障。4.更换显示板。5.更换主控板。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "HLL", descShort: "低压侧制冷剂泄漏", fullGuide: "1.检漏并补充制冷剂。2.检查管路接头是否松动。3.检查密封圈是否老化。4.补漏后抽真空加氟。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "HLH", descShort: "高压侧制冷剂泄漏", fullGuide: "1.检漏并补充制冷剂。2.检查高压管路是否有破损。3.补漏后抽真空加氟。[来源：容声BCD-355WYM维修手册+citation:7]" },
{ brand: "容声", category: "refrigerator", code: "F5", descShort: "化霜回路故障（维修内部）", fullGuide: "1.检查化霜加热器是否损坏，测量阻值(正常200-400Ω)。2.检查化霜熔断器是否断路。3.检查化霜传感器是否正常。4.检查主控板化霜控制电路。5.更换化霜加热器或主控板。" },
{ brand: "容声", category: "refrigerator", code: "F6", descShort: "接收通讯故障（维修内部）", fullGuide: "1.检查主控板与显示板之间的通讯线路。2.检查排线插头是否氧化。3.测量接收端通讯电压。4.更换显示板。5.更换主控板。" },
{ brand: "容声", category: "refrigerator", code: "F7", descShort: "发送通讯故障（维修内部）", fullGuide: "1.检查主控板与显示板之间的通讯线路。2.检查排线插头是否氧化。3.测量发送端通讯电压。4.更换主控板。5.更换显示板。" },
{ brand: "容声", category: "refrigerator", code: "F8", descShort: "主控板程序不匹配（维修内部）", fullGuide: "1.检查主控板型号是否与原机匹配。2.重新烧录或更新主控板程序。3.更换正确型号的主控板。" },
{ brand: "容声", category: "refrigerator", code: "F9", descShort: "风冷蒸发器传感器故障（维修内部）", fullGuide: "1.检查风冷蒸发器传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查传感器线路。4.更换主控板。" },
{ brand: "容声", category: "refrigerator", code: "H21", descShort: "DC电压异常（变频板供电，维修内部）", fullGuide: "1.测量直流母线电压是否正常。2.检查PFC电路。3.检查电解电容是否鼓包。4.更换变频板。" },
{ brand: "容声", category: "refrigerator", code: "EE", descShort: "双传感器同时故障或通讯异常（维修内部）", fullGuide: "1.同时检查冷藏室和冷冻室传感器。2.分别测量两个传感器阻值，异常则更换。3.检查主控板与显示板通讯。4.更换主控板。" },
{ brand: "容声", category: "refrigerator", code: "ERRORR", descShort: "冷藏室传感器故障（BCD-252/272系列，维修内部）", fullGuide: "1.检查冷藏室传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查传感器线路。4.更换主控板。" },
{ brand: "容声", category: "refrigerator", code: "ERRORF", descShort: "冷冻室传感器故障（BCD-252/272系列，维修内部）", fullGuide: "1.检查冷冻室传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查线路连接。4.更换主控板。" },
{ brand: "容声", category: "refrigerator", code: "ERRORD", descShort: "化霜传感器故障（BCD-252/272系列，维修内部）", fullGuide: "1.检查化霜传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查化霜加热器是否正常。4.更换主控板。" },
{ brand: "容声", category: "refrigerator", code: "Rrv", descShort: "上电冷藏显示E5秒，冷藏传感器回路异常（维修内部）", fullGuide: "1.检查冷藏室传感器回路。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查传感器线路是否断路。4.更换主控板。" },
{ brand: "容声", category: "refrigerator", code: "dr", descShort: "门未关严/开门报警（非故障，官方）", fullGuide: "1.检查门是否关严。2.检查门开关是否接触良好。3.检查门封条是否密封严实。4.关好门后报警自动消除。" },
{ brand: "海尔", category: "refrigerator", code: "F1", descShort: "冷藏室蒸发器传感器故障", fullGuide: "1.关闭冰箱电源，打开冷藏室门，找到蒸发器传感器。2.检查传感器连接是否松动或脱落，重新插紧。3.用干净湿布轻轻擦拭传感器表面，去除污垢。4.测量传感器阻值(25℃正常应在2.3-2.7kΩ)，若阻值异常则更换传感器。5.检查控制板是否故障，必要时更换主控板。[来源：啄木鸟维修+citation:5][citation:7]" },
{ brand: "海尔", category: "refrigerator", code: "F2", descShort: "冷冻室传感器故障/变温室传感器故障", fullGuide: "1.检查冷冻室传感器连接是否松动，重新插紧。2.测量传感器阻值(25℃约2.3-2.7kΩ)，异常则更换。3.检查传感器线路是否断路或短路。4.更换主控板。[来源：海尔马来西亚官网+citation:1][citation:3]" },
{ brand: "海尔", category: "refrigerator", code: "F3", descShort: "冷冻室温度传感器故障", fullGuide: "1.检查冷冻室传感器连接是否松动。2.测量传感器阻值(25℃约2.3-2.7kΩ)，异常则更换。3.检查传感器线路。4.更换主控板。[来源：海尔马来西亚官网+citation:1][citation:3]" },

{ brand: "海尔", category: "refrigerator", code: "Eh", descShort: "传感器故障", fullGuide: "1.检查对应温区传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查线路连接。4.更换主控板。[来源：海尔马来西亚官网+citation:1][citation:3]" },
{ brand: "海尔", category: "refrigerator", code: "E0", descShort: "通信故障/主控板通讯异常", fullGuide: "1.检查主控板与显示板之间的连接线是否松动。2.检查排线插头是否氧化。3.断电5分钟后重新通电。4.更换显示板。5.更换主控板。[来源：海尔马来西亚官网+citation:1][citation:3][citation:8]" },
{ brand: "海尔", category: "refrigerator", code: "E1", descShort: "冷藏室温度传感器故障/通信故障", fullGuide: "1.执行标准复位操作：拔掉冰箱电源插头，静置5分钟以上，确保主控板电容完全放电。2.重新通电后观察30分钟内是否仍显示E1。3.若复位无效，检查冷藏室后壁或蒸发器附近的温度传感器。4.用万用表测传感器阻值(25℃标准2.3-2.7kΩ)，异常则更换。5.检查传感器线路是否断路。[来源：太平洋科技+citation:2][citation:6]" },
{ brand: "海尔", category: "refrigerator", code: "E2", descShort: "风扇故障/冷冻室传感器故障", fullGuide: "1.检查冷冻室风扇是否运转。2.检查风扇是否被冰堵住，断电化霜。3.检查冷冻室传感器连接是否松动。4.测量传感器阻值，异常则更换。5.更换风扇电机或主控板。[来源：海尔马来西亚官网+citation:1][citation:3][citation:6]" },
{ brand: "海尔", category: "refrigerator", code: "E6", descShort: "风扇故障", fullGuide: "1.检查风扇电机是否正常运转。2.检查风扇是否被异物卡住或结冰堵塞。3.测量风扇电机供电电压。4.更换风扇电机。[来源：海尔马来西亚官网+citation:1][citation:3]" },
{ brand: "海尔", category: "refrigerator", code: "E9", descShort: "风扇故障", fullGuide: "1.检查风扇电机是否正常运转。2.检查风扇是否被异物卡住或结冰堵塞。3.测量风扇电机供电电压。4.更换风扇电机。[来源：海尔马来西亚官网+citation:1][citation:3]" },
{ brand: "海尔", category: "refrigerator", code: "Er", descShort: "制冰机故障", fullGuide: "1.检查制冰机是否卡死。2.检查制冰机进水阀是否工作。3.检查制冰机电机是否正常。4.检查冰盒检测传感器。5.更换制冰机组件。[来源：海尔马来西亚官网+citation:1][citation:3]" },
{ brand: "海尔", category: "refrigerator", code: "Ec", descShort: "化霜故障", fullGuide: "1.检查化霜加热器是否损坏，测量阻值(正常200-400Ω)。2.检查化霜熔断器是否断路。3.检查化霜传感器是否正常。4.检查主控板化霜控制电路。5.更换化霜加热器或主控板。[来源：海尔马来西亚官网+citation:1][citation:3]" },
{ brand: "海尔", category: "refrigerator", code: "Ed", descShort: "化霜故障", fullGuide: "1.检查化霜加热器是否损坏。2.检查化霜熔断器是否断路。3.检查化霜传感器是否正常。4.更换化霜加热器或主控板。[来源：海尔马来西亚官网+citation:1][citation:3]" },

{ brand: "海尔", category: "refrigerator", code: "E2", descShort: "变温室/软冷冻传感器故障（官方）", fullGuide: "1.检查变温室传感器连接是否松动。2.测量传感器阻值(25℃约2.3-2.7kΩ)，异常则更换。3.检查线路连接。4.更换主控板。" },

{ brand: "海尔", category: "refrigerator", code: "E4", descShort: "化霜传感器故障（官方）", fullGuide: "1.检查化霜传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查化霜加热器是否正常。4.更换主控板。" },
{ brand: "海尔", category: "refrigerator", code: "E5", descShort: "化霜加热回路故障（官方）", fullGuide: "1.检查化霜加热器是否损坏，测量阻值(正常200-400Ω)。2.检查化霜熔断器是否断路。3.检查主控板化霜控制电路。4.更换化霜加热器或主控板。" },
{ brand: "海尔", category: "refrigerator", code: "E6", descShort: "冷冻超温报警（官方）", fullGuide: "1.检查冷冻室门是否关严。2.检查一次性放入的温热食物是否过多。3.检查冷凝器散热是否良好。4.等待冰箱自行降温。" },
{ brand: "海尔", category: "refrigerator", code: "E7", descShort: "门开关/门体传感器故障（官方）", fullGuide: "1.检查门是否关严。2.检查门开关是否接触良好。3.检查门封条是否密封严实。4.更换门开关。" },
{ brand: "海尔", category: "refrigerator", code: "E8", descShort: "变频板通讯/驱动故障（官方）", fullGuide: "1.检查主控板与变频板之间的通讯线。2.测量通讯电压。3.检查变频板供电。4.更换变频板或主控板。" },
{ brand: "海尔", category: "refrigerator", code: "E9", descShort: "主控板/EEPROM故障（官方）", fullGuide: "1.断电重启，拔掉电源静置10分钟以上重新通电。2.如故障重现，可能是主控板存储器芯片损坏。3.更换主控板。" },
{ brand: "海尔", category: "refrigerator", code: "EA", descShort: "蒸发器风机故障（官方）", fullGuide: "1.检查蒸发器风扇是否运转。2.检查风扇是否被冰堵住，断电化霜。3.测量风扇电机供电电压。4.更换风扇电机。" },
{ brand: "海尔", category: "refrigerator", code: "EC", descShort: "冷凝器风机故障（官方）", fullGuide: "1.检查冷凝器风扇是否运转。2.检查风扇是否被异物卡住。3.测量风扇电机供电电压。4.更换冷凝风扇电机。" },
{ brand: "海尔", category: "refrigerator", code: "Ed", descShort: "化霜系统综合故障（官方）", fullGuide: "1.检查化霜加热器是否损坏。2.检查化霜熔断器是否断路。3.检查化霜传感器是否正常。4.检查主控板化霜控制电路。5.更换化霜加热器或主控板。" },
{ brand: "海尔", category: "refrigerator", code: "Er", descShort: "温度传感器综合故障（官方）", fullGuide: "1.检查各温区传感器连接是否松动。2.分别测量各传感器阻值，异常则更换。3.更换主控板。" },
{ brand: "海尔", category: "refrigerator", code: "EH", descShort: "湿度传感器故障（部分风冷机型，官方）", fullGuide: "1.检查湿度传感器连接是否松动。2.清洁传感器表面。3.更换湿度传感器。4.更换主控板。" },
{ brand: "海尔", category: "refrigerator", code: "F6", descShort: "冷冻化霜传感器异常（维修内部）", fullGuide: "1.检查冷冻化霜传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查化霜加热器是否正常。4.更换主控板。" },
{ brand: "海尔", category: "refrigerator", code: "F7", descShort: "按键/显示板故障（维修内部）", fullGuide: "1.检查显示板连接线是否松动。2.检查按键是否卡滞。3.更换显示板。" },
{ brand: "海尔", category: "refrigerator", code: "F8", descShort: "电源/电压异常（维修内部）", fullGuide: "1.测量电源电压是否正常(187-242V)。2.检查电源线路。3.加装稳压器。4.更换电源板。" },
{ brand: "海尔", category: "refrigerator", code: "F9", descShort: "制冰机传感器/回路故障（带制冰机型，维修内部）", fullGuide: "1.检查制冰机传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查制冰机进水阀。4.更换制冰机组件。" },
{ brand: "海尔", category: "refrigerator", code: "FR", descShort: "主传感器故障（维修内部）", fullGuide: "1.检查主传感器连接是否松动。2.测量传感器阻值，异常则更换。3.更换主控板。" },
{ brand: "海尔", category: "refrigerator", code: "H1", descShort: "冷藏室高温报警（官方）", fullGuide: "1.检查冷藏室门是否关严。2.检查门封条是否密封良好。3.检查制冷系统是否正常。4.等待冰箱自行降温。" },
{ brand: "海尔", category: "refrigerator", code: "H2", descShort: "冷冻室高温报警（官方）", fullGuide: "1.检查冷冻室门是否关严。2.检查一次性放入的食物是否过多。3.等待冰箱自行降温。" },
{ brand: "海尔", category: "refrigerator", code: "H3", descShort: "变温室高温报警（官方）", fullGuide: "1.检查变温室门是否关严。2.检查门封条是否密封良好。3.等待冰箱自行降温。" },
{ brand: "海尔", category: "refrigerator", code: "HH", descShort: "对应温区严重超温（官方）", fullGuide: "1.立即检查该温区门是否关严。2.检查制冷系统是否正常工作。3.如长时间不降温，联系售后检修。" },
{ brand: "海尔", category: "refrigerator", code: "LL", descShort: "对应温区温度过低（官方）", fullGuide: "1.检查对应温区温度传感器是否异常。2.检查温控器设置是否过低。3.更换温度传感器或主控板。" },
{ brand: "海尔", category: "refrigerator", code: "dr", descShort: "门未关严/开门报警（非故障，官方）", fullGuide: "1.检查门是否关严。2.检查门开关是否接触良好。3.检查门封条是否密封严实。4.关好门后报警自动消除。" },
{ brand: "海尔", category: "refrigerator", code: "EE", descShort: "双传感器同时故障（维修内部）", fullGuide: "1.同时检查冷藏室和冷冻室传感器。2.分别测量两个传感器阻值，异常则更换。3.更换主控板。" },
{ brand: "海尔", category: "refrigerator", code: "Rd", descShort: "冷藏化霜故障（维修内部）", fullGuide: "1.检查冷藏化霜加热器是否损坏。2.检查化霜熔断器是否断路。3.检查化霜传感器是否正常。4.更换化霜加热器或主控板。" },
{ brand: "海尔", category: "refrigerator", code: "Hd", descShort: "冷冻化霜故障（维修内部）", fullGuide: "1.检查冷冻化霜加热器是否损坏。2.检查化霜熔断器是否断路。3.检查化霜传感器是否正常。4.更换化霜加热器或主控板。" },
{ brand: "海尔", category: "refrigerator", code: "Fd", descShort: "风机/风道故障（维修内部）", fullGuide: "1.检查风机是否运转。2.检查风道是否被冰堵住或异物堵塞。3.断电化霜处理。4.更换风机电机。" },
{ brand: "卡萨帝", category: "refrigerator", code: "E1", descShort: "冷藏室温度传感器故障（官方）", fullGuide: "1.检查冷藏室传感器连接是否松动。2.拔掉传感器插头测量阻值(25℃约5-10K)，异常则更换。3.检查传感器线路是否断路。4.更换主控板。[来源：卡萨帝官方资料]" },
{ brand: "卡萨帝", category: "refrigerator", code: "E2", descShort: "冷冻室温度传感器故障（官方）", fullGuide: "1.检查冷冻室传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查传感器线路。4.更换主控板。[来源：卡萨帝官方资料]" },
{ brand: "卡萨帝", category: "refrigerator", code: "E3", descShort: "变温室/软冷冻传感器故障（官方）", fullGuide: "1.检查变温室传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查线路连接。4.更换主控板。[来源：卡萨帝官方资料]" },
{ brand: "卡萨帝", category: "refrigerator", code: "E4", descShort: "冷藏蒸发器传感器故障（官方）", fullGuide: "1.检查冷藏蒸发器传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查蒸发器是否结霜严重。4.更换主控板。[来源：卡萨帝官方资料]" },
{ brand: "卡萨帝", category: "refrigerator", code: "E5", descShort: "冷冻蒸发器传感器故障（官方）", fullGuide: "1.检查冷冻蒸发器传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查蒸发器是否结霜严重。4.更换主控板。[来源：卡萨帝官方资料]" },
{ brand: "卡萨帝", category: "refrigerator", code: "E6", descShort: "环境温度传感器故障（官方）", fullGuide: "1.检查环境温度传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查主板接口。4.更换主控板。[来源：卡萨帝官方资料]" },
{ brand: "卡萨帝", category: "refrigerator", code: "E7", descShort: "化霜传感器故障（官方）", fullGuide: "1.检查化霜传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查化霜加热器是否正常。4.更换主控板。[来源：卡萨帝官方资料]" },
{ brand: "卡萨帝", category: "refrigerator", code: "E8", descShort: "压缩机过流/变频驱动故障（官方）", fullGuide: "1.检查电源电压是否正常(187-242V)。2.测量压缩机电流是否过大。3.检查压缩机电容。4.检查变频板驱动电路。5.更换压缩机或变频板。[来源：卡萨帝官方资料]" },
{ brand: "卡萨帝", category: "refrigerator", code: "E9", descShort: "WiFi模块/联网异常（官方）", fullGuide: "1.确认网络为2.4GHz(设备不支持5GHz网络)。2.更新APP到最新版本。3.确认路由器账号密码输入正确。4.断电重启冰箱。5.如仍无法连接，联系售后检修WiFi模块。[来源：卡萨帝官方资料]" },
{ brand: "卡萨帝", category: "refrigerator", code: "ED", descShort: "蒸发器温度传感器异常（官方，同E4/E5）", fullGuide: "1.检查蒸发器传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查蒸发器是否结霜严重。4.更换主控板。[来源：卡萨帝官方资料]" },
{ brand: "卡萨帝", category: "refrigerator", code: "F1", descShort: "冷藏风机故障（官方）", fullGuide: "1.检查冷藏室风扇是否运转。2.检查风扇是否被冰堵住，断电化霜。3.测量风扇电机供电电压。4.更换冷藏风扇电机。[来源：卡萨帝官方资料]" },
{ brand: "卡萨帝", category: "refrigerator", code: "F2", descShort: "冷冻风机故障（官方）", fullGuide: "1.检查冷冻室风扇是否运转。2.检查风扇是否被冰堵住，断电化霜。3.测量风扇电机供电电压。4.更换冷冻风扇电机。[来源：卡萨帝官方资料]" },
{ brand: "卡萨帝", category: "refrigerator", code: "F3", descShort: "冷凝风机故障（官方）", fullGuide: "1.检查冷凝器风扇是否运转。2.检查风扇是否被异物卡住。3.测量风扇电机供电电压。4.更换冷凝风扇电机。[来源：卡萨帝官方资料]" },
{ brand: "卡萨帝", category: "refrigerator", code: "F4", descShort: "风门/风道电机故障（售后内部）", fullGuide: "1.检查风门电机是否正常工作。2.检查风道是否被异物堵塞。3.测量电机供电电压。4.更换风门电机。[来源：卡萨帝官方资料]" },
{ brand: "卡萨帝", category: "refrigerator", code: "H1", descShort: "冷藏超温报警（官方）", fullGuide: "1.检查冷藏室门是否关严。2.检查一次性放入的温热食物是否过多。3.检查门封条是否密封良好。4.等待冰箱自行降温。[来源：卡萨帝官方资料]" },
{ brand: "卡萨帝", category: "refrigerator", code: "H2", descShort: "冷冻超温报警（官方）", fullGuide: "1.检查冷冻室门是否关严。2.检查一次性放入的温热食物是否过多。3.等待冰箱自行降温。[来源：卡萨帝官方资料]" },
{ brand: "卡萨帝", category: "refrigerator", code: "H3", descShort: "变温超温报警（官方）", fullGuide: "1.检查变温室门是否关严。2.检查门封条是否密封良好。3.等待冰箱自行降温。[来源：卡萨帝官方资料]" },
{ brand: "卡萨帝", category: "refrigerator", code: "UC", descShort: "显示板与主控板通讯故障（官方）", fullGuide: "1.检查显示板与主控板之间的连接线是否松动。2.检查排线插头是否氧化。3.更换显示板。4.更换主控板。[来源：卡萨帝官方资料]" },
{ brand: "卡萨帝", category: "refrigerator", code: "UE", descShort: "变频板与主控板通讯故障（售后内部）", fullGuide: "1.检查主控板与变频板之间的通讯线。2.测量通讯电压。3.检查变频板供电。4.更换变频板或主控板。[来源：卡萨帝官方资料]" },
{ brand: "卡萨帝", category: "refrigerator", code: "dr", descShort: "门未关严/开门报警（官方）", fullGuide: "1.检查门是否关严。2.检查门开关是否接触良好。3.检查门封条是否密封严实。4.关好门后报警自动消除。[来源：卡萨帝官方资料]" },
{ brand: "卡萨帝", category: "refrigerator", code: "dL", descShort: "冷藏门开关故障（官方）", fullGuide: "1.检查冷藏门是否关严。2.检查冷藏门开关是否接触良好。3.更换冷藏门开关。[来源：卡萨帝官方资料]" },

{ brand: "小米", category: "refrigerator", code: "rS / H02", descShort: "冷藏室传感器故障", fullGuide: "1.关闭冰箱电源5分钟。2.5分钟后重新通电观察。3.若问题仍存在，说明冷藏室传感器可能损坏或线路故障，需申请售后检测。[来源：小米官方支持]" },

{ brand: "小米", category: "refrigerator", code: "FF / H29", descShort: "冷冻室风扇故障", fullGuide: "1.关闭冰箱电源5分钟。2.检查风扇是否被冰堵住，断电化霜。3.测量风扇电机供电电压。4.更换冷冻风扇电机。[来源：小米官方支持]" },
