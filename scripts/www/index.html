{ brand: "科龙", code: "E33", descShort: "室内环境传感器异常", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查主板接口电路。" },
{ brand: "科龙", code: "E34", descShort: "室内盘管传感器异常", fullGuide: "1.测量盘管传感器阻值。2.更换同规格传感器。3.检查线路连接。" },
{ brand: "科龙", code: "E38", descShort: "室内EEPROM故障", fullGuide: "1.断电重启。2.更换室内主板。3.重新烧录EEPROM数据。" },
{ brand: "科龙", code: "E39", descShort: "室内风机电机故障", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈信号。3.检查风叶是否卡滞。4.更换室内电机。" },
{ brand: "科龙", code: "E41", descShort: "室内交流电过零检测故障", fullGuide: "1.检查电源波形是否畸变。2.更换内机主板。3.检测过零电路光耦。" },
{ brand: "科龙", code: "ER", descShort: "显示屏与室内主板通讯故障", fullGuide: "1.检查显示板连接线是否松动。2.更换显示板。3.更换内机主板。" },
{ brand: "科龙", code: "E1(3P)", descShort: "三相电源相序错误", fullGuide: "1.检查电源相序是否正确。2.调整相序。3.检查电源线路。" },
{ brand: "科龙", code: "E2(3P)", descShort: "三相电源缺相", fullGuide: "1.检查电源是否缺相。2.检查电源线路。3.检查空气开关。" },
{ brand: "科龙", code: "E8(3P)", descShort: "三相压缩机过热保护", fullGuide: "1.清理内外机散热器。2.检查压缩机温度。3.检查制冷剂是否不足。4.更换压缩机。" },
{ brand: "科龙", code: "FC", descShort: "系统流量异常/过滤器堵塞", fullGuide: "1.检查过滤器是否堵塞，清洗过滤器。2.检查制冷剂管路是否堵塞。3.检查电子膨胀阀。4.更换干燥过滤器。" },
{ brand: "科龙", code: "EA", descShort: "压缩机管路压力故障", fullGuide: "1.检查高压压力传感器。2.检查低压压力传感器。3.检测系统压力。4.更换压力传感器。" },
{ brand: "科龙", code: "-9", descShort: "室外环温传感器开路", fullGuide: "1.检测室外环境温度传感器阻值是否无穷大。2.检查传感器线路是否断路。3.更换传感器。" },
{ brand: "科龙", code: "-59", descShort: "室外环温传感器短路", fullGuide: "1.检测室外环境温度传感器阻值是否接近0。2.检查传感器线路是否短路。3.更换传感器。" },
{ brand: "LG", code: "CH00", descShort: "电源不稳定或暂时性故障", fullGuide: "1.拔掉电源线或关闭断路器，等待5分钟后恢复供电。2.若相同错误代码持续存在，需要由技术人员进行全面检查。" },
{ brand: "LG", code: "CH01", descShort: "室内机回风温度传感器故障", fullGuide: "1.检查室内回风温度传感器插头是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查主板接口电路。4.更换室内主板。" },
{ brand: "LG", code: "CH02", descShort: "室内机进口管壁温度传感器故障", fullGuide: "1.检查室内机进口管壁传感器插头是否松动。2.测量传感器阻值，异常则更换。3.检查线路连接。4.更换室内主板。" },
{ brand: "LG", code: "CH03", descShort: "线控器与室内机通讯不良", fullGuide: "1.检查线控器与室内机之间的通讯线路。2.检查接头是否松动或氧化。3.更换线控器。4.更换室内主板。" },
{ brand: "LG", code: "CH04", descShort: "排水故障 / 冷凝水满", fullGuide: "1.拔掉电源线，等待5分钟后恢复供电。2.检查排水管是否堵塞或弯折。3.清理排水管和接水盘。4.对于窗式/移动式空调，需手动排出冷凝水，拧开设备后下部的排水盖，让水流入容器中。5.若问题持续存在，联系LG客服。" },
{ brand: "LG", code: "CH05", descShort: "室内外机通讯不良", fullGuide: "1.拔掉电源线或关闭断路器，等待5分钟后恢复供电。2.检查内外机连接线是否松动、接错或断线。3.检查端子是否氧化。4.更换内机主板或外机主板。" },
{ brand: "LG", code: "CH06", descShort: "室内机出口管壁温度传感器故障", fullGuide: "1.检查室内机出口管壁传感器插头是否松动。2.测量传感器阻值，异常则更换。3.检查线路连接。4.更换室内主板。" },
{ brand: "LG", code: "CH07", descShort: "室内机运行模式冲突", fullGuide: "1.检查所有室内机的运行模式设置是否一致。2.将全部单元设置为同一种模式（全部制冷/全部制热）。3.制冷和除湿模式不能与制热模式同时使用。4.空气净化和风扇模式可随时使用。" },
{ brand: "LG", code: "CH09", descShort: "室内机EEPROM不良", fullGuide: "1.断电重启。2.更换室内主板。3.重新烧录EEPROM数据。" },
{ brand: "LG", code: "CH10", descShort: "室内机风扇电机故障 / BLOC电机反馈信号不良", fullGuide: "1.检查室内风机电容及电机绕组。2.检测风机霍尔反馈信号。3.检查风叶是否卡滞。4.检查风扇周围是否有碎屑或积雪。5.更换室内电机。" },
{ brand: "LG", code: "CH11", descShort: "室内机与外机间通讯不良", fullGuide: "1.检查内外机连接线。2.测量通讯电压。3.更换内机主板或外机主板。4.检查电源线和电缆连接。" },
{ brand: "LG", code: "CH20", descShort: "室内传感器异常", fullGuide: "1.检查室内各传感器插头是否松动。2.测量传感器阻值，异常则更换。3.检查主板接口电路。" },
{ brand: "LG", code: "CH21", descShort: "室外机变频压缩机IPM故障", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。4.涂抹导热硅脂。" },
{ brand: "LG", code: "CH22", descShort: "变频压缩机电流过大", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查系统压力是否过高。4.更换变频模块或压缩机。" },
{ brand: "LG", code: "CH23", descShort: "变频压缩机直流低电压", fullGuide: "1.检测电源电压是否正常(187-242V)。2.检查PFC电路。3.检查电解电容。4.更换外机主板。" },
{ brand: "LG", code: "CH24", descShort: "室外机高压开关动作", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.检查外机散热风扇。4.检查高压开关是否损坏。" },
{ brand: "LG", code: "CH25", descShort: "室外机电压过高或过低", fullGuide: "1.测量电源电压是否在正常范围(220V±10%)。2.电压不稳则加装稳压器。3.检查电源线路。4.更换外机主板。" },
{ brand: "LG", code: "CH26", descShort: "室外机变频压缩机启动失败", fullGuide: "1.检查压缩机线序是否正确。2.测量压缩机绕组阻值。3.检查电源相序。4.更换变频模块或压缩机。" },
{ brand: "LG", code: "CH27", descShort: "室外机OSC/PFC故障", fullGuide: "1.检查PFC电路IGBT及二极管。2.测量PFC输出电压。3.更换外机主板或PFC模块。4.检查电抗器。" },
{ brand: "LG", code: "CH28", descShort: "室外机变频压缩机DCINK高电压", fullGuide: "1.检测电源电压是否过高。2.检查PFC电路。3.检查电解电容。4.更换外机主板。" },
{ brand: "LG", code: "CH29", descShort: "室外机变频压缩机启动故障", fullGuide: "1.检查压缩机线序。2.测量压缩机绕组阻值。3.检查电源电压。4.更换变频模块。" },
{ brand: "LG", code: "CH30", descShort: "室外机通信故障", fullGuide: "1.检查室外机主板供电。2.检查通讯线路。3.更换外机主板。" },
{ brand: "LG", code: "CH31", descShort: "室外机变频压缩机CT电流过小", fullGuide: "1.检查CT线圈是否松脱。2.测量压缩机运行电流。3.检查压缩机是否缺氟或损坏。4.更换主板或压缩机。" },
{ brand: "LG", code: "CH32", descShort: "室外机变频压缩机排气温度过大上升", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。" },
{ brand: "LG", code: "CH33", descShort: "定频压缩机排气温度过大上升", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查四通阀是否串气。" },
{ brand: "LG", code: "CH34", descShort: "室外机高压过大上升", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.检查外机散热风扇。4.检查系统是否堵塞。" },
{ brand: "LG", code: "CH35", descShort: "室外机低压过大下降", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查电子膨胀阀。" },
{ brand: "LG", code: "CH38", descShort: "制冷剂不足 / 冷媒泄漏", fullGuide: "1.拔掉电源线，等待5分钟后恢复供电。2.若错误在新安装或移机后出现，联系安装技术人员检查制冷剂和管道连接。3.若在正常使用中出现，可能是暂时性故障，重置后如再次出现，联系LG客服。" },
{ brand: "LG", code: "CH39", descShort: "室外机PFC电路与变频板通讯故障", fullGuide: "1.检查通讯接头连接。2.检查PFC板与变频板之间的连接线。3.更换室外PC板。" },
{ brand: "LG", code: "CH40", descShort: "室外机变频压缩机CT传感器不良", fullGuide: "1.检查CT传感器连接。2.更换CT传感器。3.更换室外主板。" },
{ brand: "LG", code: "CH41", descShort: "室外机变频压缩机排气温度传感器不良", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "LG", code: "CH42", descShort: "室外机低压传感器不良", fullGuide: "1.检查低压压力传感器接头连接。2.更换传感器。3.检查室外PC板。" },
{ brand: "LG", code: "CH43", descShort: "室外机高压传感器不良", fullGuide: "1.检查高压压力传感器接头连接。2.更换传感器。3.检查室外PC板。" },
{ brand: "LG", code: "CH44", descShort: "室外机空气温度传感器不良", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "LG", code: "CH45", descShort: "室外机热交换温度传感器不良", fullGuide: "1.检查室外盘管传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "LG", code: "CH46", descShort: "室外机吸气温度传感器不良", fullGuide: "1.检测吸气传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "LG", code: "CH47", descShort: "室外机定频压缩机排气温度传感器不良", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "LG", code: "CH48", descShort: "热交换器温度传感器不良", fullGuide: "1.检查热交换器温度传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "LG", code: "CH50", descShort: "室外机三相电源异常", fullGuide: "1.检查电源相序是否正确。2.调整相序。3.检查电源是否缺相。" },
{ brand: "LG", code: "CH51", descShort: "过容量室内机容量超配", fullGuide: "1.检查室内机总容量是否超出室外机容量。2.调整室内机配置。3.更换更大容量的室外机。" },
{ brand: "LG", code: "CH53", descShort: "室内外机通讯异常", fullGuide: "1.拔掉电源线或关闭断路器，等待5分钟后恢复供电。2.检查通信电缆是否接线正确。3.若错误在新安装后出现，联系安装技术人员检查。4.更换内外机主板。" },
{ brand: "LG", code: "CH54", descShort: "反向相序检测 / 电源相序错误", fullGuide: "1.检查电源相序是否正确。2.调整相序。3.若错误在电气施工后出现，通知承包商存在反向相位检测错误。4.重置空调断路器。" },
{ brand: "LG", code: "CH57", descShort: "主PCB到变频PCB通讯不良", fullGuide: "1.检查主PCB与变频PCB之间的通讯线路。2.测量通讯电压。3.更换主PCB或变频PCB。" },
{ brand: "LG", code: "CH61", descShort: "室外机过热保护 / 室内机过热保护", fullGuide: "1.制冷模式：检查室外机周围通风是否良好，清除杂物，打开通风窗。2.制热模式：清洗室内机过滤网。3.拔掉电源线，等待5分钟后恢复供电。4.若问题持续存在，联系维修技师。" },
{ brand: "LG", code: "CH66", descShort: "室内外机通信线路或管道连接问题", fullGuide: "1.拔掉电源线，等待5分钟后恢复供电。2.若错误在新安装或移机后出现，联系安装技术人员检查通信和管道连接。3.若在正常使用中出现，可能是暂时性故障，重置后如再次出现，需维修技师检查。" },
{ brand: "LG", code: "CH67", descShort: "室外机风扇故障", fullGuide: "1.检查室外风扇周围是否有碎屑或积雪，并清除。2.检查风机电机是否损坏。3.检查风机电容是否失效。4.更换风机电机。" },
{ brand: "LG", code: "CH90", descShort: "测试运行保护 / 管道连接问题", fullGuide: "1.若错误在新安装或移机后出现，应检查管道连接状态，联系安装技术人员。2.若在正常使用中出现，拔掉电源线，等待5分钟后恢复供电。3.可能是暂时性故障，重置后如再次出现，联系维修技师。" },
{ brand: "LG", code: "CH91", descShort: "测试运行保护 / 管道连接问题", fullGuide: "1.若错误在新安装或移机后出现，应检查管道连接状态，联系安装技术人员。2.若在正常使用中出现，拔掉电源线，等待5分钟后恢复供电。3.可能是暂时性故障，重置后如再次出现，联系维修技师。" },
{ brand: "LG", code: "CH93", descShort: "室内外机通信问题", fullGuide: "1.拔掉电源线，等待5分钟后恢复供电。2.若错误在新安装或移机后出现，检查电源线和电缆连接，室外机需接通电源。3.对于2021年后生产的机型，室内机和室外机均需接通电源。4.将空调电源插头直接插入墙壁插座，不要使用插排。" },
{ brand: "LG", code: "E0", descShort: "室内外机通讯故障 / kW Manager运行时显示", fullGuide: "1.拔掉电源线，等待5分钟后恢复供电。2.检查内外机连接线。3.更换内机主板或外机主板。4.注意：某些型号在kW Manager运行时，室内机显示屏会显示EO，属正常现象。" },
{ brand: "LG", code: "E6", descShort: "室内机风扇问题", fullGuide: "1.检查室内风扇周围是否有碎屑或积雪，并清除。2.检查风机电机是否损坏。3.更换室内电机。" },
{ brand: "LG", code: "EF", descShort: "室外机风扇问题", fullGuide: "1.检查室外风扇周围是否有碎屑或积雪，并清除。2.检查风机电机是否损坏。3.更换风机电机。" },
{ brand: "LG", code: "F4", descShort: "制冷剂不足 / 模块保护", fullGuide: "1.拔掉电源线，等待5分钟后恢复供电。2.若错误在新安装或移机后出现，联系安装技术人员检查制冷剂。3.有些型号CH38/F4同义，表示制冷剂不足。有些型号CH90/CH91显示为F4。" },
{ brand: "LG", code: "FL", descShort: "排水故障（窗式/移动式空调）", fullGuide: "1.窗式和移动式空调的设计使得冷凝水自然蒸发，但在雨天或湿度较高时可能显示FL。2.手动排出冷凝水：拔掉电源，准备容器，拧开设备后下部的排水盖，让水流入容器中。3.排空完成后将盖子拧紧。4.若在干燥天气频繁发生，需检查产品。" },
{ brand: "LG", code: "P4", descShort: "制热时室内机过热保护", fullGuide: "1.清洗室内机过滤网。2.检查内机风机转速。3.拔掉电源线，等待5分钟后恢复供电。4.根据型号不同，该错误可能显示为P4、P6、P7、P8或CH34。" },
{ brand: "LG", code: "P6", descShort: "制热时室内机过热保护", fullGuide: "1.清洗室内机过滤网。2.检查内机风机转速。3.拔掉电源线，等待5分钟后恢复供电。4.根据型号不同，该错误可能显示为P4、P6、P7、P8或CH34。" },
{ brand: "LG", code: "P7", descShort: "制热时室内机过热保护", fullGuide: "1.清洗室内机过滤网。2.检查内机风机转速。3.拔掉电源线，等待5分钟后恢复供电。4.根据型号不同，该错误可能显示为P4、P6、P7、P8或CH34。" },
{ brand: "LG", code: "P8", descShort: "制热时室内机过热保护", fullGuide: "1.清洗室内机过滤网。2.检查内机风机转速。3.拔掉电源线，等待5分钟后恢复供电。4.根据型号不同，该错误可能显示为P4、P6、P7、P8或CH34。" },
{ brand: "LG", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "LG", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "LG", code: "SP", descShort: "强力冷却功能运行中", fullGuide: "该代码表示强力冷却功能正在运行（Jet Mode/Power Cooling/Super Cool Power等），属正常现象。" },
{ brand: "LG", code: "CP", descShort: "强力冷却功能运行中", fullGuide: "该代码表示强力冷却功能正在运行（Jet Mode/Power Cooling/Super Cool Power等），属正常现象。" },
{ brand: "LG", code: "PO", descShort: "强力冷却功能运行中", fullGuide: "该代码表示强力冷却功能正在运行（Jet Mode/Power Cooling/Super Cool Power等），属正常现象。" },
{ brand: "LG", code: "SP", descShort: "强力制冷模式（正常）", fullGuide: "该代码表示强力冷却功能正在运行（Jet Mode/Power Cooling等），属正常现象。" },
{ brand: "LG", code: "CP", descShort: "强力制冷模式（正常）", fullGuide: "该代码表示强力冷却功能正在运行，属正常现象。" },
{ brand: "LG", code: "PO", descShort: "运行保护/状态提示（正常）", fullGuide: "该代码表示运行保护或状态提示，属正常现象。" },
{ brand: "LG", code: "CH03", descShort: "线控器与室内机通讯故障", fullGuide: "1.检查线控器与室内机之间的通讯线路。2.检查接头是否松动或氧化。3.更换线控器。4.更换室内主板。" },
{ brand: "LG", code: "CH04", descShort: "排水系统故障（排水泵/浮球开关）", fullGuide: "1.拔掉电源线，等待5分钟后恢复供电。2.检查排水管是否堵塞或弯折。3.检查排水泵是否工作。4.检查浮子开关是否卡住。5.清理排水管和接水盘。6.更换排水泵。" },
{ brand: "LG", code: "CH07", descShort: "运行模式冲突/设置错误", fullGuide: "1.检查所有室内机的运行模式设置是否一致。2.将全部单元设置为同一种模式（全部制冷/全部制热）。3.制冷和除湿模式不能与制热模式同时使用。" },
{ brand: "LG", code: "CH09", descShort: "室内机EEPROM故障", fullGuide: "1.断电重启。2.更换室内主板。3.重新烧录EEPROM数据。" },
{ brand: "LG", code: "CH10", descShort: "室内机风机电机反馈异常（BLDC）", fullGuide: "1.检查室内风机电容及电机绕组。2.检测风机霍尔反馈信号。3.检查风叶是否卡滞。4.检查风扇周围是否有碎屑。5.更换室内电机。" },
{ brand: "LG", code: "CH11", descShort: "室内外机通讯异常（双向）", fullGuide: "1.检查内外机连接线。2.测量通讯电压。3.更换内机主板或外机主板。4.检查电源线和电缆连接。" },
{ brand: "LG", code: "CH21", descShort: "压缩机过载/过流保护", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查系统压力是否过高。4.更换变频模块或压缩机。" },
{ brand: "LG", code: "CH23", descShort: "系统高压保护", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.检查外机散热风扇。4.检查高压开关是否损坏。" },
{ brand: "LG", code: "CH24", descShort: "系统低压保护/冷媒泄漏", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查低压开关。" },
{ brand: "LG", code: "CH25", descShort: "压缩机排气温度过高保护", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。" },
{ brand: "LG", code: "CH26", descShort: "IPM变频模块过热/过流保护", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。4.涂抹导热硅脂。" },
{ brand: "LG", code: "CH27", descShort: "直流母线电压异常保护", fullGuide: "1.检测电源电压。2.检查PFC电路。3.检查电解电容。4.更换外机主板。" },
{ brand: "LG", code: "CH61", descShort: "热交换器高温保护（内外机散热不良）", fullGuide: "1.制冷模式：检查室外机周围通风是否良好，清除杂物。2.制热模式：清洗室内机过滤网。3.拔掉电源线，等待5分钟后恢复供电。" },
{ brand: "LG", code: "CH62", descShort: "变频模块散热器温度过高", fullGuide: "1.检查外机散热风扇。2.清理冷凝器翅片。3.更换导热硅脂。4.更换IPM模块。" },
{ brand: "LG", code: "CH65", descShort: "散热器温度传感器故障", fullGuide: "1.检查散热器温度传感器插头是否松动。2.测量传感器阻值。3.更换传感器。4.更换外机主板。" },
{ brand: "LG", code: "CH67", descShort: "室外机直流风机堵转/故障", fullGuide: "1.检查室外风扇周围是否有碎屑或积雪，并清除。2.检查风机电机是否损坏。3.检查风机电容是否失效。4.更换风机电机。" },
{ brand: "LG", code: "40", descShort: "室外机压缩机CT电流传感器故障", fullGuide: "1.检查CT传感器连接。2.更换CT传感器。3.更换室外主板。" },
{ brand: "LG", code: "41", descShort: "压缩机排气温度传感器故障", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "LG", code: "42", descShort: "低压传感器故障", fullGuide: "1.检查低压压力传感器接头连接。2.更换传感器。3.检查室外PC板。" },
{ brand: "LG", code: "43", descShort: "高压传感器故障", fullGuide: "1.检查高压压力传感器接头连接。2.更换传感器。3.检查室外PC板。" },
{ brand: "LG", code: "44", descShort: "室外环境温度传感器故障", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "LG", code: "45", descShort: "室外盘管温度传感器故障", fullGuide: "1.检查室外盘管传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "LG", code: "46", descShort: "压缩机吸气温度传感器故障", fullGuide: "1.检测吸气传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "LG", code: "47", descShort: "定频压缩机排气温度传感器故障", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "LG", code: "50", descShort: "三相电源缺相/相序错误", fullGuide: "1.检查电源相序是否正确。2.调整相序。3.检查电源是否缺相。4.重置空调断路器。" },
{ brand: "LG", code: "51", descShort: "室内机容量超配", fullGuide: "1.检查室内机总容量是否超出室外机容量。2.调整室内机配置。3.更换更大容量的室外机。" },
{ brand: "LG", code: "105", descShort: "室外机主板与风机驱动板通讯故障", fullGuide: "1.检查主PCB与风机驱动板之间的通讯线路。2.测量通讯电压。3.更换主PCB或风机驱动板。" },
{ brand: "格兰仕", code: "E1", descShort: "压缩机电流过大 / 压缩机过热 / 排气温度高 / 模块保护", fullGuide: "1.检查过载保护器有无断开。2.检查压缩机感温包是否短路。3.区分运行一段时间还是开机即出现故障：系统方面考虑排空不净、过量冲注、外机高温或通风不畅；电路方面短接内机主板OVC与零线测试。" },
{ brand: "格兰仕", code: "E2", descShort: "室内蒸发器防冻保护", fullGuide: "1.清洗过滤网增加风量。2.检查内机风机转速。3.检测盘管传感器RT2是否异常。4.检查制冷剂是否不足。" },
{ brand: "格兰仕", code: "E3", descShort: "室内温度感温头短路或开路 / 压缩机低压保护", fullGuide: "1.测量室内环境温度传感器阻值(25℃约5-10K)，异常则更换。2.确定环境温度是否太低。3.短接主控板LPP插头和零线N测试，判断是控制故障还是系统故障。4.检查系统是否漏氟、堵塞。" },
{ brand: "格兰仕", code: "E4", descShort: "室内蒸发器管温感温头短路或开路 / 制冷系统压力过高", fullGuide: "1.测量室内盘管传感器阻值，异常则更换。2.检查RT5传感器是否异常。3.清洗冷凝器翅片。4.检查制冷剂是否过多。" },
{ brand: "格兰仕", code: "E5", descShort: "室内外通信故障", fullGuide: "1.检查内外机连接线是否松动、接错或断线。2.测量GND与CMM之间电压是否在6-7V左右摆动。3.更换内机主板或外机主板。" },
{ brand: "格兰仕", code: "E6", descShort: "压缩机高压保护 / 制冷过冷保护 / 电源相序保护", fullGuide: "1.清洗冷凝器翅片。2.检查高压保护开关与线路是否正常。3.检测RT2传感器是否异常。4.对于三相电，检查电源相序是否正确。" },
{ brand: "格兰仕", code: "E7", descShort: "压缩机低压保护 / 传感器开路", fullGuide: "1.检查低压保护开关与线路是否正常。2.检查RT1、RT2、RT3温度传感器是否开路。3.检漏并补充制冷剂。" },
{ brand: "格兰仕", code: "E8", descShort: "室外机通讯故障 / 传感器短路", fullGuide: "1.检查通讯线路连接情况。2.检查RT1、RT2、RT3温度传感器是否短路。3.更换传感器或主板。" },
{ brand: "格兰仕", code: "E9", descShort: "室内机通讯故障 / 低电压保护", fullGuide: "1.检查通讯线路连接情况。2.测量电源电压是否正常(187-242V)。3.加装稳压器。" },
{ brand: "格兰仕", code: "E0", descShort: "系统高压保护", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.查高压开关。4.检查外机散热环境。" },
{ brand: "格兰仕", code: "F0", descShort: "室外环境温度过低", fullGuide: "1.等待环境温度回升后再次试机。2.检查室外环境温度传感器。3.更换传感器。" },
{ brand: "格兰仕", code: "F1", descShort: "室内温度传感器回路开路或短路 / 蒸发器结霜故障", fullGuide: "1.测量室内环境温度传感器阻值，异常则更换。2.检查传感器线路接口。3.清洗过滤网，检查蒸发器是否结霜。" },
{ brand: "格兰仕", code: "F2", descShort: "室内外温度传感器通讯故障 / 制冷时室外机异常", fullGuide: "1.检查传感器线路是否正常。2.检查室外机散热是否良好。3.清理冷凝器翅片。4.更换传感器。" },
{ brand: "格兰仕", code: "F3", descShort: "室外温度传感器回路开路或短路 / 防冻结保护", fullGuide: "1.测量室外温度传感器阻值，异常则更换。2.检查线路接口。3.观察空调出风量是否变小。4.清洗过滤网。5.检查管温头是否损坏。" },
{ brand: "格兰仕", code: "F4", descShort: "室内外温度传感器通讯线路短路 / 制热室内管温过热", fullGuide: "1.检查室内外温度传感器线路连接情况。2.清洗过滤网。3.检查内机风机转速。4.检测盘管传感器。" },
{ brand: "格兰仕", code: "F5", descShort: "制冷时室外机异常", fullGuide: "1.检查室外机散热是否良好。2.清理冷凝器翅片。3.检查外机风扇是否运转。4.检查制冷剂是否不足。" },
{ brand: "格兰仕", code: "F6 / FF06", descShort: "PG电机故障 / 室内风机故障 / 过压保护", fullGuide: "1.检查室内风机是否正常运转。2.检查风机电容是否鼓包、漏液或损坏。3.检查风机电机是否损坏。4.检查是否有异物堵塞。5.更换风机或电容。" },
{ brand: "格兰仕", code: "F7 / FF07", descShort: "室温传感器故障", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查主板接口电路。" },
{ brand: "格兰仕", code: "F8 / FF08", descShort: "室内管温传感器故障", fullGuide: "1.打开室内机下面面板，将黑色电器盒盖板打开。2.检查传感器引线接插头是否松动，重新插紧。3.测量传感器阻值，异常则更换。" },
{ brand: "格兰仕", code: "F9 / FF09", descShort: "室外管温传感器故障", fullGuide: "1.检查室外盘管传感器阻值(25℃约5-10K)。2.更换传感器。3.检查外机主板。" },
{ brand: "格兰仕", code: "CF", descShort: "过滤器清洁提醒 / 滤网清洗", fullGuide: "1.关闭空调电源。2.打开空调面板，取出过滤器并清洗干净。3.确保过滤器完全干燥后再重新安装。4.按遥控器复位键消除提醒。" },
{ brand: "格兰仕", code: "E152", descShort: "内机电子膨胀阀关2次", fullGuide: "1.检查电子膨胀阀线圈阻值。2.检测阀体是否卡死。3.更换电子膨胀阀。4.检查主板驱动电路。" },
{ brand: "格兰仕", code: "E153", descShort: "内机浮子开关2次感应 / 水满保护", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。" },
{ brand: "格兰仕", code: "E154", descShort: "内机风扇故障", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈信号。3.检查风叶是否卡滞。4.更换室内电机。" },
{ brand: "格兰仕", code: "E162", descShort: "EEPROM故障", fullGuide: "1.断电重启尝试恢复。2.更换室内主板。3.重新烧录EEPROM数据。" },
{ brand: "格兰仕", code: "E163", descShort: "OPTION设置故障 / 机型参数配置错误", fullGuide: "1.检查内外机型号是否匹配。2.重新设置机型代码。3.更换匹配的主板。" },
{ brand: "格兰仕", code: "E165", descShort: "电加热排除温度保护", fullGuide: "1.检查电加热器是否异常过热。2.检测电加热温度传感器。3.更换电加热组件。" },
{ brand: "格兰仕", code: "E166", descShort: "与电加热相关的无风故障", fullGuide: "1.检查室内风机是否运行。2.检测风道是否堵塞。3.检查风机转速。4.更换电机。" },
{ brand: "格兰仕", code: "E201", descShort: "设定台数故障", fullGuide: "1.检查室内机台数设定是否正确。2.重新设置台数代码。3.检查通讯线路。" },
{ brand: "格兰仕", code: "E202", descShort: "内机与外机通讯故障", fullGuide: "1.检查内外机连接线是否松动。2.测量通讯电压波动。3.更换内机主板或外机主板。" },
{ brand: "格兰仕", code: "E203", descShort: "外主机与辅助机通信故障", fullGuide: "1.检查外机之间通讯线。2.检查辅助机主板供电。3.更换故障主板。" },
{ brand: "格兰仕", code: "E221", descShort: "外机温度温控开路或短路", fullGuide: "1.检测室外温度传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "格兰仕", code: "E226", descShort: "外机温度温控脱落", fullGuide: "1.检查传感器插头是否松动。2.重新插拔传感器。3.更换传感器。" },
{ brand: "格兰仕", code: "E231", descShort: "冷凝器主温控故障", fullGuide: "1.检查室外盘管主传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "格兰仕", code: "E236", descShort: "冷凝器辅助温控故障", fullGuide: "1.检查室外盘管辅助传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "格兰仕", code: "E241", descShort: "冷凝器中部温控故障", fullGuide: "1.检查冷凝器中部传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "格兰仕", code: "E246", descShort: "冷凝器出口1温控故障", fullGuide: "1.检查冷凝器出口传感器阻值。2.更换传感器。3.检查线路。" },
{ brand: "格兰仕", code: "E251", descShort: "数字排气温度温控故障", fullGuide: "1.检测排气温度传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "格兰仕", code: "E256", descShort: "定速压缩机1温控故障", fullGuide: "1.检查定速压缩机1温度传感器。2.更换传感器。3.检查主板。" },
{ brand: "格兰仕", code: "E257", descShort: "定速压缩机2温控故障", fullGuide: "1.检查定速压缩机2温度传感器。2.更换传感器。3.检查主板。" },
{ brand: "格兰仕", code: "E261", descShort: "数字排气温控故障", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板接口。" },
{ brand: "格兰仕", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "格兰仕", code: "FF01", descShort: "蒸发器结霜故障", fullGuide: "1.清洗过滤网。2.检查风机转速。3.检测盘管传感器。4.检查制冷剂是否不足。" },
{ brand: "格兰仕", code: "FF02", descShort: "制冷时室外机异常", fullGuide: "1.检查室外机散热是否良好。2.清理冷凝器翅片。3.检查外机风扇是否运转。" },
{ brand: "格兰仕", code: "FF03", descShort: "制冷室外管温过热（过热保护）", fullGuide: "1.清洗冷凝器翅片。2.检查外机散热风扇。3.检查制冷剂是否过多。4.检查系统是否堵塞。" },
{ brand: "格兰仕", code: "FF04", descShort: "制热室内管温过热（过热保护）", fullGuide: "1.清洗过滤网。2.检查内机风机转速。3.检测盘管传感器。4.检查电加热是否异常。" },
{ brand: "格兰仕", code: "FF05", descShort: "制热室外机异常", fullGuide: "1.检查室外机化霜是否正常。2.检查四通阀是否串气。3.检查制冷剂是否不足。" },
{ brand: "格兰仕", code: "FF06", descShort: "过压保护", fullGuide: "1.测量电源电压是否过高。2.检查PFC电路。3.更换外机主板。" },
{ brand: "格兰仕", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "格兰仕", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.关闭空调电源。2.打开空调面板，取出过滤器并清洗干净。3.确保过滤器完全干燥后再重新安装。4.按遥控器复位键消除提醒。" },
{ brand: "格兰仕", code: "E3", descShort: "压缩机低压保护/缺氟泄漏", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查低压开关。" },
{ brand: "格兰仕", code: "E4", descShort: "压缩机排气管高温保护", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。" },
{ brand: "格兰仕", code: "E5", descShort: "系统低电压保护（<187V）", fullGuide: "1.测量电源电压是否低于187V。2.加装稳压器。3.避开用电高峰期使用。4.检查电源线路。" },
{ brand: "格兰仕", code: "E6", descShort: "静电除尘模块故障", fullGuide: "1.检查静电除尘器是否工作正常。2.清洗静电除尘模块。3.检查信号转换器。4.更换静电除尘模块。" },
{ brand: "格兰仕", code: "E0", descShort: "室内机EEPROM数据错误", fullGuide: "1.断电重启尝试恢复。2.更换室内主板。3.重新烧录EEPROM数据。" },
{ brand: "格兰仕", code: "FF01/F1", descShort: "蒸发器结霜/防冻结保护", fullGuide: "1.清洗过滤网增加风量。2.检查风机转速。3.检测盘管传感器。4.检查制冷剂是否不足。" },
{ brand: "格兰仕", code: "FF02/F2", descShort: "制冷时室外机异常", fullGuide: "1.检查室外机散热是否良好。2.清理冷凝器翅片。3.检查外机风扇是否运转。4.检查制冷剂是否不足。" },
{ brand: "格兰仕", code: "FF03/F3", descShort: "制冷室外管温过热保护", fullGuide: "1.清洗冷凝器翅片。2.检查外机散热风扇。3.检查制冷剂是否过多。4.检查系统是否堵塞。" },
{ brand: "格兰仕", code: "FF04/F4", descShort: "制热室内管温过热保护", fullGuide: "1.清洗过滤网。2.检查内机风机转速。3.检测盘管传感器。4.检查电加热是否异常。" },
{ brand: "格兰仕", code: "FF05/F5", descShort: "制热时室外机异常/过流", fullGuide: "1.检查室外机化霜是否正常。2.检查四通阀是否串气。3.检查制冷剂是否不足。4.检测压缩机电流。" },
{ brand: "格兰仕", code: "FF06/F6", descShort: "室内过压保护", fullGuide: "1.测量电源电压是否过高。2.检查PFC电路。3.更换外机主板。" },
{ brand: "格兰仕", code: "E3", descShort: "室内温度传感器故障（变频）", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查主板接口电路。" },
{ brand: "格兰仕", code: "E4", descShort: "室内管温传感器故障（变频）", fullGuide: "1.测量盘管传感器阻值。2.更换同规格传感器。3.检查线路连接。" },
{ brand: "格兰仕", code: "E5", descShort: "内外机通讯故障（变频）", fullGuide: "1.检查内外机连接线是否松动。2.测量通讯电压。3.更换内机主板或外机主板。" },
{ brand: "格兰仕", code: "E1(3P)", descShort: "三相电源异相/相序错误", fullGuide: "1.检查电源相序是否正确。2.调整相序。3.检查电源线路。" },
{ brand: "格兰仕", code: "E2(3P)", descShort: "三相电源缺相保护", fullGuide: "1.检查电源是否缺相。2.检查电源线路。3.检查空气开关。" },
{ brand: "格兰仕", code: "E3(3P)", descShort: "三相压缩机过载保护", fullGuide: "1.检测压缩机电流。2.检查电源电压。3.检查系统压力。4.更换压缩机。" },
{ brand: "格兰仕", code: "P0", descShort: "系统压力异常保护", fullGuide: "1.检测系统压力。2.检查制冷剂是否过多或不足。3.检查系统是否堵塞。4.检查四通阀。" },
{ brand: "格兰仕", code: "P1", descShort: "外机风机故障/堵转", fullGuide: "1.检查直流风机插头是否松动。2.测量风机绕组及霍尔反馈。3.更换室外直流电机。" },
{ brand: "格兰仕", code: "P2", descShort: "变频模块过热保护", fullGuide: "1.断电后检查模块散热片。2.检查外机散热风扇。3.更换导热硅脂。4.更换IPM模块。" },
{ brand: "伊莱克斯", code: "E0", descShort: "室内温度传感器故障 / 系统故障", fullGuide: "1.检查温度传感器接触是否不良、短路或断路。2.检查传感器连接线是否松动，重新插紧。3.若无效，更换温度传感器。4.检查主控制电路板是否正常。" },
{ brand: "伊莱克斯", code: "E1", descShort: "TH1排气温度传感器开路/短路 / 室内串行通讯传送错误", fullGuide: "1.检测排气温度传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。4.检查室内串行通讯信号是否正常。" },
{ brand: "伊莱克斯", code: "E2", descShort: "TH2进盘温度传感器开路/短路 / 防冻结保护", fullGuide: "1.测量盘管传感器阻值(25℃约5-10K)。2.更换同规格传感器。3.检查线路连接。4.清洗过滤网，检查风机转速。[citation:1]" },
{ brand: "伊莱克斯", code: "E3", descShort: "TH3中盘温度传感器开路/短路 / 室内机排水故障", fullGuide: "1.检测TH3传感器阻值，异常则更换。2.清理排水管路，检查排水泵是否工作。3.检查水位开关是否故障。4.更换排水泵或水位开关。[citation:1][citation:6]" },
{ brand: "伊莱克斯", code: "E4", descShort: "TH4进盘温度传感器开路/短路 / 舒适温度保护", fullGuide: "1.检测TH4传感器阻值。2.更换传感器。3.检查空调进排气口是否被遮挡。4.清洗内部滤网。[citation:9]" },
{ brand: "伊莱克斯", code: "E5", descShort: "TH5中盘温度传感器开路/短路 / 室内外机通信故障", fullGuide: "1.检测TH5传感器阻值。2.检查内外机连接线是否松动、断裂。3.若问题依旧，检修主板或更换通信模块。[citation:6]" },
{ brand: "伊莱克斯", code: "E6", descShort: "TH6进盘温度传感器开路/短路 / 防冻结保护", fullGuide: "1.检测TH6传感器阻值。2.更换传感器。3.用压力表测系统压力、用钳表测运行电流，低压偏低或电流偏小，需加氟。[citation:10]" },
{ brand: "伊莱克斯", code: "E7", descShort: "TH7中盘温度传感器开路/短路", fullGuide: "1.检测TH7传感器阻值。2.更换传感器。3.检查线路连接。4.检查主板接口电路。" },
{ brand: "伊莱克斯", code: "E8", descShort: "TH8环境温度传感器开路/短路 / 过热保护", fullGuide: "1.检测环境温度传感器阻值(25℃约5-10K)。2.更换传感器。3.检查电源电压是否在220V±10%范围内。4.检查压缩机电容。[citation:6]" },
{ brand: "伊莱克斯", code: "E9", descShort: "TH9总出盘温度传感器开路/短路", fullGuide: "1.检测总出盘传感器阻值。2.更换传感器。3.检查线路连接。4.检查主板接口电路。" },
{ brand: "伊莱克斯", code: "EA", descShort: "TH10过冷进温度传感器开路/短路", fullGuide: "1.检测过冷进传感器阻值。2.更换传感器。3.检查线路连接。4.检查制冷系统是否正常。" },
{ brand: "伊莱克斯", code: "EB", descShort: "TH11过冷出温度传感器开路/短路", fullGuide: "1.检测过冷出传感器阻值。2.更换传感器。3.检查线路连接。4.检查制冷剂是否过多或不足。" },
{ brand: "伊莱克斯", code: "EC", descShort: "TH12回气温度传感器开路/短路", fullGuide: "1.检测回气传感器阻值。2.更换传感器。3.检查线路连接。4.检查压缩机回气状态。[citation:5]" },
{ brand: "伊莱克斯", code: "E0", descShort: "EEPROM故障 / 系统故障", fullGuide: "1.断电重启尝试恢复。2.更换室内主板。3.重新烧录EEPROM数据。[citation:4]" },
{ brand: "伊莱克斯", code: "P1", descShort: "室内环境温度传感器故障 / 过热保护", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查主板接口电路。[citation:2][citation:3]" },
{ brand: "伊莱克斯", code: "P2", descShort: "室内盘管温度传感器故障 / 过冷保护", fullGuide: "1.测量盘管传感器阻值。2.更换同规格传感器。3.检查线路连接。[citation:2][citation:3]" },
{ brand: "伊莱克斯", code: "P3", descShort: "室外化霜温度传感器故障", fullGuide: "1.检测室外化霜传感器阻值。2.更换传感器。3.检查外机主板。[citation:2][citation:3]" },
{ brand: "伊莱克斯", code: "P5", descShort: "制热长时间无热风吹出故障", fullGuide: "1.首次启动制热时室内管温小于28℃持续30分钟触发。2.检查过滤网是否脏堵。3.检查内机风机转速。4.检测盘管传感器。[citation:3]" },
{ brand: "伊莱克斯", code: "P6", descShort: "EEPROM故障", fullGuide: "1.断电重启。2.更换室内主板。3.重新烧录EEPROM数据。[citation:2][citation:3]" },
{ brand: "伊莱克斯", code: "P7", descShort: "显示板与室内控制板通讯故障", fullGuide: "1.检查显示板连接线是否松动。2.更换显示板。3.更换内机主板。[citation:2][citation:3]" },
{ brand: "伊莱克斯", code: "P8", descShort: "室内风机故障 / PG电机故障", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈信号。3.检查风叶是否卡滞。4.更换室内电机。[citation:2][citation:3]" },
{ brand: "伊莱克斯", code: "F1", descShort: "室内环境温度传感器开路或短路 / 室温传感器坏", fullGuide: "1.拔掉传感器插头测量阻值。2.更换传感器。3.检查主板接口电路。[citation:1][citation:2]" },
{ brand: "伊莱克斯", code: "F2", descShort: "室内盘管温度传感器开路或短路 / 内盘传感器坏", fullGuide: "1.测量盘管传感器阻值。2.更换传感器。3.检查线路连接。[citation:1][citation:2]" },
{ brand: "伊莱克斯", code: "F3", descShort: "室外环境温度传感器开路或短路 / 室外管温传感器坏", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查主板接口。[citation:1][citation:2]" },
{ brand: "伊莱克斯", code: "F4", descShort: "室外盘管温度传感器开路或短路 / 外机工作不正常", fullGuide: "1.检查室外盘管传感器阻值。2.更换传感器。3.检查外机主板。[citation:1][citation:2]" },
{ brand: "伊莱克斯", code: "F5", descShort: "排气温度传感器开路或短路", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。[citation:1]" },
{ brand: "伊莱克斯", code: "F6", descShort: "过载限频 / 室外管温传感器故障", fullGuide: "1.先观察能否启动，检查电源。2.内外机通风是否良好。3.查传感器，主控板。4.清洗过滤网，断电30分钟后再开机。[citation:1][citation:7]" },
{ brand: "伊莱克斯", code: "F8", descShort: "过电流限频", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查系统压力。4.更换压缩机或电容。[citation:1]" },
{ brand: "伊莱克斯", code: "F9", descShort: "排气温度过高限频", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。[citation:1]" },
{ brand: "伊莱克斯", code: "E2", descShort: "防冻结保护", fullGuide: "1.清洗过滤网增加风量。2.检查内机风机转速。3.检测盘管传感器。4.检查制冷剂是否不足。[citation:1]" },
{ brand: "伊莱克斯", code: "E3", descShort: "系统堵塞或制冷剂泄漏", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查管路是否堵塞。[citation:1]" },
{ brand: "伊莱克斯", code: "E4", descShort: "压缩机排气温度过高保护", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否过多或不足。3.清理外机散热。[citation:1]" },
{ brand: "伊莱克斯", code: "E5", descShort: "过电流保护", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查压缩机电容。[citation:1]" },
{ brand: "伊莱克斯", code: "E6", descShort: "室内外机通讯故障", fullGuide: "1.检查内外机连接线是否松动或断线。2.测量通讯电压。3.更换内机主板或外机主板。[citation:1]" },
{ brand: "伊莱克斯", code: "E8", descShort: "温度过高保护", fullGuide: "1.清洗过滤网。2.检查内机风机转速。3.检测盘管传感器。4.检查电加热是否异常。[citation:1]" },
{ brand: "伊莱克斯", code: "C5", descShort: "跳线帽故障", fullGuide: "1.检查主板上跳线帽是否插装。2.重新插紧跳线帽。3.更换跳线帽。4.更换主板。[citation:1]" },
{ brand: "伊莱克斯", code: "H1", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。[citation:1]" },
{ brand: "伊莱克斯", code: "H3", descShort: "压缩机过载保护", fullGuide: "1.检测压缩机电容容量。2.测量系统压力是否过高。3.更换压缩机。[citation:1]" },
{ brand: "伊莱克斯", code: "H4", descShort: "室内风机无反馈", fullGuide: "1.检查室内风机反馈线是否连接。2.检测风机霍尔信号。3.更换室内电机。[citation:1]" },
{ brand: "伊莱克斯", code: "H5", descShort: "IPM模块保护", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。[citation:1]" },
{ brand: "伊莱克斯", code: "H6", descShort: "室内风机电机故障", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈。3.更换室内电机。[citation:1]" },
{ brand: "伊莱克斯", code: "HC", descShort: "PFC电路保护", fullGuide: "1.检查PFC电路IGBT及二极管。2.测量PFC输出电压。3.更换外机主板。[citation:1]" },
{ brand: "伊莱克斯", code: "EE", descShort: "EEPROM读取故障", fullGuide: "1.断电重启尝试恢复。2.更换室内主板。3.重新烧录EEPROM数据。[citation:1]" },
{ brand: "伊莱克斯", code: "PH", descShort: "直流母线电压过高保护", fullGuide: "1.检测电源电压是否超过260V。2.检查PFC电路。3.更换外机主板。[citation:1]" },
{ brand: "伊莱克斯", code: "PL", descShort: "直流母线电压过低保护", fullGuide: "1.检测电源电压是否低于180V。2.检查整流桥及大电容。3.加装稳压器。[citation:1]" },
{ brand: "伊莱克斯", code: "U7", descShort: "四通阀换向异常", fullGuide: "1.测试四通阀线圈阻值(约2KΩ)。2.检查四通阀是否卡死。3.更换四通阀。[citation:1]" },
{ brand: "伊莱克斯", code: "L3", descShort: "室外直流风机故障", fullGuide: "1.检查直流风机插头是否松动。2.测量风机绕组及霍尔反馈。3.更换室外直流电机。[citation:1]" },
{ brand: "伊莱克斯", code: "L9", descShort: "过电流保护", fullGuide: "1.检测压缩机电流。2.检查电源电压。3.检查系统压力。4.更换压缩机。[citation:1]" },
{ brand: "伊莱克斯", code: "Fo", descShort: "制冷剂累积", fullGuide: "1.检查制冷剂是否过多。2.释放多余制冷剂。3.检测系统压力。[citation:1]" },
{ brand: "伊莱克斯", code: "FH", descShort: "防冻结限频", fullGuide: "1.清洗过滤网。2.检查风机转速。3.检测盘管传感器。4.保护性降频运行，系统正常后自动恢复。[citation:1]" },
{ brand: "伊莱克斯", code: "LU", descShort: "功率限频", fullGuide: "1.检测电源电压。2.检查整机功率。3.保护性降频运行，系统正常后自动恢复。[citation:1]" },
{ brand: "伊莱克斯", code: "EU", descShort: "模块温度限频", fullGuide: "1.检查外机散热风扇。2.清理冷凝器翅片。3.保护性降频运行，系统正常后自动恢复。[citation:1]" },
{ brand: "伊莱克斯", code: "Po", descShort: "压缩机测试模式最低频率", fullGuide: "1.空调处于测试模式。2.断电重启退出测试模式。[citation:1]" },
{ brand: "伊莱克斯", code: "P1", descShort: "压缩机测试模式额定频率", fullGuide: "1.空调处于测试模式。2.断电重启退出测试模式。[citation:1]" },
{ brand: "伊莱克斯", code: "P2", descShort: "压缩机测试模式最高频率", fullGuide: "1.空调处于测试模式。2.断电重启退出测试模式。[citation:1]" },
{ brand: "伊莱克斯", code: "P3", descShort: "压缩机测试模式中频频率", fullGuide: "1.空调处于测试模式。2.断电重启退出测试模式。[citation:1]" },
{ brand: "伊莱克斯", code: "E152", descShort: "内机电子膨胀阀关2次", fullGuide: "1.检查电子膨胀阀线圈阻值。2.检测阀体是否卡死。3.更换电子膨胀阀。[citation:4]" },
{ brand: "伊莱克斯", code: "E153", descShort: "内机浮子开关2次感应 / 水满保护", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。[citation:4]" },
{ brand: "伊莱克斯", code: "E154", descShort: "内机风扇故障", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈。3.更换室内电机。[citation:4]" },
{ brand: "伊莱克斯", code: "E162", descShort: "EEPROM故障", fullGuide: "1.断电重启。2.更换主板。3.重新烧录EEPROM数据。[citation:4]" },
{ brand: "伊莱克斯", code: "E163", descShort: "OPTION设置故障 / 机型参数配置错误", fullGuide: "1.检查内外机型号是否匹配。2.重新设置机型代码。3.更换匹配的主板。[citation:4]" },
{ brand: "伊莱克斯", code: "E165", descShort: "电加热排除温度保护", fullGuide: "1.检查电加热器是否异常过热。2.检测电加热温度传感器。3.更换电加热组件。[citation:4]" },
{ brand: "伊莱克斯", code: "E166", descShort: "与电加热相关的无风故障", fullGuide: "1.检查室内风机是否运行。2.检测风道是否堵塞。3.更换电机。[citation:4]" },
{ brand: "伊莱克斯", code: "E201", descShort: "设定台数故障", fullGuide: "1.检查室内机台数设定是否正确。2.重新设置台数代码。3.检查通讯线路。[citation:4]" },
{ brand: "伊莱克斯", code: "E202", descShort: "内机与外机通讯故障", fullGuide: "1.检查内外机连接线。2.测量通讯电压。3.更换内机主板或外机主板。[citation:4]" },
{ brand: "伊莱克斯", code: "E203", descShort: "外主机与辅助机通信故障", fullGuide: "1.检查外机之间通讯线。2.检查辅助机主板供电。3.更换故障主板。[citation:4]" },
{ brand: "伊莱克斯", code: "E221", descShort: "外机温度温控开路或短路", fullGuide: "1.检测室外温度传感器阻值。2.更换传感器。3.检查线路连接。[citation:4]" },
{ brand: "伊莱克斯", code: "E226", descShort: "外机温度温控脱落", fullGuide: "1.检查传感器插头是否松动。2.重新插拔传感器。3.更换传感器。[citation:4]" },
{ brand: "伊莱克斯", code: "E231", descShort: "冷凝器主温控故障", fullGuide: "1.检查室外盘管主传感器阻值。2.更换传感器。3.检查外机主板。[citation:4]" },
{ brand: "伊莱克斯", code: "E236", descShort: "冷凝器辅助温控故障", fullGuide: "1.检查室外盘管辅助传感器阻值。2.更换传感器。3.检查线路连接。[citation:4]" },
{ brand: "伊莱克斯", code: "E241", descShort: "冷凝器中部温控故障", fullGuide: "1.检查冷凝器中部传感器阻值。2.更换传感器。3.检查主板接口。[citation:4]" },
{ brand: "伊莱克斯", code: "E246", descShort: "冷凝器出口1温控故障", fullGuide: "1.检查冷凝器出口传感器阻值。2.更换传感器。3.检查线路。[citation:4]" },
{ brand: "伊莱克斯", code: "E251", descShort: "数字排气温度温控故障", fullGuide: "1.检测排气温度传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。[citation:4]" },
{ brand: "伊莱克斯", code: "E256", descShort: "定速压缩机1温控故障", fullGuide: "1.检查定速压缩机1温度传感器。2.更换传感器。3.检查主板。[citation:4]" },
{ brand: "伊莱克斯", code: "E257", descShort: "定速压缩机2温控故障", fullGuide: "1.检查定速压缩机2温度传感器。2.更换传感器。3.检查主板。[citation:4]" },
{ brand: "伊莱克斯", code: "E261", descShort: "数字排气温控故障", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板接口。[citation:4]" },
{ brand: "伊莱克斯", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。[citation:1]" },
{ brand: "伊莱克斯", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "伊莱克斯", code: "LP", descShort: "室内外机不匹配", fullGuide: "1.检查室内机与室外机型号是否匹配。2.联系经销商更换匹配的机组。[citation:1]" },
{ brand: "伊莱克斯", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "伊莱克斯", code: "CF", descShort: "滤网清洗提醒（正常运行）", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "伊莱克斯", code: "H1", descShort: "化霜运行（变频商用）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "伊莱克斯", code: "E0", descShort: "室内机EEPROM故障/配置错误", fullGuide: "1.断电重启尝试恢复。2.更换室内主板。3.重新烧录EEPROM数据。4.检查机型参数配置是否正确。" },
{ brand: "伊莱克斯", code: "E1", descShort: "室内环境温度传感器故障（开路/短路）", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查主板接口电路。" },
{ brand: "伊莱克斯", code: "E2", descShort: "室内盘管温度传感器故障/防冻结保护", fullGuide: "1.测量盘管传感器阻值，异常则更换。2.清洗过滤网增加风量。3.检查风机转速。4.检查制冷剂是否不足。" },
{ brand: "伊莱克斯", code: "E3", descShort: "室外机通讯故障/外机启动失败", fullGuide: "1.检查外机主板供电。2.检查通讯线路。3.更换外机主板。4.检查外机启动电容。" },
{ brand: "伊莱克斯", code: "E4", descShort: "系统高压保护/压缩机过热保护", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.查高压开关。4.检查外机散热环境。" },
{ brand: "伊莱克斯", code: "E5", descShort: "压缩机过流保护/过载保护", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查压缩机电容。4.更换压缩机。" },
{ brand: "伊莱克斯", code: "E6", descShort: "内外机通讯异常/机型不匹配", fullGuide: "1.检查内外机连接线是否松动。2.测量通讯电压。3.检查内外机型号是否匹配。4.更换内机主板或外机主板。" },
{ brand: "伊莱克斯", code: "E7", descShort: "室内风机电机故障/反馈异常", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈信号。3.检查风叶是否卡滞。4.更换室内电机。" },
{ brand: "伊莱克斯", code: "E8", descShort: "系统低压保护/冷媒泄漏保护", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查低压开关。" },
{ brand: "伊莱克斯", code: "E9", descShort: "排水系统故障（排水泵/浮球开关）", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。5.更换排水泵。" },
{ brand: "伊莱克斯", code: "F0", descShort: "室内温度传感器故障（变频）", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查主板接口电路。" },
{ brand: "伊莱克斯", code: "F1", descShort: "室内盘管传感器故障（变频）", fullGuide: "1.测量盘管传感器阻值。2.更换同规格传感器。3.检查线路连接。" },
{ brand: "伊莱克斯", code: "F2", descShort: "室外环境温度传感器故障", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "伊莱克斯", code: "F3", descShort: "室外盘管温度传感器故障", fullGuide: "1.检查室外盘管传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "伊莱克斯", code: "F4", descShort: "压缩机排气温度传感器故障", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "伊莱克斯", code: "F5", descShort: "模块温度传感器故障（IPM）", fullGuide: "1.检查模块温度传感器插头是否松动。2.测量传感器阻值。3.更换传感器。4.更换外机主板。" },
{ brand: "伊莱克斯", code: "FH", descShort: "蒸发器防冻结保护（变频）", fullGuide: "1.清洗过滤网。2.检查风机转速。3.检测盘管传感器。4.检查制冷剂是否不足。" },
{ brand: "伊莱克斯", code: "H3", descShort: "压缩机过载保护（商用三相）", fullGuide: "1.检测压缩机电容容量。2.测量系统压力是否过高。3.检查电源相序。4.更换压缩机。" },
{ brand: "伊莱克斯", code: "H5", descShort: "变频IPM模块保护/过热过流", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。4.涂抹导热硅脂。" },
{ brand: "伊莱克斯", code: "EE", descShort: "系统参数异常/主板故障", fullGuide: "1.断电重启尝试恢复。2.更换室内主板。3.重新烧录EEPROM数据。" },
{ brand: "伊莱克斯", code: "EU", descShort: "外机风机故障/堵转保护", fullGuide: "1.检查直流风机插头是否松动。2.测量风机绕组及霍尔反馈。3.更换室外直流电机。" },
{ brand: "伊莱克斯", code: "LP", descShort: "低压传感器故障（商用多联机）", fullGuide: "1.检查低压压力传感器接头连接。2.更换传感器。3.检查室外PC板。" },
{ brand: "大金", code: "A0", descShort: "外部保护装置动作", fullGuide: "1.检测室内机外部输入端子之间开路或短路。2.检查外部保护装置是否动作。3.检查现场设定是否正确。4.检查加湿器是否漏水。5.更换室内机P板。" },
{ brand: "大金", code: "A1", descShort: "室内机PC板不良", fullGuide: "1.检查E2PROM数据是否异常。2.排除外在干扰（噪声等）。3.更换室内机P板。4.检查电源电压是否稳定。" },
{ brand: "大金", code: "A3", descShort: "排水水位异常", fullGuide: "1.检查电源电压是否为220V。2.检查浮球开关或短路连接器是否故障。3.检查排水泵是否工作。4.清理排水管，确保无堵塞或向上倾斜。5.检查连接器是否松动。6.更换室内机P板。" },
{ brand: "大金", code: "A4", descShort: "防冻结保护功能异常", fullGuide: "1.清洗过滤网。2.检查室内机热交换器是否脏堵。3.检查热交换器热敏电阻是否正常。4.检查室内机P板。" },
{ brand: "大金", code: "A5", descShort: "防冻结控制/制热峰值切断", fullGuide: "1.清洗室内机空气滤网。2.清洁室内机热交换器。3.检查是否存在空气短路。4.更换热交换器热敏电阻。5.更换室内机P板。" },
{ brand: "大金", code: "A6", descShort: "风扇马达锁住/过载", fullGuide: "1.检查风扇马达线束是否断线、短路或连接器松脱。2.检查风扇周围是否有异物缠绕。3.检查强电P板与弱电P板之间的连接器是否松脱。4.更换风扇马达。5.更换P板。" },
{ brand: "大金", code: "A7", descShort: "风向摆动电动机堵转", fullGuide: "1.检查摆动马达是否故障。2.检查转接线是否良好。3.检查风向叶片凸轮机构是否卡住。4.更换摆动马达。5.更换室内机P板。" },
{ brand: "大金", code: "A8", descShort: "电源故障/交流输入过电流", fullGuide: "1.检查电源电压是否正常。2.检查信号线连接是否良好。3.检查配线是否正确。4.检查是否有瞬时停电。5.更换室内机P板。" },
{ brand: "大金", code: "A9", descShort: "电子膨胀阀驱动部件故障", fullGuide: "1.检查电子膨胀阀线圈阻值。2.检测阀体是否卡死或堵塞。3.检查转接线是否不良。4.更换电子膨胀阀。5.更换室内机P板。" },
{ brand: "大金", code: "AA", descShort: "加热器过热", fullGuide: "1.检查加热器是否异常过热。2.检查加热器热保护装置。3.更换加热器组件。" },
{ brand: "大金", code: "AE", descShort: "水位低/不供水", fullGuide: "1.检查供水系统是否正常。2.检查水位传感器。3.检查水泵是否工作。" },
{ brand: "大金", code: "AF", descShort: "排水水位超限/排水不畅", fullGuide: "1.检查压缩机非运转状态下浮控开关是否动作。2.检查加湿器是否漏水。3.检查排水管是否上倾斜或堵塞。4.更换室内机P板。" },
{ brand: "大金", code: "AH", descShort: "空气过滤器异常", fullGuide: "1.检查空气过滤器是否安装到位。2.清洗或更换空气过滤器。3.检查集尘器是否故障。" },
{ brand: "大金", code: "AJ", descShort: "能力设定不当", fullGuide: "1.检查预先设定的数据是否正确。2.检查数据保存IC中是否未设定程序。3.重新设定能力代码。4.更换室内机P板。" },
{ brand: "大金", code: "C0", descShort: "传感器系统故障（整装）", fullGuide: "1.检查各传感器连接是否正常。2.检查传感器阻值是否在正常范围。3.更换故障传感器。4.更换P板。" },
{ brand: "大金", code: "C1", descShort: "室内机P板与风扇P板通信错误", fullGuide: "1.检查室内机P板与适配器P板之间的传送通信连接器连接。2.检查是否有外在干扰（噪声）。3.更换室内机P板。4.更换适配器P板。" },
{ brand: "大金", code: "C4", descShort: "液管用热敏电阻故障", fullGuide: "1.检查热敏电阻连接是否松动。2.测量热敏电阻阻值(25℃约5-10K)。3.更换热敏电阻。4.更换室内机P板。" },
{ brand: "大金", code: "C5", descShort: "气管用热敏电阻故障", fullGuide: "1.检查热敏电阻连接是否松动。2.测量热敏电阻阻值。3.更换热敏电阻。4.更换室内机P板。" },
{ brand: "大金", code: "C9", descShort: "吸气管用热敏电阻故障", fullGuide: "1.检查热敏电阻连接是否松动。2.测量热敏电阻阻值。3.更换热敏电阻。4.更换室内机P板。" },
{ brand: "大金", code: "CA", descShort: "排气热敏电阻故障", fullGuide: "1.检查排气热敏电阻连接。2.测量阻值，异常则更换。3.检查线路连接。4.更换P板。" },
{ brand: "大金", code: "CJ", descShort: "遥控器中的温控传感器故障", fullGuide: "1.检查遥控器热敏电阻是否正常。2.更换遥控器。3.更换遥控器P板。" },
{ brand: "大金", code: "CF", descShort: "高压开关故障", fullGuide: "1.检查高压开关是否动作。2.测量高压开关通断。3.更换高压开关。" },
{ brand: "大金", code: "E0", descShort: "安全装置动作（室外机）", fullGuide: "1.检查室外机保护装置是否动作。2.检查高压开关、低压开关。3.检查制冷系统压力。4.更换室外机P板。" },
{ brand: "大金", code: "E1", descShort: "室外机PC板不良", fullGuide: "1.检查室外机P板供电。2.检查通信是否正常。3.更换室外机P板。" },
{ brand: "大金", code: "E2", descShort: "漏电检测", fullGuide: "1.检查线路是否漏电。2.检查压缩机绝缘是否下降。3.检查电源线路。4.更换故障部件。" },
{ brand: "大金", code: "E3", descShort: "高压部分异常/高压开关动作", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.检查外机散热风扇。4.更换高压开关。5.更换室外机P板。" },
{ brand: "大金", code: "E4", descShort: "低压部分异常/低压传感器动作", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检查低压传感器。4.更换室外机P板。" },
{ brand: "大金", code: "E5", descShort: "变频压缩机过载/堵转", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查系统压力。4.更换压缩机或变频板。" },
{ brand: "大金", code: "E6", descShort: "定频压缩机过电流或堵转", fullGuide: "1.检测压缩机电流。2.检查压缩机电容。3.检查系统压力。4.更换压缩机。" },
{ brand: "大金", code: "E7", descShort: "室外机风扇电动机堵转/过流", fullGuide: "1.检查风扇周围是否有异物。2.检查风扇电机绝缘是否下降。3.更换风扇电机。4.更换室外机P板。" },
{ brand: "大金", code: "E8", descShort: "输入过电流检测", fullGuide: "1.检测电源电流是否过大。2.检查电源电压。3.更换室外机P板。" },
{ brand: "大金", code: "E9", descShort: "电子膨胀阀驱动部件故障", fullGuide: "1.检查电子膨胀阀线圈阻值。2.检测阀体是否卡死。3.更换电子膨胀阀。4.更换室外机P板。" },
{ brand: "大金", code: "EA", descShort: "四通阀/制冷制热切换故障", fullGuide: "1.测试四通阀线圈阻值(约2KΩ)。2.检查四通阀是否卡死。3.更换四通阀。" },
{ brand: "大金", code: "F3", descShort: "排气管温度异常", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。" },
{ brand: "大金", code: "F6", descShort: "冷媒充填过量", fullGuide: "1.检测系统压力。2.释放多余制冷剂。3.检查充注量是否正确。" },
{ brand: "大金", code: "H0", descShort: "压缩机传感器系统故障", fullGuide: "1.检查压缩机传感器连接。2.更换压缩机传感器。3.更换室外机P板。" },
{ brand: "大金", code: "H3", descShort: "高压开关异常", fullGuide: "1.检查高压开关连接。2.测量高压开关通断。3.更换高压开关。4.更换室外机P板。" },
{ brand: "大金", code: "H4", descShort: "低压开关异常", fullGuide: "1.检查低压开关连接。2.测量低压开关通断。3.更换低压开关。4.更换室外机P板。" },
{ brand: "大金", code: "H6/H8", descShort: "电流互感器异常", fullGuide: "1.检查CT线圈是否松脱。2.测量CT输出电压。3.更换CT传感器。4.更换室外机P板。" },
{ brand: "大金", code: "H7", descShort: "室外机风扇电动机位置信号异常", fullGuide: "1.检查风扇霍尔反馈信号。2.检查风扇电机连接线。3.更换风扇电机。4.更换室外机P板。" },
{ brand: "大金", code: "H9", descShort: "室外空气热敏电阻故障", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查线路连接。4.更换室外机P板。" },
{ brand: "大金", code: "J0", descShort: "热敏电阻配线错误", fullGuide: "1.检查各热敏电阻配线是否正确。2.按接线图重新连接。3.更换故障传感器。" },
{ brand: "大金", code: "J1", descShort: "压力传感器故障", fullGuide: "1.检查高压压力传感器连接。2.更换传感器。3.更换室外机P板。" },
{ brand: "大金", code: "J2", descShort: "压缩机电流传感器故障", fullGuide: "1.检查CT传感器连接。2.更换CT传感器。3.更换室外机P板。" },
{ brand: "大金", code: "J3", descShort: "排气管热敏电阻故障", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "大金", code: "J4", descShort: "低压对应饱和温度传感器故障", fullGuide: "1.检测低压对应饱和温度传感器阻值。2.更换传感器。3.检查线路连接。4.更换P板。" },
{ brand: "大金", code: "J5", descShort: "吸气管热敏电阻故障", fullGuide: "1.检测吸气管传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "大金", code: "J6", descShort: "热交换器热敏电阻故障", fullGuide: "1.检测热交换器传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "大金", code: "JA", descShort: "高压传感器故障", fullGuide: "1.检查高压传感器连接。2.更换高压传感器。3.更换室外机P板。" },
{ brand: "大金", code: "JC", descShort: "低压传感器故障", fullGuide: "1.检查低压传感器连接。2.更换低压传感器。3.更换室外机P板。" },
{ brand: "大金", code: "L0", descShort: "变频器系统故障", fullGuide: "1.断电后检查变频器。2.检查变频器供电。3.更换变频板。" },
{ brand: "大金", code: "L1", descShort: "变频器控制P板故障", fullGuide: "1.检查变频器控制P板供电。2.检查通信线路。3.更换变频器控制P板。" },
{ brand: "大金", code: "L2", descShort: "变频P板电源电压异常上升", fullGuide: "1.检测电源电压是否过高。2.检查PFC电路。3.更换变频P板。" },
{ brand: "大金", code: "L3", descShort: "电气盒中温度异常", fullGuide: "1.检查电气盒散热是否良好。2.检查散热风扇。3.检查温度传感器。4.更换P板。" },
{ brand: "大金", code: "L4", descShort: "变频器散热片过热", fullGuide: "1.检查外机散热风扇。2.清理散热片灰尘。3.更换导热硅脂。4.更换变频模块。" },
{ brand: "大金", code: "L5", descShort: "变频器瞬时过电流", fullGuide: "1.检查压缩机电机是否接地不良或短路。2.测量压缩机绕组。3.更换压缩机或变频板。" },
{ brand: "大金", code: "L8", descShort: "变频压缩机过电流故障", fullGuide: "1.检查压缩机过载情况。2.检查压缩机电机是否断线。3.更换压缩机。" },
{ brand: "大金", code: "L9", descShort: "变频压缩机启动出错/堵转", fullGuide: "1.检查压缩机是否堵转。2.检查压缩机电容。3.更换压缩机。" },
{ brand: "大金", code: "LC", descShort: "室外机控制部分与变频器通信异常", fullGuide: "1.检查控制P板与变频P板之间的连接。2.测量通信电压。3.更换控制P板或变频P板。" },
{ brand: "大金", code: "P0", descShort: "制冷剂量不足", fullGuide: "1.检漏并补充制冷剂。2.检查系统压力。3.检查制冷剂管路是否泄漏。" },
{ brand: "大金", code: "P1", descShort: "电源电压不平衡或变频器P板故障", fullGuide: "1.检测三相电源电压是否平衡。2.检查电源相序。3.更换变频器控制P板。" },
{ brand: "大金", code: "P3", descShort: "印刷电路板温度感应器异常", fullGuide: "1.检查P板温度传感器。2.更换传感器。3.更换印刷电路板。" },
{ brand: "大金", code: "P4", descShort: "散热片温度感应器异常", fullGuide: "1.检测散热片温度传感器阻值。2.更换传感器。3.检查散热片是否过热。4.更换P板。" },
{ brand: "大金", code: "PJ", descShort: "变频器和风扇驱动器组合不当", fullGuide: "1.检查变频器与风扇驱动器型号是否匹配。2.重新设定配置。3.更换匹配的组件。" },
{ brand: "大金", code: "U0", descShort: "进气管温度异常/电子膨胀阀故障", fullGuide: "1.检测进气管温度传感器。2.检查电子膨胀阀是否故障。3.检查制冷剂是否短缺。4.更换电子膨胀阀。" },
{ brand: "大金", code: "U1", descShort: "反相", fullGuide: "1.检查电源相序是否正确。2.互换L1、L2或L3中的两个调整相序。3.检查电源线路。" },
{ brand: "大金", code: "U2", descShort: "电源电压不足或瞬间停电", fullGuide: "1.测量电源电压是否正常。2.检查电源线路是否接触不良。3.加装稳压器。" },
{ brand: "大金", code: "U3", descShort: "未执行检查运转", fullGuide: "1.执行检查运转程序。2.按照维修手册进行设定。3.检查配线是否正确。" },
{ brand: "大金", code: "U4", descShort: "信号故障/室内外通信故障", fullGuide: "1.检查室内机与室外机之间的接线是否正确。2.测量通信电压。3.检查室内机和室外机中的电路板是否不良。4.更换内机主板或外机主板。" },
{ brand: "大金", code: "U5", descShort: "遥控器与室内机通信故障", fullGuide: "1.检查遥控器与室内机之间的传送线路。2.检查遥控器设定是否正确。3.更换遥控器。4.更换室内机P板。" },
{ brand: "大金", code: "U8", descShort: "主遥控器和副遥控器通信故障", fullGuide: "1.检查主副遥控器设置是否正确。2.检查遥控器之间连线。3.更换遥控器。" },
{ brand: "大金", code: "U9", descShort: "室内机与室外机通信故障", fullGuide: "1.检查同一系统内的室内机和室外机之间的连接。2.检查通信线路。3.更换内机主板或外机主板。" },
{ brand: "大金", code: "UA", descShort: "室内机和室外机组合不当", fullGuide: "1.检查内外机型号是否匹配。2.更换匹配的机组。3.检查配线配管是否兼容。" },
{ brand: "大金", code: "UC", descShort: "集中控制通信故障", fullGuide: "1.检查集中控制器连接。2.检查通信线路。3.更换集中控制器。" },
{ brand: "大金", code: "UF", descShort: "制冷剂系统未设定/配线配管不兼容", fullGuide: "1.检查制冷剂系统地址是否设定。2.检查配线配管是否正确。3.立即断开电源，纠正接线。" },
{ brand: "大金", code: "UH", descShort: "系统故障/制冷剂系统地址未确定", fullGuide: "1.检查制冷剂系统地址设定。2.重新确定地址。3.检查系统配线。" },
{ brand: "大金", code: "E1", descShort: "排气管温度过高（家用）", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。" },
{ brand: "大金", code: "E2", descShort: "压缩机过电流（家用）", fullGuide: "1.检测压缩机电流。2.检查电源电压。3.检查压缩机电容。4.更换压缩机。" },
{ brand: "大金", code: "E3", descShort: "电源相序错误（家用）", fullGuide: "1.检查电源相序是否正确。2.调整相序。3.检查电源线路。" },
{ brand: "大金", code: "E4", descShort: "系统压力过高（家用）", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.检查外机散热风扇。" },
{ brand: "大金", code: "E5", descShort: "系统压力过低/过载（家用）", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。" },
{ brand: "大金", code: "E6", descShort: "防冻结保护（家用）", fullGuide: "1.清洗过滤网增加风量。2.检查风机转速。3.检测盘管传感器。4.检查制冷剂是否不足。" },
{ brand: "大金", code: "H6", descShort: "无室内电机反馈", fullGuide: "1.检查电机线插头是否脱落。2.检查内风机到主板的连接线是否断。3.清洗过滤网防止脏堵。4.更换室内风机电机。5.更换控制主板。" },
{ brand: "大金", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "大金", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "大金", code: "A0", descShort: "外部保护装置动作/外机保护触发", fullGuide: "1.检测室内机外部输入端子之间开路或短路。2.检查外部保护装置是否动作。3.检查现场设定是否正确。4.更换室内机P板。" },
{ brand: "大金", code: "A1", descShort: "室内机控制P板故障/EEPROM异常", fullGuide: "1.检查E2PROM数据是否异常。2.排除外在干扰（噪声等）。3.更换室内机P板。4.检查电源电压是否稳定。" },
{ brand: "大金", code: "A3", descShort: "排水泵故障/排水水位异常", fullGuide: "1.检查电源电压是否为220V。2.检查浮球开关或短路连接器是否故障。3.检查排水泵是否工作。4.清理排水管，确保无堵塞。5.更换室内机P板。" },
{ brand: "大金", code: "A4", descShort: "防冻结保护功能异常（冷水机）", fullGuide: "1.清洗过滤网。2.检查室内机热交换器是否脏堵。3.检查热交换器热敏电阻是否正常。4.更换室内机P板。" },
{ brand: "大金", code: "A5", descShort: "室内机防冻结保护（滤网脏/蒸发器脏）", fullGuide: "1.清洗室内机空气滤网。2.清洁室内机热交换器。3.检查是否存在空气短路。4.更换热交换器热敏电阻。5.更换室内机P板。" },
{ brand: "大金", code: "A6", descShort: "室内风扇电机故障（堵转/过载）", fullGuide: "1.检查风扇马达线束是否断线、短路或连接器松脱。2.检查风扇周围是否有异物缠绕。3.更换风扇马达。4.更换P板。" },
{ brand: "大金", code: "A7", descShort: "摆风电机故障（摆动活叶马达异常）", fullGuide: "1.检查摆动马达是否故障。2.检查转接线是否良好。3.检查风向叶片凸轮机构是否卡住。4.更换摆动马达。5.更换室内机P板。" },
{ brand: "大金", code: "A8", descShort: "电源过流/输入电压异常", fullGuide: "1.检查电源电压是否正常。2.检查信号线连接是否良好。3.检查是否有瞬时停电。4.更换室内机P板。" },
{ brand: "大金", code: "A9", descShort: "电子膨胀阀驱动故障", fullGuide: "1.检查电子膨胀阀线圈阻值。2.检测阀体是否卡死或堵塞。3.更换电子膨胀阀。4.更换室内机P板。" },
{ brand: "大金", code: "AF", descShort: "排水水位超限/加湿器异常", fullGuide: "1.检查压缩机非运转状态下浮控开关是否动作。2.检查加湿器是否漏水。3.检查排水管是否上倾斜或堵塞。4.更换室内机P板。" },
{ brand: "大金", code: "AJ", descShort: "容量设定故障/机型匹配错误", fullGuide: "1.检查预先设定的数据是否正确。2.检查数据保存IC中是否未设定程序。3.重新设定能力代码。4.更换室内机P板。" },
{ brand: "大金", code: "C4", descShort: "室内机液管热敏电阻（R2T）异常", fullGuide: "1.检查热敏电阻连接是否松动。2.测量热敏电阻阻值(25℃约5-10K)。3.更换热敏电阻。4.更换室内机P板。" },
{ brand: "大金", code: "C5", descShort: "室内机气管热敏电阻（R3T）异常", fullGuide: "1.检查热敏电阻连接是否松动。2.测量热敏电阻阻值。3.更换热敏电阻。4.更换室内机P板。" },
{ brand: "大金", code: "C9", descShort: "室内环境温度传感器（R1T）异常", fullGuide: "1.检查热敏电阻连接是否松动。2.测量热敏电阻阻值。3.更换热敏电阻。4.更换室内机P板。" },
{ brand: "大金", code: "CJ", descShort: "遥控器温度传感器异常", fullGuide: "1.检查遥控器热敏电阻是否正常。2.更换遥控器。3.更换遥控器P板。" },
{ brand: "大金", code: "E1", descShort: "室外机P板不良/控制板故障", fullGuide: "1.检查室外机P板供电。2.检查通信是否正常。3.更换室外机P板。" },
{ brand: "大金", code: "E3", descShort: "高压压力保护（系统压力过高）", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.检查外机散热风扇。4.更换高压开关。5.更换室外机P板。" },
{ brand: "大金", code: "E4", descShort: "低压压力保护（缺氟/冷媒泄漏）", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检查低压传感器。4.更换室外机P板。" },
{ brand: "大金", code: "E5", descShort: "压缩机过载/过流保护", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查系统压力。4.更换压缩机或变频板。" },
{ brand: "大金", code: "E6", descShort: "压缩机过热保护/排气温度过高", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。" },
{ brand: "大金", code: "E7", descShort: "室外风扇电机故障（堵转/过流）", fullGuide: "1.检查风扇周围是否有异物。2.检查风扇电机绝缘是否下降。3.更换风扇电机。4.更换室外机P板。" },
{ brand: "大金", code: "H3", descShort: "高压开关异常/高压保护动作", fullGuide: "1.检查高压开关连接。2.测量高压开关通断。3.更换高压开关。4.更换室外机P板。" },
{ brand: "大金", code: "H4", descShort: "低压开关异常/低压保护动作", fullGuide: "1.检查低压开关连接。2.测量低压开关通断。3.更换低压开关。4.更换室外机P板。" },
{ brand: "大金", code: "H7", descShort: "外机风扇电机位置信号异常", fullGuide: "1.检查风扇霍尔反馈信号。2.检查风扇电机连接线。3.更换风扇电机。4.更换室外机P板。" },
{ brand: "大金", code: "H9", descShort: "室外环境温度传感器异常", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查线路连接。4.更换室外机P板。" },
{ brand: "大金", code: "L3", descShort: "电气箱温度过高/功率元件过热", fullGuide: "1.检查电气盒散热是否良好。2.检查散热风扇。3.检查温度传感器。4.更换P板。" },
{ brand: "大金", code: "L4", descShort: "变频散热鳍片温度过高", fullGuide: "1.检查外机散热风扇。2.清理散热片灰尘。3.更换导热硅脂。4.更换变频模块。" },
{ brand: "大金", code: "L5", descShort: "压缩机过载/电流检测异常", fullGuide: "1.检查压缩机电机是否接地不良或短路。2.测量压缩机绕组。3.更换压缩机或变频板。" },
{ brand: "大金", code: "LC", descShort: "外机主板与微处理器通讯故障", fullGuide: "1.检查控制P板与变频P板之间的连接。2.测量通信电压。3.更换控制P板或变频P板。" },
{ brand: "大金", code: "U4", descShort: "内外机通讯故障（接线/主板）", fullGuide: "1.检查室内机与室外机之间的接线是否正确。2.测量通信电压。3.更换内机主板或外机主板。" },
{ brand: "大金", code: "U5", descShort: "室内机与遥控器通讯故障", fullGuide: "1.检查遥控器与室内机之间的传送线路。2.检查遥控器设定是否正确。3.更换遥控器。4.更换室内机P板。" },
{ brand: "大金", code: "P3", descShort: "电气箱内温度传感器异常", fullGuide: "1.检查P板温度传感器。2.更换传感器。3.更换印刷电路板。" },
{ brand: "大金", code: "J6", descShort: "室外热交换器温度传感器异常", fullGuide: "1.检测热交换器传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "三菱电机", code: "E1", descShort: "操作开关线断/室内机电路板故障", fullGuide: "1.检查操作开关连接线是否断开。2.检查室内机电路板是否损坏。3.测量开关信号线通断。4.更换室内机P板。" },
{ brand: "三菱电机", code: "E2", descShort: "室内机位置编号重复/室内机板故障", fullGuide: "1.检查同一系统内室内机地址是否有重复。2.重新设置室内机地址码。3.更换室内机电路板。" },
{ brand: "三菱电机", code: "E3", descShort: "无对应室外机号码/内外信号线断", fullGuide: "1.检查室内外机信号连接线是否断路。2.检查室外机电源是否ON。3.检查室外机号码设定是否正确(未设48或49)。4.更换室外机板。" },
{ brand: "三菱电机", code: "E4", descShort: "室内机号码设定不正确(设了48或49)", fullGuide: "1.检查室内机地址码设定。2.重新设置有效地址码(非48/49)。3.更换室内机电路板。" },
{ brand: "三菱电机", code: "E5", descShort: "室内外机通信异常/室外机板故障", fullGuide: "1.检查室内外机连接线是否松动。2.测量通信电压。3.检查室外机电源是否分开供电。4.更换室外机电路板。" },
{ brand: "三菱电机", code: "E6", descShort: "室内机热交换器热敏电阻故障/室内机板故障", fullGuide: "1.检查热交换器热敏电阻连接是否松动。2.测量热敏电阻阻值(25℃约5-10K)。3.更换热敏电阻。4.更换室内机板。" },
{ brand: "三菱电机", code: "E7", descShort: "室内机吸气热敏电阻故障/室内机板故障", fullGuide: "1.检查吸气热敏电阻连接。2.测量热敏电阻阻值。3.更换热敏电阻。4.更换室内机板。" },
{ brand: "三菱电机", code: "E8", descShort: "室内机热交换器温度过高(暖气)/热敏电阻短路", fullGuide: "1.检查过滤网是否脏堵，清洗滤网。2.检查内机风机转速。3.检测热交换器热敏电阻是否短路。4.更换热敏电阻或室内机板。" },
{ brand: "三菱电机", code: "E10", descShort: "操作开关多台控制时台数超过", fullGuide: "1.检查多台控制器设置。2.减少同时操作的控制台数。3.检查控制器通讯线路。4.更换控制器。" },
{ brand: "三菱电机", code: "E31", descShort: "室外机号码重复/室外机板故障", fullGuide: "1.检查室外机地址设置是否有重复。2.重新设置唯一地址。3.更换室外机电路板。" },
{ brand: "三菱电机", code: "E32", descShort: "电源反相或缺相/室外机板故障", fullGuide: "1.检查电源相序是否正确。2.将三相电源中任两相对换接法。3.检查电源是否缺相。4.更换室外机电路板。" },
{ brand: "三菱电机", code: "E33", descShort: "压缩机过流/缺相/室外机板故障", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查压缩机是否缺S相或R相(初级52C的次级配线)。4.更换压缩机或室外机板。" },
{ brand: "三菱电机", code: "E34", descShort: "52C的初级缺T相", fullGuide: "1.检查52C接触器初级是否缺T相。2.检查电源线路连接。3.检查接触器是否损坏。4.更换52C接触器。" },
{ brand: "三菱电机", code: "E35", descShort: "外机温度过高/外机热敏电阻短路", fullGuide: "1.检查外机散热环境。2.清理冷凝器翅片。3.检查外机热敏电阻是否短路。4.更换热敏电阻或室外机板。" },
{ brand: "三菱电机", code: "E36", descShort: "压缩机出口冷管温度过高", fullGuide: "1.检测压缩机排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。" },
{ brand: "三菱电机", code: "E38", descShort: "室外机气温热敏电阻不良", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查线路连接。4.更换室外机板。" },
{ brand: "三菱电机", code: "E39", descShort: "压缩机出口冷管温度热敏电阻不良", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。4.更换室外机板。" },
{ brand: "三菱电机", code: "E40", descShort: "压缩机高压过高", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.检查高压开关。4.检查外机散热环境。" },
{ brand: "三菱电机", code: "EA", descShort: "室内外机接线错误/超过室内机连接数", fullGuide: "1.检查室内外机接线是否正确。2.检查室内机连接数量是否超限。3.重新正确接线。4.调整室内机配置。" },
{ brand: "三菱电机", code: "Eb", descShort: "室内外机接线错误", fullGuide: "1.检查室内外机接线是否正确。2.按接线图重新连接。3.检查信号线连接。" },
{ brand: "三菱电机", code: "EC", descShort: "启动时间结束", fullGuide: "1.检查启动时间设置。2.断电重启。3.检查系统启动条件是否满足。4.更换控制板。" },
{ brand: "三菱电机", code: "EE", descShort: "室内外机通讯错误", fullGuide: "1.检查室内外机连接线。2.测量通讯电压。3.检查信号接收状态。4.更换内机主板或外机主板。" },
{ brand: "三菱电机", code: "EF", descShort: "M-NET传输错误", fullGuide: "1.检查M-NET通讯线路。2.检查通讯地址设置。3.检查终端电阻。4.更换通讯模块。" },
{ brand: "三菱电机", code: "E0", descShort: "遥控器传输错误(信号接收错误)", fullGuide: "1.检查遥控器与室内机之间的传送线路。2.检查遥控器设定是否正确。3.更换遥控器。4.更换室内机接收板。" },
{ brand: "三菱电机", code: "E3", descShort: "遥控器传输错误(传输错误)", fullGuide: "1.检查遥控器连接线。2.更换遥控器。3.更换室内机接收板。" },
{ brand: "三菱电机", code: "P1", descShort: "进气传感器错误", fullGuide: "1.检查室内环境温度传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)。3.更换传感器。4.更换室内机板。" },
{ brand: "三菱电机", code: "P2", descShort: "管道(液体或两相管道)传感器错误", fullGuide: "1.检查管道温度热敏电阻连接。2.测量热敏电阻阻值。3.更换传感器。4.更换室内机板。" },
{ brand: "三菱电机", code: "P3", descShort: "系统错误(发送/接收信号)", fullGuide: "1.检查通信线路。2.检查地址设置。3.更换通信模块。4.更换控制板。" },
{ brand: "三菱电机", code: "P4", descShort: "排水传感器错误", fullGuide: "1.检查排水传感器连接。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.更换排水传感器。" },
{ brand: "三菱电机", code: "P5", descShort: "排水泵错误/排水溢流保护", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.更换排水泵。" },
{ brand: "三菱电机", code: "P6", descShort: "冻结/过热保护操作", fullGuide: "1.清洗过滤网增加风量。2.检查风机转速。3.检测盘管传感器。4.检查制冷剂是否不足。" },
{ brand: "三菱电机", code: "P7", descShort: "系统错误(地址)", fullGuide: "1.检查室内机地址设置。2.重新设置唯一地址。3.检查地址码是否重复。" },
{ brand: "三菱电机", code: "P8", descShort: "管道温度错误", fullGuide: "1.检查管道温度传感器。2.更换传感器。3.检查线路连接。4.更换室外机板。" },
{ brand: "三菱电机", code: "P9", descShort: "管道温度热敏电阻/冷凝器/蒸发器异常", fullGuide: "1.检测冷凝器或蒸发器传感器阻值。2.更换传感器。3.检查线路连接。4.更换控制板。" },
{ brand: "三菱电机", code: "PA", descShort: "强制压缩机错误", fullGuide: "1.检查压缩机强制运行设置。2.检查压缩机是否卡缸。3.更换压缩机。" },
{ brand: "三菱电机", code: "P5(变频)", descShort: "系统水阀反馈信号异常", fullGuide: "1.检查空调系统中水阀是否正常工作。2.检查水阀是否堵塞或损坏。3.清理或更换水阀。4.重新启动系统。" },
{ brand: "三菱电机", code: "P6(变频)", descShort: "系统压缩机启动异常", fullGuide: "1.检查电路是否正常。2.检查电路接触不良或短路。3.检查压缩机电容。4.修复或更换相关电器元件。" },
{ brand: "三菱电机", code: "P7(变频)", descShort: "系统压缩机停机异常", fullGuide: "1.检查压力传感器是否正常。2.检查系统是否过压或过低。3.清理或更换相关元件。4.更换压力传感器。" },
{ brand: "三菱电机", code: "P8(变频)", descShort: "EV马达驱动板故障", fullGuide: "1.检查马达驱动板是否正常工作。2.检查是否短路或电路不良。3.修复或更换驱动板。" },
{ brand: "三菱电机", code: "P9(变频)", descShort: "室内盘管温度传感器故障", fullGuide: "1.检查传感器是否正常。2.检查传感器是否损坏。3.修复或更换传感器。" },
{ brand: "三菱电机", code: "U1", descShort: "异常高压/高压开关63H工作/球阀关闭", fullGuide: "1.检查高压开关是否动作。2.检查球阀是否完全打开。3.清洗冷凝器翅片。4.检查制冷剂是否过多。5.更换高压开关。" },
{ brand: "三菱电机", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "三菱电机", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },{ brand: "三菱电机", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "三菱电机", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "三菱电机", code: "E0", descShort: "线控器通讯异常/室内机EEPROM故障", fullGuide: "1.检查遥控器与室内机之间的传送线路。2.检查遥控器设定是否正确。3.更换遥控器。4.更换室内机接收板。5.更换室内机EEPROM。" },
{ brand: "三菱电机", code: "E1", descShort: "线控器与内机通讯异常", fullGuide: "1.检查线控器连接线。2.更换线控器。3.更换室内机接收板。" },
{ brand: "三菱电机", code: "E2", descShort: "室内机地址重复（多联机）", fullGuide: "1.检查同一系统内室内机地址是否有重复。2.重新设置室内机地址码。3.更换室内机电路板。" },
{ brand: "三菱电机", code: "E3", descShort: "未检测到室外机/内外机信号线断", fullGuide: "1.检查室内外机信号连接线是否断路。2.检查室外机电源是否ON。3.检查室外机号码设定是否正确。4.更换室外机板。" },
{ brand: "三菱电机", code: "E4", descShort: "室内机地址设定错误（设为48/49）", fullGuide: "1.检查室内机地址码设定。2.重新设置有效地址码(非48/49)。3.更换室内机电路板。" },
{ brand: "三菱电机", code: "E5", descShort: "内外机通讯异常/外机断电或主板坏", fullGuide: "1.检查室内外机连接线是否松动。2.测量通信电压。3.检查室外机电源是否分开供电。4.更换室外机电路板。" },
{ brand: "三菱电机", code: "E6", descShort: "室内盘管温度传感器（TH2）故障", fullGuide: "1.检查热交换器热敏电阻连接是否松动。2.测量热敏电阻阻值(25℃约5-10K)。3.更换热敏电阻。4.更换室内机板。" },
{ brand: "三菱电机", code: "E7", descShort: "室内环境温度传感器（TH1）故障", fullGuide: "1.检查吸气热敏电阻连接。2.测量热敏电阻阻值。3.更换热敏电阻。4.更换室内机板。" },
{ brand: "三菱电机", code: "E8", descShort: "制热过载保护（内机盘管>68℃）", fullGuide: "1.检查过滤网是否脏堵，清洗滤网。2.检查内机风机转速。3.检测热交换器热敏电阻是否短路。4.更换热敏电阻或室内机板。" },
{ brand: "三菱电机", code: "E9", descShort: "排水系统异常/浮子开关或排水泵故障", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.更换排水泵或浮子开关。" },
{ brand: "三菱电机", code: "P1", descShort: "室内吸气温度传感器故障（同E7）", fullGuide: "1.检查室内环境温度传感器连接。2.测量传感器阻值。3.更换传感器。4.更换室内机板。" },
{ brand: "三菱电机", code: "P2", descShort: "室内盘管温度传感器故障（同E6）", fullGuide: "1.检查盘管温度传感器连接。2.测量传感器阻值。3.更换传感器。4.更换室内机板。" },
{ brand: "三菱电机", code: "P4", descShort: "排水传感器故障/浮子开关开路", fullGuide: "1.检查排水传感器连接。2.检查浮子开关是否开路。3.更换排水传感器或浮子开关。4.更换室内机板。" },
{ brand: "三菱电机", code: "P5", descShort: "排水泵故障/过载", fullGuide: "1.检查排水泵是否工作。2.测量排水泵供电。3.清理排水管路。4.更换排水泵。" },
{ brand: "三菱电机", code: "P6", descShort: "过冷/过热保护（制冷防冻结/制热防过热）", fullGuide: "1.清洗过滤网增加风量。2.检查风机转速。3.检测盘管传感器。4.检查制冷剂是否不足或过多。" },
{ brand: "三菱电机", code: "P8", descShort: "盘管温度异常/冷媒不足保护", fullGuide: "1.检测盘管温度传感器。2.检查制冷剂是否不足。3.检漏补氟。4.检查系统是否堵塞。" },
{ brand: "三菱电机", code: "P9", descShort: "室内盘管传感器（TH5）故障", fullGuide: "1.检查TH5传感器连接。2.测量传感器阻值。3.更换传感器。4.更换室内机板。" },
{ brand: "三菱电机", code: "PA", descShort: "压缩机强制停止（漏水异常触发）", fullGuide: "1.检查排水系统是否漏水。2.检查漏水传感器。3.清理排水管路。4.排除漏水故障后重启。" },
{ brand: "三菱电机", code: "PB", descShort: "室内风机电机故障/失速", fullGuide: "1.检查风扇马达线束是否断线、短路。2.检查风扇周围是否有异物缠绕。3.更换风扇马达。4.更换P板。" },
{ brand: "三菱电机", code: "E31", descShort: "室外机地址重复", fullGuide: "1.检查室外机地址设置是否有重复。2.重新设置唯一地址。3.更换室外机电路板。" },
{ brand: "三菱电机", code: "E32", descShort: "外机缺相/反相/电源异常", fullGuide: "1.检查电源相序是否正确。2.将三相电源中任两相对换接法。3.检查电源是否缺相。4.更换室外机电路板。" },
{ brand: "三菱电机", code: "E33", descShort: "压缩机过流保护/缺相或外机板坏", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.更换压缩机或室外机板。" },
{ brand: "三菱电机", code: "E35", descShort: "外机过热保护/外机热敏电阻短路", fullGuide: "1.检查外机散热环境。2.清理冷凝器翅片。3.检查外机热敏电阻是否短路。4.更换热敏电阻或室外机板。" },
{ brand: "三菱电机", code: "E36", descShort: "压缩机排气管温度过高", fullGuide: "1.检测压缩机排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。" },
{ brand: "三菱电机", code: "E38", descShort: "室外环境温度传感器异常", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查线路连接。4.更换室外机板。" },
{ brand: "三菱电机", code: "E39", descShort: "压缩机排气管温度传感器异常", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。4.更换室外机板。" },
{ brand: "三菱电机", code: "E40", descShort: "压缩机高压保护/系统压力过高", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.检查高压开关。4.检查外机散热环境。" },
{ brand: "三菱电机", code: "Fb", descShort: "室外基板异常/驱动板故障", fullGuide: "1.检查室外机P板供电。2.检查驱动板与主板通讯。3.更换室外机P板或驱动板。" },
{ brand: "三菱电机", code: "Fd", descShort: "压缩机锁死/启动失败", fullGuide: "1.检查压缩机是否卡缸或堵转。2.测量压缩机绕组阻值。3.检查压缩机电容。4.更换压缩机。" },
{ brand: "三菱电机", code: "FE", descShort: "室外风机电机异常/失速", fullGuide: "1.检查风扇周围是否有异物。2.检查风扇电机绝缘是否下降。3.更换风扇电机。4.更换室外机P板。" },
{ brand: "三菱电机", code: "U9", descShort: "电压异常/200V机型电源错误", fullGuide: "1.测量电源电压是否正常(200V±10%)。2.检查电源线路。3.加装稳压器。4.更换室外机板。" },
{ brand: "三菱电机", code: "UE", descShort: "内外机连接错误/配线错误", fullGuide: "1.检查室内外机接线是否正确。2.按接线图重新连接。3.检查信号线连接。4.更换内机主板或外机主板。" },
{ brand: "三菱电机", code: "UF", descShort: "压缩机过流/系统异常保护", fullGuide: "1.检测压缩机电流。2.检查系统压力。3.检查制冷剂是否过多或不足。4.更换压缩机。" },
{ brand: "三菱电机", code: "UP", descShort: "压缩机顶部温度异常/过热保护", fullGuide: "1.检测压缩机顶部温度传感器。2.检查制冷剂是否不足。3.改善外机散热。4.更换压缩机。" },
{ brand: "三菱电机", code: "EE", descShort: "内外机通讯故障（同E5）", fullGuide: "1.检查室内外机连接线。2.测量通讯电压。3.更换内机主板或外机主板。" },
{ brand: "统帅", code: "H1", descShort: "自动化霜（正常，冬季制热）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "统帅", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "统帅", code: "AC", descShort: "自清洁运行中", fullGuide: "空调正在进行自清洁功能，属正常状态，等待20-30分钟自动完成。" },
{ brand: "统帅", code: "E0", descShort: "排水系统故障（浮子开关/积水）", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。5.更换排水泵。" },
{ brand: "统帅", code: "E1", descShort: "室内环境温度传感器故障（T1）", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查主板接口电路。" },
{ brand: "统帅", code: "E2", descShort: "室内盘管温度传感器故障（T2）", fullGuide: "1.测量盘管传感器阻值。2.更换同规格传感器。3.检查线路连接。4.检查主板接口电路。" },
{ brand: "统帅", code: "E3", descShort: "室外环境温度传感器故障（T3）", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "统帅", code: "E4", descShort: "室外盘管温度传感器故障（T4）", fullGuide: "1.检查室外盘管传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "统帅", code: "E5", descShort: "过流/低压保护（缺氟/电压低）", fullGuide: "1.检测压缩机电流是否过大。2.检漏并补充制冷剂。3.检查电源电压是否稳定。4.加装稳压器。" },
{ brand: "统帅", code: "E6", descShort: "内外机通讯故障/信号线异常", fullGuide: "1.检查内外机连接线是否松动或断路。2.测量通讯电压。3.更换内机主板或外机主板。" },
{ brand: "统帅", code: "E7", descShort: "相序保护/电源异常/模式冲突", fullGuide: "1.检查电源相序是否正确。2.调整相序。3.检查所有线控器模式设置是否一致。4.测量电源电压。" },
{ brand: "统帅", code: "E8", descShort: "主板与显示板通讯故障", fullGuide: "1.检查显示板连接线是否松动。2.更换显示板。3.更换内机主板。" },
{ brand: "统帅", code: "E9", descShort: "制热过载/防冻结保护", fullGuide: "1.清洗过滤网。2.检查内机风机转速。3.检测盘管传感器。4.检查电加热是否异常。" },
{ brand: "统帅", code: "F1", descShort: "IPM模块过热/过流/短路保护", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。4.涂抹导热硅脂。" },
{ brand: "统帅", code: "F2", descShort: "压缩机无负载/启动失败", fullGuide: "1.检查压缩机线序是否正确。2.测量压缩机绕组阻值。3.检查电源相序。4.更换压缩机或变频板。" },
{ brand: "统帅", code: "F3", descShort: "外机板与功率模块通讯故障", fullGuide: "1.检查外机主板与变频板之间的通讯排线。2.测量通讯电压。3.更换外机主板或变频板。" },
{ brand: "统帅", code: "F4", descShort: "压缩机排气温度过高保护", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。" },
{ brand: "统帅", code: "F5", descShort: "总电流过流保护", fullGuide: "1.检测电源电压及负载电流。2.检查压缩机电容。3.更换压缩机或电容。" },
{ brand: "统帅", code: "F6", descShort: "电源过欠压保护", fullGuide: "1.测量电源电压是否正常(187-242V)。2.加装稳压器。3.检查电源线路。" },
{ brand: "统帅", code: "F7", descShort: "压缩机堵转/失步保护", fullGuide: "1.检查压缩机是否卡缸或堵转。2.测量压缩机绕组阻值。3.检查压缩机电容。4.更换压缩机。" },
{ brand: "统帅", code: "F9", descShort: "PFC功率因数校正保护", fullGuide: "1.检查PFC电路IGBT及二极管。2.测量PFC输出电压。3.更换外机主板或PFC模块。" },
{ brand: "统帅", code: "E16", descShort: "室内基板故障/EEPROM异常", fullGuide: "1.断电重启。2.更换室内主板。3.重新烧录EEPROM数据。" },
{ brand: "统帅", code: "E36", descShort: "压缩机排气温度传感器异常", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "统帅", code: "E38", descShort: "室外环境传感器断线", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "统帅", code: "E39", descShort: "压缩机排气传感器断线", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查线路连接。" },
{ brand: "统帅", code: "E49", descShort: "低压开关异常/冷媒泄漏", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查低压开关。" },
{ brand: "统帅", code: "P0", descShort: "系统高压保护/管路堵塞", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.检查高压开关。4.检查管路是否堵塞。" },
{ brand: "统帅", code: "P1", descShort: "直流母线过欠压", fullGuide: "1.检测电源电压。2.检查PFC电路。3.检查电解电容。4.更换外机主板。" },
{ brand: "统帅", code: "P2", descShort: "压缩机顶部温度保护", fullGuide: "1.检测压缩机顶部温度传感器。2.检查制冷剂是否不足。3.改善外机散热。4.更换压缩机。" },
{ brand: "统帅", code: "P5", descShort: "冷凝器高温保护", fullGuide: "1.清洗冷凝器翅片。2.检查外机散热风扇。3.清理散热器。4.检查制冷剂是否过多。" },
{ brand: "统帅", code: "U4", descShort: "室内机与遥控器通讯故障", fullGuide: "1.检查遥控器与室内机之间的传送线路。2.检查遥控器设定是否正确。3.更换遥控器。4.更换室内机接收板。" },
{ brand: "约克", code: "E0", descShort: "相序错误/缺相保护", fullGuide: "1.检查电源相序是否正确。2.调整相序，将三相电源中任两相对换。3.检查电源是否缺相。4.检查电源线路。" },
{ brand: "约克", code: "E1", descShort: "高压保护/系统压力过高/传感器不良", fullGuide: "1.清洗冷凝器翅片，保证通风良好。2.检查制冷剂是否过多。3.检查高压开关是否损坏。4.检查外机散热风扇是否运转。5.更换高压开关。" },
{ brand: "约克", code: "E2", descShort: "室内防冻结保护/室内热交换器温度传感器不良", fullGuide: "1.清洗过滤网增加风量。2.检查内机风机转速。3.检测盘管传感器阻值(25℃约5-10K)，异常则更换。4.检查制冷剂是否不足。" },
{ brand: "约克", code: "E3", descShort: "低压保护/冷媒不足/压缩机报警输入", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查过压保护及连接线是否完好。5.若一上电就报警，检查相序板。" },
{ brand: "约克", code: "E4", descShort: "排气管高温保护/室外盘管管温头报警", fullGuide: "1.检测排气温度传感器阻值，异常则更换。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。" },
{ brand: "约克", code: "E5", descShort: "低电压保护/过欠压保护", fullGuide: "1.测量电源电压是否正常(187-242V)。2.加装稳压器。3.避开用电高峰期使用。4.检查电源线路。" },
{ brand: "约克", code: "E6", descShort: "静电除尘故障/通讯错误", fullGuide: "1.检查静电除尘器是否工作正常。2.检查信号线是否正常连接。3.更换信号转换器。4.检查内外机通讯线路。" },
{ brand: "约克", code: "E7", descShort: "室外环境温度过低保护/耐高温保护", fullGuide: "1.检查窗户是否紧闭。2.提升室内温度。3.检查室外环境温度传感器。4.暂停空调使用或排除外部影响。" },
{ brand: "约克", code: "E8", descShort: "PG电机无反馈信号/双室内机通讯故障", fullGuide: "1.检查室内风机反馈线是否连接正确。2.检查风机电容及电机绕组。3.检测风机霍尔反馈信号。4.更换室内电机或主板。" },
{ brand: "约克", code: "E9", descShort: "系统冷媒不足（蒸发器高于25℃）", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查管路是否有泄漏。" },
{ brand: "约克", code: "EA", descShort: "系统不制热或不制冷报警", fullGuide: "1.检查四通阀是否换向正常。2.测试四通阀线圈阻值(约2KΩ)。3.检查制冷剂是否不足。4.更换四通阀。" },
{ brand: "约克", code: "Eb", descShort: "一小时压缩机启动超过6次", fullGuide: "1.检查系统是否频繁启停。2.检查电源电压是否稳定。3.检查压缩机过载保护。4.断电重启后观察。" },
{ brand: "约克", code: "EC", descShort: "制冷剂泄漏检测系统故障", fullGuide: "1.检漏并补充制冷剂。2.检查管路接头是否松动。3.检查密封圈是否老化。4.补漏后抽真空加氟。" },
{ brand: "约克", code: "ED", descShort: "水流开关故障（水冷机组）", fullGuide: "1.检查水流开关是否动作。2.检查水泵是否工作。3.检查水路是否畅通。4.更换水流开关。" },
{ brand: "约克", code: "EE", descShort: "水位报警故障/排水故障", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。" },
{ brand: "约克", code: "EF", descShort: "通讯故障/其他故障", fullGuide: "1.检查内外机通讯线路。2.测量通讯电压。3.更换内机主板或外机主板。" },
{ brand: "约克", code: "E14", descShort: "室内风扇电机故障", fullGuide: "1.检查风扇马达线束是否断线、短路。2.检查风扇周围是否有异物缠绕。3.更换风扇马达。4.更换P板。" },
{ brand: "约克", code: "E16", descShort: "室内基板故障/EEPROM异常", fullGuide: "1.断电重启尝试恢复。2.更换室内主板。3.重新烧录EEPROM数据。" },
{ brand: "约克", code: "E36", descShort: "压缩机排气温度传感器异常", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "约克", code: "E38", descShort: "室外环境传感器断线", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "约克", code: "E39", descShort: "压缩机排气传感器断线", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查线路连接。" },
{ brand: "约克", code: "E49", descShort: "低压开关异常/冷媒泄漏", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查低压开关。" },
{ brand: "约克", code: "F0", descShort: "过载保护", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查系统压力是否过高。4.更换压缩机。" },
{ brand: "约克", code: "F1", descShort: "室外温度传感器故障/IPM模块保护", fullGuide: "1.检测室外环境温度传感器阻值。2.断电后检查模块散热片。3.测量压缩机三相绕组。4.更换传感器或IPM模块。" },
{ brand: "约克", code: "F2", descShort: "室外冷凝器管道传感器故障/压缩机过流", fullGuide: "1.检查室外盘管传感器阻值。2.检测压缩机电流。3.更换传感器。4.检查压缩机电容。" },
{ brand: "约克", code: "F3", descShort: "排气温度传感器故障/IPM通讯故障", fullGuide: "1.检测排气传感器阻值。2.检查外机主板与变频板之间通讯排线。3.更换排气传感器。4.更换外机主板或变频板。" },
{ brand: "约克", code: "F4", descShort: "室外EEPROM错误/排气温度过热保护", fullGuide: "1.断电重启。2.更换室外主板。3.重新烧录EEPROM数据。4.检测排气温度传感器。" },
{ brand: "约克", code: "F5", descShort: "室外风扇转速故障（直流电机）", fullGuide: "1.检查直流风机插头是否松动。2.测量风机绕组及霍尔反馈。3.更换室外直流电机。" },
{ brand: "约克", code: "F6", descShort: "T2b传感器错误/环境温度传感器故障", fullGuide: "1.检测T2b传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "约克", code: "F7", descShort: "自动升降面板通讯错误/吸气温度传感器故障", fullGuide: "1.检查升降面板通讯线路。2.检测吸气传感器阻值。3.更换传感器或面板。" },
{ brand: "约克", code: "F8", descShort: "自动升降面板故障", fullGuide: "1.检查升降电机是否卡滞。2.检查门体传感器。3.测量电机供电。4.更换升降面板组件。" },
{ brand: "约克", code: "F9", descShort: "自动升降面板打开", fullGuide: "1.检查面板是否正常关闭。2.检查门开关传感器。3.重新关闭面板。" },
{ brand: "约克", code: "F11", descShort: "压缩机异常", fullGuide: "1.检查压缩机线序是否正确。2.测量压缩机绕组阻值。3.检查压缩机电容。4.更换压缩机。" },
{ brand: "约克", code: "F12", descShort: "室外EEPROM错误", fullGuide: "1.断电重启。2.更换室外主板。3.重新烧录EEPROM数据。" },
{ brand: "约克", code: "F19", descShort: "电源电压过高或过低", fullGuide: "1.测量电源电压是否正常(187-242V)。2.加装稳压器。3.检查电源线路。" },
{ brand: "约克", code: "F21", descShort: "化霜温度传感器故障", fullGuide: "1.检测化霜传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "约克", code: "F22", descShort: "室外机型交流过流保护", fullGuide: "1.检测压缩机电流。2.检查电源电压。3.更换压缩机。" },
{ brand: "约克", code: "F23", descShort: "压缩机单相过流保护", fullGuide: "1.检测压缩机单相电流。2.检查压缩机电容。3.更换压缩机。" },
{ brand: "约克", code: "F25", descShort: "排气温度传感器故障", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "约克", code: "F28", descShort: "站内循环检测错误", fullGuide: "1.检查系统内循环状态。2.检查传感器连接。3.更换故障传感器。" },
{ brand: "约克", code: "P0", descShort: "系统高压保护/管路堵塞", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.检查高压开关。4.检查管路是否堵塞。" },
{ brand: "约克", code: "P1", descShort: "高/低电压保护", fullGuide: "1.测量电源电压是否正常。2.加装稳压器。3.检查电源线路。" },
{ brand: "约克", code: "P2", descShort: "压缩机顶部过热保护", fullGuide: "1.检测压缩机顶部温度传感器。2.检查制冷剂是否不足。3.改善外机散热。4.更换压缩机。" },
{ brand: "约克", code: "P3", descShort: "室外低温保护/压缩机电流第一保护", fullGuide: "1.检查室外环境温度是否过低。2.检测压缩机电流。3.检查室外环境温度传感器。" },
{ brand: "约克", code: "P4", descShort: "压缩机驱动错误/排放管温度保护", fullGuide: "1.检查压缩机线序。2.测量压缩机三相电阻。3.检测排气温度传感器。4.更换变频模块。" },
{ brand: "约克", code: "P5", descShort: "模式冲突/冷凝器高温保护", fullGuide: "1.检查所有线控器模式设置是否一致。2.清洗冷凝器翅片。3.检查外机散热风扇。" },
{ brand: "约克", code: "P6", descShort: "压缩机低压保护", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查低压开关。" },
{ brand: "约克", code: "P7", descShort: "室外IGBT传感器错误/压缩机电流第二保护", fullGuide: "1.检测IGBT传感器阻值。2.检测压缩机电流。3.更换传感器或外机主板。" },
{ brand: "约克", code: "P8", descShort: "压缩机过电流/压缩机电流第三保护", fullGuide: "1.检测压缩机电流。2.检查电源电压。3.检查系统压力。4.更换压缩机。" },
{ brand: "约克", code: "H1", descShort: "网络通讯故障", fullGuide: "1.检查网络通讯线路。2.检查通讯地址设置。3.检查终端电阻。4.更换通讯模块。" },
{ brand: "约克", code: "H2", descShort: "室外递减故障", fullGuide: "1.检查室外机递减控制设置。2.检查室外机运行状态。3.更换室外控制板。" },
{ brand: "约克", code: "H3", descShort: "室外添加故障", fullGuide: "1.检查室外机添加设置。2.检查通讯线路。3.更换室外控制板。" },
{ brand: "约克", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "约克", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "约克", code: "AC", descShort: "自清洁运行中", fullGuide: "空调正在进行自清洁功能，属正常状态，等待20-30分钟自动完成。" },
{ brand: "约克", code: "dF", descShort: "正在自动化霜，属正常状态", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "约克", code: "CL", descShort: "滤网堵塞，清洗滤网提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "约克", code: "OP", descShort: "机器待机状态", fullGuide: "空调处于待机模式，属正常状态，按遥控器开机键即可启动。" },
{ brand: "约克", code: "H1", descShort: "制热预热防冷风，正常运行", fullGuide: "空调正常进入制热防冷风模式，属正常现象，等待几分钟自动恢复。" },
{ brand: "约克", code: "E1", descShort: "高压保护｜散热差、管路堵塞、压机过载", fullGuide: "1.清洗冷凝器翅片，保证通风良好。2.检查制冷剂是否过多。3.检查高压开关是否损坏。4.检查外机散热风扇是否运转。" },
{ brand: "约克", code: "E2", descShort: "内机蒸发器防冻结保护｜缺氟、内机风量小", fullGuide: "1.清洗过滤网增加风量。2.检查内机风机转速。3.检测盘管传感器。4.检查制冷剂是否不足。" },
{ brand: "约克", code: "E3", descShort: "低压保护｜系统缺氟、冷媒泄漏", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查低压开关。" },
{ brand: "约克", code: "E4", descShort: "压缩机排气高温保护｜外机散热差、缺氟", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。" },
{ brand: "约克", code: "E5", descShort: "整机过流/电压过低保护｜电压不稳、压机卡滞", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查压缩机电容。4.更换压缩机。" },
{ brand: "约克", code: "E6", descShort: "内外机通讯故障｜信号线断路、主板异常", fullGuide: "1.检查内外机连接线是否松动或断路。2.测量通讯电压。3.更换内机主板或外机主板。" },
{ brand: "约克", code: "E7", descShort: "电源相序/缺相保护｜三相电机型专用", fullGuide: "1.检查电源相序是否正确。2.调整相序。3.检查电源是否缺相。4.检查电源线路。" },
{ brand: "约克", code: "E8", descShort: "内机风机失速/转速反馈异常", fullGuide: "1.检查室内风机反馈线是否连接正确。2.检查风机电容及电机绕组。3.检测风机霍尔反馈信号。4.更换室内电机或主板。" },
{ brand: "约克", code: "E9", descShort: "水满保护｜天花机/风管机排水故障", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。" },
{ brand: "约克", code: "F1", descShort: "室内环温传感器故障", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查主板接口电路。" },
{ brand: "约克", code: "F2", descShort: "室内盘管传感器故障", fullGuide: "1.测量盘管传感器阻值。2.更换同规格传感器。3.检查线路连接。" },
{ brand: "约克", code: "F3", descShort: "室外环境传感器故障", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "约克", code: "F4", descShort: "室外盘管传感器故障", fullGuide: "1.检查室外盘管传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "约克", code: "F5", descShort: "压机排气温度传感器故障", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "约克", code: "P0", descShort: "变频IPM模块保护｜过热、过流、短路", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。4.涂抹导热硅脂。" },
{ brand: "约克", code: "P1", descShort: "直流母线电压异常｜过高/过低", fullGuide: "1.检测电源电压。2.检查PFC电路。3.检查电解电容。4.更换外机主板。" },
{ brand: "约克", code: "P2", descShort: "压缩机过载保护", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查系统压力。4.更换压缩机。" },
{ brand: "约克", code: "P3", descShort: "外机低温防冻保护", fullGuide: "1.检查室外环境温度是否过低。2.检查室外环境温度传感器。3.更换传感器。" },
{ brand: "约克", code: "P4", descShort: "内机盘管高温/低温保护", fullGuide: "1.清洗过滤网。2.检查风机转速。3.检测盘管传感器。4.检查制冷剂是否不足或过多。" },
{ brand: "约克", code: "P5", descShort: "外机冷凝器高温保护", fullGuide: "1.清洗冷凝器翅片。2.检查外机散热风扇。3.清理散热器。4.检查制冷剂是否过多。" },
{ brand: "约克", code: "P7", descShort: "压机排气温度过高保护", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否不足。3.清理外机散热。4.检查系统是否堵塞。" },
{ brand: "约克", code: "EE", descShort: "内机EEPROM存储故障", fullGuide: "1.断电重启。2.更换室内主板。3.重新烧录EEPROM数据。" },
{ brand: "约克", code: "E0", descShort: "外机EEPROM存储故障", fullGuide: "1.断电重启。2.更换室外主板。3.重新烧录EEPROM数据。" },
{ brand: "约克", code: "L1", descShort: "外机总线通讯故障", fullGuide: "1.检查外机之间通讯线。2.检查外机主板供电。3.更换故障主板。" },
{ brand: "约克", code: "L3", descShort: "线控器与内机通讯异常", fullGuide: "1.检查线控器连接线。2.更换线控器。3.更换内机主板。" },
{ brand: "约克", code: "L7", descShort: "机组地址码设置错误", fullGuide: "1.检查室内机地址设置。2.重新设置唯一地址。3.检查地址码是否重复。" },
{ brand: "约克", code: "H2", descShort: "变频压缩机失步故障", fullGuide: "1.检查压缩机线是否松脱。2.测量压缩机绕组阻值。3.更换变频模块或压缩机。" },
{ brand: "约克", code: "H3", descShort: "四通阀换向动作异常", fullGuide: "1.测试四通阀线圈阻值(约2KΩ)。2.检查四通阀是否卡死。3.更换四通阀。" },
{ brand: "约克", code: "H4", descShort: "系统低压压力开关动作", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查低压开关。" },
{ brand: "约克", code: "H5", descShort: "系统高压压力开关动作", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.检查高压开关。4.检查外机散热环境。" },
{ brand: "小天鹅", code: "E0", descShort: "系统高压保护 / EEPROM参数故障", fullGuide: "1.清洗冷凝器翅片，保证通风良好。2.检查制冷剂是否过多。3.检查高压开关是否损坏。4.断电重启，如仍报故障更换主板。" },
{ brand: "小天鹅", code: "E1", descShort: "压缩机高压保护 / 室内外通讯故障", fullGuide: "1.检查冷凝器前是否有障碍物。2.室外环境温度高于43℃时制冷属正常保护。3.检查控制回路是否异常。4.检查内外机连接线是否松动。5.更换内机主板或外机主板。" },
{ brand: "小天鹅", code: "E2", descShort: "蒸发器防冻结保护 / 过零检测出错", fullGuide: "1.清洗过滤网增加风量。2.检查室内风机是否不转或风口堵住。3.检查管温感温头是否折断或插头松动。4.室内环境温度低于18℃时属正常保护。" },
{ brand: "小天鹅", code: "E3", descShort: "压缩机低压保护 / 室内温度传感器故障", fullGuide: "1.检漏并补充制冷剂。2.检查膨胀阀是否半堵。3.检查电磁阀是否故障。4.检查过滤器是否半堵。5.更换室内温度传感器。" },
{ brand: "小天鹅", code: "E4", descShort: "压缩机排气温度过高保护 / 室外管温传感器故障", fullGuide: "1.检查系统是否堵塞。2.检查压缩机是否老化。3.清理外机散热。4.检查制冷剂是否不足。5.更换室外管温传感器。" },
{ brand: "小天鹅", code: "E5", descShort: "室外环温过低保护 / 通讯故障", fullGuide: "1.检查室外环境温度是否过低。2.检查室外环温传感器阻值。3.检查内外机连接线。4.更换传感器。" },
{ brand: "小天鹅", code: "E6", descShort: "过冷保护 / 室内两传感器同时损坏", fullGuide: "1.检查制冷状态RT2传感器是否异常。2.检查室内环境温度传感器和盘管传感器是否同时损坏。3.更换故障传感器。" },
{ brand: "小天鹅", code: "E7", descShort: "室外机异常保护 / 温度传感器开路", fullGuide: "1.检查室外机散热是否良好。2.检查RT1、RT2、RT3温度传感器是否开路。3.更换故障传感器。4.清理外机散热器。" },
{ brand: "小天鹅", code: "E8", descShort: "温度传感器短路 / 卸荷保护", fullGuide: "1.检查RT1、RT2、RT3温度传感器是否短路。2.更换短路传感器。3.检查卸荷保护装置是否动作。" },
{ brand: "小天鹅", code: "E9", descShort: "低电压保护 / 室外化霜传感器故障", fullGuide: "1.测量电源电压是否正常(187-242V)。2.加装稳压器。3.检查室外化霜传感器阻值，异常则更换。" },
{ brand: "小天鹅", code: "E10", descShort: "室外机保护", fullGuide: "1.检查室外机电源是否正常。2.检查室外机主板。3.检查压缩机运行状态。4.更换外机主板。" },
{ brand: "小天鹅", code: "E11", descShort: "室内机电源异常", fullGuide: "1.检查室内机电源电压。2.检查电源线路是否松动。3.更换室内机主板。" },
{ brand: "小天鹅", code: "E15", descShort: "排水泵浮子开关起动（排水报警）", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。" },
{ brand: "小天鹅", code: "E16", descShort: "风向板未开", fullGuide: "1.检查风向板电机是否故障。2.检查风向板是否在30秒内未转向。3.更换摆动马达。4.检查转接线是否良好。" },
{ brand: "小天鹅", code: "E17", descShort: "可选故障", fullGuide: "1.检查是否有其他故障代码同时显示。2.断电重启观察。3.联系专业维修人员检修。" },
{ brand: "小天鹅", code: "E20", descShort: "室内温控器1（Th1）开路", fullGuide: "1.检查室内环境温度传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)。3.更换传感器。4.更换室内机板。" },
{ brand: "小天鹅", code: "E21", descShort: "室内热交换机温控器1（Th2）开路", fullGuide: "1.检查室内盘管传感器连接。2.测量传感器阻值。3.更换传感器。4.更换室内机板。" },
{ brand: "小天鹅", code: "E22", descShort: "室内热交换机温控器2（Th3）开路", fullGuide: "1.检查室内热交换器第二传感器连接。2.测量传感器阻值。3.更换传感器。4.更换室内机板。" },
{ brand: "小天鹅", code: "E25", descShort: "室内机DIP地址重复", fullGuide: "1.检查同一系统内室内机地址是否有重复。2.重新设置室内机地址码。3.更换室内机电路板。" },
{ brand: "小天鹅", code: "E26", descShort: "室内机电路板和遥控器传输故障", fullGuide: "1.检查遥控器与室内机之间的传送线路。2.检查遥控器设定是否正确。3.更换遥控器。4.更换室内机接收板。" },
{ brand: "小天鹅", code: "E27", descShort: "室内外机传输错误/室外机地址重复/过电流保护", fullGuide: "1.检查室内外机连接电缆是否破损。2.检查室外机地址是否重复。3.检查主电源是否逆相。4.检查过电流保护是否动作。5.更换内机主板或外机主板。" },
{ brand: "小天鹅", code: "E30", descShort: "室内机总功率超限/室外机功率设定错误", fullGuide: "1.检查室内机总功率是否在允许范围50%-135%。2.检查室外机功率设定是否正确。3.调整室内机配置。4.更换匹配的主板。" },
{ brand: "小天鹅", code: "E31", descShort: "高压压力过高/低压压力过低/冷媒泄漏", fullGuide: "1.高压端压力超过2.78MPa时清洗冷凝器。2.低压端压力低于0MPa持续10分钟以上时检漏补氟。3.检查管道是否堵塞。4.更换高压开关。" },
{ brand: "小天鹅", code: "E32", descShort: "变频器保护（过电压/欠电压/IPM保护/电流传感异常）", fullGuide: "1.检查电源电压是否稳定。2.断电后检查模块散热片。3.测量压缩机三相绕组。4.更换IPM模块或变频板。" },
{ brand: "小天鹅", code: "E40", descShort: "室外机温控器开路", fullGuide: "1.检查室外环境温度传感器连接。2.检查室外热交换器入口/出口温控器。3.检查压缩机排放温控器。4.更换故障传感器。5.更换室外机板。" },
{ brand: "小天鹅", code: "E41", descShort: "输出传感器开路", fullGuide: "1.检查输出传感器(SEN1/SEN2)连接。2.检查高压侧接头是否松动。3.更换传感器。4.更换室外机板。" },
{ brand: "小天鹅", code: "E42", descShort: "电流检测传感器故障", fullGuide: "1.检查电流检测传感器(CT)连接。2.测量CT输出电压。3.更换CT传感器。4.更换室外机板。" },
{ brand: "小天鹅", code: "E01", descShort: "高负荷保护", fullGuide: "1.清洗冷凝器翅片。2.检查外机散热环境。3.检查制冷剂是否过多。4.检查外机散热风扇。" },
{ brand: "小天鹅", code: "E02", descShort: "冻结保护", fullGuide: "1.清洗过滤网增加风量。2.检查内机风机转速。3.检测盘管传感器。4.检查制冷剂是否不足。" },
{ brand: "小天鹅", code: "E03", descShort: "室温传感器故障", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查主板接口电路。" },
{ brand: "小天鹅", code: "E04", descShort: "室内机盘管传感器故障", fullGuide: "1.测量盘管传感器阻值。2.更换同规格传感器。3.检查线路连接。4.检查主板接口电路。" },
{ brand: "小天鹅", code: "E05", descShort: "排水溢流异常保护", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。" },
{ brand: "小天鹅", code: "E06", descShort: "室内两传感器同时损坏", fullGuide: "1.检查室内环境温度传感器和盘管传感器是否同时异常。2.测量两个传感器阻值。3.更换故障传感器。4.更换室内机板。" },
{ brand: "小天鹅", code: "E07", descShort: "室外机异常保护", fullGuide: "1.检查室外机散热是否良好。2.检查外机风扇是否运转。3.检查制冷剂是否不足。4.清理外机散热器。" },
{ brand: "小天鹅", code: "E08", descShort: "横向摆风异常保护", fullGuide: "1.检查摆动马达是否故障。2.检查转接线是否良好。3.检查风向叶片是否卡住。4.更换摆动马达。" },
{ brand: "小天鹅", code: "E09", descShort: "室外化霜传感器故障", fullGuide: "1.检测室外化霜传感器阻值。2.更换传感器。3.检查线路连接。4.更换室外机板。" },
{ brand: "小天鹅", code: "E152", descShort: "内机电子膨胀阀关2次", fullGuide: "1.检查电子膨胀阀线圈阻值。2.检测阀体是否卡死。3.更换电子膨胀阀。4.检查主板驱动电路。" },
{ brand: "小天鹅", code: "E153", descShort: "内机浮子开关2次感应", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。" },
{ brand: "小天鹅", code: "E154", descShort: "内机风扇故障", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈信号。3.检查风叶是否卡滞。4.更换室内电机。" },
{ brand: "小天鹅", code: "E162", descShort: "EEPROM故障", fullGuide: "1.断电重启尝试恢复。2.更换室内主板。3.重新烧录EEPROM数据。" },
{ brand: "小天鹅", code: "E163", descShort: "OPTION设置故障", fullGuide: "1.检查内外机型号是否匹配。2.重新设置机型代码。3.更换匹配的主板。" },
{ brand: "小天鹅", code: "E165", descShort: "电加热排除温度保护", fullGuide: "1.检查电加热器是否异常过热。2.检测电加热温度传感器。3.更换电加热组件。" },
{ brand: "小天鹅", code: "E166", descShort: "与电加热相关的无风故障", fullGuide: "1.检查室内风机是否运行。2.检测风道是否堵塞。3.检查风机转速。4.更换电机。" },
{ brand: "小天鹅", code: "E201", descShort: "设定台数故障", fullGuide: "1.检查室内机台数设定是否正确。2.重新设置台数代码。3.检查通讯线路。" },
{ brand: "小天鹅", code: "E202", descShort: "内机与外机通讯故障", fullGuide: "1.检查内外机连接线是否松动。2.测量通讯电压。3.更换内机主板或外机主板。" },
{ brand: "小天鹅", code: "E203", descShort: "外主机与辅助机通信故障", fullGuide: "1.检查外机之间通讯线。2.检查辅助机主板供电。3.更换故障主板。" },
{ brand: "小天鹅", code: "E221", descShort: "外机温度温控开路或短路", fullGuide: "1.检测室外温度传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "小天鹅", code: "E226", descShort: "外机温度温控脱落", fullGuide: "1.检查传感器插头是否松动。2.重新插拔传感器。3.更换传感器。" },
{ brand: "小天鹅", code: "E231", descShort: "冷凝器主温控故障", fullGuide: "1.检查室外盘管主传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "小天鹅", code: "E236", descShort: "冷凝器辅助温控故障", fullGuide: "1.检查室外盘管辅助传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "小天鹅", code: "E241", descShort: "冷凝器中部温控故障", fullGuide: "1.检查冷凝器中部传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "小天鹅", code: "E246", descShort: "冷凝器出口1温控故障", fullGuide: "1.检查冷凝器出口传感器阻值。2.更换传感器。3.检查线路。" },
{ brand: "小天鹅", code: "E251", descShort: "数字排气温度温控故障", fullGuide: "1.检测排气温度传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "小天鹅", code: "E256", descShort: "定速压缩机1温控故障", fullGuide: "1.检查定速压缩机1温度传感器。2.更换传感器。3.检查主板。" },
{ brand: "小天鹅", code: "E257", descShort: "定速压缩机2温控故障", fullGuide: "1.检查定速压缩机2温度传感器。2.更换传感器。3.检查主板。" },
{ brand: "小天鹅", code: "E261", descShort: "数字排气温控故障", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板接口。" },
{ brand: "小天鹅", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "小天鹅", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "小天鹅", code: "AC", descShort: "自清洁运行中", fullGuide: "空调正在进行自清洁功能，属正常状态，等待20-30分钟自动完成。" },
{ brand: "小天鹅", code: "dF", descShort: "自动化霜，正常状态", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "小天鹅", code: "CL", descShort: "过滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "小天鹅", code: "H1", descShort: "制热预热防冷风，正常运行", fullGuide: "空调正常进入制热防冷风模式，属正常现象，等待几分钟自动恢复。" },
{ brand: "小天鹅", code: "E0", descShort: "室内机EEPROM存储故障", fullGuide: "1.断电重启尝试恢复。2.更换室内主板。3.重新烧录EEPROM数据。" },
{ brand: "小天鹅", code: "E1", descShort: "室内外机通讯故障", fullGuide: "1.检查内外机连接线是否松动或断路。2.测量通讯电压。3.更换内机主板或外机主板。" },
{ brand: "小天鹅", code: "E2", descShort: "蒸发器防冻结保护", fullGuide: "1.清洗过滤网增加风量。2.检查内机风机转速。3.检测盘管传感器。4.检查制冷剂是否不足。" },
{ brand: "小天鹅", code: "E3", descShort: "室内风机速度失控", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈信号。3.检查风叶是否卡滞。4.更换室内电机。" },
{ brand: "小天鹅", code: "E4", descShort: "压缩机电流过载保护", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查压缩机电容。4.更换压缩机。" },
{ brand: "小天鹅", code: "E5", descShort: "室内环境温度传感器T1故障", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查主板接口电路。" },
{ brand: "小天鹅", code: "E6", descShort: "室内盘管温度传感器T2故障", fullGuide: "1.测量盘管传感器阻值。2.更换同规格传感器。3.检查线路连接。4.检查主板接口电路。" },
{ brand: "小天鹅", code: "E7", descShort: "室外环境温度传感器T3故障", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "小天鹅", code: "E8", descShort: "室外盘管温度传感器T4故障", fullGuide: "1.检查室外盘管传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "小天鹅", code: "E9", descShort: "系统低压保护/冷媒不足", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查低压开关。" },
{ brand: "小天鹅", code: "EA", descShort: "室外风机电机故障", fullGuide: "1.检查直流风机插头是否松动。2.测量风机绕组及霍尔反馈。3.更换室外直流电机。" },
{ brand: "小天鹅", code: "Eb", descShort: "四通阀换向异常故障", fullGuide: "1.测试四通阀线圈阻值(约2KΩ)。2.检查四通阀是否卡死。3.更换四通阀。" },
{ brand: "小天鹅", code: "Ec", descShort: "制冷模式过载保护", fullGuide: "1.清洗冷凝器翅片。2.检查外机散热风扇。3.检查制冷剂是否过多。4.检查系统压力。" },
{ brand: "小天鹅", code: "Ed", descShort: "制热模式过载保护", fullGuide: "1.清洗过滤网。2.检查内机风机转速。3.检测盘管传感器。4.检查电加热是否异常。" },
{ brand: "小天鹅", code: "F1", descShort: "室内环温传感器异常", fullGuide: "1.拔掉传感器插头测量阻值。2.更换传感器。3.检查主板接口电路。" },
{ brand: "小天鹅", code: "F2", descShort: "室内管温传感器异常", fullGuide: "1.测量盘管传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "小天鹅", code: "F3", descShort: "室外环温传感器异常", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "小天鹅", code: "F4", descShort: "室外管温传感器异常", fullGuide: "1.检查室外盘管传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "小天鹅", code: "F5", descShort: "压缩机排气温度传感器故障", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "小天鹅", code: "P0", descShort: "变频IPM模块保护/过热/过流/短路", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。4.涂抹导热硅脂。" },
{ brand: "小天鹅", code: "P1", descShort: "供电电压过高过低保护", fullGuide: "1.测量电源电压是否正常(187-242V)。2.加装稳压器。3.检查电源线路。" },
{ brand: "小天鹅", code: "P2", descShort: "压缩机顶部高温保护", fullGuide: "1.检测压缩机顶部温度传感器。2.检查制冷剂是否不足。3.改善外机散热。4.更换压缩机。" },
{ brand: "小天鹅", code: "P3", descShort: "外机低温防冻保护", fullGuide: "1.检查室外环境温度是否过低。2.检查室外环境温度传感器。3.更换传感器。" },
