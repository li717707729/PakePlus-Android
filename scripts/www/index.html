{ brand: "三星", code: "E2", descShort: "导风门电机 / 门体传感器故障", fullGuide: "1.检查导风门电机是否卡滞。2.测量电机线圈阻值。3.检查门体传感器是否正常。4.更换导风门电机或传感器。" },
{ brand: "三星", code: "E4", descShort: "格栅电机故障 / 系统缺氟 / 强制化霜", fullGuide: "1.检查格栅电机是否卡滞。2.检漏并补充制冷剂。3.检查截止阀是否全开。4.更换格栅电机。" },
{ brand: "三星", code: "E5", descShort: "室内盘管温度传感器故障", fullGuide: "1.测量盘管传感器阻值(25℃约5-10K)。2.更换同规格传感器。3.检查线路连接。" },
{ brand: "三星", code: "E6", descShort: "室外盘管 / 化霜传感器故障", fullGuide: "1.检查室外盘管传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "三星", code: "E7", descShort: "电加热温度传感器故障", fullGuide: "1.检测电加热温度传感器阻值。2.更换传感器。3.检查主板接口电路。" },
{ brand: "三星", code: "E101", descShort: "内外机通讯异常", fullGuide: "1.检查内外机连接线。2.测量通讯电压。3.更换内机主板或外机主板。" },
{ brand: "三星", code: "E121", descShort: "室内环境传感器开路/短路", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查主板接口电路。" },
{ brand: "三星", code: "E122", descShort: "蒸发器入口温度传感器故障", fullGuide: "1.检测蒸发器入口传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "三星", code: "E123", descShort: "蒸发器出口温度传感器故障", fullGuide: "1.检测蒸发器出口传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "三星", code: "E124", descShort: "内机向外机通讯中断", fullGuide: "1.检查内外机连接线。2.测量通讯电压。3.更换内机主板。" },
{ brand: "三星", code: "E128", descShort: "内机入口传感器脱落", fullGuide: "1.检查传感器插头是否松动。2.重新插拔传感器。3.更换传感器。" },
{ brand: "三星", code: "E129", descShort: "内机出口传感器脱落", fullGuide: "1.检查传感器插头是否松动。2.重新插拔传感器。3.更换传感器。" },
{ brand: "三星", code: "E130", descShort: "出入口传感器同时脱落", fullGuide: "1.检查两个传感器插头。2.重新插拔或更换传感器。3.检查主板接口。" },
{ brand: "三星", code: "E131", descShort: "辅助电加热1温控故障", fullGuide: "1.检查辅助电加热1温控器。2.测量温控器通断。3.更换温控器。" },
{ brand: "三星", code: "E132", descShort: "辅助电加热2温控故障", fullGuide: "1.检查辅助电加热2温控器。2.测量温控器通断。3.更换温控器。" },
{ brand: "三星", code: "E133", descShort: "辅助电加热3温控故障", fullGuide: "1.检查辅助电加热3温控器。2.测量温控器通断。3.更换温控器。" },
{ brand: "三星", code: "E151", descShort: "电子膨胀阀开阀异常", fullGuide: "1.检查电子膨胀阀线圈阻值。2.检测阀体是否卡死。3.更换电子膨胀阀。" },
{ brand: "三星", code: "E152", descShort: "电子膨胀阀关阀异常", fullGuide: "1.检查电子膨胀阀线圈阻值。2.检测阀体是否卡死。3.更换电子膨胀阀。" },
{ brand: "三星", code: "E153", descShort: "接水盘水满 / 排水堵塞 / 浮子开关动作", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。" },
{ brand: "三星", code: "E154", descShort: "室内风机电机故障 / 转速失速", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈。3.更换室内电机。" },
{ brand: "三星", code: "E162", descShort: "室内机EEPROM存储故障", fullGuide: "1.断电重启尝试恢复。2.更换室内主板。3.重新烧录EEPROM数据。" },
{ brand: "三星", code: "E163", descShort: "机型参数配置错误", fullGuide: "1.检查内外机型号是否匹配。2.重新设置机型代码。3.更换匹配的主板。" },
{ brand: "三星", code: "E202", descShort: "外机通讯接收异常", fullGuide: "1.检查外机主板供电。2.检查通讯线路。3.更换外机主板。" },
{ brand: "三星", code: "E203", descShort: "外机通讯发送异常", fullGuide: "1.检查外机主板供电。2.检查通讯线路。3.更换外机主板。" },
{ brand: "三星", code: "E221", descShort: "室外环境温度传感器故障", fullGuide: "1.检测外机环境温度传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "三星", code: "E231", descShort: "室外冷凝器盘管传感器故障", fullGuide: "1.检查室外盘管传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "三星", code: "E251", descShort: "压缩机排气温度传感器故障", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "三星", code: "E291", descShort: "高压压力传感器故障", fullGuide: "1.检查高压压力传感器。2.测量传感器输出电压。3.更换传感器。" },
{ brand: "三星", code: "E296", descShort: "低压压力传感器故障", fullGuide: "1.检查低压压力传感器。2.测量传感器输出电压。3.更换传感器。" },
{ brand: "三星", code: "E303", descShort: "系统高压保护", fullGuide: "1.清洗冷凝器翅片。2.测运行电流。3.检压力。4.查高压开关。" },
{ brand: "三星", code: "E404", descShort: "系统低压保护 / 缺氟泄漏", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。" },
{ brand: "三星", code: "E416", descShort: "压缩机排气温度过高保护", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否过多或不足。3.清理外机散热。" },
{ brand: "三星", code: "E458", descShort: "室外风机电机故障", fullGuide: "1.检查直流风机插头是否松动。2.测量风机绕组及霍尔反馈。3.更换室外直流电机。" },
{ brand: "三星", code: "E461", descShort: "压缩机启动失败 / 卡缸", fullGuide: "1.检查压缩机电容。2.测量压缩机绕组阻值。3.检查系统压力。4.更换压缩机。" },
{ brand: "三星", code: "E505", descShort: "排气高温极限保护", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否过多或不足。3.清理外机散热。4.更换压缩机。" },
{ brand: "三星", code: "E606", descShort: "变频模块过热 / 过流保护", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。" },
{ brand: "三星", code: "CF", descShort: "滤网灰尘过多，请清洗滤网", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "三星", code: "CI", descShort: "机器自动清洁运行中", fullGuide: "自动清洁功能运行中，属正常现象，等待完成即可。" },
{ brand: "三星", code: "dF", descShort: "制热模式自动化霜", fullGuide: "空调自动进入化霜模式，属正常现象，等待化霜结束。" },
{ brand: "日立", code: "01", descShort: "室内机保护装置跳脱", fullGuide: "1.检查接水盘水位是否过高。2.检查排水管是否堵塞。3.检查浮子开关是否动作正常。4.检查室内风扇电机是否卡滞。5.检查排水泵是否工作。6.更换故障电机或PCB板。" },
{ brand: "日立", code: "02", descShort: "室外机保护装置跳脱", fullGuide: "1.检查制冷剂管路是否堵塞。2.检查制冷剂是否过多。3.检查系统是否混入不凝缩气体。4.检查电源相序是否正确。5.检查压缩机是否故障。6.检查高压开关是否断开。" },
{ brand: "日立", code: "03", descShort: "室内外机通讯异常", fullGuide: "1.检查内外机连接线是否松动、断线或接线错误。2.检查室外机电源是否OFF。3.检查室外机保险丝是否熔断。4.检查操作回路插线端子。5.更换内外机主板。" },
{ brand: "日立", code: "04", descShort: "室外机基板与压机驱动板通讯异常", fullGuide: "1.检查控制基板与变频基板之间的通讯线路。2.检查通讯线是否断线或接线错误。3.检查动力保险丝是否断开。4.更换变频基板或控制基板。" },
{ brand: "日立", code: "05", descShort: "电源相序异常", fullGuide: "1.检查电源配线是否逆相。2.检查电源是否缺相。3.调整电源相序。4.检查接线端子是否松动。" },
{ brand: "日立", code: "06", descShort: "变频电压异常", fullGuide: "1.检查电源电压是否波动过大。2.检查供电线路容量是否不足。3.检查接线是否正确。4.加装稳压器。" },
{ brand: "日立", code: "07", descShort: "排气过热度过小", fullGuide: "1.检查制冷剂是否过多。2.检查电子膨胀阀是否锁定在全开状态。3.检查传感器及接线是否正常。4.释放多余制冷剂。" },
{ brand: "日立", code: "08", descShort: "排气温度过高", fullGuide: "1.检查制冷剂是否不足或泄漏。2.检查制冷剂管路是否堵塞。3.检查电子膨胀阀是否锁定在关闭状态。4.检漏补氟。5.检查排气温度传感器。" },
{ brand: "日立", code: "09", descShort: "室外风扇电机保护装置跳脱", fullGuide: "1.检查室外风扇电机是否过热或卡滞。2.检查风扇电机接线是否错误。3.更换风扇电机。" },
{ brand: "日立", code: "11", descShort: "回风温度传感器异常", fullGuide: "1.检查室内回风温度传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)。3.更换传感器。4.检查主板接口电路。" },
{ brand: "日立", code: "12", descShort: "出风温度传感器异常", fullGuide: "1.检查室内出风温度传感器连接是否松动。2.测量传感器阻值。3.更换传感器。4.检查主板接口电路。" },
{ brand: "日立", code: "13", descShort: "防冻/液管温度传感器异常", fullGuide: "1.检查防冻温度传感器（液管温度传感器）连接。2.测量传感器阻值。3.更换传感器。4.检查线路连接。" },
{ brand: "日立", code: "14", descShort: "气管温度传感器异常", fullGuide: "1.检查气管温度传感器连接是否松动。2.测量传感器阻值。3.更换传感器。4.检查线路连接。" },
{ brand: "日立", code: "16", descShort: "线控器温度传感器异常", fullGuide: "1.检查线控器温度传感器连接。2.更换线控器。3.检查线控器与主机通讯。" },
{ brand: "日立", code: "19", descShort: "室内风扇马达保护器动作", fullGuide: "1.检查室内风扇电机是否卡滞。2.检查电机接线是否错误。3.测量电机绕组阻值。4.更换室内风扇电机。" },
{ brand: "日立", code: "20", descShort: "压缩机顶部温度热敏电阻异常", fullGuide: "1.检查压缩机顶部温度传感器连接是否松动。2.测量传感器阻值。3.更换传感器。4.检查主板接口电路。" },
{ brand: "日立", code: "21", descShort: "高压压力传感器异常", fullGuide: "1.检查高压压力传感器连接是否松动。2.测量传感器输出电压。3.更换传感器。4.检查主板接口电路。" },
{ brand: "日立", code: "22", descShort: "室外环境温度传感器异常", fullGuide: "1.检查室外环境温度传感器连接。2.测量传感器阻值。3.更换传感器。4.检查主板接口。" },
{ brand: "日立", code: "23", descShort: "压缩机排气温度传感器异常", fullGuide: "1.检查排气温度传感器连接。2.测量传感器阻值。3.更换排气传感器。4.检查主板排气温检测电路。" },
{ brand: "日立", code: "24", descShort: "室外热交液管温度传感器异常", fullGuide: "1.检查室外热交换器液管温度传感器连接。2.测量传感器阻值。3.更换传感器。4.检查线路。" },
{ brand: "日立", code: "29", descShort: "低压压力传感器异常", fullGuide: "1.检查低压压力传感器连接是否松动。2.测量传感器输出电压。3.更换传感器。4.检查主板接口电路。" },
{ brand: "日立", code: "31", descShort: "室内外机容量组合错误", fullGuide: "1.检查室内外机容量代码设定是否正确。2.检查室内机合计容量代码是否过大或过小（正常80%-120%）。3.重新设定容量代码。4.更换匹配的主板。" },
{ brand: "日立", code: "32", descShort: "室内机通讯不正常", fullGuide: "1.检查电源线是否接有其他系统的室内机。2.检查通讯线路。3.检查室内机主板。4.重新设置地址码。" },
{ brand: "日立", code: "35", descShort: "室内机机号设定重复", fullGuide: "1.检查同一冷媒系统内是否有相同编号的室内机。2.重新设置室内机地址码。3.确保每个室内机有唯一编号。" },
{ brand: "日立", code: "36", descShort: "室内机组合错误", fullGuide: "1.检查室内机型号是否匹配（P型室外机不能连接J型室内机）。2.更换匹配的室内机型号。" },
{ brand: "日立", code: "38", descShort: "室外机保护回路异常", fullGuide: "1.检查室外机PCB保护回路接线是否正确。2.检查保护开关是否故障。3.更换室外机主板。4.检查接线是否错误。" },
{ brand: "日立", code: "39", descShort: "压缩机过电流异常", fullGuide: "1.检查压缩机电流值是否过大或为0A。2.检查接线是否错误。3.检查压缩机是否卡缸或损坏。4.更换压缩机。5.检查变频器。" },
{ brand: "日立", code: "41", descShort: "制冷过负载", fullGuide: "1.检查室外保护装置动作时压缩机温度是否超过95℃。2.检查室外机散热是否良好。3.清理冷凝器翅片。4.检查制冷剂是否过多。" },
{ brand: "日立", code: "42", descShort: "制热过负载", fullGuide: "1.检查室内配管温度是否超过55℃。2.清洗过滤网。3.检查内机风机转速。4.检查电加热是否异常。" },
{ brand: "日立", code: "43", descShort: "压缩比过小保护动作", fullGuide: "1.检查压缩机是否故障。2.检查变频器是否故障。3.检查压缩机电源线是否脱落。4.检查电源问题。5.更换压缩机或变频板。" },
{ brand: "日立", code: "44", descShort: "低压过高保护动作", fullGuide: "1.检查制冷时室内热负荷是否过大。2.检查制热时室外环境温度是否过高。3.检查电子膨胀阀是否锁定在全开状态。4.检查系统是否异常。" },
{ brand: "日立", code: "45", descShort: "高压过高保护动作", fullGuide: "1.检查制冷剂是否过量。2.检查系统是否超负荷运行。3.检查热交换器是否堵塞散热不良。4.检查制冷剂管路是否堵塞。5.清理散热器。" },
{ brand: "日立", code: "46", descShort: "高压过低保护动作", fullGuide: "1.检查制冷剂是否不足。2.检查电子膨胀阀是否锁定在关闭状态。3.检查制冷剂是否泄漏。4.检漏补氟。" },
{ brand: "日立", code: "47", descShort: "低压过低保护动作", fullGuide: "1.检查制冷剂是否不足。2.检查电子膨胀阀是否锁定在关闭状态。3.检查蒸发温度是否异常低下（低于-35℃）。4.检漏补氟。5.检查膨胀阀。" },
{ brand: "日立", code: "48", descShort: "变频器过电流保护", fullGuide: "1.检查系统是否过负荷运行。2.检查压缩机是否异常或堵转。3.检查变频器IPM模块。4.更换压缩机或变频板。" },
{ brand: "日立", code: "51", descShort: "变频器电流传感器异常", fullGuide: "1.检查电流传感器是否故障。2.检查压缩机是否故障。3.检查PCB板是否故障。4.更换变频基板。" },
{ brand: "日立", code: "52", descShort: "过电流保护动作", fullGuide: "1.检查系统是否过载。2.检查压缩机是否堵转。3.检查电流值是否过大。4.更换压缩机或变频器。" },
{ brand: "日立", code: "53", descShort: "IPM保护动作", fullGuide: "1.检查变频器IPM模块是否过热。2.检查变频器或PCB是否故障。3.检查驱动IC是否错误信号。4.更换变频基板或IPM模块。" },
{ brand: "日立", code: "54", descShort: "变频器散热片温度过高", fullGuide: "1.检查散热片温度传感器是否异常。2.检查热交换器是否堵塞。3.检查风扇电机是否异常。4.清理散热片。5.更换风扇电机。" },
{ brand: "日立", code: "55", descShort: "变频器不动作", fullGuide: "1.检查变频基板是否异常。2.检查变频器供电是否正常。3.更换变频基板。" },
{ brand: "日立", code: "57", descShort: "室外风扇电机保护动作", fullGuide: "1.检查变频基板与风扇电机的连接配线是否断线或误配线。2.检查风扇电机是否异常。3.重新连接线缆。4.更换风扇电机。" },
{ brand: "日立", code: "59", descShort: "AC斩波器保护动作", fullGuide: "1.检查电源问题。2.检查FET是否故障。3.检查CT是否故障。4.更换AC斩波器。" },
{ brand: "日立", code: "EE", descShort: "压缩机保护报警", fullGuide: "1.检查02、07、08、39、43、44、45、47报警代码在6小时内是否出现3次。2.检查压缩机是否损坏。3.检查制冷系统是否异常。4.更换压缩机。注意：此报警不可通过线控器复位。" },
{ brand: "日立", code: "b1", descShort: "室内机地址设定错误", fullGuide: "1.检查地址和冷媒系统设定是否正确。2.检查地址设定是否超过64的情况。3.重新设置地址码。" },
{ brand: "日立", code: "b5", descShort: "室内机连接台数错误", fullGuide: "1.检查非H-LINK II的室内机连接是否超过17台。2.减少室内机连接数量。3.检查系统配置。" },
{ brand: "日立", code: "运转限制中", descShort: "断电重启后需要预热/模式冲突", fullGuide: "1.空调长时间断电后重新上电，需要预热4-8小时才能正常启动。2.如不想等待，可在线控器上长按【风量】+【挡风板】键5秒消除。3.检查所有线控器是否设置为统一模式。4.如外机主CPU失电，需预热8小时。" },
{ brand: "日立", code: "滤网提示", descShort: "滤网脏堵，需要清洗", fullGuide: "1.清洗过滤网。2.清洗完成后按遥控器复位键消除提示。3.检查风道是否堵塞。" },
{ brand: "日立", code: "E01", descShort: "室内盘管温度传感器异常", fullGuide: "1.测量盘管传感器阻值(25℃约5-10K)。2.更换同规格传感器。3.检查线路连接。4.检查主板接口电路。" },
{ brand: "日立", code: "E03", descShort: "室内环境温度传感器异常", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查主板接口电路。" },
{ brand: "日立", code: "E05", descShort: "内外机通讯线路故障", fullGuide: "1.检查内外机连接线是否松动或断路。2.测量通讯电压是否有波动。3.更换内机主板或外机主板。" },
{ brand: "日立", code: "E07", descShort: "室外风机电机故障", fullGuide: "1.检查直流风机插头是否松动。2.测量风机绕组及霍尔反馈。3.更换室外直流电机。" },
{ brand: "日立", code: "E09", descShort: "变频模块IPM过热过流保护", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。4.涂抹导热硅脂。" },
{ brand: "日立", code: "F01", descShort: "制冷系统缺氟、冷媒不足", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查管路有无破损。" },
{ brand: "日立", code: "P04", descShort: "商用机室内环温传感器异常", fullGuide: "1.检测室内环境温度传感器阻值。2.更换传感器。3.检查主板接口电路。" },
{ brand: "日立", code: "P08", descShort: "商用机室外风机异常", fullGuide: "1.检查室外风机电机是否卡滞。2.测量风机绕组及供电。3.更换室外风机电机。" },
{ brand: "日立", code: "U4", descShort: "遥控器与内机通讯故障", fullGuide: "1.检查遥控器电池。2.检查遥控器与接收器通信。3.更换遥控器或接收板。4.检查内机主板。" },
{ brand: "日立", code: "32", descShort: "室内机供电电源异常", fullGuide: "1.检查室内机电源电压是否正常。2.检查电源线路是否松动。3.检查保险丝是否熔断。4.更换电源板或主板。" },
{ brand: "创维", code: "88", descShort: "室内温度传感器故障", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查主板接口电路。4.断电重启后再试。" },
{ brand: "创维", code: "E0", descShort: "排气温度过高保护", fullGuide: "1.检测排气温度传感器阻值。2.检查制冷剂是否过多或不足。3.清理外机散热。4.检查系统是否堵塞。" },
{ brand: "创维", code: "E1", descShort: "过负荷保护 / 制热过负荷保护", fullGuide: "1.清洗过滤网。2.检查内机风机转速是否正常。3.检测室内管温传感器。4.检查压缩机运行状态。5.排除进出风口障碍物。" },
{ brand: "创维", code: "E2", descShort: "压缩机过载保护 / 过电流保护", fullGuide: "1.检测压缩机电容容量。2.测量系统压力是否过高。3.检查电源电压是否稳定。4.更换压缩机。" },
{ brand: "创维", code: "E3", descShort: "电源相序错误 / 防冻结保护", fullGuide: "1.检查电源相序是否正确(三相电)。2.调整相序。3.清洗过滤网。4.检查风机转速。5.检测盘管传感器。" },
{ brand: "创维", code: "E4", descShort: "系统高压保护", fullGuide: "1.清洗冷凝器翅片。2.检查大小阀门是否完全打开。3.检测制冷剂是否过多。4.查高压开关。5.检查电子膨胀阀。" },
{ brand: "创维", code: "E5", descShort: "系统低压保护 / 缺氟保护", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查低压开关。" },
{ brand: "创维", code: "E6", descShort: "缺氟保护 / 阀门截止保护", fullGuide: "1.检漏补氟。2.检查阀门是否完全打开。3.检测系统压力。4.检查管路有无泄漏。" },
{ brand: "创维", code: "E7", descShort: "四通阀换向异常保护", fullGuide: "1.测试四通阀线圈阻值(约2KΩ)。2.检查四通阀是否卡死。3.更换四通阀。4.检查制冷剂压力。" },
{ brand: "创维", code: "E8", descShort: "外环温度异常保护", fullGuide: "1.检测室外环境温度传感器阻值。2.检查外机散热环境。3.更换传感器。4.清理冷凝器翅片。" },
{ brand: "创维", code: "E152", descShort: "内机电子膨胀阀关2次", fullGuide: "1.检查电子膨胀阀线圈阻值。2.检测阀体是否卡死。3.更换电子膨胀阀。4.检查主板驱动电路。" },
{ brand: "创维", code: "E153", descShort: "内机浮子开关2次感应 / 水满保护", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。" },
{ brand: "创维", code: "E154", descShort: "内机风扇故障 / 室内风机堵转保护", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈。3.检查风叶是否卡滞。4.更换室内电机。" },
{ brand: "创维", code: "E162", descShort: "EEPROM故障", fullGuide: "1.断电重启尝试恢复。2.更换室内主板。3.重新烧录EEPROM数据。" },
{ brand: "创维", code: "E163", descShort: "OPTION设置故障 / 机型参数配置错误", fullGuide: "1.检查内外机型号是否匹配。2.重新设置机型代码。3.更换匹配的主板。" },
{ brand: "创维", code: "E165", descShort: "电加热排除温度保护", fullGuide: "1.检查电加热器是否异常过热。2.检测电加热温度传感器。3.更换电加热组件。" },
{ brand: "创维", code: "E166", descShort: "与电加热相关的无风故障", fullGuide: "1.检查室内风机是否运行。2.检测风道是否堵塞。3.检查风机转速。4.更换电机。" },
{ brand: "创维", code: "E201", descShort: "设定台数故障", fullGuide: "1.检查室内机台数设定是否正确。2.重新设置台数代码。3.检查通讯线路。" },
{ brand: "创维", code: "E202", descShort: "内机与外机通讯故障", fullGuide: "1.检查内外机连接线是否松动。2.测量通讯电压波动。3.更换内机主板或外机主板。" },
{ brand: "创维", code: "E203", descShort: "外主机与辅助机通信故障", fullGuide: "1.检查外机之间通讯线。2.检查辅助机主板供电。3.更换故障主板。" },
{ brand: "创维", code: "E221", descShort: "外机温度温控开路或短路", fullGuide: "1.检测室外温度传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "创维", code: "E226", descShort: "外机温度温控脱落", fullGuide: "1.检查传感器插头是否松动。2.重新插拔传感器。3.更换传感器。" },
{ brand: "创维", code: "E231", descShort: "冷凝器主温控故障", fullGuide: "1.检查室外盘管主传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "创维", code: "E236", descShort: "冷凝器辅助温控故障", fullGuide: "1.检查室外盘管辅助传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "创维", code: "E241", descShort: "冷凝器中部温控故障", fullGuide: "1.检查冷凝器中部传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "创维", code: "E246", descShort: "冷凝器出口1温控故障", fullGuide: "1.检查冷凝器出口传感器阻值。2.更换传感器。3.检查线路。" },
{ brand: "创维", code: "E251", descShort: "数字排气温度温控故障", fullGuide: "1.检测排气温度传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "创维", code: "E261", descShort: "数字排气温控故障", fullGuide: "1.检测排气传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "创维", code: "F1", descShort: "冷藏蒸发器传感器短路或开路", fullGuide: "1.检测冷藏蒸发器传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "创维", code: "F2", descShort: "环境温度传感器短路或开路", fullGuide: "1.检测环境温度传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "创维", code: "F3", descShort: "冷藏空间传感器短路或开路", fullGuide: "1.检测冷藏空间传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "创维", code: "F4", descShort: "冷冻温度传感器短路或开路", fullGuide: "1.检测冷冻温度传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "创维", code: "L0", descShort: "跳线帽故障", fullGuide: "1.检查主板上跳线帽是否插装。2.重新插紧跳线帽。3.更换跳线帽。4.更换主板。" },
{ brand: "创维", code: "L1", descShort: "内机过零检测故障", fullGuide: "1.检查电源波形是否畸变。2.更换内机主板。3.检测过零电路光耦。" },
{ brand: "创维", code: "L2", descShort: "室内风机故障 / 电机堵转保护", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈。3.检查风叶是否卡滞。4.更换室内电机。" },
{ brand: "创维", code: "L3", descShort: "内机报内外机通讯故障", fullGuide: "1.检查内外机连接线。2.测量通讯电压。3.更换内机主板或外机主板。" },
{ brand: "创维", code: "L4", descShort: "选择口电平异常", fullGuide: "1.检查选择口设置是否正确。2.检查线路连接。3.更换主板。" },
{ brand: "创维", code: "L5", descShort: "内机EEPROM故障", fullGuide: "1.断电重启。2.更换室内主板。3.重新烧录EEPROM数据。" },
{ brand: "创维", code: "L6", descShort: "外机报内外机通讯故障", fullGuide: "1.检查外机主板供电。2.检查通讯线路。3.更换外机主板。" },
{ brand: "创维", code: "L7", descShort: "内机与手操器通讯故障", fullGuide: "1.检查手操器连接线。2.更换手操器。3.更换内机主板。" },
{ brand: "创维", code: "L8", descShort: "水泵故障", fullGuide: "1.检查水泵是否卡滞。2.测量水泵供电。3.更换水泵。" },
{ brand: "创维", code: "L9", descShort: "水满保护", fullGuide: "1.清理排水管路。2.检查浮子开关。3.清理接水盘。4.检查排水泵。" },
{ brand: "创维", code: "P0", descShort: "外机EEPROM故障", fullGuide: "1.断电重启。2.更换室外主板。3.重新烧录EEPROM数据。" },
{ brand: "创维", code: "P1", descShort: "充电故障", fullGuide: "1.检查充电电路。2.检查PTC及继电器。3.更换主板。" },
{ brand: "创维", code: "P2", descShort: "前馈电压保护", fullGuide: "1.检测电源电压。2.检查电压检测电路。3.更换主板。" },
{ brand: "创维", code: "P3", descShort: "直流输入电压过高保护", fullGuide: "1.检测电源电压是否超过260V。2.检查PFC电路。3.更换外机主板。" },
{ brand: "创维", code: "P4", descShort: "直流输入电压过低保护", fullGuide: "1.检测电源电压是否低于180V。2.检查整流桥及大电容。3.加装稳压器。" },
{ brand: "创维", code: "P5", descShort: "直流母线电压跌落保护", fullGuide: "1.检查电源电压。2.检查PFC电路。3.更换外机主板。" },
{ brand: "创维", code: "P6", descShort: "整机电流检测电路故障", fullGuide: "1.检查CT线圈是否松脱。2.测量压缩机运行电流。3.更换主板。" },
{ brand: "创维", code: "P7", descShort: "整机电流保护", fullGuide: "1.检测电源电压及负载电流。2.检查压缩机电容。3.更换压缩机或电容。" },
{ brand: "创维", code: "P8", descShort: "PFC电流检测电路故障", fullGuide: "1.检查PFC电路IGBT及二极管。2.测量PFC输出电压。3.更换外机主板。" },
{ brand: "创维", code: "P9", descShort: "PFC保护", fullGuide: "1.检查PFC电路。2.测量电解电容两端电压。3.更换外机主板或PFC模块。" },
{ brand: "创维", code: "PA", descShort: "内外机不匹配故障", fullGuide: "1.检查内外机型号是否匹配。2.重新设置容量代码。3.更换匹配的主板。" },
{ brand: "创维", code: "PC", descShort: "模式冲突", fullGuide: "1.检查所有线控器是否设置为统一模式。2.关机后重新开机。3.检查内外机匹配。" },
{ brand: "创维", code: "Pd", descShort: "外机选择口电平异常", fullGuide: "1.检查外机选择口设置。2.检查线路连接。3.更换外机主板。" },
{ brand: "创维", code: "HE", descShort: "辅热粘连保护", fullGuide: "1.检查辅助电加热是否粘连。2.检测电加热继电器。3.更换主板或电加热组件。" },
{ brand: "创维", code: "H0", descShort: "压缩机失步保护", fullGuide: "1.检查压缩机线序。2.测量压缩机三相电阻。3.更换变频模块或压缩机。" },
{ brand: "创维", code: "H1", descShort: "压缩机启动失败保护", fullGuide: "1.检查压缩机电容。2.测量压缩机绕组阻值。3.检查系统压力。4.更换压缩机。" },
{ brand: "创维", code: "H2", descShort: "压缩机相电流峰值保护", fullGuide: "1.检查压缩机线序。2.测量压缩机三相电阻。3.更换变频模块。" },
{ brand: "创维", code: "H3", descShort: "压缩机相电流有效值保护", fullGuide: "1.检测压缩机电流。2.检查系统压力。3.更换变频模块或压缩机。" },
{ brand: "创维", code: "H4", descShort: "压缩机模块保护", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。" },
{ brand: "创维", code: "H5", descShort: "压缩机模块温度过高保护", fullGuide: "1.检查外机散热风扇。2.清理冷凝器翅片。3.更换导热硅脂。4.更换IPM模块。" },
{ brand: "创维", code: "H6", descShort: "压缩机相电流检测电路故障", fullGuide: "1.检查CT线圈。2.测量压缩机运行电流。3.更换主板。" },
{ brand: "创维", code: "H7", descShort: "压缩机缺相保护", fullGuide: "1.检查压缩机三相供电。2.测量压缩机线是否断路。3.更换变频板。" },
{ brand: "创维", code: "H8", descShort: "室外直流风机保护", fullGuide: "1.检查直流风机插头是否松动。2.测量风机绕组及霍尔反馈。3.更换室外直流电机。" },
{ brand: "创维", code: "H9", descShort: "室外直流风机相电流检测电路故障", fullGuide: "1.检查风机电流检测电路。2.更换风机驱动板。3.更换外机主板。" },
{ brand: "创维", code: "U0", descShort: "室内环境感温包开短路", fullGuide: "1.拔掉传感器插头测量阻值。2.更换传感器。3.检查主板接口电路。" },
{ brand: "创维", code: "U1", descShort: "室内管温感温包开短路", fullGuide: "1.测量盘管传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "创维", code: "U2", descShort: "室外环境感温包开短路", fullGuide: "1.检测外机环境温度传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "创维", code: "U3", descShort: "室外管温感温包开短路", fullGuide: "1.检查室外盘管传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "创维", code: "U4", descShort: "室外排气感温包开短路", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "创维", code: "U5", descShort: "压缩机模块感温包开短路", fullGuide: "1.检测模块温度传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "创维", code: "U6", descShort: "液管感温包开短路", fullGuide: "1.检测液管传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "创维", code: "U7", descShort: "气管感温包开短路", fullGuide: "1.检测气管传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "创维", code: "U8", descShort: "排气感温包失效", fullGuide: "1.检测排气传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "创维", code: "b0", descShort: "制冷回油", fullGuide: "空调正常运行状态，属正常功能指示，无需维修。" },
{ brand: "创维", code: "b1", descShort: "防冷风保护", fullGuide: "1.空调制热预热阶段正常现象。2.等待3-5分钟自动恢复。3.如长时间不出风，检查内机管温传感器。" },
{ brand: "创维", code: "b2", descShort: "收氟模式", fullGuide: "收氟模式下，制冷设定16℃开机，3s内连续按超强键6次即进入。" },
{ brand: "创维", code: "CL / b3", descShort: "过滤网清洗提醒 / 自清洁功能运行中", fullGuide: "1.清洗过滤网。2.断电清洗后重新启动复位。3.如运行自清洁功能，等待20-30分钟自动完成。" },
{ brand: "创维", code: "dF", descShort: "化霜或制热回油", fullGuide: "空调正常进入化霜模式，运行灯闪烁，属正常现象，等待化霜结束。" },
{ brand: "创维", code: "LL", descShort: "试运行模式", fullGuide: "空调处于试运行状态，属正常功能指示。" },
{ brand: "创维", code: "nF", descShort: "缺氟保护屏蔽", fullGuide: "缺氟保护功能已被屏蔽，需检查系统是否正常。" },
{ brand: "创维", code: "oo", descShort: "定时化霜", fullGuide: "空调已设定定时化霜，属正常功能，代码显示3-5秒后自动清除。" },
{ brand: "创维", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.断电清洗后重新启动复位。3.按遥控器复位键消除提醒。" },
{ brand: "创维", code: "b0", descShort: "制冷回油（正常）", fullGuide: "空调正常运行状态，属正常功能指示，无需维修。" },
{ brand: "创维", code: "b1", descShort: "防冷风保护（制热启动）", fullGuide: "1.空调制热预热阶段正常现象。2.等待3-5分钟自动恢复。3.如长时间不出风，检查内机管温传感器。" },
{ brand: "创维", code: "b2", descShort: "收氟模式（维修）", fullGuide: "收氟模式下，制冷设定16℃开机，3s内连续按超强键6次即进入。" },
{ brand: "创维", code: "LL", descShort: "试运行模式", fullGuide: "空调处于试运行状态，属正常功能指示。" },
{ brand: "创维", code: "U0", descShort: "室内环境传感器开路/短路", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查主板接口电路。" },
{ brand: "创维", code: "U1", descShort: "室内盘管传感器开路/短路", fullGuide: "1.测量盘管传感器阻值。2.更换同规格传感器。3.检查线路连接。4.检查主板接口电路。" },
{ brand: "创维", code: "U2", descShort: "室外环境传感器开路/短路", fullGuide: "1.检测外机环境温度传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "创维", code: "U6", descShort: "液管温度传感器故障", fullGuide: "1.检测液管传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "创维", code: "U7", descShort: "气管温度传感器故障", fullGuide: "1.检测气管传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "创维", code: "E202", descShort: "内外机通讯异常（商用）", fullGuide: "1.检查内外机连接线。2.测量通讯电压。3.更换内机主板或外机主板。" },
{ brand: "创维", code: "E221", descShort: "外机环境传感器脱落", fullGuide: "1.检查传感器插头是否松动。2.重新插拔传感器。3.更换传感器。" },
{ brand: "创维", code: "E231", descShort: "冷凝器主传感器故障", fullGuide: "1.检查室外盘管主传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "创维", code: "E251", descShort: "压缩机排气传感器故障", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "创维", code: "d0", descShort: "压缩机相电流限频", fullGuide: "1.检查压缩机线序。2.测量压缩机三相电阻。3.检查系统压力。4.保护性降频运行，系统正常后自动恢复。" },
{ brand: "创维", code: "d1", descShort: "整机电流限频", fullGuide: "1.检测电源电压及负载电流。2.检查压缩机电容。3.保护性降频运行，系统正常后自动恢复。" },
{ brand: "创维", code: "d2", descShort: "排气高温限频", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否过多或不足。3.保护性降频运行，系统正常后自动恢复。" },
{ brand: "创维", code: "d3", descShort: "防冻结限频", fullGuide: "1.清洗过滤网。2.检查风机转速。3.保护性降频运行，系统正常后自动恢复。" },
{ brand: "创维", code: "d4", descShort: "过载限频", fullGuide: "1.检查系统压力。2.清理外机散热。3.保护性降频运行，系统正常后自动恢复。" },
{ brand: "创维", code: "d5", descShort: "IPM模块过热限频", fullGuide: "1.断电后检查模块散热片。2.检查外机散热风扇。3.保护性降频运行，系统正常后自动恢复。" },
{ brand: "康佳", code: "03", descShort: "温度传感器故障或异常", fullGuide: "1.检查温度传感器是否正确连接到控制板，确保插头牢固连接。2.用柔软布擦拭传感器表面，确保清洁。3.测量传感器阻值(25℃约5-10K)，异常则更换。4.如仍无效，联系专业技术人员检修。[citation:2]" },
{ brand: "康佳", code: "06", descShort: "室内外机通讯故障", fullGuide: "1.检查内外机连接线是否松动或断路。2.测量通讯电压是否有2-24V波动。3.检查连接线驳接点是否漏电。4.更换内外机连接线或主板。[citation:10]" },
{ brand: "康佳", code: "EE", descShort: "室内机EEPROM故障", fullGuide: "1.断电重启尝试恢复。2.更换室内主板。3.重新烧录EEPROM数据。[citation:1]" },
{ brand: "康佳", code: "E0", descShort: "室内开门保护", fullGuide: "1.检查面板门是否关好。2.检查门开关是否正常。3.检查开门保护传感器。4.更换门开关。[citation:3]" },
{ brand: "康佳", code: "E1", descShort: "室内风机转速信号检测异常", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈信号。3.检查风叶是否卡滞。4.更换室内电机。[citation:1]" },
{ brand: "康佳", code: "E2", descShort: "室内主板过零信号检测异常", fullGuide: "1.检查电源波形是否畸变。2.更换内机主板。3.检测过零电路光耦。[citation:1]" },
{ brand: "康佳", code: "E3", descShort: "室内盘管温度传感器故障", fullGuide: "1.测量盘管传感器阻值(25℃约5-10K)。2.更换同规格传感器。3.检查线路连接。4.检查主板接口电路。[citation:1]" },
{ brand: "康佳", code: "E4", descShort: "室内环境温度传感器故障/缺氟", fullGuide: "1.拔掉传感器插头测量阻值，异常则更换。2.检漏并补充制冷剂。3.检查截止阀是否全开。4.检测系统压力。[citation:1]" },
{ brand: "康佳", code: "E5", descShort: "显示板通信故障", fullGuide: "1.检查显示板连接线是否断路。2.检查插头接头是否良好。3.更换显示板。4.更换内机主板。[citation:1]" },
{ brand: "康佳", code: "E6", descShort: "室内外机通信故障", fullGuide: "1.检查内外机连接线是否松动或断路。2.测量通讯电压波动(正常2-24V)。3.用万用表检查通讯电路。4.更换内机主板或外机主板。[citation:1][citation:4]" },
{ brand: "康佳", code: "E7", descShort: "室外主控芯片与驱动芯片通讯故障", fullGuide: "1.检查外机主板供电。2.检查主板与驱动板通讯排线。3.更换外机主板或驱动板。[citation:1]" },
{ brand: "康佳", code: "E9", descShort: "PM2.5传感器故障", fullGuide: "1.检查PM2.5传感器连接。2.清洁传感器。3.更换传感器模块。[citation:3]" },
{ brand: "康佳", code: "EA", descShort: "压缩机低压过流保护故障", fullGuide: "1.检测压缩机电流。2.检查系统压力是否过低。3.检漏补氟。4.检查压缩机电容。" },
{ brand: "康佳", code: "Eb", descShort: "过欠压保护", fullGuide: "1.测量电源电压是否正常(187-242V)。2.检查电源线路。3.加装稳压器。" },
{ brand: "康佳", code: "EH", descShort: "升降门故障", fullGuide: "1.检查升降门电机是否卡滞。2.检查门体传感器。3.测量电机供电。4.更换升降门电机。[citation:3]" },
{ brand: "康佳", code: "FL", descShort: "显示板与主板通讯故障", fullGuide: "1.检查显示板连接线。2.检查插头是否松动。3.更换显示板。4.更换主板。" },
{ brand: "康佳", code: "F0", descShort: "PG电机过零故障", fullGuide: "1.检查风机电容。2.检测风机霍尔反馈。3.检查过零检测电路。4.更换电机或主板。[citation:3]" },
{ brand: "康佳", code: "F1", descShort: "室内外通信故障", fullGuide: "1.检查内外机连接线是否松动。2.测量通讯电压。3.更换内机主板或外机主板。[citation:3]" },
{ brand: "康佳", code: "F2", descShort: "室内环境温度传感器故障", fullGuide: "1.拔掉传感器插头测量阻值。2.阻值异常则更换传感器。3.检查主板接口电路。[citation:3]" },
{ brand: "康佳", code: "F3", descShort: "室内盘管温度传感器故障", fullGuide: "1.测量盘管传感器阻值。2.更换同规格传感器。3.检查线路连接。[citation:3]" },
{ brand: "康佳", code: "F4", descShort: "室内风机故障", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈。3.更换室内电机。[citation:3]" },
{ brand: "康佳", code: "F5", descShort: "室外模块故障", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。[citation:3]" },
{ brand: "康佳", code: "F6", descShort: "室外环境温度传感器故障", fullGuide: "1.检测外机环境温度传感器阻值。2.更换传感器。3.检查主板接口。[citation:3]" },
{ brand: "康佳", code: "F7", descShort: "室外盘管温度传感器故障", fullGuide: "1.检查室外盘管传感器阻值。2.更换传感器。3.检查外机主板。[citation:1][citation:3]" },
{ brand: "康佳", code: "F8", descShort: "压缩机吸气温度传感器故障", fullGuide: "1.检测吸气传感器阻值。2.更换传感器。3.检查线路连接。[citation:3]" },
{ brand: "康佳", code: "F9", descShort: "压缩机排气温度传感器故障", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。[citation:3]" },
{ brand: "康佳", code: "FA", descShort: "电流、电压互感器故障", fullGuide: "1.检查CT线圈是否松脱。2.测量互感器输出电压。3.更换主板。[citation:3]" },
{ brand: "康佳", code: "Fb", descShort: "室内机EEPROM故障", fullGuide: "1.断电重启。2.更换室内主板。3.重新烧录EEPROM数据。[citation:3]" },
{ brand: "康佳", code: "FC", descShort: "压缩机驱动异常故障", fullGuide: "1.检查压缩机线序。2.测量压缩机三相电阻。3.更换变频模块。[citation:3]" },
{ brand: "康佳", code: "Fd", descShort: "电源相序错或缺相故障", fullGuide: "1.检查电源相序是否正确。2.调整相序。3.检查电源是否缺相。4.更换主板。[citation:3]" },
{ brand: "康佳", code: "FE", descShort: "回气传感器异常", fullGuide: "1.检测回气传感器阻值。2.更换传感器。3.检查线路连接。[citation:3]" },
{ brand: "康佳", code: "FF", descShort: "缺氟或者其它故障", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查系统是否堵塞。[citation:3]" },
{ brand: "康佳", code: "FH", descShort: "室外直流风机故障", fullGuide: "1.检查直流风机插头是否松动。2.测量风机绕组及霍尔反馈。3.更换室外直流电机。[citation:3]" },
{ brand: "康佳", code: "FP", descShort: "室外机EEPROM故障", fullGuide: "1.断电重启。2.更换室外主板。3.重新烧录EEPROM数据。[citation:3]" },
{ brand: "康佳", code: "P1", descShort: "蒸发器温度保护", fullGuide: "1.清洗过滤网。2.检查风机转速。3.检测盘管传感器。4.检查制冷剂。[citation:3]" },
{ brand: "康佳", code: "P2", descShort: "变频模块过热、过流保护", fullGuide: "1.断电后检查模块散热片。2.检查外机散热风扇。3.更换IPM模块或变频板。[citation:3]" },
{ brand: "康佳", code: "P3", descShort: "交流输入电流过大保护", fullGuide: "1.检测电源电压及负载电流。2.检查压缩机电容。3.更换压缩机。[citation:3]" },
{ brand: "康佳", code: "P4", descShort: "压缩机排气温度保护", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否过多或不足。3.清理外机散热。[citation:3]" },
{ brand: "康佳", code: "P5", descShort: "压缩机壳顶过热保护", fullGuide: "1.检测壳顶温度传感器。2.检查制冷剂。3.改善外机散热。4.更换压缩机。[citation:3]" },
{ brand: "康佳", code: "P6", descShort: "压缩机吸气温度保护", fullGuide: "1.检测吸气传感器。2.检查制冷剂。3.检查系统是否堵塞。[citation:3]" },
{ brand: "康佳", code: "P7", descShort: "电源过、欠压保护", fullGuide: "1.测量电源电压是否正常(187-242V)。2.加装稳压器。3.更换主板。[citation:3]" },
{ brand: "康佳", code: "P8", descShort: "回气低压保护", fullGuide: "1.检漏补氟。2.检查截止阀。3.检测系统压力。[citation:3]" },
{ brand: "康佳", code: "P9", descShort: "排气高压保护", fullGuide: "1.清洗冷凝器。2.检查制冷剂是否过多。3.查高压开关。[citation:3]" },
{ brand: "康佳", code: "PA", descShort: "冷凝盘管高温保护", fullGuide: "1.清洗冷凝器翅片。2.检查外机散热风扇。3.清理散热器。[citation:3]" },
{ brand: "康佳", code: "PC", descShort: "室外环境温度超温保护", fullGuide: "1.检查外机散热环境。2.清理冷凝器翅片。3.改善安装位置。[citation:3]" },
{ brand: "康佳", code: "PF", descShort: "PFC过流保护代码", fullGuide: "1.检查PFC电路IGBT及二极管。2.测量PFC输出电压。3.更换外机主板。[citation:3]" },
{ brand: "康佳", code: "PH", descShort: "缺氟或换向阀故障", fullGuide: "1.检漏并补充制冷剂。2.测试四通阀线圈阻值。3.检查四通阀是否卡死。4.更换四通阀。[citation:3]" },
{ brand: "康佳", code: "dF", descShort: "化霜状态", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。[citation:3]" },
{ brand: "康佳", code: "df", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "康佳", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.断电清洗后重新启动复位。3.按遥控器复位键消除提醒。" },
{ brand: "康佳", code: "OP", descShort: "运行待机模式", fullGuide: "空调处于待机模式，属正常状态，按遥控器开机键即可启动。" },
{ brand: "康佳", code: "P4", descShort: "电源电压过高/过低保护", fullGuide: "1.测量电源电压(正常187~242V)。2.加装稳压器。3.检查电源线路。" },
{ brand: "康佳", code: "P5", descShort: "IPM模块过热保护", fullGuide: "1.检查外机散热风扇。2.清理冷凝器翅片。3.更换导热硅脂。4.更换IPM模块。" },
{ brand: "康佳", code: "P7", descShort: "制冷内盘防冻结保护", fullGuide: "1.清洗过滤网。2.检查风机转速。3.检测盘管传感器。4.检查制冷剂。" },
{ brand: "康佳", code: "P8", descShort: "制热外盘过热保护", fullGuide: "1.清洗过滤网。2.检查内机风机转速。3.检测外盘管传感器。4.检查电加热。" },
{ brand: "康佳", code: "P9", descShort: "变频驱动保护", fullGuide: "1.检查压缩机线序。2.测量压缩机三相电阻。3.更换变频模块。" },
{ brand: "康佳", code: "F1", descShort: "压缩机启动异常（缺相/反转）", fullGuide: "1.检查压缩机线序是否正确。2.测量压缩机三相绕组阻值。3.检查电源相序。4.更换压缩机或变频板。" },
{ brand: "康佳", code: "F2", descShort: "压缩机失步故障", fullGuide: "1.检查压缩机线是否松脱。2.测量压缩机绕组阻值。3.更换变频模块或压缩机。" },
{ brand: "康佳", code: "F3", descShort: "IPM模块故障", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。" },
{ brand: "康佳", code: "F9", descShort: "室外直流风机故障", fullGuide: "1.检查直流风机插头是否松动。2.测量风机绕组及霍尔反馈。3.更换室外直流电机。" },
{ brand: "康佳", code: "L3", descShort: "商用机内外机通讯故障", fullGuide: "1.检查内外机连接线。2.测量通讯电压波动。3.更换内机主板或外机主板。" },
{ brand: "康佳", code: "L7", descShort: "商用机线控器通讯故障", fullGuide: "1.检查线控器连接线。2.更换线控器。3.更换内机主板。" },
{ brand: "康佳", code: "L9", descShort: "商用机排水故障/水满保护", fullGuide: "1.清理排水管路。2.检查排水泵。3.检查浮子开关。4.清理接水盘。" },
{ brand: "康佳", code: "E202", descShort: "商用外机通讯异常", fullGuide: "1.检查外机之间通讯线。2.检查外机主板供电。3.更换故障主板。" },
{ brand: "康佳", code: "E251", descShort: "商用压缩机排气传感器故障", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "东芝", code: "E01", descShort: "遥控器与室内机通信错误", fullGuide: "1.检查遥控器与内机A/B连接线。2.检查接头触点是否断开或接触不良。3.检查内机电源。4.检查室内P.C板是否故障。5.检查遥控器主副设置是否正确。" },
{ brand: "东芝", code: "E02", descShort: "遥控器发送错误", fullGuide: "1.检查遥控器通讯连线。2.更换遥控器。3.检查遥控器电池电量。" },
{ brand: "东芝", code: "E03", descShort: "室内机与遥控器间通讯错误", fullGuide: "1.检查遥控器和通信适配器的接线。2.检查适配器是否故障。3.更换适配器或室内机主板。" },
{ brand: "东芝", code: "E04", descShort: "室内外机通讯回路错误", fullGuide: "1.检查内外机电源打开次序（应先送外机电源，再送内机）。2.检查室内机地址设置。3.检查室内和室外机间连线。4.检查室外机终端电阻SW30-2设置。" },
{ brand: "东芝", code: "E06", descShort: "室内机数量减少/通讯异常", fullGuide: "1.检查室内机电源是否正常。2.检查室内和室外机间连线。3.检查内外P.C板的通信连接接头是否松动。" },
{ brand: "东芝", code: "E07", descShort: "内外机通讯回路中断", fullGuide: "1.检查室外机终端电阻SW30-2设置。2.检查室内和室外机间连线是否断路。3.检查室外机P.C板是否故障。" },
{ brand: "东芝", code: "E08", descShort: "室内机地址重复", fullGuide: "1.检查多台室内机地址是否重复。2.重新设置室内机地址。3.检查地址设定后遥控器连接变化。" },
{ brand: "东芝", code: "E09", descShort: "主遥控器重复", fullGuide: "1.检查两个遥控器的主副设置。2.确保只有一个主遥控器。3.更换遥控器P.C板。" },
{ brand: "东芝", code: "E10", descShort: "室内P.C板组件间通讯错误", fullGuide: "1.检查电源线路是否故障。2.更换室内P.C板。3.检查通讯连接接头。" },
{ brand: "东芝", code: "E12", descShort: "自动地址启动错误", fullGuide: "1.确保自动地址启动时无其他制冷回路系统设定。2.断开与其他系统通讯连接后重新设定地址。3.检查系统组网是否正确。" },
{ brand: "东芝", code: "E15", descShort: "自动地址期间室内机无响应", fullGuide: "1.检查室内和室外间的通讯线路连接。2.检查室内电源线路。3.检查周围装置是否产生噪音干扰。4.更换室内P.C板。" },
{ brand: "东芝", code: "E16", descShort: "连接的室内机组数量/容量超出", fullGuide: "1.检查室内机总容量是否超出室外机容量的135%。2.检查连接的室内机数量是否超过48台。3.检查室外机P.C板。4.调整室内机配置。" },
{ brand: "东芝", code: "E18", descShort: "主室内机与从属机通讯错误", fullGuide: "1.检查遥控器连接线。2.检查室内机电源。3.检查室内机P.C板是否故障。" },
{ brand: "东芝", code: "E19", descShort: "室外主机数量错误", fullGuide: "1.检查一个系统是否有多个室外机主机。2.确保只有一个主机。3.检查内外机连接线。" },
{ brand: "东芝", code: "E20", descShort: "自动地址期间连接其他系统机组", fullGuide: "1.检查是否连接了其他系统的机组。2.断开其他系统电缆后重新设定地址。" },
{ brand: "东芝", code: "E23", descShort: "外机间通讯发送错误", fullGuide: "1.检查室外机组电源。2.检查室外机组间的通讯线路。3.检查外机PC板通讯连接。4.检查室外机间通讯终端电阻设定。" },
{ brand: "东芝", code: "E25", descShort: "副外机地址重复", fullGuide: "1.检查手动设定的室外机地址是否重复。2.重新设置副外机地址。" },
{ brand: "东芝", code: "E26", descShort: "连接的外机数量减少/通讯异常", fullGuide: "1.检查室外机电源。2.检查内外机传送线。3.检查室外PC板通讯接头连接。" },
{ brand: "东芝", code: "E28", descShort: "副外机错误", fullGuide: "1.检查副外机的检查代码。2.按SW04键5秒以上可让不正常停止的外机风扇运转测试。3.检查副外机主板。" },
{ brand: "东芝", code: "E31", descShort: "IPDU通讯错误", fullGuide: "1.检查通讯接头连接和IPDU与I/F板之间的断开。2.检查室外PC板(1/F、IPDU、风扇IPDU)是否故障。3.更换IPDU-PC板。" },
{ brand: "东芝", code: "E0", descShort: "冷媒泄漏", fullGuide: "1.检漏并补充制冷剂。2.检查管路是否有破损。3.检测系统压力。4.检查截止阀是否全开。" },
{ brand: "东芝", code: "E1", descShort: "系统高压保护", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.查高压开关。4.检查外机散热环境。" },
{ brand: "东芝", code: "E2", descShort: "内侧防冻结保护", fullGuide: "1.清洗过滤网。2.检查风机转速。3.检测盘管传感器。4.检查制冷剂是否不足。" },
{ brand: "东芝", code: "E3", descShort: "系统低压保护", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查低压开关。" },
{ brand: "东芝", code: "E4", descShort: "压缩机排气保护", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否过多或不足。3.清理外机散热。" },
{ brand: "东芝", code: "E5", descShort: "低电压过流保护", fullGuide: "1.测量电源电压是否正常(187-242V)。2.检测压缩机电流。3.加装稳压器。" },
{ brand: "东芝", code: "E6", descShort: "通讯故障", fullGuide: "1.检查内外机连接线是否松动。2.测量通讯电压。3.更换内机主板或外机主板。" },
{ brand: "东芝", code: "E7", descShort: "室外风机速度失控", fullGuide: "1.检查室外风机线、反馈线是否脱落或损坏。2.如风机不转，更换风机马达。3.如风机能转但报故障，更换室外基板。" },
{ brand: "东芝", code: "E8", descShort: "防高温保护", fullGuide: "1.清洗过滤网。2.检查内机风机转速。3.检测盘管传感器。" },
{ brand: "东芝", code: "E9", descShort: "防冷风保护", fullGuide: "1.空调制热预热阶段正常现象。2.等待3-5分钟自动恢复。3.如长时间不出风，检查内机管温传感器。" },
{ brand: "东芝", code: "F01", descShort: "室内TCJ传感器错误", fullGuide: "1.检查TCJ传感器接头连接是否松动。2.检查传感器电阻特性(25℃约5-10K)。3.更换传感器。4.检查室内PC板。" },
{ brand: "东芝", code: "F02", descShort: "室内TC2传感器错误", fullGuide: "1.检查TC2传感器接头连接。2.检查传感器电阻特性。3.更换传感器。4.检查室内PC板。" },
{ brand: "东芝", code: "F03", descShort: "室内TC1传感器错误", fullGuide: "1.检查TC1传感器接头连接。2.检查传感器电阻特性。3.更换传感器。4.检查室内PC板。" },
{ brand: "东芝", code: "F04", descShort: "TD1传感器错误", fullGuide: "1.检查TD1传感器接头连接。2.检查传感器电阻特性。3.更换传感器。4.检查室内PC板(1/F)。" },
{ brand: "东芝", code: "F05", descShort: "TD2传感器错误", fullGuide: "1.检查TD2传感器接头连接。2.检查传感器电阻特性。3.更换传感器。4.检查室内PC板(1/F)。" },
{ brand: "东芝", code: "F06", descShort: "TE1传感器错误", fullGuide: "1.检查TE1传感器接头连接。2.检查传感器电阻特性。3.更换传感器。4.检查室内PC板(1/F)。" },
{ brand: "东芝", code: "F07", descShort: "TL传感器错误", fullGuide: "1.检查TL传感器接头连接。2.检查传感器电阻特性。3.更换传感器。4.检查室内PC板(1/F)。" },
{ brand: "东芝", code: "F08", descShort: "TO传感器错误", fullGuide: "1.检查TO传感器接头连接。2.检查传感器电阻特性。3.更换传感器。4.检查室内PC板(1/F)。" },
{ brand: "东芝", code: "F10", descShort: "室内TA传感器错误", fullGuide: "1.检查TA传感器接头连接。2.检查传感器电阻特性。3.更换传感器。4.检查室内PC板。" },
{ brand: "东芝", code: "F12", descShort: "TS1传感器错误", fullGuide: "1.检查TS1传感器接头连接。2.检查传感器电阻特性。3.更换传感器。4.检查室内PC板(1/F)。" },
{ brand: "东芝", code: "F13", descShort: "IPDU TH传感器错误", fullGuide: "1.检查IGBT内置式温度传感器。2.更换IPDU-PC板。3.检查传感器线路连接。" },
{ brand: "东芝", code: "F15", descShort: "室外温度传感器电线接错", fullGuide: "1.检查TE1传感器和TL传感器的安装位置。2.检查传感器电阻特征。3.检查室内PC板(1/F)。" },
{ brand: "东芝", code: "F16", descShort: "室外压力传感器电缆接错", fullGuide: "1.检查高压Pd传感器和低压Ps传感器接头连接。2.检查压力传感器是否故障。3.更换室外PC板。4.检查压缩机。" },
{ brand: "东芝", code: "F23", descShort: "Ps传感器错误", fullGuide: "1.检查Ps传感器和Pd传感器接头连接是否正确。2.检查低压Ps传感器连接。3.更换压力传感器。4.检查四通阀和SV4回路。" },
{ brand: "东芝", code: "F24", descShort: "Pd传感器错误", fullGuide: "1.检查Pd传感器接头连接。2.更换Pd传感器。3.检查室外PC板(1/F)。" },
{ brand: "东芝", code: "F29", descShort: "室内其他错误", fullGuide: "1.检查室内P.C板是否正常运行。2.更换室内P.C板。3.检查电源供电。" },
{ brand: "东芝", code: "F31", descShort: "室外EEPROM错误", fullGuide: "1.检查电源电压是否稳定。2.检查电源噪音。3.更换室外P.C板。" },
{ brand: "东芝", code: "H01", descShort: "变频器过电流保护", fullGuide: "1.检查电源电压。2.检查压缩机是否故障。3.检查不正常过载运行原因。4.更换室外P.C板(IPDU)。" },
{ brand: "东芝", code: "H02", descShort: "压缩机锁死/启动失败", fullGuide: "1.检查压缩机是否故障。2.检查电源电压是否为380V±10%。3.检查压缩机电缆和缺相。4.更换室外PC板(IPDU)。" },
{ brand: "东芝", code: "H03", descShort: "电流检测回路系统错误", fullGuide: "1.检查电流检测回路系统的电缆连接。2.更换室外PC板(IPDU)。3.检查电流检测电路。" },
{ brand: "东芝", code: "H04", descShort: "压缩机外壳恒温器动作", fullGuide: "1.检查压缩机外壳恒温器回路。2.检查维修阀全开度。3.检查外机PMV堵塞。4.检查制冷剂是否缺少。" },
{ brand: "东芝", code: "H06", descShort: "低压保护", fullGuide: "1.检查维修阀全开度。2.检查外机PMV堵塞情况。3.检查低压PS传感器。4.检漏补氟。" },
{ brand: "东芝", code: "P13", descShort: "变频IPM模块故障/保护", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。4.检查压缩机是否对地短路。" },
{ brand: "东芝", code: "00", descShort: "正常运行", fullGuide: "空调运行正常，无需维修。" },
{ brand: "东芝", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "东芝", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.断电清洗后重新启动复位。3.按遥控器复位键消除提醒。" },
{ brand: "东芝", code: "E21", descShort: "排水泵故障/浮子开关动作（天花/风管机）", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。5.更换排水泵。" },
{ brand: "东芝", code: "P05", descShort: "变频模块IPM过热保护", fullGuide: "1.断电后检查模块散热片。2.检查外机散热风扇。3.更换导热硅脂。4.更换IPM模块或变频板。" },
{ brand: "东芝", code: "P07", descShort: "外机主板散热器过热", fullGuide: "1.检查外机散热环境。2.清理散热器灰尘。3.检查散热风扇是否运转。4.更换外机主板。" },
{ brand: "东芝", code: "P10", descShort: "内机浮子开关动作（水满）", fullGuide: "1.清理排水管路。2.检查浮子开关是否卡住。3.清理接水盘。4.检查排水泵是否工作。" },
{ brand: "东芝", code: "P12", descShort: "内机风机无反馈/电机故障", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈信号。3.检查风叶是否卡滞。4.更换室内电机。" },
{ brand: "东芝", code: "P19", descShort: "四通阀换向异常", fullGuide: "1.测试四通阀线圈阻值(约2KΩ)。2.检查四通阀是否卡死。3.更换四通阀。4.检查制冷剂压力。" },
{ brand: "东芝", code: "P22", descShort: "外机风机/IPDU风机故障", fullGuide: "1.检查直流风机插头是否松动。2.测量风机绕组及霍尔反馈。3.检查IPDU风机驱动。4.更换室外风机电机。" },
{ brand: "东芝", code: "L29", descShort: "外机IPDU驱动模块异常", fullGuide: "1.断电后检查IPDU模块。2.测量压缩机三相绕组。3.更换IPDU模块。4.检查通讯线路连接。" },
{ brand: "东芝", code: "L31", descShort: "外机主控板故障", fullGuide: "1.检查外机主板供电。2.检查通讯线路。3.更换外机主板。" },
{ brand: "东芝", code: "H01", descShort: "压缩机启动失败/缺相", fullGuide: "1.检查压缩机线序是否正确。2.测量压缩机三相绕组阻值。3.检查电源相序。4.更换压缩机或变频板。" },
{ brand: "东芝", code: "H02", descShort: "压缩机失步（变频）", fullGuide: "1.检查压缩机线是否松脱。2.测量压缩机绕组阻值。3.更换变频模块或压缩机。" },
{ brand: "东芝", code: "A01", descShort: "外机高压传感器Pd异常", fullGuide: "1.检查高压压力传感器接头连接。2.更换Pd传感器。3.检查室外PC板(1/F)。" },
{ brand: "东芝", code: "A02", descShort: "外机低压传感器Ps异常", fullGuide: "1.检查低压压力传感器接头连接。2.更换Ps传感器。3.检查室外PC板(1/F)。" },
{ brand: "先科", code: "E0", descShort: "水位传感器故障 / 室外机过流保护", fullGuide: "1.检查水位传感器线路是否开路或短路。2.检查室外机是否过流。3.修复线路或更换传感器。4.检查排水系统是否堵塞。" },
{ brand: "先科", code: "E1", descShort: "室内环境温度传感器故障 / 三相电源故障", fullGuide: "1.检查传感器插脚是否松脱或接触不良。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查控制电路板。4.检查三相电源是否正常。" },
{ brand: "先科", code: "E2", descShort: "蒸发器防冻结保护 / 温度保险丝断", fullGuide: "1.清洗过滤网增加风量。2.检查风机转速。3.检测盘管传感器。4.检查温度保险丝是否熔断，如断则更换。" },
{ brand: "先科", code: "E3", descShort: "压缩机低压保护 / 过载欠载保护", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查空调内部电机是否过载或欠载。" },
{ brand: "先科", code: "E4", descShort: "压缩机排气温度过高保护", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否过多或不足。3.清理外机散热。4.检查系统是否堵塞。" },
{ brand: "先科", code: "E5", descShort: "过电流保护 / 低电压保护", fullGuide: "1.测量电源电压是否正常(187-242V)。2.检测压缩机电流。3.加装稳压器。4.检查压缩机电容。" },
{ brand: "先科", code: "E6", descShort: "静电除尘故障 / 通信异常", fullGuide: "1.检查静电除尘器是否工作正常。2.检查信号线是否正常连接。3.检查信号转换器。4.更换通信线路。" },
{ brand: "先科", code: "F0", descShort: "室温传感器故障 / 制冷剂泄漏", fullGuide: "1.打开面板重新插好传感器。2.测量传感器阻值，异常则更换。3.检漏并补充制冷剂。4.检查系统压力。" },
{ brand: "先科", code: "E8", descShort: "压缩机过载保护启动", fullGuide: "1.检查压缩机散热是否不良。2.检测电源电压是否稳定。3.检查系统内部压力是否异常。4.更换压缩机。" },
{ brand: "先科", code: "F8", descShort: "内外机通信故障", fullGuide: "1.检查室内机与室外机信号线是否中断。2.检查线路接头是否松动。3.检查线路是否老化。4.更换通信线路。" },
{ brand: "先科", code: "P8", descShort: "电源电压异常保护", fullGuide: "1.检查输入电压是否超出设备承受范围。2.测量电源电压，常见于用电高峰期。3.加装稳压器。4.检查电源线路。" },
{ brand: "先科", code: "H8", descShort: "传感器失灵 / 冷媒泄漏", fullGuide: "1.检测各传感器阻值是否正常。2.检查冷媒系统是否泄漏。3.更换故障传感器。4.检漏补氟。" },
{ brand: "先科", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "先科", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.断电清洗后重新启动复位。3.按遥控器复位键消除提醒。" },
{ brand: "先科", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "先科", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.断电清洗后重新启动复位。3.按遥控器复位键消除提醒。" },
{ brand: "先科", code: "OP", descShort: "待机模式", fullGuide: "空调处于待机模式，属正常状态，按遥控器开机键即可启动。" },
{ brand: "先科", code: "E7", descShort: "电源过欠压保护", fullGuide: "1.测量电源电压是否正常(187-242V)。2.检查电源线路。3.加装稳压器。" },
{ brand: "先科", code: "E8", descShort: "室内风机失速/无反馈", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈信号。3.检查风叶是否卡滞。4.更换室内电机。" },
{ brand: "先科", code: "E9", descShort: "排水故障/水满保护（天花机）", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。5.更换排水泵。" },
{ brand: "先科", code: "E0", descShort: "室外机EEPROM故障", fullGuide: "1.断电重启。2.更换室外主板。3.重新烧录EEPROM数据。" },
{ brand: "先科", code: "P0", descShort: "变频IPM模块保护", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。4.涂抹导热硅脂。" },
{ brand: "先科", code: "P1", descShort: "整机过流保护", fullGuide: "1.检测电源电压及负载电流。2.检查压缩机电容。3.更换压缩机或电容。" },
{ brand: "先科", code: "P2", descShort: "压缩机过载保护", fullGuide: "1.检测压缩机电容容量。2.测量系统压力是否过高。3.更换压缩机。" },
{ brand: "先科", code: "P3", descShort: "室外环境温度过低保护", fullGuide: "1.检查室外环境温度是否低于设定值。2.检查室外环境温度传感器。3.更换传感器。" },
{ brand: "先科", code: "P4", descShort: "室内蒸发器高温/低温保护", fullGuide: "1.清洗过滤网。2.检查风机转速。3.检测盘管传感器。4.检查制冷剂。" },
{ brand: "先科", code: "P5", descShort: "室外冷凝器高温保护", fullGuide: "1.清洗冷凝器翅片。2.检查外机散热风扇。3.清理散热器。4.检查制冷剂。" },
{ brand: "先科", code: "P7", descShort: "压缩机排气高温保护", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否过多或不足。3.清理外机散热。" },
{ brand: "先科", code: "P8", descShort: "压缩机顶部温度保护", fullGuide: "1.检测壳顶温度传感器。2.检查制冷剂。3.改善外机散热。4.更换压缩机。" },
{ brand: "先科", code: "P9", descShort: "化霜/防冷风保护", fullGuide: "1.空调制热预热阶段正常现象。2.等待3-5分钟自动恢复。3.如长时间不出风，检查内机管温传感器。" },
{ brand: "先科", code: "F3", descShort: "室外盘管温度传感器故障", fullGuide: "1.检查室外盘管传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "先科", code: "F4", descShort: "室外环境温度传感器故障", fullGuide: "1.检测外机环境温度传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "先科", code: "F5", descShort: "压缩机排气温度传感器故障", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "先科", code: "F6", descShort: "室外直流风机故障", fullGuide: "1.检查直流风机插头是否松动。2.测量风机绕组及霍尔反馈。3.更换室外直流电机。" },
{ brand: "先科", code: "L1", descShort: "商用外机通讯故障", fullGuide: "1.检查外机之间通讯线。2.检查外机主板供电。3.更换故障主板。" },
{ brand: "先科", code: "L3", descShort: "商用线控器通讯故障", fullGuide: "1.检查线控器连接线。2.更换线控器。3.更换内机主板。" },
{ brand: "先科", code: "L7", descShort: "商用地址码错误", fullGuide: "1.检查室内机地址设置。2.重新设置唯一地址。3.检查地址码是否重复。" },
{ brand: "先科", code: "H1", descShort: "压缩机启动失败/缺相", fullGuide: "1.检查压缩机线序是否正确。2.测量压缩机三相绕组阻值。3.检查电源相序。4.更换压缩机或变频板。" },
{ brand: "先科", code: "H2", descShort: "压缩机失步（变频）", fullGuide: "1.检查压缩机线是否松脱。2.测量压缩机绕组阻值。3.更换变频模块或压缩机。" },
{ brand: "先科", code: "H3", descShort: "四通阀换向异常", fullGuide: "1.测试四通阀线圈阻值(约2KΩ)。2.检查四通阀是否卡死。3.更换四通阀。" },
{ brand: "美菱", code: "E0", descShort: "室内外机通信故障", fullGuide: "1.检查室内机和室外机之间的通信线路是否连接良好，确保线路没有断开、短路或接触不良。2.检查室内机或室外机的控制板是否故障。3.关闭空调电源，等待几分钟后再重新启动。4.如问题仍存在，联系专业维修人员检修。" },
{ brand: "美菱", code: "E1", descShort: "线路短路 / 模块温度过高保护", fullGuide: "1.检查空调内部线路是否有短路现象。2.检查变频模块温度是否过高。3.检查外机散热是否良好。4.清理冷凝器翅片。5.如模块损坏则更换。" },
{ brand: "美菱", code: "E2", descShort: "室内盘管传感器故障 / 线路接触不良", fullGuide: "1.检查室内盘管传感器插头是否松动或接触不良。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查传感器线路是否短路或断路。4.检查主板接口电路。" },
{ brand: "美菱", code: "E7", descShort: "室外控制板与模块通讯故障 / 室内外通讯失败", fullGuide: "1.检查室内外电源接线方式是否相同（火线零线必须在相应位置）。2.检查内外机信号连接线是否一一对应，不能错误连接。3.检查电压是否正常，相序是否正确。4.检查室外控制板是否故障。5.检查室内吸热敏电阻是否不良。" },
{ brand: "美菱", code: "E9", descShort: "制热时蒸发器温度过高保护 / 风量过小保护", fullGuide: "1.检查过滤网是否脏堵，清洗滤网。2.检查室内风机转速是否过低。3.检测蒸发器温度传感器。4.检查风道是否堵塞。5.检查电加热是否异常。" },
{ brand: "美菱", code: "E24", descShort: "压缩机未启动 / 漏气 / 电流过小", fullGuide: "1.检查压缩机是否启动，有无异响。2.检测系统是否漏气，检漏补氟。3.测量压缩机电流是否过小。4.检查电路板是否损坏需要更换。5.检查压缩机电容。" },
{ brand: "美菱", code: "Ec", descShort: "制冷时室外传感器温度过高保护", fullGuide: "1.检查室外盘管传感器是否正常。2.清理冷凝器翅片，确保散热良好。3.检查外机散热风扇是否运转。4.检测传感器阻值，异常则更换。" },
{ brand: "美菱", code: "F4", descShort: "制热时室内盘管温度超高保护", fullGuide: "1.清洗过滤网增加风量。2.检查内机风机转速是否正常。3.检测室内盘管传感器阻值。4.检查电加热是否异常。5.如温度超过72度则触发保护。" },
{ brand: "美菱", code: "F6", descShort: "室外环境传感器故障", fullGuide: "1.检测室外环境温度传感器阻值。2.检查传感器插头是否松动。3.更换传感器。4.检查主板接口电路。" },
{ brand: "美菱", code: "P1", descShort: "电压过高或过低保护", fullGuide: "1.测量电源电压是否正常(187-242V)。2.当直流母线电压高于389V或低于113V时报故障。3.当交流电压低于140V且持续10s时报故障。4.加装稳压器。5.检查室外电控是否故障。" },
{ brand: "美菱", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "美菱", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.断电清洗后重新启动复位。3.按遥控器复位键消除提醒。" },
{ brand: "美菱", code: "OP", descShort: "待机模式", fullGuide: "空调处于待机模式，属正常状态，按遥控器开机键即可启动。" },
{ brand: "美菱", code: "E6", descShort: "室内外机通讯故障", fullGuide: "1.检查室内机和室外机之间的通信线路是否连接良好。2.检查控制板是否故障。3.关闭电源重启。4.联系专业维修人员检修。" },
{ brand: "美菱", code: "E7", descShort: "电源逆/缺相保护（三相）", fullGuide: "1.检查电源相序是否正确。2.检查电源是否缺相。3.调整相序。4.检查电源线路。" },
{ brand: "美菱", code: "E8", descShort: "室内风机失速/无反馈", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈信号。3.检查风叶是否卡滞。4.更换室内电机。" },
{ brand: "美菱", code: "E9", descShort: "水满保护（天花机/柜机）", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.清理接水盘。5.更换排水泵。" },
{ brand: "美菱", code: "F2", descShort: "室内盘管温度传感器故障", fullGuide: "1.检查室内盘管传感器插头是否松动或接触不良。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查主板接口电路。" },
{ brand: "美菱", code: "F3", descShort: "室外盘管温度传感器故障", fullGuide: "1.检查室外盘管传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "美菱", code: "F5", descShort: "压缩机排气温度传感器故障", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "美菱", code: "F7", descShort: "内外机通信中断（变频常见）", fullGuide: "1.检查内外机连接线。2.检查室内外电源接线方式是否相同。3.更换内机主板或外机主板。" },
{ brand: "美菱", code: "P0", descShort: "变频IPM模块保护", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。4.涂抹导热硅脂。" },
{ brand: "美菱", code: "P1", descShort: "整机过流保护", fullGuide: "1.检测电源电压及负载电流。2.检查压缩机电容。3.更换压缩机或电容。" },
{ brand: "美菱", code: "P2", descShort: "压缩机过载保护", fullGuide: "1.检测压缩机电容容量。2.测量系统压力是否过高。3.更换压缩机。" },
{ brand: "美菱", code: "P5", descShort: "室外冷凝器高温保护", fullGuide: "1.清洗冷凝器翅片。2.检查外机散热风扇。3.清理散热器。4.检查制冷剂。" },
{ brand: "美菱", code: "EE", descShort: "室内机EEPROM故障", fullGuide: "1.断电重启。2.更换室内主板。3.重新烧录EEPROM数据。" },
{ brand: "美菱", code: "E0", descShort: "室外机EEPROM故障", fullGuide: "1.断电重启。2.更换室外主板。3.重新烧录EEPROM数据。" },
{ brand: "美菱", code: "L0", descShort: "变频模块故障", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。" },
{ brand: "美菱", code: "L1", descShort: "直流母线欠压保护", fullGuide: "1.检测电源电压是否低于180V。2.检查整流桥及大电容。3.加装稳压器。" },
{ brand: "美菱", code: "L2", descShort: "直流母线过压保护", fullGuide: "1.检测电源电压是否超过260V。2.检查PFC电路。3.更换外机主板。" },
{ brand: "美菱", code: "L7", descShort: "相序错误保护", fullGuide: "1.检查电源相序是否正确。2.调整相序。3.检查电源是否缺相。" },
{ brand: "美菱", code: "H1", descShort: "压缩机启动失败", fullGuide: "1.检查压缩机线序是否正确。2.测量压缩机绕组阻值。3.检查电源相序。4.更换压缩机或变频板。" },
{ brand: "美菱", code: "H9", descShort: "高压传感器故障", fullGuide: "1.检查高压压力传感器接头连接。2.更换传感器。3.检查室外PC板。" },
{ brand: "美菱", code: "HC", descShort: "低压传感器故障", fullGuide: "1.检查低压压力传感器接头连接。2.更换传感器。3.检查室外PC板。" },
{ brand: "美菱", code: "E01", descShort: "变频器散热器过热", fullGuide: "1.检查外机散热风扇。2.清理散热器灰尘。3.更换导热硅脂。4.更换变频模块。" },
{ brand: "美菱", code: "E03", descShort: "交流输入电流采样异常", fullGuide: "1.检查CT线圈是否松脱。2.测量压缩机运行电流。3.更换主板。" },
{ brand: "美菱", code: "E20", descShort: "高压开关断开（排气压力过高）", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.查高压开关。4.检查外机散热环境。" },
{ brand: "美菱", code: "E60", descShort: "外机主板存储器故障", fullGuide: "1.断电重启尝试恢复。2.更换室外主板。3.重新烧录EEPROM数据。" },
{ brand: "美博", code: "E0", descShort: "室内外通讯故障", fullGuide: "1.检查室外电源板指示灯状态：灯亮则检测模块板15V回路有无短路（击穿则更换模块板）；灯不亮则检查内外接线是否松脱或接错。2.用万用表测通信线与零线电压：无变化或在0-24V变化，更换室内控制板；电压在0-13V变化，更换室外板。3.检查外围电感器是否开路，桥堆是否击穿。4.考虑更换内外连接线（线材受潮引起信号干扰）。" },
{ brand: "美博", code: "E1", descShort: "室内温度传感器故障 / 电源电压异常", fullGuide: "1.检查温度传感器与插槽是否接触良好，重新接插。2.用万用表测量传感器两端电阻，参照温度-电阻值表判断是否漂移、开路、短路，异常则更换传感器。3.检查电源电压是否正常（160-260V），若电压异常则属正常保护。4.更换室内控制板。" },
{ brand: "美博", code: "E2", descShort: "室内盘管温度传感器故障 / 盘管温度过低保护", fullGuide: "1.检查室内盘管温度传感器与插槽接触是否良好。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查制冷系统是否缺氟。4.检查内风机转速是否正常，过滤网是否堵塞。" },
{ brand: "美博", code: "E3", descShort: "室外盘管温度传感器故障 / 盘管温度过高保护", fullGuide: "1.检查室外盘管温度传感器插头是否松动。2.测量传感器阻值，异常则更换。3.检查外机散热是否良好，冷凝器翅片是否堵塞。4.检查制冷剂是否过多或不足。5.更换室外电源板。" },
{ brand: "美博", code: "E4", descShort: "系统异常 / 室外机保护", fullGuide: "1.检查室外机高低压阀是否全开。2.系统缺冷媒：开机制冷5分钟后出风口温度变化不明显，则接压力表测试，检漏重新充注冷媒。3.内盘管传感器脱落或损坏：5分钟后出风口温度变化明显，则检查传感器并重新安装。4.系统分流不均：可将室内控制板JP4跳线短接屏蔽该保护，或更换室内机。" },
{ brand: "美博", code: "E5", descShort: "室内外通讯故障 / 水流量传感器故障", fullGuide: "1.检查内外机电源接入方式是否一致，信号连接线是否一一对应。2.用万用表测通讯电压是否正常波动。3.检查水流量传感器是否故障（部分机型）。4.更换内机主板或外机主板。" },
{ brand: "美博", code: "E6", descShort: "室内风机故障 / 电机故障", fullGuide: "1.检查电机接插部位是否松动，启动运转电容容值是否正确。2.检查贯流风扇是否卡死，重新调整或更换风扇。3.用万用表检测电机反馈端是否有5V和2.6V：有5V无2.6V则为电机故障；两者均无则为电控板故障。4.更换室内电机或内机主板。" },
{ brand: "美博", code: "E7", descShort: "冷凝器高压保护 / 压缩机高压保护", fullGuide: "1.检查冷凝器是否堵塞，清洗冷凝器翅片。2.检查压缩机是否损坏，测量压缩机电流。3.检查制冷剂是否过多。4.检查外机散热风扇是否运转正常。5.更换压缩机或维修制冷系统。" },
{ brand: "美博", code: "E8", descShort: "压缩机低压保护 / 吸气温度保护", fullGuide: "1.检查制冷剂是否泄漏，检漏并补充制冷剂。2.检查膨胀阀是否故障，需更换。3.检查室外机和室内机是否通电。4.检查制冷循环是否正常。" },
{ brand: "美博", code: "E9", descShort: "排气温度保护 / 室内温度控制器故障", fullGuide: "1.检查排气温度传感器是否损坏、断裂。用万用表测阻值是否漂移，异常则更换。2.检查压缩机运行状态是否过载、堵塞。3.检查制冷室外风机是否停转，导致排气温度上升。4.更换室内温度控制器。" },
{ brand: "美博", code: "EA", descShort: "电流传感器故障", fullGuide: "1.检查系统是否缺冷媒，查找漏点重新充注。2.检查四通阀换向是否正常。3.更换室外电源板。" },
{ brand: "美博", code: "EC", descShort: "室外通讯故障", fullGuide: "1.检查电源板到模块板之间的通信线连接是否良好、有无松脱。2.排除通信线问题后，先更换电源板。3.如故障仍存在，则更换模块板。" },
{ brand: "美博", code: "EE", descShort: "EEPROM故障", fullGuide: "1.断电重新上电，若故障仍存在，检查电控板上EEPROM安装是否正常。2.更换室内控制板。3.更换室外电源板。" },
{ brand: "美博", code: "EP", descShort: "压缩机顶部温度开关故障", fullGuide: "1.检查室外电源板上压缩机顶部温度开关连接线CN10是否接插良好。2.检查压缩机温度：若温度高且伴随异味，检查压缩机连线U、V、W是否正确，系统冷媒是否不足或过量，室外机通风是否良好。3.若压缩机温度不高，短接CN10，故障解除则为壳顶温度开关损坏，更换新器件；故障仍存在则更换室外电源板。" },
{ brand: "美博", code: "EU", descShort: "电压传感器故障", fullGuide: "1.检查室外电源板与模块板之间通讯线连接是否可靠。2.更换室外电源板。3.如故障仍存在则更换模块板。" },
{ brand: "美博", code: "P0", descShort: "IPM模块保护", fullGuide: "1.若压缩机启动运行数秒甚至未启动就显示该代码，检查压缩机连线是否正确，无错误则更换模块板。2.若运行过程中出现模块保护，检查模块板安装在散热片上是否牢固，硅胶是否涂抹均匀。3.检查系统冷媒不足或过量。4.检查室外机通风是否良好。" },
{ brand: "美博", code: "P1", descShort: "过欠压保护", fullGuide: "1.测试电源电压是否在160V-260V之间，超出此范围为正常保护。2.测试室外机接线端子L、N之间电压是否在160V-260V。3.如果电压正常，则更换室外电源板。" },
{ brand: "美博", code: "P2", descShort: "过电流保护", fullGuide: "1.检查压缩机及电气系统是否有短路或绝缘电阻变小。2.检查风扇电机是否过热保护或损坏、风扇电容是否损坏。3.2P以上机器更换电源板，1.5P以下机器更换模块板。" },
{ brand: "美博", code: "P4", descShort: "排气温度保护", fullGuide: "1.检查排气温度传感器是否损坏、断裂。用万用表测阻值是否漂移，异常则更换。2.制冷室外风机不转时需检查外风机和风扇电容是否损坏、风扇叶是否被卡住。" },
{ brand: "美博", code: "P5", descShort: "制冷防冻结保护", fullGuide: "1.检查室内电机、风机电容是否损坏、贯流风扇是否被卡住。2.检查内盘温度传感器阻值是否漂移。3.若以上都正常，则更换室内控制板。" },
{ brand: "美博", code: "P6", descShort: "制冷防过热保护", fullGuide: "1.检查室外风扇电机、风机电容、风扇叶是否被卡住。2.检查室外盘管温度传感器阻值是否漂移。3.若以上都正常，则更换室外电源板。" },
{ brand: "美博", code: "P7", descShort: "制热防过热保护", fullGuide: "1.检查室内风扇电机、启动运行电容、贯流风扇是否被卡住。2.检查室内盘管温度传感器阻值是否漂移。3.若以上都正常，则更换室内电源板。" },
{ brand: "美博", code: "P8", descShort: "室外温度过高/过低保护", fullGuide: "1.室外环境温度低于-1℃制冷运行，或高于33℃制热运行，报P8保护属正常。2.若温度不在保护范围，参照温度-电阻值表用万用表测量传感器阻值是否漂移，更换传感器。3.更换室外电源板。" },
{ brand: "美博", code: "P9", descShort: "压缩机驱动保护", fullGuide: "1.若压缩机启动运行数秒甚至未启动就显示该代码，检查压缩机连线是否正确，无错误则更换模块板（IPM模块一定要涂硅胶）。2.开机运行一段时间后报P9且制冷制热正常，直接更换模块板。3.压缩机关闭后立即启动也可能造成启动不良，停机稍长时间再开机尝试。" },
{ brand: "美博", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "美博", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.断电清洗后重新启动复位。3.按遥控器复位键消除提醒。" },
{ brand: "美博", code: "OP", descShort: "待机模式", fullGuide: "空调处于待机模式，属正常状态，按遥控器开机键即可启动。" },
{ brand: "美博", code: "E0", descShort: "室内电流互感器过流保护", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查压缩机电容。4.更换室内控制板或维修电流检测电路。" },
{ brand: "美博", code: "E8", descShort: "防冻结/结霜保护", fullGuide: "1.清洗过滤网增加风量。2.检查内机风机转速是否正常。3.检测盘管传感器阻值。4.检查制冷系统是否缺氟。" },
{ brand: "美博", code: "E10", descShort: "元器件异常（传感器/主板）", fullGuide: "1.检查各温度传感器插头是否松动。2.测量传感器阻值是否正常。3.检查主板是否有明显损坏。4.更换故障传感器或主板。" },
{ brand: "美博", code: "E20", descShort: "系统过热保护", fullGuide: "1.检查制冷剂是否过多或不足。2.清理外机散热器。3.检查外机散热风扇是否运转。4.检查系统是否堵塞。" },
{ brand: "美博", code: "F0", descShort: "室内风机故障", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈信号。3.检查风叶是否卡滞。4.更换室内电机。" },
{ brand: "美博", code: "F1", descShort: "室内环境温度传感器故障（10K）", fullGuide: "1.拔掉传感器插头测量阻值(25℃约10K)。2.阻值异常则更换传感器。3.检查主板接口电路。" },
{ brand: "美博", code: "F2", descShort: "室内盘管温度传感器故障（10K）", fullGuide: "1.测量盘管传感器阻值(25℃约10K)。2.更换同规格传感器。3.检查线路连接。" },
{ brand: "美博", code: "F3", descShort: "室外盘管温度传感器故障（10K）", fullGuide: "1.检查室外盘管传感器阻值(25℃约10K)。2.更换传感器。3.检查外机主板。" },
{ brand: "美博", code: "F4", descShort: "室内风机信号反馈故障", fullGuide: "1.检查电机反馈线是否连接良好。2.检测风机霍尔反馈信号。3.更换室内电机或内机主板。" },
{ brand: "美博", code: "F6", descShort: "内外机通讯中断", fullGuide: "1.检查内外机连接线是否松动。2.测量通讯电压波动。3.更换内机主板或外机主板。" },
{ brand: "美博", code: "P1", descShort: "直流母线欠压保护", fullGuide: "1.检测电源电压是否低于180V。2.检查整流桥及大电容。3.加装稳压器。4.更换外机主板。" },
{ brand: "美博", code: "P5", descShort: "制冷防过冷保护", fullGuide: "1.清洗过滤网。2.检查风机转速。3.检测盘管传感器。4.检查室内环境温度传感器。" },
{ brand: "美博", code: "P6", descShort: "制冷防过热保护", fullGuide: "1.清洗冷凝器翅片。2.检查外机散热风扇。3.检查室外盘管传感器。4.检查制冷剂。" },
{ brand: "美博", code: "P9", descShort: "压缩机过载保护", fullGuide: "1.检测压缩机电容容量。2.测量系统压力是否过高。3.检查压缩机电流。4.更换压缩机。" },
{ brand: "美博", code: "L1", descShort: "高压传感器故障", fullGuide: "1.检查高压压力传感器接头连接。2.更换传感器。3.检查室外PC板。" },
{ brand: "美博", code: "L2", descShort: "低压传感器故障", fullGuide: "1.检查低压压力传感器接头连接。2.更换传感器。3.检查室外PC板。" },
{ brand: "美博", code: "L3", descShort: "相序错误保护", fullGuide: "1.检查电源相序是否正确。2.调整相序。3.检查电源是否缺相。" },
{ brand: "美博", code: "H1", descShort: "压缩机启动失败", fullGuide: "1.检查压缩机线序是否正确。2.测量压缩机绕组阻值。3.检查电源相序。4.更换压缩机或变频板。" },
{ brand: "美博", code: "H3", descShort: "高压开关断开（排气压力过高）", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.查高压开关。4.检查外机散热环境。" },
{ brand: "美博", code: "H4", descShort: "低压开关断开（系统缺氟）", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查低压开关。" },
{ brand: "美博", code: "EU", descShort: "室外机EEPROM故障", fullGuide: "1.断电重启。2.更换室外主板。3.重新烧录EEPROM数据。" },
{ brand: "长虹", code: "E0", descShort: "工作正常", fullGuide: "空调运行正常，无需维修。[citation:1]" },
{ brand: "长虹", code: "E1", descShort: "室内环温传感器故障 / 控制面板通讯异常", fullGuide: "1.检查室内环温传感器插脚是否松脱或接触不良[citation:10]。2.测量传感器阻值(25℃约5-10K)，异常则更换[citation:9]。3.检查控制面板与主板之间通讯是否正常[citation:3]。4.检查主控板是否故障，必要时更换。[citation:2]" },
{ brand: "长虹", code: "E2", descShort: "室内盘管传感器故障", fullGuide: "1.检查室内盘管传感器插头是否松动[citation:8]。2.测量传感器阻值(25℃约5-10K)，异常则更换[citation:1]。3.检查传感器线路是否断路或短路。4.更换室内主板。[citation:9]" },
{ brand: "长虹", code: "E3", descShort: "室外环温传感器故障", fullGuide: "1.检测室外环境温度传感器阻值[citation:8]。2.检查传感器插头是否松动。3.更换传感器。4.检查主板接口电路。[citation:10]" },
{ brand: "长虹", code: "E4", descShort: "室外盘管传感器故障", fullGuide: "1.检查室外盘管传感器插头是否松动[citation:8]。2.测量传感器阻值，异常则更换。3.检查外机主板。4.清理冷凝器翅片确保散热良好。[citation:9]" },
{ brand: "长虹", code: "E5", descShort: "室外电流过大 / 制冷剂不足", fullGuide: "1.检测压缩机电流是否过大[citation:9]。2.检查系统是否缺氟，检漏补氟[citation:3]。3.检查电源电压是否稳定。4.更换压缩机电容。[citation:10]" },
{ brand: "长虹", code: "E6", descShort: "高压压力保护", fullGuide: "1.清洗冷凝器翅片，确保散热良好[citation:9]。2.检查制冷剂是否过多。3.检查外机散热风扇是否运转。4.查高压开关是否损坏。[citation:8]" },
{ brand: "长虹", code: "E7", descShort: "电源欠压保护", fullGuide: "1.测量电源电压是否正常(187-242V)[citation:8]。2.检查电源线路是否接触不良。3.加装稳压器。4.更换电源板。[citation:10]" },
{ brand: "长虹", code: "E8", descShort: "控制面板和主控板之间通讯故障", fullGuide: "1.检查控制面板连接线是否松动或断路[citation:8]。2.检查显示板与主板通讯线路。3.更换显示板。4.更换内机主板。[citation:7]" },
{ brand: "长虹", code: "E9", descShort: "室外机异常", fullGuide: "1.检查室外机电源电压是否过低[citation:7]。2.检查高压开关是否动作。3.检查压力是否过高。4.检查制冷剂是否过多或系统短路。[citation:8]" },
{ brand: "长虹", code: "E40", descShort: "室外机异常", fullGuide: "1.检查室外机电源电压是否过低。2.检查压力是否过高。3.检查高压开关是否动作。4.检查制冷剂是否过多或系统短路。[citation:7]" },
{ brand: "长虹", code: "E57", descShort: "制冷剂不足", fullGuide: "1.检测系统压力。2.检漏并补充制冷剂。3.检查截止阀是否全开。4.检查管路有无泄漏。[citation:7]" },
{ brand: "长虹", code: "F1", descShort: "室内机热敏电阻断路或受损", fullGuide: "1.检查室内环温传感器阻值[citation:9]。2.检查传感器插头是否松动。3.更换传感器。4.检查主板接口电路。[citation:1]" },
{ brand: "长虹", code: "F2", descShort: "室内机热敏电阻断路或受损", fullGuide: "1.检查室内盘管传感器阻值[citation:1]。2.更换传感器。3.检查线路连接。4.检查主板接口电路。[citation:8]" },
{ brand: "长虹", code: "F3", descShort: "室外机热敏电阻断路或受损 / 高压开关保护", fullGuide: "1.检查室外盘管传感器阻值[citation:3]。2.检测高压开关是否动作。3.检查冷凝器散热是否不良。4.更换传感器或高压开关。[citation:4]" },
{ brand: "长虹", code: "F4", descShort: "室外机热敏电阻断路或受损", fullGuide: "1.检查室外环境温度传感器阻值[citation:1]。2.更换传感器。3.检查线路连接。4.检查主板接口。[citation:9]" },
{ brand: "长虹", code: "F5", descShort: "室外机热敏电阻断路或受损 / 逆相保护", fullGuide: "1.检测室外排气温度传感器阻值[citation:1]。2.检查电源相序是否正确[citation:3]。3.调整相序。4.更换传感器。[citation:4]" },
{ brand: "长虹", code: "F6", descShort: "室外机热敏电阻断路或受损 / 缺相保护", fullGuide: "1.检查室外机温度传感器阻值[citation:1]。2.检查电源是否缺相[citation:3]。3.更换传感器。4.检查电源线路。[citation:4]" },
{ brand: "长虹", code: "F7", descShort: "室外机热敏电阻断路或受损 / 温度传感器异常", fullGuide: "1.检查各温度传感器阻值[citation:1]。2.检测传感器线路是否开路或短路。3.更换故障传感器。4.检查主板。[citation:8]" },
{ brand: "长虹", code: "F8", descShort: "室外机热敏电阻断路或受损", fullGuide: "1.检查室外机盘管传感器阻值[citation:1]。2.更换传感器。3.检查线路连接。4.检查外机主板。[citation:9]" },
{ brand: "长虹", code: "H1", descShort: "压缩机过流保护 / 过载保护", fullGuide: "1.检测压缩机电流是否过大[citation:3]。2.检查电源电压是否稳定。3.检查压缩机电容。4.更换压缩机。[citation:1]" },
{ brand: "长虹", code: "H2", descShort: "压缩机堵转保护", fullGuide: "1.检查压缩机是否卡缸或堵转[citation:3]。2.测量压缩机绕组阻值。3.检查压缩机电容。4.更换压缩机。[citation:1]" },
{ brand: "长虹", code: "H3", descShort: "检测不到压缩机电流", fullGuide: "1.检查压缩机连接线是否松脱[citation:8]。2.检查电流检测电路。3.检查压缩机是否损坏。4.更换主板或压缩机。[citation:1]" },
{ brand: "长虹", code: "H6", descShort: "低压开关动作", fullGuide: "1.检漏并补充制冷剂[citation:1]。2.检查截止阀是否全开。3.检测系统压力。4.检查低压开关是否损坏。[citation:3]" },
{ brand: "长虹", code: "H7", descShort: "连接室内机和室外机线路或管道接错", fullGuide: "1.检查内外机连接线是否一一对应[citation:1]。2.检查高低压管路是否接反。3.按接线图重新连接。4.检查信号线是否正确。[citation:8]" },
{ brand: "长虹", code: "P1", descShort: "制冷过载保护", fullGuide: "1.清洗过滤网增加风量[citation:8]。2.检查内机风机转速[citation:9]。3.检测盘管传感器。4.检查制冷系统是否堵塞。[citation:1]" },
{ brand: "长虹", code: "P2", descShort: "制热过载保护", fullGuide: "1.清洗过滤网[citation:8]。2.检查内机风机转速[citation:9]。3.检测盘管传感器。4.检查电加热是否异常。[citation:1]" },
{ brand: "长虹", code: "P3", descShort: "系统异常保护", fullGuide: "1.检查制冷剂是否不足或过多[citation:3]。2.检查系统是否堵塞[citation:8]。3.检查四通阀是否换向正常。4.检测各传感器阻值。[citation:4]" },
{ brand: "长虹", code: "P4", descShort: "自动模式下室内温度传感异常", fullGuide: "1.检查室内环温传感器阻值[citation:3]。2.检查传感器插头是否松动。3.更换传感器。4.更换主板。[citation:1]" },
{ brand: "长虹", code: "P5", descShort: "系统异常 / 四通阀异常", fullGuide: "1.检查制冷系统压力[citation:8]。2.测试四通阀线圈阻值(约2KΩ)[citation:5]。3.检查四通阀是否卡死。4.更换四通阀。[citation:4]" },
{ brand: "长虹", code: "E10", descShort: "操作开关多台控制时次数过多", fullGuide: "1.检查多台控制器设置。2.减少同时操作次数。3.检查控制器通讯线路。4.更换控制器。[citation:7]" },
{ brand: "长虹", code: "E31", descShort: "室外机号码重复", fullGuide: "1.检查室外机地址设置。2.重新设置唯一地址。3.检查通讯线路。4.更换外机主板。[citation:7]" },
{ brand: "长虹", code: "E33", descShort: "压缩机过流 / 缺相", fullGuide: "1.检测压缩机电流。2.检查电源是否缺相。3.检查压缩机线序。4.更换外机主板。[citation:7]" },
{ brand: "长虹", code: "E35", descShort: "外机温度过高", fullGuide: "1.检查外机散热环境。2.清理冷凝器翅片。3.检查外机热敏电阻是否短路。4.更换传感器。[citation:7]" },
{ brand: "长虹", code: "F15", descShort: "逆相保护", fullGuide: "1.检查电源相序是否正确。2.调整相序。3.检查电源线路。4.更换主板。[citation:5]" },
{ brand: "长虹", code: "HIC不良", descShort: "电流输出问题 / 变频模块故障", fullGuide: "1.检查控制板是否故障。2.检查信号线是否接触不良。3.检查压缩机是否磨损。4.检查系统是否堵塞。[citation:4]" },
{ brand: "长虹", code: "dF", descShort: "自动化霜", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。[citation:9]" },
{ brand: "长虹", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。[citation:9]" },
{ brand: "长虹", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "长虹", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "长虹", code: "OP", descShort: "待机模式", fullGuide: "空调处于待机模式，属正常状态，按遥控器开机键即可启动。" },
{ brand: "长虹", code: "H0", descShort: "化霜运行（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "长虹", code: "E0", descShort: "压缩机顶置（排气）保护", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否过多或不足。3.清理外机散热。4.检查压缩机是否过热。5.更换压缩机。" },
{ brand: "长虹", code: "F0", descShort: "室内电机故障/系统缺氟堵塞", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈信号。3.检漏并补充制冷剂。4.检查系统是否堵塞。" },
{ brand: "长虹", code: "F1", descShort: "高压开关保护/变频IPM模块保护", fullGuide: "1.清洗冷凝器翅片。2.检查高压开关是否动作。3.断电后检查模块散热片。4.更换IPM模块或变频板。" },
{ brand: "长虹", code: "F6", descShort: "室内外机通讯故障（内→外）", fullGuide: "1.检查内外机连接线是否松动。2.测量通讯电压波动。3.更换内机主板或外机主板。" },
{ brand: "长虹", code: "F7", descShort: "室外通讯接收异常", fullGuide: "1.检查外机主板供电。2.检查通讯线路。3.更换外机主板。" },
{ brand: "长虹", code: "F8", descShort: "外机与驱动板通讯故障", fullGuide: "1.检查外机主板与驱动板之间的排线。2.测量通讯电压。3.更换外机主板或驱动板。" },
{ brand: "长虹", code: "P5", descShort: "四通阀切换异常", fullGuide: "1.测试四通阀线圈阻值(约2KΩ)。2.检查四通阀是否卡死。3.更换四通阀。4.检查制冷剂压力。" },
{ brand: "长虹", code: "P9", descShort: "直流电压异常/缺相保护", fullGuide: "1.检测电源电压。2.检查电源是否缺相。3.检查PFC电路。4.更换外机主板。" },
{ brand: "长虹", code: "A0", descShort: "电源逆相保护", fullGuide: "1.检查电源相序是否正确。2.调整相序。3.检查电源线路。4.更换主板。" },
{ brand: "长虹", code: "A3", descShort: "系统高压保护", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.查高压开关。4.检查外机散热环境。" },
{ brand: "长虹", code: "A4", descShort: "系统低压保护", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查低压开关。" },
{ brand: "长虹", code: "C0", descShort: "直流电压突变故障", fullGuide: "1.检测电源电压是否波动。2.检查PFC电路。3.检查电解电容是否鼓包。4.更换外机主板。" },
{ brand: "长虹", code: "C1", descShort: "芯片数据错误/EEPROM故障", fullGuide: "1.断电重启。2.更换室内主板或室外主板。3.重新烧录EEPROM数据。" },
{ brand: "长虹", code: "CF", descShort: "室内风机故障/风机过流", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈信号。3.检查风叶是否卡滞。4.更换室内电机。" },
{ brand: "长虹", code: "H1", descShort: "压缩机过流保护", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压。3.检查压缩机电容。4.更换压缩机。" },
{ brand: "长虹", code: "H2", descShort: "压缩机堵转保护", fullGuide: "1.检查压缩机是否卡缸或堵转。2.测量压缩机绕组阻值。3.检查压缩机电容。4.更换压缩机。" },
{ brand: "长虹", code: "H3", descShort: "压缩机过载保护", fullGuide: "1.检测压缩机电容容量。2.测量系统压力是否过高。3.检查压缩机电流。4.更换压缩机。" },
{ brand: "长虹", code: "EE", descShort: "室内机EEPROM故障", fullGuide: "1.断电重启。2.更换室内主板。3.重新烧录EEPROM数据。" },
{ brand: "长虹", code: "EU", descShort: "室外机EEPROM故障", fullGuide: "1.断电重启。2.更换室外主板。3.重新烧录EEPROM数据。" },
{ brand: "小米", code: "LO", descShort: "最低温度提醒 / 急冷模式", fullGuide: "1.LO表示LOW，当室温低于8度时显示LO，是最低温度设置，相当于急冷模式，压缩机会最大负荷工作，属正常现象。2.如果室内温度不是太低，空调开机后仍显示LO，则是过滤网太脏导致蒸发器结冰，可将空调设置成送风模式运转1小时后再调回制冷状态。3.遥控器上显示LO则代表最低风速。" },
{ brand: "小米", code: "HI", descShort: "最高温度提醒", fullGuide: "HI表示HIGH，当室温高于37度时空调会显示HI，属正常提醒，表示当前温度已达到设定上限。" },
{ brand: "小米", code: "F0", descShort: "室内环境温度传感器故障", fullGuide: "1.检查室内环温传感器插头是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查主板接口电路。4.如以上正常，更换室内主板。" },
{ brand: "小米", code: "F1", descShort: "室温传感器故障", fullGuide: "1.检查室温传感器连接是否良好，重新插拔传感器插头。2.用万用表测试传感器电阻值，检查有无短路或开路。3.手握住传感器看电阻是否会逐渐减小，正常则传感器良好。4.故障依旧更换传感器或主板。" },
{ brand: "小米", code: "F2", descShort: "外部室温传感器故障 / 室外环温传感器故障", fullGuide: "1.检查室外环境温度传感器插头是否松动。2.测量传感器阻值，异常则更换。3.检查传感器线路是否有断路或短路。4.更换外机主板。" },
{ brand: "小米", code: "F3", descShort: "内部板温传感器故障", fullGuide: "1.检查室内机板温传感器连接是否良好。2.测量传感器阻值，25℃时约5-10K。3.异常则更换传感器。4.更换内机主板。" },
{ brand: "小米", code: "F4", descShort: "外部板温传感器故障", fullGuide: "1.检查室外机板温传感器连接是否良好。2.测量传感器阻值，异常则更换。3.检查外机主板。4.更换传感器或主板。" },
{ brand: "小米", code: "F5", descShort: "压缩机排气温度传感器故障", fullGuide: "1.检测排气温度传感器阻值(25℃时约60K，与其他传感器不同)。2.更换排气传感器。3.检查主板排气温检测电路。4.注意不要损坏传感器感温包和导线。" },
{ brand: "小米", code: "F6", descShort: "室外机温度传感器故障 / 内外机连接中断", fullGuide: "1.检查室外机环境温度传感器连接是否良好。2.清洁传感器表面灰尘。3.检查内外机连接线与反馈线是否松动或断路。4.检查室内电机、启动电容、电脑板控制电路。5.申请售后上门检修。" },
{ brand: "小米", code: "E61", descShort: "室内风机故障", fullGuide: "1.检查室内风机电源线和控制线连接是否良好。2.清洁风机叶片和外壳，确保空气流通顺畅。3.检查风机电机是否故障。4.检查控制板是否故障。5.联系售后服务中心检修。" },
{ brand: "小米", code: "E0", descShort: "室内外机通讯故障", fullGuide: "1.检查内外机连接线是否松动或断路。2.检查电源线是否接好，插座是否通电。3.检查空气开关是否跳闸。4.断电重启后如仍报故障，申请售后检测。" },
{ brand: "小米", code: "E1", descShort: "室内外机通讯故障", fullGuide: "1.检查内外机连接线。2.测量通讯电压波动。3.更换内机主板或外机主板。4.检查遥控器电池和匹配情况。" },
{ brand: "小米", code: "r0", descShort: "室内温度传感器故障", fullGuide: "1.检查室内温度传感器与空调主板之间连接是否良好，重新插拔传感器插头。2.用干净软布擦拭传感器表面去除污垢。3.更换传感器。4.检查空调主板或控制电路。5.联系服务中心检修。" },
{ brand: "小米", code: "E7", descShort: "室外风机故障", fullGuide: "1.检查室外风机电机是否卡滞。2.测量风机绕组及供电。3.检查风机电容是否损坏。4.更换室外风机电机。" },
{ brand: "小米", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "小米", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "小米", code: "OP", descShort: "待机模式", fullGuide: "空调处于待机模式，属正常状态，按遥控器开机键即可启动。" },
{ brand: "小米", code: "60", descShort: "自清洁运行中", fullGuide: "空调正在进行自清洁功能，属正常状态，等待20-30分钟自动完成。" },
{ brand: "小米", code: "AC", descShort: "除菌功能运行中", fullGuide: "空调正在进行除菌功能，属正常状态，等待功能运行完成即可。" },
{ brand: "小米", code: "E0", descShort: "室内PG/直流风机故障", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈信号。3.检查风叶是否卡滞。4.更换室内电机。" },
{ brand: "小米", code: "E3", descShort: "室外环境温度传感器故障（10K）", fullGuide: "1.检测室外环境温度传感器阻值(25℃约10K)。2.更换传感器。3.检查主板接口。" },
{ brand: "小米", code: "E4", descShort: "室外盘管温度传感器故障（10K）", fullGuide: "1.检查室外盘管传感器阻值(25℃约10K)。2.更换传感器。3.检查外机主板。" },
{ brand: "小米", code: "E5", descShort: "压缩机过流/外机综合保护", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查制冷剂是否过多或不足。4.更换压缩机。" },
{ brand: "小米", code: "E8", descShort: "系统异常（总故障标志）", fullGuide: "1.检查制冷剂是否泄漏。2.检查系统是否堵塞。3.检查各传感器是否正常。4.检漏补氟。5.申请售后检修。" },
{ brand: "小米", code: "E9", descShort: "室内盘管制热过热保护", fullGuide: "1.清洗过滤网。2.检查内机风机转速。3.检测盘管传感器。4.检查电加热是否异常。" },
{ brand: "小米", code: "EE", descShort: "室外机EEPROM故障", fullGuide: "1.断电重启。2.更换室外主板。3.重新烧录EEPROM数据。" },
{ brand: "小米", code: "EF", descShort: "模块感温包电路故障", fullGuide: "1.检查模块温度传感器插头是否松动。2.测量传感器阻值。3.更换传感器。4.更换外机主板。" },
{ brand: "小米", code: "EP", descShort: "PFC输入过电流故障", fullGuide: "1.检查PFC电路IGBT及二极管。2.测量输入电流。3.更换外机主板或PFC模块。" },
{ brand: "小米", code: "F1.1", descShort: "室内环境温度传感器故障", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查主板接口电路。" },
{ brand: "小米", code: "F1.2", descShort: "室外环境温度传感器故障", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "小米", code: "F2.1", descShort: "室内盘管温度传感器故障", fullGuide: "1.测量盘管传感器阻值。2.更换同规格传感器。3.检查线路连接。" },
{ brand: "小米", code: "F2.2", descShort: "室外盘管温度传感器故障", fullGuide: "1.检查室外盘管传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "小米", code: "F3.1", descShort: "室外排气温度传感器故障", fullGuide: "1.检测排气传感器阻值(25℃约60K)。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "小米", code: "F6.1", descShort: "内外机通讯：内机收不到数据", fullGuide: "1.检查内外机连接线。2.测量通讯电压。3.更换内机主板。" },
{ brand: "小米", code: "F6.2", descShort: "内外机通讯：外机收不到数据", fullGuide: "1.检查内外机连接线。2.测量通讯电压。3.更换外机主板。" },
{ brand: "小米", code: "F7", descShort: "室外直流风机故障", fullGuide: "1.检查直流风机插头是否松动。2.测量风机绕组及霍尔反馈。3.更换室外直流电机。" },
{ brand: "小米", code: "F9", descShort: "室外压缩机壳顶保护", fullGuide: "1.检查压缩机顶部温度传感器。2.检查制冷剂是否不足。3.改善外机散热。4.更换压缩机。" },
{ brand: "小米", code: "FA", descShort: "压缩机驱动故障", fullGuide: "1.检查压缩机线序。2.测量压缩机三相电阻。3.更换变频模块或压缩机。" },
{ brand: "小米", code: "P0", descShort: "IPM模块保护（过热/过流/短路）", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。4.涂抹导热硅脂。" },
{ brand: "小米", code: "P1", descShort: "排气温度过高保护", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否过多或不足。3.清理外机散热。" },
{ brand: "小米", code: "P2", descShort: "整机电流过大保护", fullGuide: "1.检测电源电压及负载电流。2.检查压缩机电容。3.更换压缩机或电容。" },
{ brand: "小米", code: "P4", descShort: "制热过载保护", fullGuide: "1.清洗过滤网。2.检查内机风机转速。3.检测盘管传感器。4.检查电加热是否异常。" },
{ brand: "小米", code: "P5", descShort: "制冷防冻结保护", fullGuide: "1.清洗过滤网增加风量。2.检查风机转速。3.检测盘管传感器。4.检查制冷剂是否不足。" },
{ brand: "小米", code: "P6", descShort: "制冷过载保护", fullGuide: "1.清洗冷凝器翅片。2.检查外机散热风扇。3.检查制冷剂是否过多。4.检查系统是否堵塞。" },
{ brand: "小米", code: "P7", descShort: "模块温度保护", fullGuide: "1.检查外机散热风扇。2.清理冷凝器翅片。3.更换导热硅脂。4.更换IPM模块。" },
{ brand: "小米", code: "C1", descShort: "主板数据故障/EEPROM错误", fullGuide: "1.断电重启尝试恢复。2.更换室内主板。3.重新烧录EEPROM数据。" },
{ brand: "小米", code: "C4", descShort: "D轴电流控制故障", fullGuide: "1.检查压缩机线序。2.测量压缩机三相电阻。3.更换变频模块。" },
{ brand: "小米", code: "C5", descShort: "Q轴电流控制故障", fullGuide: "1.检查压缩机线序。2.测量压缩机三相电阻。3.更换变频模块。" },
{ brand: "小米", code: "C9", descShort: "冷媒循环异常/系统缺氟", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。" },
{ brand: "小米", code: "H6", descShort: "室外电压过高/过低保护", fullGuide: "1.测量电源电压是否正常(187-242V)。2.加装稳压器。3.检查电源线路。" },
{ brand: "小米", code: "Hd", descShort: "室外电流保护", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压。3.检查压缩机电容。4.更换压缩机。" },
{ brand: "小米", code: "U0", descShort: "系统缺氟保护", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。" },
{ brand: "小米", code: "U0.1", descShort: "逆变器过电压保护", fullGuide: "1.检测电源电压是否过高。2.检查PFC电路。3.更换外机主板。" },
{ brand: "小米", code: "U0.2", descShort: "逆变器电压突变", fullGuide: "1.检测电源电压是否波动。2.检查电解电容。3.更换外机主板。" },
{ brand: "小米", code: "U1.3", descShort: "压机电流检测故障", fullGuide: "1.检查CT线圈是否松脱。2.测量压缩机运行电流。3.更换主板。" },
{ brand: "小米", code: "U2", descShort: "压缩机过流保护", fullGuide: "1.检测压缩机电流。2.检查电源电压。3.检查系统压力。4.更换压缩机。" },
{ brand: "扬子", code: "E0", descShort: "系统高压保护 / 反相缺相保护", fullGuide: "1.检查冷凝器是否脏堵，清洗翅片。2.检查制冷剂是否过多。3.对于380V三相电，检查电源相序是否正确，让电工调整相位。4.检查高压开关是否损坏。" },
{ brand: "扬子", code: "E1", descShort: "排气管温度过高 / 室内外通讯故障 / 二次防冻结保护", fullGuide: "1.检测排气温度传感器阻值，异常则更换。2.检查制冷剂是否不足或过多。3.清理外机散热。4.检查内外机通讯线连接是否良好，GND与CMM之间电压应在6-7V左右摆动。5.清洗过滤网，检查风机转速。" },
{ brand: "扬子", code: "E2", descShort: "压缩机过电流 / 室内温度传感器开路或短路", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查压缩机电容。4.检查室内温度传感器插头是否松动，测量阻值(25℃约5-10K)，异常则更换。5.更换压缩机。" },
{ brand: "扬子", code: "E3", descShort: "电源相序错误 / 电源电压异常 / 室内管温度传感器开路或短路", fullGuide: "1.检查电源相序是否正确，调整相序。2.测量电源电压是否正常(187-242V)，电压异常则加装稳压器。3.检查室内管温度传感器阻值，异常则更换。4.检查风机电机反馈信号。" },
{ brand: "扬子", code: "E4", descShort: "系统压力过高 / 制冷系统压力过高保护 / 室外管温度传感器开路或短路", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.检查RT5传感器是否异常。4.检查室外管温度传感器阻值，异常则更换。5.检查外机散热风扇。" },
{ brand: "扬子", code: "E5", descShort: "系统压力过低 / 室外环温过低保护 / 通讯故障", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。4.检查室外环境温度是否过低。5.检查内外机通讯线。" },
{ brand: "扬子", code: "E6", descShort: "防冻结保护 / 过冷保护 / 电源相序保护", fullGuide: "1.清洗过滤网增加风量。2.检查风机转速。3.检测盘管传感器RT2是否异常。4.检查电源相序是否正确。5.检查制冷剂是否不足。" },
{ brand: "扬子", code: "E7", descShort: "温度传感器开路 / 过电流保护", fullGuide: "1.检查RT1、RT2、RT3温度传感器插头是否松动。2.测量传感器阻值，开路则更换。3.检测压缩机电流是否过大。4.更换传感器或主板。" },
{ brand: "扬子", code: "E8", descShort: "温度传感器短路 / 卸荷保护 / 室内风机故障", fullGuide: "1.检查RT1、RT2、RT3温度传感器是否短路，更换传感器。2.检查室内风机是否卡滞或损坏。3.检查风机电容。4.更换室内电机或主板。" },
{ brand: "扬子", code: "E9", descShort: "低电压保护", fullGuide: "1.测量电源电压是否低于187V。2.检查电源线路是否接触不良。3.加装稳压器。4.避开用电高峰期使用。" },
{ brand: "扬子", code: "F1", descShort: "室内环境温度传感器故障", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查主板接口电路。" },
{ brand: "扬子", code: "F2", descShort: "室内盘管温度传感器故障", fullGuide: "1.测量盘管传感器阻值。2.更换同规格传感器。3.检查线路连接。" },
{ brand: "扬子", code: "F3", descShort: "室外盘管温度传感器故障", fullGuide: "1.检查室外盘管传感器阻值(25℃约2.5kΩ或5kΩ)。2.更换传感器。3.检查外机主板。" },
{ brand: "扬子", code: "F4", descShort: "室外环境温度传感器故障", fullGuide: "1.检测外机环境温度传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "扬子", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "扬子", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "扬子", code: "A1", descShort: "PC板不良", fullGuide: "1.检查主控板供电是否正常。2.检查主板元件有无明显损坏。3.更换主控板。" },
{ brand: "扬子", code: "A3", descShort: "排水水位控制系统故障", fullGuide: "1.清理排水管路。2.检查排水泵是否工作。3.检查浮子开关是否卡住。4.更换排水泵。" },
{ brand: "扬子", code: "A6", descShort: "风扇马达锁住 / 过载", fullGuide: "1.检查风扇叶是否卡滞。2.测量电机绕组。3.检查风机电容。4.更换风扇电机。" },
{ brand: "扬子", code: "A9", descShort: "电子膨胀阀驱动部件故障", fullGuide: "1.检查电子膨胀阀线圈阻值。2.检测阀体是否卡死。3.更换电子膨胀阀。" },
{ brand: "扬子", code: "C4", descShort: "液管用热敏电阻故障", fullGuide: "1.检测液管传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "扬子", code: "C5", descShort: "气管用热敏电阻故障", fullGuide: "1.检测气管传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "扬子", code: "C9", descShort: "吸气管用热敏电阻故障", fullGuide: "1.检测吸气传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "扬子", code: "CJ", descShort: "遥控器中的温控传感器故障", fullGuide: "1.检查遥控器电池。2.更换遥控器。3.检查遥控器温度传感器。" },
{ brand: "扬子", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "扬子", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "扬子", code: "OP", descShort: "待机模式", fullGuide: "空调处于待机模式，属正常状态，按遥控器开机键即可启动。" },
{ brand: "扬子", code: "E0", descShort: "380V电源缺相/反相保护", fullGuide: "1.检查电源相序是否正确。2.调整相序。3.检查电源是否缺相。4.检查电源线路。" },
{ brand: "扬子", code: "E1", descShort: "高压保护/系统压力过高", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.查高压开关。4.检查外机散热环境。" },
{ brand: "扬子", code: "E2", descShort: "制热高负载保护", fullGuide: "1.清洗过滤网。2.检查内机风机转速。3.检测盘管传感器。4.检查电加热是否异常。" },
{ brand: "扬子", code: "E3", descShort: "室内防冻结保护/管温异常", fullGuide: "1.清洗过滤网增加风量。2.检查风机转速。3.检测盘管传感器。4.检查制冷剂是否不足。" },
{ brand: "扬子", code: "E4", descShort: "系统异常保护/压缩机过流", fullGuide: "1.检测压缩机电流。2.检查系统压力。3.检查制冷剂是否过多或不足。4.更换压缩机。" },
{ brand: "扬子", code: "E5", descShort: "室外环温过低保护/热继电器动作", fullGuide: "1.检查室外环境温度是否过低。2.检测热继电器是否动作。3.检查室外环境温度传感器。" },
{ brand: "扬子", code: "E6", descShort: "室内环境温度传感器故障", fullGuide: "1.拔掉传感器插头测量阻值(25℃约5-10K)。2.阻值异常则更换传感器。3.检查主板接口电路。" },
{ brand: "扬子", code: "E7", descShort: "室内盘管温度传感器故障", fullGuide: "1.测量盘管传感器阻值。2.更换同规格传感器。3.检查线路连接。" },
{ brand: "扬子", code: "E8", descShort: "室内外通讯故障/显示板通讯异常", fullGuide: "1.检查内外机连接线是否松动。2.测量通讯电压波动。3.更换内机主板或外机主板。4.更换显示板。" },
{ brand: "扬子", code: "E9", descShort: "室内风机故障/PG电机失速", fullGuide: "1.检查风机电容及电机绕组。2.检测风机霍尔反馈信号。3.检查风叶是否卡滞。4.更换室内电机。" },
{ brand: "扬子", code: "F01", descShort: "室内机EEPROM故障", fullGuide: "1.断电重启。2.更换室内主板。3.重新烧录EEPROM数据。" },
{ brand: "扬子", code: "F02", descShort: "检零电路故障/电源同步异常", fullGuide: "1.检查电源电压是否稳定。2.检查过零检测电路。3.更换内机主板。" },
{ brand: "扬子", code: "F03", descShort: "室外机通讯故障", fullGuide: "1.检查外机主板供电。2.检查通讯线路。3.更换外机主板。" },
{ brand: "扬子", code: "F05", descShort: "室外机EEPROM故障", fullGuide: "1.断电重启。2.更换室外主板。3.重新烧录EEPROM数据。" },
{ brand: "扬子", code: "F06", descShort: "内外机通讯故障（双向）", fullGuide: "1.检查内外机连接线。2.测量通讯电压。3.更换内机主板或外机主板。" },
{ brand: "扬子", code: "F31", descShort: "室内环温传感器故障", fullGuide: "1.拔掉传感器插头测量阻值。2.更换传感器。3.检查主板接口电路。" },
{ brand: "扬子", code: "F32", descShort: "室内盘管传感器故障", fullGuide: "1.测量盘管传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "扬子", code: "F35", descShort: "室外环境温度传感器故障", fullGuide: "1.检测外机环境温度传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "扬子", code: "F36", descShort: "室外盘管温度传感器故障", fullGuide: "1.检查室外盘管传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "扬子", code: "F37", descShort: "压缩机排气温度传感器故障", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "扬子", code: "F38", descShort: "压缩机壳温传感器故障", fullGuide: "1.检测压缩机壳顶温度传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "扬子", code: "F51", descShort: "室内风机工作故障/过流", fullGuide: "1.检查风机电容及电机绕组。2.检测风机电流。3.更换室内电机。" },
{ brand: "扬子", code: "F55", descShort: "压缩机工作故障/启动失败", fullGuide: "1.检查压缩机线序。2.测量压缩机绕组阻值。3.检查电源相序。4.更换压缩机或变频板。" },
{ brand: "扬子", code: "F57", descShort: "冷媒泄漏故障/系统缺氟", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。" },
{ brand: "扬子", code: "F58", descShort: "室外风机工作故障/驱动异常", fullGuide: "1.检查直流风机插头是否松动。2.测量风机绕组及霍尔反馈。3.更换室外直流电机。" },
{ brand: "扬子", code: "F71", descShort: "排气温度过高保护", fullGuide: "1.检测排气温度传感器。2.检查制冷剂是否过多或不足。3.清理外机散热。" },
{ brand: "扬子", code: "F72", descShort: "高负荷保护/制冷过载", fullGuide: "1.清洗冷凝器翅片。2.检查外机散热风扇。3.检查系统压力。4.检查制冷剂是否过多。" },
{ brand: "扬子", code: "F73", descShort: "输入电流控制故障/过流", fullGuide: "1.检测电源电压及负载电流。2.检查压缩机电容。3.更换压缩机或电容。" },
{ brand: "扬子", code: "F74", descShort: "室内防冻结保护", fullGuide: "1.清洗过滤网。2.检查风机转速。3.检测盘管传感器。4.检查制冷剂是否不足。" },
{ brand: "扬子", code: "F75", descShort: "压缩机壳温保护控制故障", fullGuide: "1.检测壳顶温度传感器。2.检查制冷剂。3.改善外机散热。4.更换压缩机。" },
{ brand: "扬子", code: "F76", descShort: "直流母线电压异常保护", fullGuide: "1.检测电源电压。2.检查PFC电路。3.检查电解电容。4.更换外机主板。" },
{ brand: "扬子", code: "F78", descShort: "IPM模块保护/过热/过流", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。" },
{ brand: "扬子", code: "05", descShort: "室外EEPROM故障", fullGuide: "1.断电重启。2.更换室外主板。3.重新烧录EEPROM数据。" },
{ brand: "扬子", code: "06", descShort: "室外通信故障", fullGuide: "1.检查外机主板供电。2.检查通讯线路。3.更换外机主板。" },
{ brand: "扬子", code: "35", descShort: "室外空气温度传感器故障", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查主板接口。" },
{ brand: "扬子", code: "36", descShort: "室外盘管温度传感器故障", fullGuide: "1.检查室外盘管传感器阻值。2.更换传感器。3.检查外机主板。" },
{ brand: "扬子", code: "37", descShort: "排气温度传感器故障", fullGuide: "1.检测排气传感器阻值。2.更换排气传感器。3.检查主板排气温检测电路。" },
{ brand: "扬子", code: "38", descShort: "壳温温度传感器故障", fullGuide: "1.检测压缩机壳顶温度传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "扬子", code: "55", descShort: "压缩机工作故障", fullGuide: "1.检查压缩机线序。2.测量压缩机绕组阻值。3.更换压缩机。" },
{ brand: "扬子", code: "56", descShort: "配管温度传感器安装故障", fullGuide: "1.检查传感器插头是否松动。2.重新安装传感器。3.更换传感器。" },
{ brand: "扬子", code: "57", descShort: "冷媒泄漏故障", fullGuide: "1.检漏并补充制冷剂。2.检查截止阀是否全开。3.检测系统压力。" },
{ brand: "扬子", code: "58", descShort: "室外风扇驱动故障", fullGuide: "1.检查直流风机插头是否松动。2.测量风机绕组。3.更换室外直流电机。" },
{ brand: "扬子", code: "72", descShort: "高负荷保护", fullGuide: "1.清洗冷凝器翅片。2.检查外机散热风扇。3.检查系统压力。" },
{ brand: "扬子", code: "73", descShort: "输入电流控制故障", fullGuide: "1.检测电源电压及负载电流。2.检查压缩机电容。3.更换主板。" },
{ brand: "扬子", code: "75", descShort: "壳温传感器异常故障", fullGuide: "1.检测壳顶温度传感器阻值。2.更换传感器。3.检查线路连接。" },
{ brand: "扬子", code: "82", descShort: "总功率异常故障", fullGuide: "1.检测整机功率。2.检查电源电压。3.更换主板。" },
{ brand: "扬子", code: "90", descShort: "压缩机通信故障", fullGuide: "1.检查外机主板与压缩机之间通讯。2.检查通讯线路。3.更换外机主板。" },
{ brand: "扬子", code: "91", descShort: "IPM过流故障", fullGuide: "1.断电后检查模块散热片。2.测量压缩机三相绕组。3.更换IPM模块或变频板。" },
{ brand: "扬子", code: "92", descShort: "压缩机缺相故障", fullGuide: "1.检查压缩机线序是否正确。2.测量压缩机三相绕组阻值。3.更换变频板。" },
{ brand: "扬子", code: "93", descShort: "压缩机失速故障", fullGuide: "1.检查压缩机线是否松脱。2.测量压缩机绕组阻值。3.更换变频模块或压缩机。" },
{ brand: "扬子", code: "94", descShort: "IPM过压故障", fullGuide: "1.检测电源电压。2.检查PFC电路。3.更换IPM模块或变频板。" },
{ brand: "科龙", code: "E1", descShort: "室内环境温度传感器故障 / 过冷保护 / 三相电源相序错误", fullGuide: "1.检查传感器插头是否松动，重新插拔。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.清洗过滤网，检查是否脏堵。4.检查制冷系统是否缺氟。5.对于三相电柜机，检查电源相序是否正确，调整相序。[citation:1][citation:7][citation:2]" },
{ brand: "科龙", code: "E2", descShort: "室内盘管温度传感器故障 / 制热过热保护", fullGuide: "1.测量盘管传感器阻值，25℃时约5-10K，异常则更换。2.清洗内机蒸发器和过滤网。3.检查内机风机转速是否正常，风量是否过小。4.检查制冷剂是否过多。[citation:7][citation:1]" },
{ brand: "科龙", code: "E3", descShort: "室外环境温度传感器异常 / 系统高压保护 / 压力继电器断开", fullGuide: "1.检测室外环境温度传感器阻值，异常则更换。2.清理外机翅片，检查散热是否良好。3.检查外机风扇是否运转。4.检查制冷剂是否过多。5.检查高压压力开关是否损坏。[citation:7][citation:2]" },
{ brand: "科龙", code: "E4", descShort: "压缩机排气温度过高保护 / 室外盘管传感器故障", fullGuide: "1.检测排气温度传感器阻值，异常则更换。2.检查制冷剂是否不足，检漏补氟。3.清理外机散热器，检查散热风扇。4.检查四通阀是否串气。5.检查系统是否堵塞。[citation:7]" },
{ brand: "科龙", code: "E5", descShort: "室内外机通讯故障 / 低压保护", fullGuide: "1.检查内外机连接线是否松动、接错或断线。2.检查端子是否氧化。3.断电重启，拔掉电源等待10分钟后再通电。4.检漏并补充制冷剂（低压保护时）。5.检查通讯电路，异常则更换主板。[citation:7][citation:4]" },
{ brand: "科龙", code: "E6", descShort: "室外盘管传感器故障 / 模块过热保护", fullGuide: "1.检查室外盘管传感器插头是否松动。2.测量传感器阻值，异常则更换。3.清理外机散热器，检查散热风扇。4.检查变频模块是否过热，清理外机散热片。[citation:7]" },
{ brand: "科龙", code: "E7", descShort: "电压异常保护 / 模式冲突", fullGuide: "1.测量电源电压是否在正常范围(220V±10%)。2.检查电源接线是否松动。3.电压不稳则加装稳压器。4.检查所有线控器模式设置是否一致。[citation:7]" },
{ brand: "科龙", code: "E8", descShort: "压缩机过热保护 / 防高温保护 / 三相压缩机过热", fullGuide: "1.清理内外机散热器。2.检查压缩机温度是否过高。3.检查制冷剂是否不足。4.检查系统是否堵塞。5.对于三相电柜机，检查压缩机电流。[citation:7][citation:10]" },
{ brand: "科龙", code: "E9", descShort: "制热防冷风 / 化霜保护", fullGuide: "空调正常进入化霜或防冷风模式，制热开机预热或化霜时运行指示灯闪烁，属正常现象，等待几分钟自动恢复。" },
{ brand: "科龙", code: "E0", descShort: "显示板与主板通信故障 / 传感器异常", fullGuide: "1.断电重启，拔掉电源等待10分钟后再通电。2.检查显示板连接排线是否松动或接触不良。3.检查排线接口是否氧化。4.更换显示板或主板。[citation:7]" },
{ brand: "科龙", code: "E0", descShort: "室内温度感应器故障（五匹机）", fullGuide: "1.检查室内温度传感器插头是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查传感器线路是否短路或断路。[citation:8]" },
{ brand: "科龙", code: "E1", descShort: "室外温度感应器故障（五匹机）", fullGuide: "1.检测室外环境温度传感器阻值。2.更换传感器。3.检查主板接口电路。[citation:8]" },
{ brand: "科龙", code: "E2", descShort: "室内外通信故障（五匹机）", fullGuide: "1.检查内外机连接线是否松动或断路。2.检查通信线路是否故障。3.更换控制器或主板。[citation:8]" },
{ brand: "科龙", code: "E3", descShort: "高压保护（五匹机）", fullGuide: "1.检查制冷剂是否过少或系统是否堵塞。2.清洗冷凝器和排水管。3.检查高压开关。[citation:8]" },
{ brand: "科龙", code: "E4", descShort: "低压保护（五匹机）", fullGuide: "1.检查制冷剂是否过多或泄漏。2.检漏并补充制冷剂。3.检查低压开关。[citation:8]" },
{ brand: "科龙", code: "E5", descShort: "压力传感器故障（五匹机）", fullGuide: "1.检查压力传感器插头是否松动。2.更换压力传感器。3.检查电路故障。[citation:8]" },
{ brand: "科龙", code: "P1", descShort: "系统压力过高保护 / 压缩机过载", fullGuide: "1.清洗冷凝器翅片。2.检查制冷剂是否过多。3.检查外机散热风扇。4.测量压缩机电流是否过大。[citation:10][citation:7]" },
{ brand: "科龙", code: "P2", descShort: "制冷过冷保护", fullGuide: "1.清洗内机过滤网和蒸发器。2.检查内机风量是否正常。3.检查制冷系统是否缺氟。4.检测盘管传感器。[citation:7]" },
{ brand: "科龙", code: "P3", descShort: "制热过热保护", fullGuide: "1.清洗内机过滤网。2.检查内机风机转速。3.检查冷媒量是否过多。4.更换盘管传感器。[citation:7]" },
{ brand: "科龙", code: "F0", descShort: "系统缺氟 / 制冷剂泄漏保护", fullGuide: "1.检漏并补充制冷剂。2.检查管路接头是否松动。3.检查密封圈是否老化。4.补漏后抽真空加氟。[citation:7]" },
{ brand: "科龙", code: "F1", descShort: "IPM变频模块保护 / 室内风机故障", fullGuide: "1.断电后检查模块散热片。2.检查压缩机绝缘是否下降。3.清理外机散热器。4.更换变频模块。5.检查室内风机电机是否损坏。[citation:7][citation:8]" },
{ brand: "科龙", code: "F2", descShort: "室外风机故障（五匹机）", fullGuide: "1.检查风机电机是否损坏。2.检查风机电容是否失效。3.检查电路故障。4.更换风机电机或电容。[citation:8]" },
{ brand: "科龙", code: "F3", descShort: "压缩机排气温度传感器故障", fullGuide: "1.检测排气传感器阻值。2.检查探头线路是否故障或损坏。3.更换排气传感器。[citation:7]" },
{ brand: "科龙", code: "F4", descShort: "直流母线电压异常", fullGuide: "1.检查电源电压是否稳定。2.检查PFC电路。3.检查变频模块是否故障。4.更换变频模块。[citation:7]" },
{ brand: "科龙", code: "F5", descShort: "室内机防冻保护", fullGuide: "1.清洗过滤网。2.检查内机风机转速。3.检查制冷剂是否不足。4.补充制冷剂。[citation:7]" },
{ brand: "科龙", code: "F6", descShort: "室外风机故障 / 外环温传感器故障", fullGuide: "1.检查风机电容是否失效，更换电容。2.检查风机电机是否损坏。3.检查外环温传感器。4.更换风机电机。[citation:7]" },
{ brand: "科龙", code: "11", descShort: "压缩机启动失败 / 运行失步故障", fullGuide: "1.检查制冷剂是否不足，补充氟利昂。2.检查电源电压是否过低，加装稳压器。3.检查电源导线是否老化，及时修复或更换。4.检查压缩机是否卡缸或磨损过大。[citation:9]" },
{ brand: "科龙", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "科龙", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "科龙", code: "dF", descShort: "自动化霜（正常）", fullGuide: "空调正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "科龙", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按遥控器复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "科龙", code: "OP", descShort: "待机模式", fullGuide: "空调处于待机模式，属正常状态，按遥控器开机键即可启动。" },
{ brand: "科龙", code: "E9", descShort: "制热防冷风/预热保护（正常）", fullGuide: "空调正常进入制热防冷风模式，属正常现象，等待几分钟自动恢复。" },
