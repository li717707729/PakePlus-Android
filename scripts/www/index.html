{ brand: "小米", category: "refrigerator", code: "dr / U10", descShort: "门开关故障/门未关严报警", fullGuide: "1.检查门是否关严，门轴是否有异物卡住。2.确认门关好后，关闭电源5分钟重新通电。3.若问题仍存在，更换门开关。[来源：小米官方支持]" },
{ brand: "小米", category: "refrigerator", code: "dL", descShort: "冷藏室左门开关故障", fullGuide: "1.检查冷藏室左门是否关严，门轴是否有异物卡住。2.确认门关好后，关闭电源5分钟重新通电。3.若问题仍存在，更换门开关。[来源：小米官方支持]" },
{ brand: "小米", category: "refrigerator", code: "dF", descShort: "冷冻室左门开关故障", fullGuide: "1.检查冷冻室左门是否关严，门轴是否有异物卡住。2.确认门关好后，关闭电源5分钟重新通电。3.若问题仍存在，更换门开关。[来源：小米官方支持]" },
{ brand: "小米", category: "refrigerator", code: "dS", descShort: "冷冻室右门开关故障", fullGuide: "1.检查冷冻室右门是否关严，门轴是否有异物卡住。2.确认门关好后，关闭电源5分钟重新通电。3.若问题仍存在，更换门开关。[来源：小米官方支持]" },
{ brand: "小米", category: "refrigerator", code: "UC / tp / H50", descShort: "显示板通讯故障", fullGuide: "1.关闭冰箱电源5分钟。2.5分钟后重新通电观察。3.若问题仍存在，需申请售后检测。[来源：小米官方支持]" },
{ brand: "小米", category: "refrigerator", code: "E9 / H85", descShort: "WiFi通信故障/无法连接互联网", fullGuide: "1.确认网络为2.4GHz(设备不支持5GHz网络)。2.更新米家APP到最新版本。3.确认路由器账号密码输入正确，可用手机热点测试连接。4.若手机热点连接成功，请检查路由器设置。[来源：小米官方支持]" },
{ brand: "小米", category: "refrigerator", code: "bit0", descShort: "通信故障(故障码bit0)", fullGuide: "冰箱主控板与显示板通讯异常。1.检查主控板与显示板之间的连接线是否松动。2.检查排线插头是否氧化。3.更换显示板或主控板。[来源：小米产品规格]" },
{ brand: "小米", category: "refrigerator", code: "bit16", descShort: "变频板通信故障", fullGuide: "1.检查主控板与变频板之间的通讯线。2.测量通讯电压。3.检查变频板供电。4.更换变频板或主控板。[来源：小米产品规格]" },
{ brand: "小米", category: "refrigerator", code: "bit12", descShort: "电压不足保护故障", fullGuide: "1.测量电源电压是否正常(187-242V)。2.检查供电线路是否接触不良。3.加装稳压器。[来源：小米产品规格]" },
{ brand: "小米", category: "refrigerator", code: "bit13", descShort: "冷媒检测故障/系统缺氟", fullGuide: "1.检漏并补充制冷剂。2.检查管路是否泄漏。3.检查压缩机是否正常工作。[来源：小米产品规格]" },
{ brand: "小米", category: "refrigerator", code: "bit11", descShort: "自动制冰保护故障", fullGuide: "1.检查制冰机进水阀是否工作。2.检查制冰机电机是否正常。3.检查冰盒检测传感器。4.更换制冰机组件。[来源：小米产品规格]" },
{ brand: "小米", category: "refrigerator", code: "bit10", descShort: "母婴室传感器故障", fullGuide: "1.检查母婴室传感器连接是否松动。2.测量传感器阻值，异常则更换。3.更换主控板。[来源：小米产品规格]" },
{ brand: "小米", category: "refrigerator", code: "bit17", descShort: "制冰机异常", fullGuide: "1.检查制冰机是否卡死。2.检查制冰机电机。3.检查进水阀。4.更换制冰机组件。[来源：小米产品规格]" },
{ brand: "新飞", category: "refrigerator", code: "E1", descShort: "冷藏室传感器短路或断路", fullGuide: "1.检查冷藏室传感器连接线是否松动，重新插紧。2.拔掉传感器插头测量阻值(25℃约5-10K)，异常则更换。3.检查传感器线路是否断路或短路。4.更换主控板。[来源：新飞售后资料+citation:2]" },
{ brand: "新飞", category: "refrigerator", code: "E2", descShort: "微冻室/冷藏室蒸发器感温头故障", fullGuide: "1.断电后卸下顶盖板，取出电路板。2.用万用表电阻挡测电器盒内10芯插座(左边)第3、5脚之间的直流电阻值。3.环境温度0℃-39℃时，若阻值小于1.0kΩ或大于6.7kΩ，则为感温头故障。4.在冷冻室蒸发器感温头与内藏线连接处挖出发泡剂，剪断后更换同型号感温头。5.插上电路板及显示板，通电测试。[来源：新飞售后资料+citation:2][citation:10]" },
{ brand: "新飞", category: "refrigerator", code: "E3", descShort: "冷冻室传感器短路或断路", fullGuide: "1.检查冷冻室传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查传感器线路。4.更换主控板。[来源：新飞售后资料+citation:2]" },
{ brand: "新飞", category: "refrigerator", code: "E4", descShort: "环温传感器短路或断路", fullGuide: "1.检查环境温度传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查主板接口。4.更换主控板。[来源：新飞售后资料+citation:2]" },
{ brand: "新飞", category: "refrigerator", code: "E5", descShort: "E2PROM读写故障", fullGuide: "1.断电重启，拔掉电源静置10分钟以上重新通电。2.如故障重现，可能是主控板存储器芯片损坏。3.更换主控板。[来源：新飞售后资料+citation:2]" },
{ brand: "新飞", category: "refrigerator", code: "E6", descShort: "超温报警/冷冻温度持续过高", fullGuide: "1.建议切断电源，取出冷冻食品，擦干冰箱，关闭冰箱门后重新通电。2.检查冷冻室门是否关严。3.检查一次性放入的温热食物是否过多。4.检查密封圈是否老化导致冷气泄漏。5.检查压缩机是否工作异常。6.通电后几分钟观察E6是否消除，若仍存在需联系售后检修。[来源：新飞售后资料+citation:1][citation:2][citation:8]" },
{ brand: "新飞", category: "refrigerator", code: "E7", descShort: "通讯不合格/主控与显示板通讯故障", fullGuide: "1.检查主控板与显示板之间的连接线是否松动或断裂。2.检查排线插头是否氧化。3.更换显示板。4.更换主控板。[来源：新飞售后资料+citation:2]" },
{ brand: "新飞", category: "refrigerator", code: "E8", descShort: "过零不合格/过零检测电路故障", fullGuide: "1.检查过零检测电路。2.检查电源波形是否畸变。3.更换主控板。[来源：新飞售后资料+citation:2]" },
{ brand: "新飞", category: "refrigerator", code: "Ed", descShort: "除霜异常/压缩机不工作", fullGuide: "1.启用强制除霜模式(同时按下冷藏、冷冻调节按钮3秒以上)。2.用万用表测量K4、K3输出触点电压是否为AC220V。3.如电压正常但发热管不热，测量除霜、排水发热器件阻值，正常则检查超热保护器。4.超热保护器熔断需更换，安装时避免靠近蒸发器，建议用热缩管包裹防水汽。[来源：啄木鸟维修+citation:5]" },
{ brand: "新飞", category: "refrigerator", code: "EF", descShort: "冷冻室照度传感器故障(BCD-198D系列)", fullGuide: "1.检查冷冻室照度传感器连接是否松动。2.清洁传感器表面。3.更换冷冻室照度传感器。4.更换主控板。[来源：新飞BCD-198D故障代码表+citation:4]" },
{ brand: "新飞", category: "refrigerator", code: "ER03", descShort: "电路板故障/传感器故障", fullGuide: "1.检查控制电路板是否损坏或短路，必要时更换电路板。2.检查各温度和湿度传感器是否损坏，更换相应传感器。3.尝试将冷藏温度调高观察是否解决。4.如问题仍存在，联系新飞售后服务中心。[来源：中关村在线+citation:3]" },
{ brand: "新飞", category: "refrigerator", code: "ER", descShort: "冷冻室显示ER/风扇电机故障", fullGuide: "1.冰箱冷藏显示FF，冷冻显示ER，断电重新开启后仍出现，多为冷冻室上方风扇电机故障。2.打开冷冻室上面的风扇盖子，手工按着门上面的关门开关。3.观察5-10分钟内风扇不转或转动无力，则风扇电机损坏需更换。4.查看风扇电机铭牌上的型号，按型号购买更换。5.定期清理冰箱进气口吸附的灰尘。[来源：中关村在线+citation:3]" },
{ brand: "新飞", category: "refrigerator", code: "FF", descShort: "冷藏显示FF/通讯故障或风扇故障", fullGuide: "1.冷藏显示FF，冷冻显示ER，多为冷冻室上方风扇电机故障。2.打开冷冻室上面的风扇盖子检查风扇运转情况。3.如风扇不转或转动无力需更换。4.检查冷冻室进气口是否被灰尘堵塞，定期清理。[来源：中关村在线+citation:3]" },
{ brand: "新飞", category: "refrigerator", code: "E0", descShort: "室内温度传感器故障", fullGuide: "1.检查温度传感器连接线是否松动、短路或断路。2.若松动则重新插紧。3.若传感器损坏则需更换。4.更换主控板。[来源：新飞售后资料+citation:6]" },
{ brand: "新飞", category: "refrigerator", code: "E3", descShort: "室内机排水系统故障/水位过高或排水泵故障", fullGuide: "1.清理排水管路堵塞物。2.检查排水泵是否正常工作，必要时更换。3.检查水位开关是否故障，进行复位或更换。4.清理接水盘。[来源：新飞售后资料+citation:6]" },
{ brand: "新飞", category: "refrigerator", code: "E5", descShort: "室内外机通信故障/信号线接触不良", fullGuide: "1.检查内外机连接线有无松动、断裂。2.检查信号线接触是否良好。3.检修主板或更换通信模块。[来源：新飞售后资料+citation:6]" },
{ brand: "新飞", category: "refrigerator", code: "E8", descShort: "压缩机过流保护", fullGuide: "1.检查电源电压是否在220V±10%正常范围内。2.测量压缩机电容容量，若损坏及时更换。3.检查压缩机是否卡缸。4.若无法解决，联系维修人员检修压缩机。[来源：新飞售后资料+citation:6]" },
{ brand: "新飞", category: "refrigerator", code: "H", descShort: "对应温区温度过高提示", fullGuide: "1.检查对应温区门是否关严。2.检查一次性放入的温热食物是否过多。3.检查门封条是否密封良好。4.等待冰箱自行降温。初次通电因间室温度高会显示H，随着温度降低会显示相应数字。[来源：新飞售后资料+citation:2]" },
{ brand: "新飞", category: "refrigerator", code: "L", descShort: "对应温区温度过低提示", fullGuide: "1.检查对应温区温度传感器是否异常。2.检查温控器设置是否过低。3.检查主控板控制电路。4.更换温度传感器或主控板。[来源：新飞售后资料+citation:2]" },
{ brand: "新飞", category: "refrigerator", code: "开门报警图标闪烁", descShort: "门未关严报警（非故障）", fullGuide: "提示用户关门，属正常提示功能。1.检查门是否关严。2.检查门开关是否接触良好。3.检查门封条是否密封严实。4.关好门后报警自动消除。[来源：新飞售后资料+citation:10]" },
{ brand: "新飞", category: "refrigerator", code: "dF", descShort: "自动化霜（正常）", fullGuide: "冰箱正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "新飞", category: "refrigerator", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "博世", category: "refrigerator", code: "E0", descShort: "冷藏室/冷藏室温度传感器短路或断路", fullGuide: "1.检查冷藏室传感器连接线是否松动，重新插紧。2.拔掉传感器插头测量阻值(25℃约5-10K)，异常则更换。3.检查传感器线路是否断路或短路。4.更换主控板。[来源：博世售后资料]" },
{ brand: "博世", category: "refrigerator", code: "E1", descShort: "冷藏室传感器短路或断路", fullGuide: "1.检查冷藏室传感器连接线是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查传感器线路。4.更换主控板。[来源：博世售后资料]" },
{ brand: "博世", category: "refrigerator", code: "E2", descShort: "微冻室传感器短路或断路", fullGuide: "1.检查微冻室/变温室传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查线路连接。4.更换主控板。[来源：博世售后资料]" },
{ brand: "博世", category: "refrigerator", code: "E02", descShort: "制冰机/冰水系统控制模块通讯故障", fullGuide: "1.关闭断路器30秒后重新通电重置冰箱。2.如果重置后错误再次出现，制冰机模块或控制系统可能存在故障。3.检查制冰机线路连接是否松动。4.联系博世客服进行专业诊断（博世客服热线：400-690-6088）。[来源：博世官方网站]" },
{ brand: "博世", category: "refrigerator", code: "E03", descShort: "分配器用户界面故障/温控抽屉温度传感器损坏", fullGuide: "1.关闭断路器30秒后重新通电重置冰箱。2.通电后检查分配器面板是否恢复正常操作。3.检查温控抽屉温度传感器是否损坏。4.如果问题仍然存在，联系博世客服寻求服务。[来源：博世官方网站+citation:1]" },
{ brand: "博世", category: "refrigerator", code: "E3", descShort: "冷冻室传感器短路或断路", fullGuide: "1.检查冷冻室传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查传感器线路。4.更换主控板。[来源：博世售后资料]" },
{ brand: "博世", category: "refrigerator", code: "E4", descShort: "环温传感器短路或断路/冷冻机冷凝器温度传感器故障", fullGuide: "1.检查环境温度传感器连接是否松动。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查主板接口。4.更换主控板。[来源：博世售后资料+citation:1]" },
{ brand: "博世", category: "refrigerator", code: "E5", descShort: "E2PROM读写故障", fullGuide: "1.断电重启，拔掉电源静置10分钟以上重新通电。2.如故障重现，可能是主控板存储器芯片损坏。3.更换主控板。[来源：博世售后资料]" },
{ brand: "博世", category: "refrigerator", code: "E6", descShort: "超温报警/冷冻温度持续过高", fullGuide: "1.检查冷冻室门是否关严。2.检查一次性放入的温热食物是否过多。3.检查冷凝器散热是否良好。4.等待冰箱自行降温。5.如果温度持续过高，联系售后检修。[来源：博世售后资料]" },
{ brand: "博世", category: "refrigerator", code: "E06", descShort: "冰箱蒸发器传感器故障", fullGuide: "1.蒸发器传感器在正常操作期间没有故障信息。2.自动诊断测试后，如果蒸发器传感器出现故障，则显示E06。3.检查蒸发器传感器连接是否松动。4.联系售后检修。[来源：博世维修资料]" },
{ brand: "博世", category: "refrigerator", code: "E7", descShort: "通讯不合格/主控与显示板通讯故障", fullGuide: "1.检查主控板与显示板之间的连接线是否松动或断裂。2.检查排线插头是否氧化。3.更换显示板。4.更换主控板。[来源：博世售后资料]" },
{ brand: "博世", category: "refrigerator", code: "E07", descShort: "冷冻蒸发器传感器故障", fullGuide: "1.冷冻蒸发器传感器在正常操作期间没有故障消息。2.自动诊断测试后，如果蒸发器传感器出现故障，则显示E07。3.检查冷冻蒸发器传感器连接。[来源：博世维修资料+citation:1]" },
{ brand: "博世", category: "refrigerator", code: "E8", descShort: "过零不合格/过零检测电路故障", fullGuide: "1.检查过零检测电路。2.检查电源波形是否畸变。3.更换主控板。[来源：博世售后资料]" },
{ brand: "博世", category: "refrigerator", code: "E9", descShort: "控制板坏或制冷剂泄漏", fullGuide: "1.检查制冷剂是否泄漏，检漏补氟。2.检查压缩机是否正常工作。3.如压缩机正常但温度不达标，可能是控制板故障，更换主控板。[来源：博世售后资料]" },
{ brand: "博世", category: "refrigerator", code: "E10", descShort: "电源模块软件故障", fullGuide: "1.拔掉电源插头或关闭断路器，等待5分钟后重新连接。2.如果错误信息仍然显示在显示屏上，请联系博世客服。[来源：博世官方资料]" },
{ brand: "博世", category: "refrigerator", code: "E11", descShort: "显示模块软件故障", fullGuide: "1.拔掉电源插头或关闭断路器，等待5分钟后重新连接。2.如果错误信息仍然显示在显示屏上，显示模块可能需要更换，请联系博世客服。[来源：博世官方资料]" },
{ brand: "博世", category: "refrigerator", code: "E15", descShort: "环境传感器断路/短路", fullGuide: "1.检查环境传感器连接是否松动。2.测量传感器阻值，异常则更换。3.更换主控板。[来源：博世维修资料+citation:1]" },
{ brand: "博世", category: "refrigerator", code: "E20", descShort: "电源和显示模块之间通讯错误", fullGuide: "1.检查电子部件之间的连接是否正常。2.检查冰箱的化霜器控制器是否损坏。3.检查主板是否损坏。4.断电重置（关闭断路器几分钟然后重新打开）。5.如故障仍存在，联系专业维修人员检修。[来源：博世维修资料+citation:2]" },
{ brand: "博世", category: "refrigerator", code: "E21", descShort: "显示控制模块与冰水机控制模块之间通讯错误", fullGuide: "1.检查显示模块与冰水机控制模块之间的通讯线路。2.检查连接插头是否松动。3.更换显示模块或冰水机控制模块。[来源：博世维修资料+citation:1]" },
// H系列故障代码
{ brand: "博世", category: "refrigerator", code: "H5", descShort: "变温室蒸发传感器故障", fullGuide: "1.断电30秒后重新通电观察。2.检查传感器感温插头线路，用万用表测量电阻值。3.变温室蒸发传感器阻值异常需更换传感器。4.感温头损坏时，更换冰箱的感温探头。[来源：博世售后资料]" },
// 报警提示类
{ brand: "博世", category: "refrigerator", code: "DOOROPEN", descShort: "门未关严报警", fullGuide: "1.当门保持打开30秒以上时触发报警。2.检查门是否关严，门轴是否有异物卡住。3.检查门开关是否接触良好。4.关好门后报警自动消除。[来源：博世维修资料+citation:1]" },
{ brand: "博世", category: "refrigerator", code: "LOWPOWER", descShort: "电压过低保护", fullGuide: "1.当电源电压低于85V（美国）或165V（欧洲标准）时显示。2.设备不工作，直到电压恢复正常。3.测量电源电压是否正常。4.如果警告信息延长，通知供电公司或加装稳压器。[来源：博世维修资料+citation:1]" },
{ brand: "博世", category: "refrigerator", code: "PO/PF", descShort: "停电后恢复/电源故障", fullGuide: "1.通常在短暂停电后出现，属信息提示。2.关闭断路器几分钟然后重新打开，重置冰箱。3.检查冷冻室温度是否正常。4.如正常则无需维修。[来源：博世官方资料]" },
{ brand: "博世", category: "refrigerator", code: "报警", descShort: "冷冻室高温报警", fullGuide: "1.当冷冻室实际温度高于-18度时出现报警提示。2.将耳朵贴在冰箱侧板，听压缩机是否有声音。3.将冷冻室设定温度手动调节到-18度以下。4.减少冷冻室一次性放入的食物量，避免无法均匀制冷。5.等待温度降低后报警自动消失。[来源：博世售后资料]" },
// 自检/测试模式
{ brand: "博世", category: "refrigerator", code: "E或D", descShort: "显示屏显示E或D/电子设备检测到故障", fullGuide: "1.关闭设备电源。2.拔掉电源插头或关闭断路器。3.等待5分钟后重新连接。4.如果错误信息仍然显示在显示屏上，请拨打博世客服热线。[来源：博世官方网站]" },
{ brand: "博世", category: "refrigerator", code: "温度显示闪烁", descShort: "冷冻室温度显示闪烁", fullGuide: "1.表示过去有故障导致冷冻室过热。2.按下报警按钮时，温度显示会短暂显示冷冻室达到的最高温度。3.按下报警按钮后，温度显示会停止闪烁并恢复设定温度显示。[来源：博世维修资料+citation:10]" },
{ brand: "博世", category: "refrigerator", code: "陈列室模式", descShort: "陈列室模式开启/电器不制冷但灯亮", fullGuide: "1.此模式用于陈列室展示，不制冷但灯光和显示正常工作。2.启动设备自检程序（通电后10秒内按住冷冻室按钮3-5秒直到听到声音）。3.程序结束后，设备将切换到正常操作。[来源：博世维修资料+citation:1]" },
{ brand: "松下", category: "refrigerator", code: "H01", descShort: "冷冻室传感器电路异常（断线或短路）", fullGuide: "1.检查冷冻室传感器连接线是否松动或断裂。2.拔掉传感器插头测量阻值(25℃约5-10K)，异常则更换。3.检查传感器线路是否断路或短路。4.如传感器正常则更换控制基板。[来源：松下维修手册NR-F461AX]" },
{ brand: "松下", category: "refrigerator", code: "H02", descShort: "冷藏室传感器电路异常（断线或短路）", fullGuide: "1.检查冷藏室传感器连接线是否松动或断裂。2.测量传感器阻值(25℃约5-10K)，异常则更换。3.检查传感器线路。4.更换控制基板。[来源：松下维修手册NR-F461AX]" },
{ brand: "松下", category: "refrigerator", code: "H04", descShort: "制冰传感器电路异常（断线或短路）", fullGuide: "1.检查制冰传感器连接线是否松动。2.测量传感器阻值，异常则更换。3.检查制冰机线路。4.更换控制基板。[来源：松下维修手册NR-F461AX]" },
{ brand: "松下", category: "refrigerator", code: "H05", descShort: "冷冻室除霜传感器电路异常", fullGuide: "1.检查冷冻室除霜传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查温度保险丝是否熔断。4.更换控制基板。[来源：松下维修手册NR-F461AX]" },
{ brand: "松下", category: "refrigerator", code: "H07", descShort: "外部气温传感器电路异常", fullGuide: "1.检查外部气温传感器（蜂鸣器ATC基板内）连接。2.测量传感器阻值，异常则更换。3.检查外部气温传感器电路。4.更换控制基板。[来源：松下维修手册NR-F461AX]" },
{ brand: "松下", category: "refrigerator", code: "H10", descShort: "切换室传感器异常", fullGuide: "1.检查切换室/变温室传感器连接是否松动。2.测量传感器阻值，异常则更换。3.检查传感器线路。4.更换控制基板。[来源：松下维修手册NR-F461AX]" },
{ brand: "松下", category: "refrigerator", code: "H21", descShort: "制冰机异常（保护控制中）", fullGuide: "1.检查制冰机旋转部位是否卡死。2.检查制冰机电机是否正常运转。3.检查制冰机组件。4.更换制冰机或控制基板。[来源：松下维修手册NR-F461AX]" },
{ brand: "松下", category: "refrigerator", code: "H27", descShort: "冷藏室用风扇电机断线/锁定", fullGuide: "1.检查冷藏室风扇是否被冰堵住或异物卡住。2.断电化霜处理。3.测量风扇电机供电电压。4.检查风扇电机是否断线。5.更换冷藏室风扇电机或控制基板。[来源：松下维修手册NR-F461AX]" },
{ brand: "松下", category: "refrigerator", code: "H28", descShort: "机械室用风扇电机断线/锁定", fullGuide: "1.检查机械室风扇是否被异物卡住。2.检查机械室用风扇电机是否断线。3.测量风扇电机供电电压。4.注意：外部气温达到40℃以上时，会强制停止压缩机。5.更换机械室风扇电机。[来源：松下维修手册NR-F461AX]" },
{ brand: "松下", category: "refrigerator", code: "H29", descShort: "冷冻室用风扇电机断线/锁定", fullGuide: "1.检查冷冻室风扇是否被冰堵住或异物卡住。2.断电化霜处理。3.测量风扇电机供电电压。4.检查风扇电机是否断线。5.更换冷冻室风扇电机。[来源：松下维修手册NR-F461AX]" },
{ brand: "长虹", category: "refrigerator", code: "E0", descShort: "室内温度传感器故障（接触不良、短路或断路）", fullGuide: "1.检查传感器连接线是否松动，重新插紧。2.若松动则重新插紧；若无效，需更换温度传感器。3.测量传感器阻值(25℃约5-10K)，异常则更换。4.更换主控板。[来源：长虹冰箱售后资料]" },
{ brand: "长虹", category: "refrigerator", code: "E3", descShort: "室内机排水系统故障（水位过高或排水泵故障）", fullGuide: "1.清理排水管路堵塞物。2.检查排水泵是否正常工作，必要时更换。3.检查水位开关是否故障，进行复位或更换。4.清理接水盘。[来源：长虹冰箱售后资料]" },
{ brand: "长虹", category: "refrigerator", code: "E5", descShort: "室内外机通信故障（信号线接触不良、外机电源异常或主板故障）", fullGuide: "1.检查内外机连接线有无松动、断裂。2.检查信号线接触是否良好。3.检修主板或更换通信模块。[来源：长虹冰箱售后资料]" },
{ brand: "长虹", category: "refrigerator", code: "E8", descShort: "压缩机过流保护（电压不稳、压缩机卡缸、电容损坏）", fullGuide: "1.检查电源电压是否在220V±10%正常范围内。2.测量压缩机电容容量，若损坏及时更换。3.检查压缩机是否卡缸。4.若无法解决，联系维修人员检修压缩机。[来源：长虹冰箱售后资料]" },
{ brand: "长虹", category: "refrigerator", code: "H", descShort: "对应温区温度过高提示", fullGuide: "1.检查对应温区门是否关严。2.检查一次性放入的温热食物是否过多。3.检查门封条是否密封良好。4.等待冰箱自行降温。初次通电因间室温度高会显示H，随着温度降低会显示相应数字。[来源：长虹冰箱售后资料]" },
{ brand: "长虹", category: "refrigerator", code: "L", descShort: "对应温区温度过低提示", fullGuide: "1.检查对应温区温度传感器是否异常。2.检查温控器设置是否过低。3.检查主控板控制电路。4.更换温度传感器或主控板。[来源：长虹冰箱售后资料]" },
{ brand: "长虹", category: "refrigerator", code: "dF", descShort: "自动化霜（正常）", fullGuide: "冰箱正常进入化霜模式，属正常现象，等待化霜结束即可。" },
{ brand: "长虹", category: "refrigerator", code: "CL", descShort: "滤网清洗提醒", fullGuide: "1.清洗过滤网。2.按复位键消除提醒。3.检查风道是否堵塞。" },
{ brand: "云米", category: "refrigerator", code: "E0", descShort: "冷藏室/冷冻室传感器故障", fullGuide: "1.检查主控板输出端到冷藏传感器1之间是否存在断路或短路现象。2.测量感温头阻值(25℃约5-10K)，异常则更换。3.检查传感器线路连接。4.更换主控板。[来源：云米技术文档+citation:2]" },
{ brand: "云米", category: "refrigerator", code: "E1", descShort: "冷冻室蒸发器传感器故障", fullGuide: "1.检查主控板输出端到除霜传感器之间是否存在断路或短路现象。2.测量感温头阻值，异常则更换。3.检查冷冻室蒸发器是否结霜严重。4.更换主控板。[来源：云米技术文档+citation:2]" },
{ brand: "云米", category: "refrigerator", code: "E2", descShort: "多传感器同时故障（需同时显示E0、E1）", fullGuide: "1.同时检查冷藏室传感器和冷冻室蒸发器传感器。2.分别测量两个传感器阻值，异常则更换。3.检查传感器线路。4.更换主控板。[来源：云米技术文档+citation:2]" },
{ brand: "云米", category: "refrigerator", code: "EH", descShort: "环温传感器故障", fullGuide: "1.检查主控板输出端到环境温度传感器之间是否存在断路或短路现象。2.测量感温头阻值，异常则更换。3.检查主板接口。4.更换主控板。[来源：云米技术文档+citation:2]" },
{ brand: "云米", category: "refrigerator", code: "EC", descShort: "通信故障", fullGuide: "1.检查显控板与主控板之间的连接线是否松动。2.检查显示板和主控板连接线。3.更换显示板。4.更换主控板。[来源：云米技术文档+citation:2]" },
{ brand: "云米", category: "refrigerator", code: "EF", descShort: "风机报警", fullGuide: "1.检查主板冷冻风机端子是否供电。2.检查风扇是否堵转或不工作。3.测量风扇电机供电电压。4.主板坏更换主板，电机坏更换电机。[来源：云米技术文档+citation:2]" },
{ brand: "云米", category: "refrigerator", code: "EL", descShort: "WiFi通信故障", fullGuide: "1.检查WiFi模块与主控板连接线是否松动。2.确认网络为2.4GHz(设备不支持5GHz网络)。3.更新米家APP到最新版本。4.断电重启冰箱。5.更换WiFi模块。[来源：云米技术文档+citation:2]" },
{ brand: "云米", category: "refrigerator", code: "RS", descShort: "冷藏室传感器故障", fullGuide: "1.检查主控板输出端到冷藏传感器之间是否存在断路或短路现象。2.测量感温头阻值，异常则更换。3.检查传感器线路。4.更换主控板。[来源：云米技术文档+citation:2]" },
{ brand: "云米", category: "refrigerator", code: "FS", descShort: "冷冻室传感器故障", fullGuide: "1.检查主控板输出端到冷冻传感器之间是否存在断路或短路现象。2.测量感温头阻值，异常则更换。3.检查传感器线路。4.更换主控板。[来源：云米技术文档+citation:2]" },
{ brand: "云米", category: "refrigerator", code: "DS", descShort: "右上铰链盖内温湿传感器故障", fullGuide: "1.检查主控板输出端到环境温度传感器之间是否存在断路或短路现象。2.测量感温头阻值，异常则更换。3.检查右上铰链盖内传感器线路。4.更换传感器或主控板。[来源：云米技术文档+citation:2]" },
{ brand: "云米", category: "refrigerator", code: "Fd", descShort: "冷冻室内蒸发器化霜传感器故障", fullGuide: "1.检查主控板输出端到除霜传感器之间是否存在断路或短路现象。2.测量感温头阻值，异常则更换。3.检查化霜加热器是否正常。4.更换主控板。[来源：云米技术文档+citation:2]" },
{ brand: "云米", category: "refrigerator", code: "DC", descShort: "通讯故障", fullGuide: "1.检查显控板与主控板及显示板和主控板连接线。2.检查排线插头是否氧化。3.更换显示板。4.更换主控板。[来源：云米技术文档+citation:2]" },
{ brand: "云米", category: "refrigerator", code: "FF", descShort: "冷冻风道内风机故障", fullGuide: "1.检查主板冷冻风机端子是否供电。2.检查风扇是否堵转或不工作。3.测量风扇电机供电电压。4.主板坏更换主板，电机坏更换电机。[来源：云米技术文档+citation:2]" },
{ brand: "云米", category: "refrigerator", code: "OF / off", descShort: "冷藏室关闭模式（非故障）", fullGuide: "表示冷藏室已关闭。1.检测冷藏室设定温度。2.调节温度重新开启冷藏室。[来源：云米技术文档+citation:2]" },
{ brand: "云米", category: "refrigerator", code: "rH", descShort: "环境温度传感器异常", fullGuide: "1.检查主控板输出端到环境传感器之间是否存在断路或短路现象。2.测量感温头阻值，异常则更换。3.检查主板接口。4.更换主控板。[来源：云米技术文档+citation:2]" },
{ brand: "云米", category: "refrigerator", code: "rS", descShort: "冷藏传感器异常", fullGuide: "1.检查主控板输出端到冷藏传感器之间是否存在断路或短路现象。2.测量感温头阻值，异常则更换。3.更换主控板。[来源：云米技术文档+citation:2]" },
{ brand: "云米", category: "refrigerator", code: "dS", descShort: "除霜传感器异常", fullGuide: "1.检查主控板输出端到除霜传感器之间是否存在断路或短路现象。2.测量感温头阻值，异常则更换。3.检查化霜加热器。4.更换主控板。[来源：云米技术文档+citation:2]" },
{ brand: "云米", category: "refrigerator", code: "dH / dA", descShort: "除霜不良/化霜系统故障", fullGuide: "1.检查化霜加热器是否断路，测量阻值(正常200-400Ω)。2.检查化霜熔断器是否断路。3.检查化霜温度传感器是否断路。4.检查主控板输出端电压是否正常。5.更换故障部件。[来源：云米技术文档+citation:2]" },
{ brand: "云米", category: "refrigerator", code: "CO / IC", descShort: "通信异常", fullGuide: "1.检查显控板与主控板及显示板和主控板连接线。2.检查排线插头是否氧化。3.更换显示板。4.更换主控板。[来源：云米技术文档+citation:2]" },
{ brand: "云米", category: "refrigerator", code: "FF(电机)", descShort: "冷冻电机异常", fullGuide: "1.检查主板冷冻风机端子是否供电。2.检查风扇是否堵转或不工作。3.电机不转或转速异常需更换。4.主板坏更换主板。[来源：云米技术文档+citation:2]" },
{ brand: "云米", category: "refrigerator", code: "CH", descShort: "冷凝器高温报警", fullGuide: "1.冷凝器温度高于高温报警启动值时会显示CH警报。2.冷柜继续运转，待冷凝器温度回落后自动解除报警。3.检查冷凝器散热是否良好，清理灰尘。4.检查冷凝器风扇是否运转。[来源：云米技术文档+citation:9]" },
{ brand: "创维", category: "refrigerator", code: "E1", descShort: "冷藏室温度传感器故障", fullGuide: "1.检查主控制板上的连接器是否插接良好。2.用万用表测量对应传感器线是否有电阻，常温25℃正常阻值2-3kΩ。3.若无电阻或阻值异常，更换温度传感器。4.检查线路连接，更换主控板。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "E2", descShort: "冷冻室温度传感器故障", fullGuide: "1.检查主控制板上的连接器是否插接良好。2.用万用表测量对应传感器线是否有电阻，常温25℃正常阻值2-3kΩ。3.若无电阻或阻值异常，更换冷冻室温度传感器。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "E3", descShort: "化霜温度传感器故障（冷冻蒸发器上）", fullGuide: "1.检查主控制板上的连接器是否插接良好。2.拆开冷冻室风道上盖板及风扇电机支架，检查化霜感温头是否插接到位。3.测量化霜传感器阻值（常温25℃正常2-3kΩ），异常则更换。4.检查化霜加热器是否正常。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "E4", descShort: "直流风机故障", fullGuide: "1.检查显示电路板连接器是否插接良好。2.检查连接器是否有泡沫堵塞或变形，清理泡沫或更换连接器。3.检查风机是否堵转或不工作。4.测量风机电机供电电压。5.更换风机电机或主控板。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "E5", descShort: "发送通讯故障", fullGuide: "1.检查显示电路板连接器是否插接良好。2.检查连接器是否有泡沫堵塞或变形，清理或更换。3.检查显示板与主控板之间的通讯线路。4.更换显示板或主控板。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "E6", descShort: "超温报警（冷冻室温度过高）", fullGuide: "1.冰箱内放置了过热的物品导致温度上升，将物品拿出冰箱并擦干水分，等待15分钟后重新通电。2.检查冰箱门密封圈是否老化，更换密封圈。3.检查压缩机是否工作异常，判断电压是否稳定。4.切断电源，取出冷冻食品，擦干冰箱，关闭冰箱门重新通电，几分钟后E6故障会自动消除。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "F1", descShort: "冷藏室/冷藏空间温度传感器故障", fullGuide: "1.检查冷藏空间温度传感器插件是否松脱或接触不良。2.测量传感器阻值（常温25℃正常2-3kΩ），断路或短路则更换温度传感器。3.检查传感器线路。4.更换主控板。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "F2", descShort: "软冷室/变温室温度传感器故障", fullGuide: "1.检查软冷冻室/变温室温度传感器插件是否松脱或接触不良。2.测量传感器阻值（常温25℃正常2-3kΩ），断路或短路则更换传感器。3.更换主控板。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "F3", descShort: "冷冻室温度传感器故障/冷藏蒸发器传感器和冷藏空间传感器同时故障", fullGuide: "1.检查冷冻室传感器插件是否松脱。2.测量传感器阻值（常温25℃正常2-3kΩ），异常则更换。3.对于部分型号，表示冷藏空间和冷藏蒸发器传感器同时故障，需同时检查两个传感器。4.更换主控板。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "F4", descShort: "环境温度传感器故障", fullGuide: "1.检查环境温度传感器插件是否松脱或接触不良。2.测量传感器阻值（常温25℃正常2-3kΩ），异常则更换。3.更换显示板。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "F5", descShort: "冷藏室温度传感器与环境传感器同时故障", fullGuide: "1.检查冷藏室温度传感器插件是否松脱。2.测量冷藏室传感器阻值，异常则更换。3.检查环境传感器是否异常。4.更换显示板或主控板。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "F6", descShort: "显示板通讯接收故障", fullGuide: "1.检查显示板插线端子是否松脱或接触不良。2.检查排线插头是否氧化。3.更换显示板。4.更换主控板。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "F7", descShort: "主控板通讯接收故障", fullGuide: "1.检查显示板/主控板插线端子是否松脱或接触不良。2.主控板元器件可能损坏，更换主控板。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "F8", descShort: "冷藏蒸发器传感器故障/系统异常保护", fullGuide: "1.检查冷藏蒸发器传感器插件是否松脱或接触不良。2.测量传感器阻值（常温25℃正常2-3kΩ），断路或短路则更换温度传感器。3.检查入户电压电流是否异常，安装稳压器。4.检查冰箱制冷剂是否不足。5.检查压缩机是否过热或声音异常。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "FS", descShort: "冷冻传感器（冷冻室左侧）异常", fullGuide: "1.检查冷冻室温度传感器插件是否松脱或接触不良。2.测量传感器阻值（常温25℃正常2-3kΩ），断路或短路则更换传感器。3.检查主控板是否损坏，更换主控板。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "rH/rt", descShort: "环境温度传感器（左侧铰链盖下方）异常", fullGuide: "1.检查环境温度传感器插件是否松脱或接触不良。2.测量传感器阻值（常温25℃正常2-3kΩ），断路或短路则更换温度传感器。3.检查主板接口。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "rS", descShort: "冷藏传感器1（冷藏室灯组件处）异常", fullGuide: "1.检查冷藏室温度传感器插件是否松脱或接触不良。2.测量传感器阻值（常温25℃正常2-3kΩ），断路或短路则更换传感器。3.主控板是否损坏，更换主控板。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "r2", descShort: "冷藏传感器2（冷藏室右侧）异常", fullGuide: "1.检查冷藏室温度传感器插件是否松脱或接触不良。2.测量传感器阻值（常温25℃正常2-3kΩ），断路或短路则更换传感器。3.主控板是否损坏，更换主控板。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "bS", descShort: "变温传感器异常", fullGuide: "1.检查变温室温度传感器插件是否松脱或接触不良。2.测量传感器阻值（常温25℃正常2-3kΩ），断路或短路则更换传感器。3.主控板是否损坏，更换主控板。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "dS", descShort: "除霜温度传感器（冷冻蒸发器上）异常", fullGuide: "1.检查除霜温度传感器插件是否松脱或接触不良。2.测量传感器阻值（常温25℃正常2-3kΩ），断路或短路则更换传感器。3.主控板是否损坏，更换主控板。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "dH/dA", descShort: "除霜不良（开始除霜经过80分钟除霜传感器不到5℃以上）", fullGuide: "1.检查温度熔断保护器和加热器插件是否松脱或接触不良。2.检查熔断保护器和加热器及加热继电器内部是否断线，更换熔断保护器。3.检查排水口是否被堵住，疏通排水管。4.更换化霜加热器或主控板。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "CO/IC", descShort: "控制板处理器和显示板处理器之间通信异常", fullGuide: "1.检查控制板和显示板之间线路是否断路或短路，更换线路。2.检查各个插件是否松脱或接触不良。3.主控板坏，更换主控板。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "FF", descShort: "冷冻室风机异常", fullGuide: "1.检查冷冻室风机线束插件是否松脱或接触不良。2.检查风机线束是否断路或短路。3.风机电机损坏，更换冷冻室风机。4.主控板损坏，更换主控板。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "CF", descShort: "冷凝风机异常", fullGuide: "1.检查冷凝风机线束插件是否松脱或接触不良。2.检查风机线束是否断路或短路。3.风机电机损坏，更换冷凝风机。4.主控板损坏，更换主控板。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "dr", descShort: "开门报警（用户开门后60s内未检测到关门信号）/门开关故障", fullGuide: "1.检查门是否关好。2.检查门封条是否密封严实。3.检查霍尔开关及线束是否损坏，更换霍尔开关。4.检查连线是否有开路。5.更换显示板。6.更换主控板。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "UC", descShort: "温控板与控制器通讯故障", fullGuide: "1.重启冰箱：拔掉电源插头，等待5分钟后重新插上电源并开启冰箱。2.检查电源线和插头：确保电源线与插座接触良好。3.打开冰箱后面的面板，检查温控板和连接线是否有断裂或损坏。4.检查冷凝器排架是否积满尘土和油污导致散热不良。5.检查压缩机是否故障。6.更换温控器或电路板。[来源：创维售后资料]" },
{ brand: "创维", category: "refrigerator", code: "F0", descShort: "冷藏室/冷冻室传感器故障", fullGuide: "1.检查主控板输出端到冷藏传感器1之间是否存在断路或短路现象。2.测量感温头阻值，异常则更换。3.检查传感器线路连接。4.更换主控板。[来源：创维技术文档]" },
{ brand: "创维", category: "refrigerator", code: "OF/off", descShort: "制冷关闭模式（非故障）", fullGuide: "表示冷藏室或制冷已关闭。1.检测冷藏室设定温度。2.调节温度重新开启冷藏室。[来源：创维技术文档]" },
{ brand: "创维", category: "refrigerator", code: "dF", descShort: "自动化霜（正常）", fullGuide: "冰箱正常进入化霜模式，属正常现象，等待化霜结束即可。" },

    const washerDatabase = {
        faults: [
           { brand: "云米", category: "washer", code: "E1", descShort: "进水超时/供水异常", fullGuide: "1.检查自来水阀门是否打开，水压是否过低。2.清洁进水阀滤网，清除堵塞物。3.检查进水管是否弯折或堵塞。4.检查进水阀是否损坏，测量线圈阻值。5.更换进水阀或电脑板。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E2", descShort: "排水超时/6分钟未排空", fullGuide: "1.检查排水管是否放下或弯折。2.清理排水过滤器及排水口异物。3.检查排水泵是否堵塞或损坏，清理叶轮。4.检查水位传感器是否故障。5.更换排水泵或电脑板。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E3", descShort: "门锁异常/锁门解锁故障", fullGuide: "1.检查门是否关到位，门钩与门锁是否对齐。2.检查门封条是否平整无变形。3.检查门锁控制线路是否开路。4.检查电脑板门锁继电器是否故障。5.更换门锁组件或电脑板。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E4", descShort: "溢水保护/水位过高", fullGuide: "1.检查进水阀是否卡死导致进水不止。2.检查水位传感器是否故障。3.检查排水管是否堵塞导致无法排水。4.断开电源后取出衣物，清理排水系统。5.更换进水阀或水位传感器。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E5", descShort: "水位传感器异常/频率无变化", fullGuide: "1.检查水位传感器连接线是否松动或脱落。2.检查水位传感器气管是否漏气或堵塞。3.检查电脑板与传感器通讯是否正常。4.更换水位传感器。5.更换电脑板。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E6", descShort: "水加热异常/不加热", fullGuide: "1.检查加热管接线是否松动或脱落。2.测量加热管阻值是否正常(通常20-50Ω)。3.检查温度传感器是否正常。4.检查电脑板加热控制电路。5.更换加热管或电脑板。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E7", descShort: "水加热异常/温度过高", fullGuide: "1.检查加热管是否短路导致持续加热。2.检查温度传感器是否故障。3.检查电脑板加热继电器是否粘连。4.测量水温是否超过90度。5.更换加热管、温度传感器或电脑板。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E9", descShort: "主板与显板通讯异常", fullGuide: "1.检查显示板与主控板之间的连接线是否松动或脱落。2.检查排线插头是否氧化。3.检查是否存在电磁干扰。4.更换显示板。5.更换主控板。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E10", descShort: "电机霍尔传感器故障", fullGuide: "1.检查电机霍尔插件是否松动或脱落。2.测量霍尔传感器供电电压(5V)。3.手动转动滚筒测量霍尔信号输出。4.更换电机或主控板。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E11", descShort: "电机堵转/过载", fullGuide: "1.检查滚筒内衣物是否过多或缠绕。2.检查皮带是否过松或脱落。3.手动转动滚筒检查是否卡滞。4.检查电机是否损坏。5.减少衣物量或更换皮带/电机。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E12", descShort: "电机驱动板异常", fullGuide: "1.检查驱动板与主控板之间通讯线路。2.检查驱动板供电是否正常。3.检查电机连接线是否松动。4.更换电机驱动板。5.更换主控板。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E13", descShort: "加热管故障/开路", fullGuide: "1.测量加热管阻值，正常为20-50Ω。2.检查加热管接线端子是否松动或烧毁。3.检查温度保险丝是否熔断。4.更换加热管。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E14", descShort: "温度传感器故障", fullGuide: "1.检查温度传感器连接线是否松动。2.测量传感器阻值(25℃约5-10K)。3.更换温度传感器。4.更换主控板。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E15", descShort: "臭氧发生器故障（部分型号）", fullGuide: "1.检查臭氧发生器连接线是否松动。2.检查臭氧发生器模块是否损坏。3.更换臭氧发生器。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E16", descShort: "风机转速异常（烘干机型）", fullGuide: "1.检查风机电机是否卡滞。2.检查风机连接线是否松动。3.检查风道是否堵塞。4.更换风机电机。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E17", descShort: "烘干加热管异常（烘干机型）", fullGuide: "1.测量加热管阻值是否正常。2.检查加热管接线是否松动。3.检查温度传感器是否正常。4.更换加热管。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E18", descShort: "烘干温度过高保护", fullGuide: "1.检查烘干进风口是否堵塞。2.检查温度传感器是否故障。3.检查加热管是否短路。4.清理风道。5.更换温度传感器或加热管。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E19", descShort: "滚筒内湿度过大保护", fullGuide: "1.检查衣物脱水是否不彻底。2.检查排水系统是否堵塞。3.调整烘干程序重新运行。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E20", descShort: "水位传感器频率异常", fullGuide: "1.检查水位传感器气管是否漏气或堵塞。2.检查水位传感器连接线是否松动。3.更换水位传感器。4.更换主控板。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E21", descShort: "进水阀短路/开路", fullGuide: "1.测量进水阀线圈阻值，正常约4-6kΩ。2.检查进水阀连接线是否松动。3.更换进水阀。4.更换主控板。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E22", descShort: "排水泵短路/开路", fullGuide: "1.测量排水泵线圈阻值，正常约200-300Ω。2.检查排水泵连接线是否松动。3.清理排水泵叶轮异物。4.更换排水泵。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E23", descShort: "泡沫过多保护", fullGuide: "1.检查是否使用了非低泡洗衣机专用洗涤剂。2.建议使用少量低泡洗涤剂。3.添加额外的漂洗程序消除过多泡沫。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E24", descShort: "排水过滤器堵塞", fullGuide: "1.打开排水过滤器盖。2.清理过滤器内的硬币、纽扣、毛絮等杂物。3.确保过滤器旋紧到位后重新运行。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E25", descShort: "进水阀漏水/水压过高", fullGuide: "1.检查进水阀是否卡死导致常流水。2.检查水压是否过高超出标准。3.更换进水阀。[来源：云米官方故障代码表]" },
{ brand: "云米", category: "washer", code: "E26", descShort: "出水管位置过高保护", fullGuide: "1.检查出水管是否插在高于地面100cm的位置。2.将排水管高度调整到低于100cm。3.确保排水管末端未被封闭。[来源：云米官方故障代码表]" },
{ brand: "海尔", category: "washer", code: "E1", descShort: "门锁异常/机门未关好", fullGuide: "1.请重新关好机门，确保门锁到位。2.检查门封条是否平整无变形。3.检查门锁控制线路是否开路。4.按住启动/暂停键2秒钟尝试开门。5.如有应急拉绳可垂直拉动打开机门。6.更换门锁组件或电脑板。[来源：海尔官网+citation:1][citation:2][citation:7]" },
{ brand: "海尔", category: "washer", code: "E2", descShort: "排水故障/排水超时", fullGuide: "1.检查排水管是否放下或弯折。2.清理排水过滤器及排水口异物。3.检查排水泵是否堵塞或损坏，清理叶轮。4.排水时8分钟水位没有达到复位以下。5.更换排水泵或电脑板。[来源：海尔官网+citation:1][citation:2][citation:7]" },
{ brand: "海尔", category: "washer", code: "E3", descShort: "温度传感器故障/排水超时报警", fullGuide: "1.检查温度传感器连接线是否松动。2.测量传感器阻值(25℃约5-10K)。3.检查排水管是否畅通。4.更换温度传感器。5.更换主控板。[来源：海尔官网+citation:7]" },
{ brand: "海尔", category: "washer", code: "E4", descShort: "进水超时/水压过低或进水阀堵塞", fullGuide: "1.检查水龙头是否完全打开。2.清洁进水阀滤网，清除堵塞物。3.检查进水管是否弯折。4.检查水压是否过低。5.更换进水阀或电脑板。[来源：海尔官网+citation:1][citation:2][citation:7]" },
{ brand: "海尔", category: "washer", code: "E5", descShort: "电机运转异常/电机过热保护", fullGuide: "1.检查电机插接线是否接触不良。2.检查电机是否过热保护。3.测量电机绕组阻值。4.更换电机或变频板。[来源：海尔官网+citation:2][citation:5][citation:7]" },
{ brand: "海尔", category: "washer", code: "E6", descShort: "烘干加热管异常/加热超温保护", fullGuide: "1.测量加热管阻值是否正常(通常20-50Ω)。2.检查加热管接线是否松动。3.检查温度传感器是否正常。4.水温加热温度过高保护。5.更换加热管或温度传感器。[来源：海尔官网+citation:7]" },
{ brand: "海尔", category: "washer", code: "E7", descShort: "电机故障/温度传感器异常", fullGuide: "1.检查电机插接线是否接触不良或受干扰。2.检查温度传感器NTC是否异常保护。3.检查电机是否损坏。4.更换电机或温度传感器。[来源：海尔官网+citation:2][citation:7]" },
{ brand: "海尔", category: "washer", code: "E8", descShort: "超水位保护/水位超过警戒线", fullGuide: "1.拔掉电源插头。2.关闭水龙头。3.检查进水阀是否卡死导致进水不止。4.检查排水管是否堵塞。5.联系售后检修。[来源：海尔官网+citation:1][citation:6][citation:7]" },
{ brand: "海尔", category: "washer", code: "E9", descShort: "超水位保护(洗涤水位未检测到)/烘干温度传感器故障", fullGuide: "1.检查水位传感器是否故障。2.检查进排水系统是否正常。3.检查烘干温度传感器是否开路或短路。4.更换水位传感器或温度传感器。[来源：海尔官网+citation:7]" },
{ brand: "海尔", category: "washer", code: "E10", descShort: "水位传感器故障", fullGuide: "1.检查水位传感器连接线是否松动。2.检查水位传感器气管是否漏气或堵塞。3.检查电脑板与传感器通讯是否正常。4.更换水位传感器。5.更换电脑板。[来源：海尔官网+citation:7]" },
{ brand: "海尔", category: "washer", code: "E11", descShort: "进水异常", fullGuide: "1.进水5分钟后没有达到复位水位。2.检查水龙头是否打开。3.检查进水阀滤网是否堵塞。4.检查水压是否过低。5.清理进水阀或更换。[来源：海尔官网+citation:4][citation:7]" },
{ brand: "海尔", category: "washer", code: "E12", descShort: "排水异常", fullGuide: "1.排水时8分钟水位没有达到复位以下。2.检查排水管是否堵塞或弯折。3.清理排水过滤器。4.检查排水泵是否工作。5.更换排水泵。[来源：海尔官网+citation:4][citation:7]" },
{ brand: "海尔", category: "washer", code: "E13", descShort: "给水异常/水位超过警戒水位", fullGuide: "1.检查进水阀是否卡死导致进水不止。2.检查水位传感器是否故障。3.检查排水管是否堵塞。4.更换进水阀或水位传感器。[来源：海尔官网+citation:7]" },
{ brand: "海尔", category: "washer", code: "E14", descShort: "甩干分布不平衡", fullGuide: "1.请将筒内衣物抖散均匀。2.检查洗衣机是否放置平稳。3.避免洗涤单件大件衣物或防水面料衣物。4.减少衣物量重新运行。[来源：海尔官网+citation:7]" },
{ brand: "海尔", category: "washer", code: "E16", descShort: "存储芯片故障/断电记忆失效", fullGuide: "1.EEPROM储存错误。2.断电重启尝试恢复。3.更换主控板。[来源：海尔官网+citation:7]" },
{ brand: "海尔", category: "washer", code: "E20", descShort: "进水超时故障", fullGuide: "1.检查水龙头是否打开，确保水源正常供应。2.检查进水管是否堵塞，清理干净。3.检查洗衣机水位感应器是否损坏。[来源：海尔官网+citation:8]" },
{ brand: "海尔", category: "washer", code: "E22", descShort: "断电记忆失效", fullGuide: "1.EEPROM储存错误。2.断电重启尝试恢复。3.更换主控板。[来源：海尔官网+citation:7]" },
{ brand: "海尔", category: "washer", code: "E30", descShort: "排水超时故障", fullGuide: "1.检查排水管是否弯曲或堵塞，清理干净。2.检查排水泵是否正常工作，如有损坏需要更换。[来源：海尔官网+citation:8]" },
{ brand: "海尔", category: "washer", code: "E31", descShort: "电机自我保护", fullGuide: "1.电机运行时测速电机反馈信号8秒不变。2.检查电机霍尔传感器。3.更换电机或主控板。[来源：海尔官网+citation:7]" },
{ brand: "海尔", category: "washer", code: "E40", descShort: "温度传感器故障", fullGuide: "1.检查温度传感器是否损坏，如有损坏需要更换。2.检查温度传感器与主板连接是否正常，如有松动需重新连接。[来源：海尔官网+citation:8]" },
{ brand: "海尔", category: "washer", code: "E50", descShort: "门锁故障", fullGuide: "1.检查门锁是否损坏，如有损坏需要更换。2.检查门锁与主板连接是否正常，如有松动需重新连接。[来源：海尔官网+citation:8]" },
{ brand: "海尔", category: "washer", code: "E61", descShort: "空气滤网未安装到位(洗烘一体机型)", fullGuide: "1.检查最后一道空气滤网是否安装到位。2.清洁滤网后重新安装。3.确保滤网安装牢固后重新运行。[来源：海尔官网+citation:9]" },
{ brand: "海尔", category: "washer", code: "ERR1", descShort: "门锁异常/机门未正常关闭", fullGuide: "1.检查门是否异常或未正常关闭。2.重新关门确保门锁到位。3.更换门锁组件。[来源：海尔官网+citation:10]" },
{ brand: "海尔", category: "washer", code: "ERR2", descShort: "排水泵故障", fullGuide: "1.可自行先清理底部过滤网。2.检查排水泵是否堵塞。3.更换排水泵。[来源：海尔官网+citation:10]" },
{ brand: "海尔", category: "washer", code: "ERR3", descShort: "温度传感器故障", fullGuide: "1.检查温度传感器连接线是否松动。2.测量传感器阻值。3.更换温度传感器。[来源：海尔官网+citation:10]" },
{ brand: "海尔", category: "washer", code: "ERR4", descShort: "电路管路接触不良", fullGuide: "1.检查电路故障。2.检查管路连接是否正常。3.建议请售后服务人员修理。[来源：海尔官网+citation:10]" },
{ brand: "海尔", category: "washer", code: "ERR5", descShort: "进水异常/规定时间未达到设定水位", fullGuide: "1.检查进水阀门是否堵塞。2.检查水龙头是否打开，水压是否正常。3.清理进水阀滤网。[来源：啄木鸟维修+citation:3][citation:10]" },
{ brand: "海尔", category: "washer", code: "ERR8", descShort: "水位过高保护/洗衣机内水过多", fullGuide: "1.拔掉电源插头，关闭水龙头。2.联系售后上门检修。[来源：海尔官网+citation:6]" },
{ brand: "海尔", category: "washer", code: "E2EE", descShort: "存储芯片故障", fullGuide: "1.断电重启尝试恢复。2.更换主控板。[来源：海尔官网+citation:7]" },
{ brand: "海尔", category: "washer", code: "EC1", descShort: "加热管异常/加热10分钟内水温无变化", fullGuide: "1.测量加热管阻值是否正常。2.检查加热管接线是否松动。3.更换加热管。[来源：海尔官网+citation:4][citation:7]" },
{ brand: "海尔", category: "washer", code: "EC2", descShort: "水温传感器异常/开路或短路", fullGuide: "1.检查水温传感器连接线是否松动。2.测量传感器阻值。3.更换水温传感器。[来源：海尔官网+citation:7]" },
{ brand: "海尔", category: "washer", code: "EC3", descShort: "水位传感器异常/开路或短路", fullGuide: "1.检查水位传感器连接线是否松动。2.检查气管是否漏气。3.更换水位传感器。[来源：海尔官网+citation:7]" },
{ brand: "海尔", category: "washer", code: "EC4", descShort: "出风口温度异常/烘干30分钟内5分钟无变化", fullGuide: "1.检查烘干进风口是否堵塞。2.检查风道是否畅通。3.更换温度传感器。[来源：海尔官网+citation:7]" },
{ brand: "海尔", category: "washer", code: "EC5", descShort: "烘干温度传感器异常/开路或短路", fullGuide: "1.检查烘干温度传感器连接线。2.测量传感器阻值。3.更换烘干温度传感器。[来源：海尔官网+citation:7]" },
{ brand: "海尔", category: "washer", code: "EA3", descShort: "干燥时水位异常/烘干时超过设定水位", fullGuide: "1.检查排水系统是否正常。2.检查水位传感器。3.清理排水泵过滤器。[来源：海尔官网+citation:4][citation:7]" },
{ brand: "海尔", category: "washer", code: "F1", descShort: "水位传感器接触不良", fullGuide: "1.检查水位传感器连接线是否松动。2.检查传感器与电脑板通讯。3.更换水位传感器。[来源：太平洋科技+citation:4][citation:7]" },
{ brand: "海尔", category: "washer", code: "F7", descShort: "电机故障/变频板故障", fullGuide: "1.检查是否因衣物缠绕而造成堵转，整理衣物重新运行。2.检查电机插线是否未插好。3.用万用表测量电机任意两相间电阻是否为18.5欧姆。4.更换变频板或电机。[来源：啄木鸟维修+citation:5]" },
{ brand: "海尔", category: "washer", code: "FC0", descShort: "系统故障", fullGuide: "请联系售后检修。[来源：海尔官网+citation:1]" },
{ brand: "海尔", category: "washer", code: "FC1", descShort: "系统故障", fullGuide: "请联系售后检修。[来源：海尔官网+citation:1]" },
{ brand: "海尔", category: "washer", code: "FC2", descShort: "系统故障", fullGuide: "请联系售后检修。[来源：海尔官网+citation:1]" },
{ brand: "海尔", category: "washer", code: "FA", descShort: "系统故障", fullGuide: "请联系售后检修。[来源：海尔官网+citation:1]" },
{ brand: "海尔", category: "washer", code: "UNB", descShort: "脱水不平衡/衣物分布不均", fullGuide: "1.请将筒内衣物抖散均匀。2.检查洗衣机是否放置平稳。[来源：海尔官网+citation:1]" },
{ brand: "海尔", category: "washer", code: "U01", descShort: "门锁解除异常", fullGuide: "1.4次解除门锁仍未解除。2.检查门锁组件。3.更换门锁。[来源：海尔官网+citation:7]" },
{ brand: "海尔", category: "washer", code: "U02", descShort: "门锁异常", fullGuide: "1.4次进行门锁后仍未锁住。2.检查门锁组件。3.更换门锁。[来源：海尔官网+citation:7]" },
{ brand: "海尔", category: "washer", code: "U03", descShort: "脱水异常", fullGuide: "1.最后脱水时不平衡判定为1200克以上。2.将衣物抖散均匀。3.减少衣物量。[来源：海尔官网+citation:7]" },
{ brand: "海尔", category: "washer", code: "U4", descShort: "机门未关好", fullGuide: "1.检查机门是否完全关闭。2.重新关门确保门锁到位。[来源：海尔官网+citation:7]" },
{ brand: "海尔", category: "washer", code: "U5", descShort: "洗衣机中间盖未完全盖好", fullGuide: "1.检查洗衣机中间的盖子是否完全盖好。2.重新盖好盖子。[来源：海尔官网+citation:7]" },
{ brand: "海尔", category: "washer", code: "UL", descShort: "洗衣机盖无法打开/童锁功能开启", fullGuide: "1.检查是否设置了童锁功能。2.解除童锁后再尝试开门。[来源：海尔官网+citation:7]" },
{ brand: "海尔", category: "washer", code: "NAL-E", descShort: "烘干时筒内衣物过多", fullGuide: "1.取出部分衣物。2.然后再选择烘干按钮。[来源：海尔官网+citation:4][citation:7]" },
{ brand: "海尔", category: "washer", code: "END", descShort: "程序结束", fullGuide: "洗衣机程序运行结束，属正常提示。[来源：海尔官网+citation:7]" },
{ brand: "海信", category: "washer", code: "E1", descShort: "进水超时/水压过低或进水阀堵塞", fullGuide: "1.检查水龙头是否完全打开，水压是否过低。2.检查进水管是否弯折或冻住。3.清洁进水阀滤网，清除堵塞物。4.按启动/暂停键继续运行，若仍报故障需更换进水阀或电脑板。[来源：海信售后资料+citation:1]" },
{ brand: "海信", category: "washer", code: "E2", descShort: "排水超时/排水管堵塞或排水泵故障", fullGuide: "1.检查排水管是否放下或弯折。2.清理排水过滤器及排水口异物。3.检查排水泵是否堵塞或损坏，清理叶轮。4.按启动/暂停键继续运行，若仍报故障需更换排水泵。[来源：海信售后资料+citation:1]" },
{ brand: "海信", category: "washer", code: "E3", descShort: "上盖未盖好/脱水不平衡", fullGuide: "1.检查洗衣机上盖是否完全盖好。2.将桶内衣物抖散均匀，避免单件大件衣物。3.重新盖上盖子按启动键继续运行。[来源：海信售后资料+citation:1]" },
{ brand: "海信", category: "washer", code: "E4", descShort: "进水超时/8分钟未达到设定水位", fullGuide: "1.检查水龙头是否打开，水压是否正常。2.检查进水阀滤网是否堵塞。3.检查进水管是否弯折。4.更换进水阀。[来源：海信售后资料+citation:1]" },
{ brand: "海信", category: "washer", code: "E5", descShort: "水温超过50度/过载保护", fullGuide: "1.检查进水温度是否过高。2.检查洗涤衣物是否过多导致电机过载。3.检查加热管是否故障。4.待水温降低后重新运行。[来源：海信售后资料+citation:1]" },
{ brand: "海信", category: "washer", code: "E6", descShort: "使用了高泡洗衣粉", fullGuide: "1.使用了非低泡洗衣机专用洗涤剂。2.建议使用少量低泡洗涤剂。3.添加额外的漂洗程序消除过多泡沫。[来源：海信售后资料+citation:1]" },
{ brand: "海信", category: "washer", code: "E8", descShort: "面板/主板通信故障", fullGuide: "1.检查显示板与主控板之间的连接线是否松动。2.检查排线插头是否氧化。3.更换显示板。4.更换主控板。[来源：海信售后资料+citation:5]" },
{ brand: "海信", category: "washer", code: "E9", descShort: "室内外板通信故障", fullGuide: "1.检查主控板与显示板之间通讯线路。2.更换显示板。3.更换主控板。[来源：海信售后资料+citation:5]" },
{ brand: "海信", category: "washer", code: "F1", descShort: "水位传感器接触不良或故障", fullGuide: "1.拔下水位传感器的透明管下端吹气，可以听到传感器的动作声音，说明通水管未漏气。2.检查水位传感器连接线是否松动。3.检查传感器气管是否漏气或堵塞。4.更换水位传感器。[来源：海信售后资料+citation:1]" },
{ brand: "海信", category: "washer", code: "F3", descShort: "排水异常/排水泵故障", fullGuide: "1.检查排水管是否冻结、打结或堵塞。2.清理排水泵过滤器。3.检查排水泵是否工作。4.更换排水泵。[来源：海信售后资料+citation:3]" },
{ brand: "海信", category: "washer", code: "F7", descShort: "电机故障/变频板故障/电机插线松动", fullGuide: "1.检查是否因衣物缠绕造成堵转，整理衣物重新运行。2.检查电机插线是否未插好，有无接线端子脱落。3.用万用表测量电机任意两相间电阻是否为18.5欧姆。4.更换变频板或电机。[来源：海信售后资料+citation:2]" },
{ brand: "海信", category: "washer", code: "F8", descShort: "加热管异常", fullGuide: "1.测量加热管阻值是否正常(通常20-50Ω)。2.检查加热管接线是否松动。3.更换加热管。[来源：海信售后资料+citation:9]" },
{ brand: "海信", category: "washer", code: "F13/F14", descShort: "门锁异常/机门未关好", fullGuide: "1.确保机门完全关紧，听到清晰的咔嗒声表示锁定成功。2.按启动/暂停键尝试复位故障。3.检查门锁连接线是否松动。4.更换门锁组件。[来源：海信售后资料+citation:3]" },
{ brand: "海信", category: "washer", code: "F24", descShort: "水位过高/溢水故障", fullGuide: "1.检查进水阀是否卡死导致进水不止。2.检查水位传感器是否故障。3.检查排水管是否堵塞。4.按启动/暂停键消除故障并恢复进水操作。[来源：海信售后资料+citation:9]" },
{ brand: "海信", category: "washer", code: "F99", descShort: "肥皂盒未关闭", fullGuide: "1.检查洗涤剂盒是否完全关闭。2.关闭肥皂盒后按启动/暂停键消除故障，程序将恢复运行。[来源：海信售后资料+citation:3]" },
{ brand: "海信", category: "washer", code: "E1(空调类)", descShort: "室内温度传感器故障", fullGuide: "1.检查室内温度传感器连接线是否松动。2.测量传感器阻值。3.更换传感器。[来源：海信售后资料+citation:5]" },
{ brand: "海信", category: "washer", code: "E3(空调类)", descShort: "室外温度传感器故障", fullGuide: "1.检查室外温度传感器连接线是否松动。2.测量传感器阻值。3.更换传感器。[来源：海信售后资料+citation:5]" },
{ brand: "海信", category: "washer", code: "E5(空调类)", descShort: "电流过大", fullGuide: "1.检测压缩机电流是否过大。2.检查电源电压是否稳定。3.检查系统压力。[来源：海信售后资料+citation:5]" },
{ brand: "海信", category: "washer", code: "E6(空调类)", descShort: "压力保护", fullGuide: "1.检查制冷剂压力是否过高或过低。2.检漏补氟。3.更换压力开关。[来源：海信售后资料+citation:5]" },
{ brand: "海信", category: "washer", code: "E7(空调类)", descShort: "低电压保护", fullGuide: "1.测量电源电压是否正常(187-242V)。2.加装稳压器。[来源：海信售后资料+citation:5]" },
{ brand: "海信", category: "washer", code: "ERR1", descShort: "门锁异常/机门未正常关闭", fullGuide: "1.检查机门是否异常或未正常关闭。2.重新关好机门，确保门锁到位。3.更换门锁组件。[来源：海信售后资料+citation:1]" },
{ brand: "海信", category: "washer", code: "ERR2", descShort: "排水泵故障", fullGuide: "1.清理底部过滤网。2.检查排水泵是否堵塞。3.更换排水泵。[来源：海信售后资料+citation:1]" },
{ brand: "海信", category: "washer", code: "ERR3", descShort: "温度传感器故障", fullGuide: "1.检查温度传感器连接线是否松动。2.测量传感器阻值(25℃约5-10K)。3.更换温度传感器。[来源：海信售后资料+citation:1]" },
{ brand: "海信", category: "washer", code: "ERR4", descShort: "加热管故障/加热功能异常", fullGuide: "1.检查加热管线路是否接触不良。2.测量加热管阻值是否正常。3.更换加热管。[来源：海信售后资料+citation:1]" },
{ brand: "海信", category: "washer", code: "ERR5", descShort: "进水超时/8分钟后未达到水位", fullGuide: "1.检查水龙头是否打开。2.检查进水阀滤网是否堵塞。3.更换进水阀。[来源：海信售后资料+citation:1]" },
{ brand: "海信", category: "washer", code: "UN", descShort: "脱水不平衡/衣物分布不均", fullGuide: "1.将桶内衣物抖散均匀。2.避免洗涤单件大件衣物或防水面料衣物。3.检查洗衣机是否放置平稳。4.调整后盖上盖子按启动键继续运行。[来源：海信售后资料+citation:4]" },
{ brand: "海信", category: "washer", code: "F01", descShort: "进水异常/进水超时", fullGuide: "1.查看洗衣机进水龙头是否全开并有足够的水压。2.检查进水管是否有被冻住、打结或堵塞。3.检查进水阀过滤网是否堵塞，进水阀是否损坏。4.测量电磁阀线圈电阻(正常4.5-5.1kΩ)，异常则更换进水阀。[来源：海信售后资料+citation:3]" },
{ brand: "海信", category: "washer", code: "F03", descShort: "排水异常/水不排干", fullGuide: "1.检查排水管是否冻结、打结或堵塞。2.清理排水泵过滤器。3.检查排水泵是否工作。4.更换排水泵。[来源：海信售后资料+citation:3]" },
{ brand: "海信", category: "washer", code: "F13/F14", descShort: "门锁异常/无法正确锁定或解锁", fullGuide: "1.检查门是否关闭到位。2.按启动/暂停按钮取消故障并重新开门或锁门。3.检查门锁连接线是否松动。4.更换门锁组件。[来源：海信售后资料+citation:3]" },
{ brand: "海信", category: "washer", code: "F24", descShort: "水位太高/溢水保护", fullGuide: "1.检查进水阀是否卡死导致进水不止。2.检查水位传感器是否故障。3.按启动/暂停按钮消除故障并恢复进水操作。[来源：海信售后资料+citation:3]" },
{ brand: "海信", category: "washer", code: "F99", descShort: "肥皂盒未关闭", fullGuide: "1.关闭洗涤剂盒。2.按启动/暂停按钮消除故障，程序将恢复运行。[来源：海信售后资料+citation:3]" },
{ brand: "博世", category: "washer", code: "E16/F16", descShort: "门未正确锁闭/门锁故障", fullGuide: "1.检查门是否完全关闭，确保听到清晰的咔嗒锁止声。2.检查衣物是否夹在门缝中。3.检查门封条是否平整无变形。4.断电静置5分钟后重新通电。5.若仍报故障，检查门锁组件触点电阻(正常0.2-0.8Ω)，更换门锁。[来源：博世官方+啄木鸟维修]" },
{ brand: "博世", category: "washer", code: "E34/F34", descShort: "门锁异常/门未锁好", fullGuide: "1.检查门是否完全关闭。2.检查是否有衣物卡在门与机壳之间。3.重新关门后重启程序。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "E67", descShort: "门打不开/运行模块故障", fullGuide: "1.关闭洗衣机总电源，等待1-2分钟后重新通电测试。2.若仍无法开门，需联系售后上门更换门锁组件。[来源：万师傅]" },
// 进水相关故障
{ brand: "博世", category: "washer", code: "E17/F17/F29", descShort: "进水异常/进水过滤器堵塞或水压过低", fullGuide: "1.检查水龙头是否完全打开。2.清洁进水管滤网：关闭水龙头，拆下进水管，用小刷子清洁滤网。3.检查进水管是否弯折或压住。4.确保水压足够(全开水龙头约10升/分钟)。5.若问题持续，联系水管工或更换进水电磁阀。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "E30/10/-10/-20", descShort: "水压过低/进水过滤器堵塞/水位测量系统故障", fullGuide: "1.检查水龙头是否打开。2.清洁进水滤网。3.检查进水管是否弯折。4.等待约5分钟直到排水过程结束。5.关闭并重新打开洗衣机电源重置故障信息。6.若仍显示故障，联系博世客服。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "H9E", descShort: "热水龙头未打开/热水水压过低", fullGuide: "1.确认热水软管已正确连接。2.打开热水龙头。3.检查热水进水管是否弯折。4.检查热水水压是否正常。5.清洁进水管滤网。[来源：博世官网]" },
// 排水相关故障
{ brand: "博世", category: "washer", code: "E18/F18", descShort: "排水管堵塞/弯折/排水泵堵塞", fullGuide: "1.检查排水管是否弯折或被压住。2.清理排水泵过滤器：打开右下角维修盖，排空残余水，取出泵内异物。3.检查排水管安装高度是否超过1米。4.确保泵盖已正确拧紧(手柄垂直位置)。5.如仍有问题，联系博世客服4008-855-888。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "E:00 <-> -18", descShort: "排水泵堵塞/排水管堵塞", fullGuide: "1.清洁洗衣机排水软管和/或排水管。2.需要执行排水泵维护以清除堵塞物。3.参考用户手册了解如何清洁排水泵。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "E:36 -25 / -26", descShort: "排水泵堵塞", fullGuide: "1.清洁排水泵。2.确保泵盖已正确组装并完全拧紧。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "E:38 / -25 / -26", descShort: "排水泵堵塞", fullGuide: "1.清洁滚筒。2.如故障再次出现，清洁排水泵。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "E:30 / -80", descShort: "排水管堵塞/弯折/排水泵堵塞/泵盖未拧紧", fullGuide: "1.清洁排水管和出水软管。2.确保排水管没有弯折。3.确保排水管安装高度不超过1米。4.移除排水软管上不合适的延长管。5.清洁排水泵。6.确保泵盖已完全拧紧(手柄垂直位置)。7.减少洗涤剂用量。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "E1", descShort: "排水超时/排水管堵塞", fullGuide: "1.检查排水管是否放下或弯折。2.清理排水过滤器及排水口异物。3.检查排水泵是否堵塞或损坏。4.联系售后检修。[来源：啄木鸟维修]" },
{ brand: "博世", category: "washer", code: "E2", descShort: "上盖未盖好/进水超时(部分型号)", fullGuide: "1.检查洗衣机上盖是否完全盖好。2.重新盖好盖子后运行。[来源：啄木鸟维修]" },
// 加热/温度相关故障
{ brand: "博世", category: "washer", code: "E:00 <-> -23", descShort: "底部有水/机器漏水", fullGuide: "1.立即关闭水龙头。2.拔掉电源插头。3.联系博世客服安排上门维修。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "E19/F19", descShort: "加热超时", fullGuide: "1.断电静置5分钟后重新通电。2.检查加热管是否损坏。3.若仍报故障，联系博世客服安排维修。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "E20/F20", descShort: "意外加热/非预期加热", fullGuide: "1.关闭并重新打开洗衣机电源重置。2.如果无法纠正错误，联系博世客服安排维修预约。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "E5", descShort: "水温超过50度", fullGuide: "1.检查进水温度是否过高。2.检查加热管是否故障。3.待水温降低后重新运行。[来源：啄木鸟维修]" },
{ brand: "博世", category: "washer", code: "E6", descShort: "加热超温报警", fullGuide: "1.水加热温度过高保护。2.检查加热管是否短路。3.检查温度传感器。4.联系检修。[来源：啄木鸟维修]" },
{ brand: "博世", category: "washer", code: "E4", descShort: "加热管故障/加热异常", fullGuide: "1.检查加热管线路是否接触不良。2.测量加热管阻值是否正常。3.更换加热管。[来源：啄木鸟维修]" },
{ brand: "博世", category: "washer", code: "E7", descShort: "温度传感器异常/NTC异常保护", fullGuide: "1.检查温度传感器连接线是否松动。2.测量传感器阻值(25℃约5-10K)。3.更换温度传感器。[来源：啄木鸟维修]" },
// 电机/变频板故障
{ brand: "博世", category: "washer", code: "E5(SO6A)", descShort: "电机运转异常/电机保护报警", fullGuide: "1.检查电机霍尔传感器连接。2.检查电机是否过热。3.更换电机或变频板。[来源：啄木鸟维修]" },
{ brand: "博世", category: "washer", code: "E7(HTD/BS68)", descShort: "电机故障", fullGuide: "1.检查电机连接线是否松动。2.测量电机绕组阻值。3.更换电机。[来源：啄木鸟维修]" },
{ brand: "博世", category: "washer", code: "E80", descShort: "驱动电路故障/电机驱动异常", fullGuide: "1.故障只能由授权技术人员排除。2.联系博世客服安排维修。[来源：博世官网]" },
// 不平衡/甩干相关故障
{ brand: "博世", category: "washer", code: "E32/F32", descShort: "衣物分布不平衡/甩干中断", fullGuide: "1.将大小件衣物混合洗涤以减少不平衡。2.确保枕头、被套上的拉链和纽扣已扣好。3.将衣物抖散均匀后重新运行甩干程序。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "H:32", descShort: "衣物分布不均匀/甩干中断", fullGuide: "1.将滚筒内衣物抖散均匀。2.混合大小件衣物洗涤。3.不同尺寸的衣物在甩干过程中能更好地分布。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "E3", descShort: "脱水不平衡", fullGuide: "1.将桶内衣物重新抖散开来。2.避免洗涤单件大件衣物。3.检查洗衣机是否放置平稳。[来源：啄木鸟维修]" },
{ brand: "博世", category: "washer", code: "E:60 -2B", descShort: "衣物分布不均匀", fullGuide: "1.不平衡检测系统已触发并中断甩干。2.重新分布滚筒内的衣物。3.尽量混合大小件衣物洗涤。[来源：博世官网]" },
// 泡沫/洗涤剂相关故障
{ brand: "博世", category: "washer", code: "气泡图标", descShort: "洗涤剂用量过多/泡沫过多", fullGuide: "1.将1汤匙衣物柔顺剂与约0.5升水混合，倒入分配器II格中。2.注意：洗涤户外服装、运动装或羽绒填充物品时请勿加入此混合物。3.下次洗涤同量衣物时减少洗涤剂用量。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "E33/F33", descShort: "检测到洗涤剂泡沫/洗涤剂过多", fullGuide: "1.减少洗涤剂用量。2.洗涤轻微脏污衣物时，洗涤剂用量应相应减少。3.关于洗涤剂用量的信息可在洗涤剂包装上找到。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "E6", descShort: "使用高泡洗衣粉/泡沫过多", fullGuide: "1.使用了非低泡洗衣机专用洗涤剂。2.建议使用少量低泡洗涤剂。3.添加额外的漂洗程序消除过多泡沫。[来源：啄木鸟维修]" },
{ brand: "博世", category: "washer", code: "E:30/-20", descShort: "洗涤剂用量过多/额外加水/电磁阀故障", fullGuide: "1.将1汤匙衣物柔顺剂与约0.5升水混合，倒入分配器II格中。2.不要在洗衣机运行时额外加水。3.若电磁阀故障，联系博世客服。[来源：博世官网]" },
// 智能投放系统故障
{ brand: "博世", category: "washer", code: "E10/-00/-10/-20", descShort: "智能投放系统泵堵塞", fullGuide: "1.将洗衣机置于待机模式。2.清洁泵单元。3.清洁后重新开机。4.如故障代码再次显示，可手动停用智能投放系统。5.联系博世客服。[来源：博世官网]" },
// 传感器故障
{ brand: "博世", category: "washer", code: "F1", descShort: "水位传感器接触不良", fullGuide: "1.拔下水位传感器透明管下端吹气，可听到传感器动作声说明通水管未漏气。2.检查水位传感器连接线是否松动。3.更换水位传感器。[来源：啄木鸟维修]" },
{ brand: "博世", category: "washer", code: "E25/F25", descShort: "浊度传感器故障", fullGuide: "1.断电静置5分钟后重新通电。2.如故障仍存在，联系博世客服安排维修。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "E26/F26", descShort: "模拟压力传感器故障/水位传感器故障", fullGuide: "1.此故障无法自行修复。2.联系博世客服安排维修预约。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "E28/F28", descShort: "流量传感器故障", fullGuide: "1.断电静置5分钟后重新通电。2.如故障仍存在，联系博世客服安排维修。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "F27", descShort: "压力传感器故障", fullGuide: "1.此故障需要专业检测。2.联系博世客服安排维修。[来源：博世官网]" },
// 通信/系统故障
{ brand: "博世", category: "washer", code: "E56", descShort: "通信错误/程序异常", fullGuide: "1.断电静置5分钟后重新通电。2.如故障仍存在，联系博世客服。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "E0/E3", descShort: "控制面板按键失灵/液体渗入", fullGuide: "1.检查控制面板按键是否有液体渗入或物理卡滞。2.断电静置5分钟后重新通电。3.若故障仍存在，联系博世客服。[来源：太平洋科技]" },
// AquaStop/漏水保护
{ brand: "博世", category: "washer", code: "E23/F23", descShort: "AquaStop安全软管已激活/漏水保护", fullGuide: "1.AquaStop安全装置包含电动阀，切勿浸入水中。2.立即关闭水龙头。3.联系博世客服安排维修。[来源：博世官网]" },
// 其他提示/非故障代码
{ brand: "博世", category: "washer", code: "CL", descShort: "儿童锁已激活", fullGuide: "1.儿童锁已激活，请参考用户手册了解如何解除儿童锁。2.可在此处下载用户手册副本。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "暂停图标闪烁", descShort: "节能模式已激活", fullGuide: "1.节能模式已激活。2.按下暂停/播放图标，显示屏将再次亮起。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "水滴滚筒图标", descShort: "需要执行筒清洁程序", fullGuide: "1.需要执行筒清洁程序。2.运行筒清洁程序清除滚筒内残留物。[来源：博世官网]" },
{ brand: "博世", category: "washer", code: "A02", descShort: "水位传感器信号异常", fullGuide: "1.检查进水管是否弯折。2.清洁进水阀滤网。3.断电静置5分钟重新通电。[来源：太平洋科技]" },
{ brand: "博世", category: "washer", code: "END", descShort: "程序结束", fullGuide: "洗衣机程序运行结束，属正常提示。[来源：啄木鸟维修]" },
{ brand: "博世", category: "washer", code: "E03", descShort: "控制面板按键失灵", fullGuide: "1.确认控制面板按键是否有液体渗入或物理卡滞。2.断电静置5分钟后重新通电。[来源：太平洋科技]" },
{ brand: "美的", category: "washer", code: "E1", descShort: "进水超时报警/水压过低或进水阀堵塞", fullGuide: "1.检查是否停水，水龙头是否完全打开。2.检查管接口是否漏水。3.清洁进水阀滤网，清除堵塞物。4.检查进水管是否扭结或冻结。5.开盖后重新关闭上盖，报警即可消除。6.如仍报故障需更换进水阀或电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E2/E3", descShort: "脱水开盖报警/盖板未盖好", fullGuide: "1.检查盖板是否盖好。2.如设置了水回收功能，开盖后再盖好即可。3.检查排水管是否未放下或排水高度超过15公分。4.检查压力软管是否堵塞。5.用户使用了高泡沫洗衣粉也可能导致此报警。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E3/E4", descShort: "纠偏无效报警/衣物分布不均", fullGuide: "1.脱水撞桶3次修正无效。2.检查洗衣机是否倾斜，底脚是否悬空。3.将桶内衣物重新抖散均匀。4.避免洗涤单件大件衣物。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E4/E2", descShort: "排水超时报警/排水管堵塞或弯折", fullGuide: "1.检查排水管是否未放下。2.清理排水管内的冰冻或脏堵物。3.检查排水管是否弯折或压扁。4.检查电压是否过低。5.更换排水泵或电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E5", descShort: "溢水报警/进水阀卡死或水位传感器故障", fullGuide: "1.核查压力管是否弯折或被挤压。2.检查水位传感器是否故障。3.检查进水阀是否卡死导致进水不止。4.更换进水阀或水位传感器。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E8", descShort: "水位传感器故障", fullGuide: "1.核查传感器接线端子是否受潮或松脱。2.检查水位传感器连接线是否松动。3.检查传感器气管是否漏气或堵塞。4.更换水位传感器。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "F0", descShort: "跳电失败报警/电源开关故障", fullGuide: "1.检查电源开关是否被挤压。2.断电重启尝试恢复。3.更换电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "F1", descShort: "通讯故障报警/电脑板接线松动", fullGuide: "1.检查电脑板接线是否松动。2.检查排线插头是否氧化。3.更换电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "F2", descShort: "芯片记忆错误", fullGuide: "1.断电重启尝试恢复。2.更换电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "F3", descShort: "霍尔传感器报警(老机型)", fullGuide: "1.检查霍尔传感器连接线是否松动。2.更换离合器(老机型)。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "F4", descShort: "电机出错/传动系统堵转", fullGuide: "1.检查传动系统是否堵转。2.检查电机连接线是否松动。3.测量电机绕组阻值。4.更换电机。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "F5", descShort: "IPM过热(老机型)", fullGuide: "1.检查电源电压是否稳定。2.更换电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "F6", descShort: "IPM过流(老机型)", fullGuide: "1.检查电机是否短路。2.更换电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "F7", descShort: "温度传感器报警(老机型)", fullGuide: "1.检查温度传感器连接线是否松动。2.测量传感器阻值(25℃约5-10K)。3.更换温度传感器。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "F8", descShort: "水位传感器故障(新款)", fullGuide: "1.核查传感器接线端子是否受潮或松脱。2.检查水位传感器连接线。3.更换水位传感器。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "F9", descShort: "称重错误/堵转", fullGuide: "1.检查线束是否松脱。2.检查霍尔传感器是否损坏。3.检查电脑板是否故障。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "Fd", descShort: "门锁故障", fullGuide: "1.检查门锁是否损坏。2.检查门锁连接线是否松动。3.更换门锁组件。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "HU", descShort: "高压报警/环境电压高于270V", fullGuide: "1.检查环境电压是否高于270V。2.拔掉电源插头，等待几分钟后重新通电。3.如电压正常，重新开机即可运行。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "L0", descShort: "进水超时(变频机型)", fullGuide: "1.进水阀滤网堵塞或水压太低。2.检查水龙头是否打开。3.清洁进水阀滤网，设法加大进水量。4.更换进水阀。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "L1", descShort: "排水超时(变频机型)", fullGuide: "1.检查排水管是否放下。2.清理排水阀或排水管内的堵塞物。3.核查牵引器是否动作。4.如内桶没有积水仍报错，检查水位传感器或电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "L2", descShort: "超重报警/衣物超过设定最大负载", fullGuide: "1.减少内桶衣物后重新开机运行程序。2.避免洗涤过重衣物。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "L3", descShort: "衣物偏置(变频机型)", fullGuide: "1.重新调整内桶衣物，使之分散均匀后再次脱水测试。2.核查脱水过程中是否存在波轮先转、桶后转导致的衣物偏心。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "CL", descShort: "童锁开门报警", fullGuide: "1.按童锁键解除童锁。2.关门状态下按启动键解除报警。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "C0", descShort: "无电机信号/电机线断或与电脑板不匹配", fullGuide: "1.检查电机线是否断开。2.检查电机与电脑板是否匹配。3.更换电机或电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "C1", descShort: "驱动信号丢失/接线松脱或离合器堵转", fullGuide: "1.检查电脑板与电机之间接线是否松脱。2.检查洗涤过程中离合器分离是否不清导致堵转。3.更换变频器。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "C2", descShort: "失速报警/脱水过程中离合器堵转", fullGuide: "1.检查电脑板与电机之间接线是否松脱。2.检查脱水过程中离合器分离是否不清导致堵转。3.更换变频器。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "C3", descShort: "驱动板高压报警", fullGuide: "1.检测环境电压。2.更换变频器。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "C4", descShort: "驱动板低压报警", fullGuide: "1.检测环境电压。2.更换变频器。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "C5", descShort: "驱动板过流报警", fullGuide: "1.检查电机是否短路。2.更换变频器。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "C6", descShort: "驱动板IPM模块错误报警", fullGuide: "1.检查传动系统是否堵转。2.检查导线是否松脱。3.更换变频器。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "C7", descShort: "驱动板3秒接收不到电脑板信号", fullGuide: "1.检测电脑板是否有电压输出。2.检查导线是否松脱。3.更换电脑板或变频器。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "C8", descShort: "电脑板5秒接收不到变频器信号", fullGuide: "1.检查导线是否松脱或受潮。2.更换变频器或电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E10", descShort: "进水超时/水压过低或进水阀故障", fullGuide: "1.检查水压是否过低导致进水缓慢。2.检查排水管是否被放下导致漏水。3.检查进水管两端接口是否漏水。4.进水阀故障，无进水阀工作的声音需更换。5.检查水位传感器压力管是否松脱或气室堵塞。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E11", descShort: "桶内有大量残留水", fullGuide: "1.检查进水阀是否直接通水(直通水)。2.检查排水泵是否不工作。3.检查电脑板是否故障。4.2020年后机型需检查排水管是否有U形弯曲导致虹吸现象。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E12", descShort: "溢水保护/水位过高", fullGuide: "1.进水阀故障导致不停进水。2.检查水位传感器及其管路是否漏气或故障。3.排空桶内残留水后开机检测。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E20", descShort: "排水泵开路", fullGuide: "1.检查排水泵接线是否松脱。2.检查排水泵是否被异物卡住。3.检查排水泵线圈阻值(正常约30Ω/180Ω)。4.更换排水泵。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E21/E3", descShort: "排水超时/排水泵脏堵", fullGuide: "1.检查排水泵是否脏堵，清理过滤器。2.检查排水管路是否堵塞或排水高度过高。3.检查排水泵接线是否松脱。4.更换排水泵。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E30/E1", descShort: "门不能上锁/门未关好", fullGuide: "1.重新关闭门体，确保门锁到位。2.检查门锁钩是否损坏。3.检查门锁接线是否松动。4.更换门锁组件。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E31", descShort: "门锁解锁失败", fullGuide: "1.检查门锁组件。2.检查门锁的机械连接。3.检查电源火线和零线是否接反。4.更换电机或电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E32", descShort: "运行当中门锁开了", fullGuide: "1.检查衣物是否太多导致门体受力变形。2.检查门锁是否故障。3.更换门锁。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E33", descShort: "水位传感器错误", fullGuide: "1.检查水位传感器连接线是否松动。2.检查水位传感器气管是否漏气。3.更换水位传感器。4.检查电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E34", descShort: "NTC开路/温度传感器故障", fullGuide: "1.检查加热管传感器接线是否松动。2.检查温度传感器阻值(25℃约4.6kΩ)。3.更换温度传感器。4.检查电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E35", descShort: "NTC短路/温度传感器故障", fullGuide: "1.检查加热管传感器接线是否松动。2.检查温度传感器阻值。3.更换温度传感器。4.检查电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E36", descShort: "洗涤时加热管不加热", fullGuide: "1.检查加热管以及接线是否松动。2.测量加热管阻值(正常约16Ω/300Ω)。3.检查温度传感器。4.更换加热管或电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E37", descShort: "进风口温度传感器故障(烘干机型)", fullGuide: "1.检查传感器接线是否松动。2.检查传感器阻值(50℃约1.7kΩ)。3.更换温度传感器。4.检查电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E38", descShort: "出风口温度传感器故障(烘干机型)", fullGuide: "1.检查传感器接线是否松动。2.检查传感器阻值(90℃约0.45kΩ)。3.更换温度传感器。4.检查电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E39", descShort: "污浊度传感器故障(老机型)", fullGuide: "1.检查传感器接线是否松动。2.检查传感器是否损坏。3.更换污浊度传感器。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E3A", descShort: "烘干加热管开路/烘干加热管故障", fullGuide: "1.检查加热管以及接线是否松动。2.检查温控器复位端子。3.检查风机是否堵转。4.检查电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E3B", descShort: "桶内温度过高", fullGuide: "1.检查温度传感器。2.检查进水阀是否进水。3.确定是否烘干中途强行停机。4.等待内筒自然冷却。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E3C", descShort: "洗涤加热管漏电", fullGuide: "1.检查加热管绝缘是否良好。2.测量加热管对地电阻。3.更换加热管。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E3D", descShort: "电源频率异常", fullGuide: "1.检查电源频率是否在50Hz±1Hz范围内。2.检查电源线路。3.更换电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E40", descShort: "记忆芯片错误/EEPROM故障", fullGuide: "1.检查电源使用环境。2.断电重启尝试恢复。3.更换电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E70", descShort: "电源按键卡死", fullGuide: "1.检查电脑板按键装配是否正常。2.清洁控制板。3.更换显示板或电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E71", descShort: "自动添加洗涤剂报警/与主板通讯错误", fullGuide: "1.检查自动添加小板与主板的连接线。2.检查自动添加小板。3.更换自动添加模块。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E74", descShort: "自动添加洗涤剂报警/液位太低", fullGuide: "1.检查洗涤剂液位是否太低。2.添加洗涤剂后重新运行。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E75", descShort: "自动添加柔顺剂报警/液位太低", fullGuide: "1.检查柔顺剂液位是否太低。2.添加柔顺剂后重新运行。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E80", descShort: "洗衣机主控板和显示板通讯不上", fullGuide: "1.检查通信线束是否松动。2.检查排线插头是否氧化。3.更换显示板。4.更换电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E60", descShort: "电机堵转报警", fullGuide: "1.检查电机接线是否松动。2.检查电机是否卡死。3.检查电脑板是否故障。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E61", descShort: "电脑板检测不到速度反馈信号", fullGuide: "1.检查电机接线是否松动。2.检查电机霍尔传感器。3.更换电机或电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E62", descShort: "电机可控硅坏报警", fullGuide: "1.检查电机接线。2.检查电机是否损坏。3.更换电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E50/E52", descShort: "变频板过流", fullGuide: "1.检查电机是否短路。2.更换变频电机板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E50/E53", descShort: "变频板IPM温度采样错误", fullGuide: "1.检查变频板散热是否良好。2.更换变频电机板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E50/E55", descShort: "变频板速度信号丢失或堵转", fullGuide: "1.置洗衣机在常温下二小时后进入T12进行自校正。2.更换电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E50/E56", descShort: "变频板电机过温", fullGuide: "1.置洗衣机在常温下二小时后进入T12进行自校正。2.更换电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E50/E57", descShort: "变频板散热器过温", fullGuide: "1.置洗衣机在常温下二小时后进入T12进行自校正。2.更换电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E50/E58", descShort: "变频板电机超负荷/电机缺相", fullGuide: "1.检查电机接线是否接好。2.检查系统是否有堵转现象。3.更换电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E55", descShort: "变频板电机过载", fullGuide: "1.检查用户负载是否过大。2.更换电脑板。3.检查系统是否有堵转现象。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "UB", descShort: "不脱水报警/衣物分布不均", fullGuide: "1.打开机门，抖散内桶衣物。2.如内桶是单个大件衣物，需增加1件类似衣物，关门后按启动键继续运行。3.如内桶泡沫过多，等待消泡程序运行结束。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "Hot", descShort: "内筒温度过高", fullGuide: "1.等待15分钟左右，待内筒温度自然降低。2.如触碰门已感受不到温度仍报警，检查加热管温控器是否异常。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "E9", descShort: "通讯故障/显示板与驱动板不能通讯", fullGuide: "1.检查显示板与主控板之间的连接线是否松动。2.更换显示板。3.更换电脑板。[来源：美的售后资料]" },
{ brand: "美的", category: "washer", code: "END", descShort: "程序结束", fullGuide: "洗衣机程序运行结束，属正常提示。[来源：美的售后资料]" },
{ brand: "小天鹅", category: "washer", code: "E10", descShort: "进水超时/进水3分钟水位无变化", fullGuide: "1.检查水龙头是否打开，水压是否过低。2.清洁进水阀滤网，清除堵塞物。3.检查进水管是否弯折。4.检查排水管是否挂起导致进水流失。5.检查回气管是否密封不牢。6.更换进水阀或电脑板。[来源：小天鹅售后资料+citation:2][citation:8]" },
{ brand: "小天鹅", category: "washer", code: "E11", descShort: "桶内有大量残留水/水位超过溢出水位", fullGuide: "1.检查进水阀是否损坏导致直通水。2.检查排水泵是否不工作。3.检查电脑板是否故障。4.检查排水管是否有U形弯曲导致虹吸现象。5.断电后清理桶内积水。[来源：小天鹅售后资料+citation:2][citation:8]" },
{ brand: "小天鹅", category: "washer", code: "E12", descShort: "溢水保护/水位超过溢水水位", fullGuide: "1.进水阀故障导致不停进水，需更换进水阀。2.检查水位传感器及其管路是否漏气或故障。3.排空桶内残留水后开机检测。[来源：小天鹅售后资料+citation:2][citation:8]" },
{ brand: "小天鹅", category: "washer", code: "E20", descShort: "排水泵未接好/电脑板无排水泵信号", fullGuide: "1.检查排水泵接线是否松脱。2.检查排水泵连接器是否接触不良。3.重新插紧排水泵接线。4.更换排水泵或电脑板。[来源：小天鹅售后资料+citation:2][citation:8]" },
{ brand: "小天鹅", category: "washer", code: "E21", descShort: "排水超时/排水3分钟水位无变化", fullGuide: "1.检查排水管是否弯折或堵塞。2.清理排水泵过滤器内的硬币、纽扣、毛絮等异物。3.检查排水泵是否损坏。4.检查排水管安装高度是否超标。5.更换排水泵。[来源：小天鹅售后资料+citation:2][citation:8]" },
{ brand: "小天鹅", category: "washer", code: "E30", descShort: "门锁不上/电脑板6次尝试锁门失败", fullGuide: "1.重新关门，检查门钩是否关到位。2.检查门封圈内是否有碎屑卡滞。3.轻压门体听是否有咔嗒锁扣声。4.检查门锁组件是否损坏。5.更换门锁组件。[来源：小天鹅售后资料+citation:1][citation:2]" },
{ brand: "小天鹅", category: "washer", code: "E31", descShort: "门锁解不开/电脑板6次尝试解锁失败", fullGuide: "1.检查门锁组件是否卡死。2.检查门锁的机械连接。3.检查电源火线和零线是否接反。4.检查进水口滤网是否堵塞(E31有时因进水不足导致)。5.清洁进水管滤网后重新试机。6.更换门锁组件。[来源：小天鹅售后资料+citation:2][citation:3]" },
{ brand: "小天鹅", category: "washer", code: "E33", descShort: "水位传感器故障/频率不在规定范围", fullGuide: "1.检查水位传感器连接线是否松动。2.检查水位传感器气管是否漏气或堵塞。3.拔下水位传感器透明管下端吹气，听是否有传感器动作声。4.更换水位传感器。[来源：小天鹅售后资料+citation:2][citation:8]" },
{ brand: "小天鹅", category: "washer", code: "E34", descShort: "温度传感器断路", fullGuide: "1.检查温度传感器连接线是否松动或脱落。2.测量传感器阻值(25℃约5-10K)。3.更换温度传感器。[来源：小天鹅售后资料+citation:2][citation:8]" },
{ brand: "小天鹅", category: "washer", code: "E35", descShort: "温度传感器短路", fullGuide: "1.检查温度传感器线路是否短路。2.测量传感器阻值。3.更换温度传感器。[来源：小天鹅售后资料+citation:2][citation:8]" },
{ brand: "小天鹅", category: "washer", code: "E40", descShort: "E2PROM检查码错误", fullGuide: "1.断电重启尝试恢复。2.更换电脑板。[来源：小天鹅售后资料+citation:2][citation:8]" },
{ brand: "小天鹅", category: "washer", code: "E41", descShort: "E2PROM连接错误", fullGuide: "1.检查E2PROM连接是否正常。2.更换电脑板。[来源：小天鹅售后资料+citation:2][citation:8]" },
{ brand: "小天鹅", category: "washer", code: "E50", descShort: "高压保护/线路电压超过280V", fullGuide: "1.立即切断电源，检查电源电压。2.待电压恢复正常后重新使用。3.加装稳压器。[来源：小天鹅售后资料+citation:2][citation:8]" },
{ brand: "小天鹅", category: "washer", code: "E60", descShort: "电机3次尝试启动失败/启动时电机不转", fullGuide: "1.检查电机连接线是否松动。2.检查电机是否损坏。3.检查传动系统是否堵转。4.更换电机或电脑板。[来源：小天鹅售后资料+citation:2][citation:8]" },
{ brand: "小天鹅", category: "washer", code: "E61", descShort: "无测速信号/电脑板检测不到速度反馈信号", fullGuide: "1.检查电机的速度反馈信号线路是否脱落。2.检查电机霍尔传感器。3.检查电机连接线是否松动。4.更换电机或电脑板。[来源：小天鹅售后资料+citation:2][citation:8]" },
{ brand: "小天鹅", category: "washer", code: "E62", descShort: "测速信号不正常/电脑板上可控硅击穿", fullGuide: "1.检查测速信号线路。2.检查电脑板可控硅是否损坏。3.更换电脑板。[来源：小天鹅售后资料+citation:2][citation:7]" },
{ brand: "小天鹅", category: "washer", code: "E70", descShort: "按键卡死/按键按下20秒以上", fullGuide: "1.检查按键是否有液体渗入或物理卡滞。2.清洁控制板。3.更换显示板或电脑板。[来源：小天鹅售后资料+citation:2][citation:8]" },
{ brand: "小天鹅", category: "washer", code: "F0", descShort: "电源开关故障", fullGuide: "1.检查电源开关是否损坏。2.更换电源开关或电脑板。[来源：小天鹅售后资料+citation:5][citation:7]" },
{ brand: "小天鹅", category: "washer", code: "F1", descShort: "水位传感器接触不良", fullGuide: "1.检查水位传感器连接线是否松动。2.检查水位传感器是否损坏。3.更换水位传感器。[来源：小天鹅售后资料+citation:5][citation:7]" },
{ brand: "小天鹅", category: "washer", code: "F2", descShort: "EPROM自检出错", fullGuide: "1.断电重启尝试恢复。2.更换电脑板。[来源：小天鹅售后资料+citation:5][citation:7]" },
{ brand: "小天鹅", category: "washer", code: "F4", descShort: "过零检测线路故障", fullGuide: "1.检查过零检测电路。2.检查电源波形是否畸变。3.更换电脑板。[来源：小天鹅售后资料+citation:5][citation:7]" },
{ brand: "小天鹅", category: "washer", code: "F8", descShort: "水位传感器损坏或接触不良", fullGuide: "1.检查水位传感器连接线是否松动。2.检查水位传感器气管是否漏气。3.更换水位传感器。[来源：小天鹅售后资料+citation:5][citation:7]" },
{ brand: "小天鹅", category: "washer", code: "E1", descShort: "进水或补水超时/水中或睡眠超时", fullGuide: "1.开闭门盖，检查进水阀等。2.检查水龙头是否打开。3.清洁进水阀滤网。4.更换进水阀。[来源：小天鹅售后资料+citation:3][citation:5]" },
{ brand: "小天鹅", category: "washer", code: "E2", descShort: "排水6分钟后水位传感器仍不能复位", fullGuide: "1.开闭门盖，检查排水管是否堵塞。2.清理排水泵过滤器。3.检查排水泵是否工作。4.更换排水泵。[来源：小天鹅售后资料+citation:3][citation:5]" },
{ brand: "小天鹅", category: "washer", code: "E3", descShort: "脱水前门未合", fullGuide: "1.关闭门盖。2.检查门开关是否损坏。3.重新关门后启动。[来源：小天鹅售后资料+citation:3][citation:5]" },
{ brand: "小天鹅", category: "washer", code: "E4", descShort: "同次工序中发生第三次撞桶", fullGuide: "1.关闭门盖。2.将衣物均匀分布桶内。3.检查洗衣机是否放置平稳。4.调整底脚使机器平稳。[来源：小天鹅售后资料+citation:3][citation:5]" },
{ brand: "小天鹅", category: "washer", code: "E5", descShort: "低电压保护", fullGuide: "1.待电网电压升高后自动恢复运行。2.检查电源电压是否正常(187-242V)。3.加装稳压器。[来源：小天鹅售后资料+citation:3][citation:5]" },
{ brand: "小天鹅", category: "washer", code: "E6", descShort: "预约时间不够", fullGuide: "1.按预约键增加预约时间。2.确保预约时间大于单次洗衣程序时间。[来源：小天鹅售后资料+citation:3][citation:5]" },
{ brand: "小天鹅", category: "washer", code: "E7", descShort: "称重校正时非空桶状态", fullGuide: "1.恢复空桶状态。2.取出桶内衣物后重新校正。[来源：小天鹅售后资料+citation:3][citation:5]" },
{ brand: "小天鹅", category: "washer", code: "E8", descShort: "水位传感器损坏或接触不良", fullGuide: "1.检查水位传感器及其电路是否接好。2.更换水位传感器。[来源：小天鹅售后资料+citation:3][citation:5]" },
{ brand: "小天鹅", category: "washer", code: "E9", descShort: "自动称重失灵", fullGuide: "1.检查信号传输线路系统装配。2.如无异常则更换电脑板。[来源：小天鹅售后资料+citation:3][citation:5]" },
{ brand: "小天鹅", category: "washer", code: "E20(早期)", descShort: "排水超时/排水管堵塞", fullGuide: "1.检查排水管是否被堵。2.清理排水管内的堵塞物。3.检查排水泵是否工作。[来源：小天鹅售后资料+citation:7]" },
{ brand: "小天鹅", category: "washer", code: "E21(早期)", descShort: "上盖没有盖好", fullGuide: "1.检查上盖是否完全盖好。2.重新盖好盖子后运行。[来源：小天鹅售后资料+citation:7]" },
{ brand: "小天鹅", category: "washer", code: "E22(早期)", descShort: "脱水不平衡", fullGuide: "1.把衣服重新抖散开来再脱水。2.避免洗涤单件大件衣物。[来源：小天鹅售后资料+citation:7]" },
{ brand: "小天鹅", category: "washer", code: "E25(早期)", descShort: "进水超时", fullGuide: "1.检查水压是否正常。2.检查进水阀是否脏堵。3.清洁进水阀滤网。[来源：小天鹅售后资料+citation:7]" },
{ brand: "小天鹅", category: "washer", code: "E26(早期)", descShort: "水温超过50度", fullGuide: "1.检查进水温度是否过高。2.检查加热管是否故障。[来源：小天鹅售后资料+citation:7]" },
{ brand: "小天鹅", category: "washer", code: "L5/LU", descShort: "低压保护", fullGuide: "1.待电网电压升高后自动恢复运行。2.检查电源电压是否正常(187-242V)。3.加装稳压器。[来源：小天鹅售后资料+citation:5][citation:7]" },
{ brand: "小天鹅", category: "washer", code: "HU", descShort: "高压保护", fullGuide: "1.立即切断电源，检查电源电压。2.待电压恢复正常后重新使用。[来源：小天鹅售后资料+citation:5][citation:7]" },
{ brand: "小天鹅", category: "washer", code: "FF", descShort: "不明故障", fullGuide: "1.将电源插头拔下。2.进行故障检查并维修。3.如无法排除，联系售后检修。[来源：小天鹅售后资料+citation:5][citation:7]" },
{ brand: "小天鹅", category: "washer", code: "E2EE", descShort: "存储芯片故障", fullGuide: "1.断电重启尝试恢复。2.更换电脑板。[来源：小天鹅售后资料+citation:7]" },
{ brand: "小天鹅", category: "washer", code: "Err8", descShort: "超水位保护(进排水故障)", fullGuide: "1.检查进水阀是否卡死。2.检查排水系统是否堵塞。3.联系检修。[来源：小天鹅售后资料+citation:7]" },
{ brand: "小天鹅", category: "washer", code: "Err9", descShort: "超水位保护(洗涤水位未检测到)", fullGuide: "1.排水2分钟后显示Err9。2.检查压力开关连接和触点。3.检查压力开关及其连接系统是否泄漏。[来源：小天鹅售后资料+citation:6][citation:7]" },
{ brand: "小天鹅", category: "washer", code: "Err10", descShort: "水位传感器故障(HTD68)", fullGuide: "1.检查水位传感器连接。2.更换水位传感器。3.联系检修。[来源：小天鹅售后资料+citation:7]" },
{ brand: "小天鹅", category: "washer", code: "Err11", descShort: "称重传感器故障(HTD68)", fullGuide: "1.检查称重传感器连接。2.更换称重传感器。3.联系检修。[来源：小天鹅售后资料+citation:7]" },
{ brand: "小天鹅", category: "washer", code: "Err12", descShort: "烘干水位异常(HTD68)", fullGuide: "1.检查烘干时水位是否正常。2.检查排水系统。3.联系检修。[来源：小天鹅售后资料+citation:7]" },
{ brand: "小天鹅", category: "washer", code: "Err13", descShort: "启动后机门异常(HTD68)", fullGuide: "1.洗衣机启动后机门没有关好。2.重新关门确保门锁到位。[来源：小天鹅售后资料+citation:7]" },
{ brand: "小天鹅", category: "washer", code: "Err14", descShort: "甩干分布不平衡(HTD68)", fullGuide: "1.将筒内衣物抖散均匀。2.避免洗涤单件大件衣物。[来源：小天鹅售后资料+citation:7]" },
{ brand: "小天鹅", category: "washer", code: "AL-E", descShort: "选择烘干程序后筒内衣物过多", fullGuide: "1.筒内衣物适当取出部分。2.减少烘干衣物量后重新运行。[来源：小天鹅售后资料+citation:7]" },
{ brand: "小天鹅", category: "washer", code: "UB", descShort: "脱水不平衡/衣物分布不均", fullGuide: "1.打开机门，抖散内桶衣物。2.如内桶是单个大件衣物，需增加1件类似衣物。3.如内桶泡沫过多，等待消泡程序运行结束。[来源：小天鹅售后资料]" },
{ brand: "小天鹅", category: "washer", code: "END", descShort: "程序结束", fullGuide: "洗衣机程序运行结束，属正常提示。[来源：小天鹅售后资料]" },
{ brand: "小天鹅", category: "washer", code: "CL", descShort: "童锁模式已开启", fullGuide: "1.长按童锁键3秒解除童锁。2.参考用户手册了解如何解除儿童锁。[来源：小天鹅售后资料]" },
{ brand: "统帅", category: "washer", code: "E1", descShort: "水位传感器故障/进水异常", fullGuide: "1.检查水位传感器连接线是否松动或受潮。2.拔下水位传感器透明管下端吹气，听是否有传感器动作声。3.检查进水阀滤网是否堵塞。4.检查水龙头是否打开，水压是否正常。5.清洁传感器周围区域。6.更换水位传感器。[来源：统帅售后资料+citation:8]" },
{ brand: "统帅", category: "washer", code: "E2", descShort: "排水故障/排水管堵塞或排水泵故障", fullGuide: "1.检查排水管是否放下、弯折或堵塞。2.清理排水泵过滤器内的硬币、纽扣、毛絮等异物。3.检查排水管是否有变形扭曲现象。4.检查排水电磁铁插线是否脱落。5.用万用表测量排水电磁铁两端电阻(正常约30-180Ω)。6.更换排水泵或排水电磁铁。[来源：统帅售后资料+citation:3][citation:4]" },
{ brand: "统帅", category: "washer", code: "E3", descShort: "门锁异常/机门未关好或门锁故障", fullGuide: "1.重新关好机门，确保门锁到位。2.检查门封条是否平整无变形，有无杂物卡滞。3.检查门锁组件是否损坏。4.清洁门锁周围的密封圈。5.更换门锁组件。[来源：统帅售后资料+citation:4][citation:8]" },
{ brand: "统帅", category: "washer", code: "E4", descShort: "电机故障/电机运转异常", fullGuide: "1.检查电机周围是否有异物或过热现象。2.检查电机连接线是否松动或损坏。3.检查电机是否过热导致保护。4.用万用表测量电机任意两相间电阻(正常约18.5Ω)。5.更换电机或电脑板。[来源：统帅售后资料+citation:1][citation:5]" },
{ brand: "统帅", category: "washer", code: "E5", descShort: "水温传感器故障/加热异常", fullGuide: "1.检查水温传感器连接线是否松动或脱落。2.测量传感器阻值(25℃约5-10K)。3.清洁传感器周围区域。4.检查加热管是否损坏。5.更换水温传感器。[来源：统帅售后资料+citation:8]" },
{ brand: "统帅", category: "washer", code: "E6", descShort: "水位传感器故障/进水超时或供电异常", fullGuide: "1.拔下电源插头，停止工作24小时以上，让CPU错误记忆消除。2.插上电源后按开机键，速按功能键选择甩干后按启动。3.检查水位传感器连接线是否松动。4.重新进行一次洗衣程序测试。5.更换水位传感器或电脑板。[来源：统帅售后资料+citation:6]" },
{ brand: "统帅", category: "washer", code: "E7", descShort: "电机过载保护/洗衣机过载", fullGuide: "1.减少衣物负荷量。2.选择适当的洗涤模式。3.检查是否有大件衣物导致电机过载。4.检查电机是否过热。5.待电机冷却后重新试机。[来源：统帅售后资料+citation:4][citation:5]" },
{ brand: "统帅", category: "washer", code: "E8", descShort: "排水管阻塞/排水超时", fullGuide: "1.清理排水管道确保畅通。2.检查排水管是否弯折或堵塞。3.清理排水泵过滤器。4.检查排水管是否被压住。5.检查排水泵是否工作正常。[来源：统帅售后资料+citation:4]" },
{ brand: "统帅", category: "washer", code: "E9", descShort: "进水口阻塞/进水超时", fullGuide: "1.检查进水口是否畅通。2.检查水龙头是否打开。3.清洁进水阀滤网。4.检查进水管是否弯折。[来源：统帅售后资料+citation:4]" },
{ brand: "统帅", category: "washer", code: "E10", descShort: "进水超时/进水8分钟未达到设定水位", fullGuide: "1.检查水龙头是否打开。2.清洁进水阀滤网。3.检查进水管是否弯折。4.检查排水管是否挂起导致进水流失。5.更换进水阀。[来源：统帅售后资料+citation:2]" },
{ brand: "统帅", category: "washer", code: "E11", descShort: "桶内有大量残留水/水位异常", fullGuide: "1.检查进水阀是否损坏导致直通水。2.检查排水泵是否不工作。3.检查电脑板是否故障。4.断电后清理桶内积水。[来源：统帅售后资料]" },
{ brand: "统帅", category: "washer", code: "E12", descShort: "溢水保护/水位超过溢水水位", fullGuide: "1.检查进水阀是否卡死导致不停进水。2.检查水位传感器及其管路是否漏气或故障。3.排空桶内残留水后开机检测。[来源：统帅售后资料]" },
{ brand: "统帅", category: "washer", code: "E20", descShort: "排水泵未接好/电脑板无排水泵信号", fullGuide: "1.检查排水泵接线是否松脱。2.检查排水泵连接器是否接触不良。3.重新插紧排水泵接线。4.更换排水泵或电脑板。[来源：统帅售后资料+citation:2]" },
{ brand: "统帅", category: "washer", code: "E21", descShort: "排水超时/排水3分钟水位无变化", fullGuide: "1.检查排水管是否弯折或堵塞。2.清理排水泵过滤器内的异物。3.检查排水泵是否损坏。4.检查排水管安装高度是否超标。5.更换排水泵。[来源：统帅售后资料+citation:2]" },
{ brand: "统帅", category: "washer", code: "E22", descShort: "进水超时", fullGuide: "1.检查水阀是否打开。2.检查水压是否过低。3.清洁进水阀滤网。4.更换进水阀。[来源：统帅售后资料+citation:2]" },
{ brand: "统帅", category: "washer", code: "E30", descShort: "门锁不上/电脑板多次尝试锁门失败", fullGuide: "1.重新关门，检查门钩是否关到位。2.检查门封圈内是否有碎屑卡滞。3.轻压门体听是否有咔嗒锁扣声。4.更换门锁组件。[来源：统帅售后资料]" },
{ brand: "统帅", category: "washer", code: "E31", descShort: "门锁解不开/电脑板多次尝试解锁失败", fullGuide: "1.检查门锁组件是否卡死。2.检查门锁的机械连接。3.检查电源火线和零线是否接反。4.更换门锁组件。[来源：统帅售后资料]" },
{ brand: "统帅", category: "washer", code: "E33", descShort: "水位传感器故障/频率不在规定范围", fullGuide: "1.检查水位传感器连接线是否松动。2.检查水位传感器气管是否漏气或堵塞。3.拔下水位传感器透明管下端吹气测试。4.更换水位传感器。[来源：统帅售后资料]" },
{ brand: "统帅", category: "washer", code: "E34", descShort: "温度传感器断路/NTC开路", fullGuide: "1.检查温度传感器连接线是否松动或脱落。2.测量传感器阻值(25℃约5-10K)。3.更换温度传感器。[来源：统帅售后资料]" },
{ brand: "统帅", category: "washer", code: "E35", descShort: "温度传感器短路/NTC短路", fullGuide: "1.检查温度传感器线路是否短路。2.测量传感器阻值。3.更换温度传感器。[来源：统帅售后资料]" },
{ brand: "统帅", category: "washer", code: "E40", descShort: "E2PROM检查码错误/存储芯片故障", fullGuide: "1.断电重启尝试恢复。2.更换电脑板。[来源：统帅售后资料]" },
{ brand: "统帅", category: "washer", code: "E50", descShort: "高压保护/线路电压超过280V", fullGuide: "1.立即切断电源，检查电源电压。2.待电压恢复正常后重新使用。3.加装稳压器。[来源：统帅售后资料]" },
{ brand: "统帅", category: "washer", code: "E60", descShort: "电机启动失败/3次尝试启动失败", fullGuide: "1.检查电机连接线是否松动。2.检查电机是否损坏。3.检查传动系统是否堵转。4.更换电机或电脑板。[来源：统帅售后资料]" },
{ brand: "统帅", category: "washer", code: "E61", descShort: "无测速信号/电脑板检测不到速度反馈", fullGuide: "1.检查电机的速度反馈信号线路是否脱落。2.检查电机霍尔传感器。3.检查电机连接线是否松动。4.更换电机或电脑板。[来源：统帅售后资料]" },
{ brand: "统帅", category: "washer", code: "E62", descShort: "测速信号不正常/电脑板上可控硅击穿", fullGuide: "1.检查测速信号线路。2.检查电脑板可控硅是否损坏。3.更换电脑板。[来源：统帅售后资料]" },
{ brand: "统帅", category: "washer", code: "E70", descShort: "按键卡死/按键按下20秒以上", fullGuide: "1.检查按键是否有液体渗入或物理卡滞。2.清洁控制板。3.更换显示板或电脑板。[来源：统帅售后资料]" },
{ brand: "统帅", category: "washer", code: "Err7", descShort: "排水超时/排水超过6分钟未排空", fullGuide: "1.检查确认排水管已经放下。2.检查排水管是否有变形扭曲。3.检查排水管是否通畅有无异物堵塞。4.检查排水电磁铁是否有吸合声，如无吸合声需更换排水电磁铁。5.更换排水泵。[来源：统帅售后资料+citation:3]" },
{ brand: "统帅", category: "washer", code: "F7", descShort: "变频板故障/电机故障/进水超时", fullGuide: "1.检查是否被衣物缠住造成堵转，整理衣服重新运行。2.检查电机插线是否未插好、有无断线。3.用万用表测量电动机任意两相间电阻是否为18.5Ω。4.如电机正常则可能是变频板故障。5.更换变频板或电机。[来源：统帅售后资料+citation:1][citation:5]" },
{ brand: "统帅", category: "washer", code: "FC", descShort: "通讯故障/主控板与驱动板通信异常", fullGuide: "1.检查主控板与驱动板的通讯线路是否插好。2.检查电源板是否向驱动器正常供电。3.检查电脑板与水位传感器连接处是否有松动。4.如线路问题，需更换电脑板或驱动板。[来源：统帅售后资料+citation:6][citation:7]" },
{ brand: "统帅", category: "washer", code: "FR", descShort: "电脑板与水位传感器连接异常/漏电报警", fullGuide: "1.检查电脑板与水位传感器连接处是否有松动。2.检查是否有漏电现象。3.拔下电源，停止工作24小时以上让CPU错误记忆消除。4.如仍无法解决，联系专业维修人员上门检测。[来源：统帅售后资料+citation:6]" },
{ brand: "统帅", category: "washer", code: "L5/LU", descShort: "低压保护/电源电压过低", fullGuide: "1.待电网电压升高后自动恢复运行。2.检查电源电压是否正常(187-242V)。3.加装稳压器。[来源：统帅售后资料]" },
{ brand: "统帅", category: "washer", code: "HU", descShort: "高压保护/电源电压过高", fullGuide: "1.立即切断电源，检查电源电压。2.待电压恢复正常后重新使用。[来源：统帅售后资料]" },
{ brand: "统帅", category: "washer", code: "E2EE", descShort: "存储芯片故障", fullGuide: "1.断电重启尝试恢复。2.更换电脑板。[来源：统帅售后资料]" },
{ brand: "统帅", category: "washer", code: "FE/E6", descShort: "电机故障", fullGuide: "1.检查电机连接线是否松动。2.检查电机是否损坏。3.测量电机阻值。4.更换电机。[来源：统帅售后资料+citation:2]" },
{ brand: "统帅", category: "washer", code: "E1(门锁异常)", descShort: "门锁异常/机门未关好", fullGuide: "1.重新关好机门，检查机门。2.检查门锁组件是否损坏。3.更换门锁组件。[来源：统帅售后资料+citation:2]" },
{ brand: "统帅", category: "washer", code: "E2(排水故障)", descShort: "排水故障", fullGuide: "1.清理过滤器检查排水泵。2.检查排水管是否堵塞。3.更换排水泵。[来源：统帅售后资料+citation:2]" },
{ brand: "统帅", category: "washer", code: "E3(温度传感器)", descShort: "温度传感器故障", fullGuide: "1.检查温度传感器连接线是否松动。2.测量传感器阻值。3.更换温度传感器。[来源：统帅售后资料+citation:2]" },
{ brand: "统帅", category: "washer", code: "E4(加热故障)", descShort: "加热故障/加热管线路接触不良", fullGuide: "1.检查加热管线路是否接触不良。2.测量加热管阻值。3.更换加热管。[来源：统帅售后资料+citation:2]" },
{ brand: "统帅", category: "washer", code: "E5(电机运转异常)", descShort: "电机运转异常/电机保护报警", fullGuide: "1.检查电机连接线是否松动。2.检查电机是否过热。3.更换电机。[来源：统帅售后资料+citation:2]" },
{ brand: "统帅", category: "washer", code: "E6(加热超温)", descShort: "加热超温报警/水加热温度过高保护", fullGuide: "1.检查加热管是否短路。2.检查温度传感器。3.更换加热管。[来源：统帅售后资料+citation:2]" },
{ brand: "统帅", category: "washer", code: "E7(温度传感器异常)", descShort: "温度传感器异常/NTC异常保护", fullGuide: "1.检查温度传感器连接线是否松动。2.测量传感器阻值。3.更换温度传感器。[来源：统帅售后资料+citation:2]" },
{ brand: "统帅", category: "washer", code: "E8(超水位保护)", descShort: "超水位保护(进排水故障)", fullGuide: "1.检查进水阀是否卡死。2.检查排水系统是否堵塞。3.联系检修。[来源：统帅售后资料+citation:2]" },
{ brand: "统帅", category: "washer", code: "UB", descShort: "脱水不平衡/衣物分布不均", fullGuide: "1.打开机门，抖散内桶衣物。2.如内桶是单个大件衣物，需增加1件类似衣物。3.如内桶泡沫过多，等待消泡程序运行结束。[来源：统帅售后资料]" },
{ brand: "统帅", category: "washer", code: "END", descShort: "程序结束", fullGuide: "洗衣机程序运行结束，属正常提示。[来源：统帅售后资料]" },
{ brand: "统帅", category: "washer", code: "CL", descShort: "童锁模式已开启", fullGuide: "1.长按童锁键解除童锁。2.参考用户手册了解如何解除儿童锁。[来源：统帅售后资料]" },
{ brand: "三星", category: "washer", code: "4C/4E/E1", descShort: "进水异常/水龙头未打开或水压过低", fullGuide: "1.检查水龙头是否完全打开。2.检查进水管是否扭结或堵塞。3.检查水压是否足够(最低0.5bar，最高8bar)。4.清洁进水阀滤网。5.检查水龙头是否冻结。6.断电重启后3分钟内所有按钮禁用。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "4C2/4E1/4E2/4Ed", descShort: "水温异常/进水管接错", fullGuide: "1.检查冷水进水管是否连接到冷水龙头(通常蓝色标识)。2.如果连接到热水龙头，衣物可能会变形。3.重新正确连接进水管。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "5C/5E/E2", descShort: "排水异常/排水管堵塞或排水泵故障", fullGuide: "1.检查排水管是否冻结或堵塞。2.清理排水泵过滤器内的异物(硬币、纽扣、毛絮等)。3.确保排水管从排水系统到机器保持笔直。4.使用紧急排水管排出桶内积水。5.如代码仍存在，联系三星售后。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "dC/dE", descShort: "门未关好/机门未正确关闭", fullGuide: "1.检查机门是否完全关闭。2.检查衣物是否被门夹住。3.重新关门确保门锁到位。4.如代码仍存在，检查门锁组件是否损坏。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "dC1/dE1", descShort: "主门锁异常/无法锁门或解锁", fullGuide: "1.检查门是否完全关闭。2.检查门锁组件是否损坏。3.断电重启后重新运行程序。4.如代码仍存在，更换门锁组件。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "dC3/dE3", descShort: "添衣门锁异常/添衣门无法锁闭或解锁", fullGuide: "1.检查添衣门是否完全关闭。2.检查添衣门锁组件是否损坏。3.断电重启后重新运行程序。4.如代码仍存在，请联系三星售后。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "OC/OE/OF/E3", descShort: "溢水保护/水位过高或泡沫过多", fullGuide: "1.可能添加了过多的洗涤剂。2.断电重启，排水泵应开始排水。3.取出部分衣物后重新运行甩干程序。4.如代码仍存在，请联系三星售后。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "Ub/UE/E4", descShort: "脱水不平衡/衣物分布不均", fullGuide: "1.将桶内衣物抖散均匀。2.检查洗衣机是否放置在平稳表面。3.单件大件衣物(如浴垫、大毛巾)不易甩干，需添加2-3件类似衣物。4.重新分布负载后运行。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "AC/AE", descShort: "主板与子板通讯异常", fullGuide: "1.断电重启，重新运行程序。2.检查通讯线路连接。3.如代码仍存在，请联系三星售后。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "DDC/ddC", descShort: "添衣门未按暂停键打开", fullGuide: "1.该提示在未按开始/暂停键时打开添衣门会出现。2.正确关闭添衣门。3.按住开始/暂停键(按住启动)恢复运行。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "SUD/Sd/5UD", descShort: "泡沫过多/洗涤剂用量过多", fullGuide: "1.使用了非低泡洗衣机专用洗涤剂。2.减少洗涤剂用量。3.运行空桶程序清洗桶内残留泡沫。4.此非故障，消泡完成后程序自动继续。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "LC/LC1/LE/LE1/E9/11E", descShort: "漏水检测/排水管位置异常或漏水", fullGuide: "1.检查排水管末端是否放置在地面上。2.检查排水管是否堵塞。3.检查洗衣机底部是否有漏水迹象。4.检查各软管连接处是否松动。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "3C/3E/EA/EB", descShort: "电机故障/滚筒电机运转异常", fullGuide: "1.断电重启后重新运行程序。2.检查电机连接线是否松动。3.如代码仍存在，更换电机或电脑板。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "3CP/3E", descShort: "波轮电机故障/波轮电机运转异常(波轮机型)", fullGuide: "1.断电重启后重新运行程序。2.检查波轮电机连接线。3.如代码仍存在，更换波轮电机。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "8C/8E", descShort: "MEMS传感器故障/振动传感器异常", fullGuide: "1.MEMS传感器检测机器振动和平衡状况。2.断电重启后重新运行程序。3.如代码仍存在，请联系三星售后。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "UC/9E1/9E2/9C1/9C2", descShort: "电压异常/低电压或电源波动", fullGuide: "1.检查电源插头是否插好。2.检查电源是否正常供电。3.断电重启后重新运行程序。4.如代码仍存在，检查家中电压是否稳定。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "HC/HE/H1", descShort: "高温加热系统异常/加热器故障", fullGuide: "1.断电重启后重新运行程序。2.检查加热管是否损坏。3.检查温度传感器。4.如代码仍存在，更换加热管。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "1C/1E/E7", descShort: "水位传感器故障", fullGuide: "1.水位传感器端子连接是否正常。2.检查水位传感器软管是否弯折或堵塞。3.断电重启后重新运行程序。4.更换水位传感器。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "AC6/AE6", descShort: "变频器通讯异常", fullGuide: "1.检查变频PCB和线束。2.根据状态，机器可能自动恢复正常。3.断电重启后重新运行程序。4.如代码仍存在，请联系三星售后。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "PC/PE/PC1/PE1", descShort: "离合器位置检测故障(特定型号)", fullGuide: "1.PC/PE：无法检测离合器位置。2.PC1/PE1：检测到离合器后，霍尔信号输出错误。3.请联系三星售后服务中心检修。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "bE1/12E", descShort: "电源按钮卡滞/电源按钮被长时间按下", fullGuide: "1.检查是否有按钮被卡住。2.断电后用湿布清洁按钮。3.如代码仍存在，更换显示板。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "bE2/14E", descShort: "控制按钮卡滞/其他按钮被长时间按下", fullGuide: "1.检查是否有按钮被卡住。2.断电后用湿布清洁按钮。3.如代码仍存在，更换显示板。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "CE/E8", descShort: "水温异常/冷水供应异常", fullGuide: "1.检查冷水进水管是否正确连接到冷水龙头(蓝色标识)。2.如连接到热水龙头，需重新正确连接。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "dE2", descShort: "电源开关错误/开关持续操作", fullGuide: "1.断开电源，等待5分钟后重新连接。2.检查电源按钮是否卡滞。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "6E/E5/HE1", descShort: "加热器故障/水加热功能异常", fullGuide: "1.检查加热管阻值是否正常(通常20-50Ω)。2.检查加热管接线是否松动。3.更换加热管。4.请联系三星售后。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "HE2", descShort: "烘干加热器故障/烘干功能异常(洗烘一体机)", fullGuide: "1.烘干部分因温度过高已关闭。2.检查烘干加热管是否损坏。3.检查风道是否堵塞。4.更换烘干加热管。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "HE3", descShort: "蒸汽功能异常/蒸汽发生器故障", fullGuide: "1.检查蒸汽发生器连接线。2.检查蒸汽发生器是否堵塞。3.更换蒸汽发生器。4.请联系三星售后。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "HOT", descShort: "机器温度过高/等待冷却", fullGuide: "1.此非故障，机器风扇将持续运行直到温度降至55°C以下。2.待冷却后门将解锁。3.等待自然冷却即可。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "tE/EC", descShort: "温度传感器故障/NTC异常", fullGuide: "1.断电重启后重新运行程序。2.检查温度传感器连接线是否松动。3.测量传感器阻值(25℃约5-10K)。4.更换温度传感器。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "Ur", descShort: "额外漂洗提示/检测到不平衡", fullGuide: "1.此提示表示检测到不平衡，正在添加额外漂洗。2.按任意键解除显示。3.此非故障。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "Cb/C6", descShort: "校准模式/重量检测校准", fullGuide: "1.校准模式用于重新校准重量检测。2.校准模式会前后转动滚筒1-3分钟后自动结束。3.校准时空桶状态进行。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "CL", descShort: "童锁已开启", fullGuide: "1.童锁模式已开启。2.长按童锁键解除童锁。3.参考用户手册了解如何解除儿童锁。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "dn", descShort: "正在下载更新", fullGuide: "1.洗衣机正在下载软件更新。2.更新期间控制面板无响应。3.更新约需15分钟，完成后信息将消失。4.保持洗衣机通电。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "0", descShort: "滚筒清洁提醒", fullGuide: "1.此非故障，是运行清洁程序的提醒。2.建议定期运行滚筒清洁程序以保持卫生。3.机器可正常运行。[来源：三星官网]" },
{ brand: "三星", category: "washer", code: "END", descShort: "程序结束", fullGuide: "洗衣机程序运行结束，属正常提示。[来源：三星官网]" },
{ brand: "三洋", category: "washer", code: "E1", descShort: "排水超时/排水管堵塞", fullGuide: "1.检查排水管是否放下或弯折。2.清理排水泵过滤器内的硬币、纽扣、毛絮等异物。3.检查排水泵是否堵塞或损坏。4.检查排水管是否冻结。5.更换排水泵。[来源：三洋售后资料]" },
